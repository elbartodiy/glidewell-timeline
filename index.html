овое экранное прочтение этой арки. Идея два: это ваша петля Части 14 — фильм о прошлом (аналоговые истоки) и фильм о будущем (передача власти, экосистема) встречаются здесь; смонтируйте кухонную лабораторию 1970-го против сканера 2022-го и титр «Constant Change».<br><br><b>Кто может об этом говорить.</b> Джим Глайдвелл — мемуары, отказ продавать, зачем понадобилась вторая рука на штурвале. Нил Парк — брал у Джима интервью о книге на Chairside Live, может задать рамку наследия. Стефани Годдард (доступность to-confirm) — передача власти изнутри. Лайла и Джимми — взгляд следующего поколения на наследование миссии. Продуктовые лиды по fastscan.io / Medit — про сканер как часть экосистемы.<br><br><b>Проверить до экрана.</b> Сверить написание имени CEO («Stephenie Goddard») и точные титул/даты — объявление 22 декабря 2021, вступление в силу 1 января 2022; приход в 2006-м и точные прежние роли. Сверить месяц выхода мемуаров (декабрь 2020), издателя (Harriman House) и полный подзаголовок. Сверить год запуска fastscan.io и точную природу партнёрства с Medit (ребрендинг или совместная разработка) до произнесения с экрана. Держать формулировку «сделали доступным / вывели на рынок», никогда — «изобрели»."}},
  {y:"early 20s", tr:"g", star:{en:"Thesis",ru:"Тезис"}, j:["digital"], tier:1, sc:[5,8,9,12],
    t:{en:"AI · scale",ru:"ИИ · масштаб"},
    d:{en:"CrownAI / MarginAI; ~500K/mo, 5,000+ staff, $700M+ — largest in the world.",ru:"CrownAI / MarginAI; ~500K/мес, 5,000+ сотрудников, $700M+ — крупнейшая в мире."},
    th:{en:"The flywheel: cheaper to make → wider access → reinvest.",ru:"Маховик: дешевле → шире доступ → реинвест."},
    full:{en:"<b>What happened.</b> By the early 2020s Glidewell folds generative AI design into the heart of its lab — tools like CrownAI and MarginAI that propose a finished crown and its margin line automatically, rather than waiting for a technician to draw every case from scratch. This sits on top of staggering volume: a reported ~500,000 restorations a month (to confirm with the company), 5,000+ staff (to confirm), $700M+ in revenue (to confirm), and the claim of being the largest dental lab in the world (to confirm). The point is not that Glidewell “invented AI” — it did not — but that it brought AI design to scale and made it the default path for routine cases. Sergei Azernikov, VP of CAD/CAM Software and the de-facto AI lead, describes a closed quality loop: millions of cloud cases train a generative model that now produces more than 95% of the lab's restoration designs (Glidewell, 2025–26) — the design is good enough that a human rarely needs to touch it.<br><br><b>Why it matters — the flywheel.</b> This beat IS the thesis made concrete. The film's whole argument — make the best dentistry affordable — runs on one engine: cheaper to make means wider access, wider access funds reinvestment, reinvestment makes it cheaper still. AI design is where that flywheel becomes visible and undeniable. When a model designs the crown in seconds — now more than 95% of restoration designs — across roughly half a million units a month, the cost of the single most labor-intensive step collapses — and scale plus AI becomes the affordability proof, not a slogan. Access is the throughline, and here it stops being aspiration and becomes arithmetic.<br><br><b>The link to the next generation.</b> Every earlier beat — Jim's bet on in-house manufacturing, the move to digital scanning, BruxZir and milled zirconia at volume — was a rung on this same ladder: each one drove unit cost down and pulled more patients into reach. AI design is simply the latest, sharpest rung. The pioneers built the volume; this generation taught the volume to design itself. That is the continuity the film should make the audience feel — not a sudden tech leap, but the same idea Jim started with, finally compounding.<br><br><b>Modern echo.</b> The echo is the closed loop itself, running right now: every case the lab ships feeds the next design, so the system keeps getting cheaper and better without a new factory or a new hire. Idea — let Azernikov open the AI black box on camera: show a raw scan, the model's proposed crown, the ~98% that ship untouched and the human catch on the rest. That single demo turns an abstract claim into something the viewer watches happen, and it positions the flywheel as the film's central engine across Parts 5, 8, 9 and 12.<br><br><b>Who can speak to it.</b> Sergei Azernikov carries this beat — the generative crown design, the cloud-case training set, the >95%-AI-generated figure and what the closed quality loop really means. David Leeson, VP of Engineering, on the automation that lets a design become a finished restoration at this volume. Jim on the why — why affordability was always the goal and why AI is the means, not the headline.<br><br><b>Verify before screen.</b> Confirm ALL figures privately with the company before anything reaches the screen: the ~500,000 units/month, the 5,000+ staff, the $700M+ revenue, the “largest dental lab in the world” claim, and the >95%-AI-generated figure. Treat every number here as an unverified claim until Glidewell confirms it; web sources are not sufficient on the private financials. Hold the line on language — “brought AI design to scale,” “made it the default,” never “invented AI.”",ru:"<b>Что произошло.</b> К началу 2020-х Glidewell встраивает генеративный ИИ-дизайн в самое сердце лаборатории — инструменты вроде CrownAI и MarginAI, которые сами предлагают готовую коронку и линию края, а не ждут, пока техник вычертит каждый случай вручную. Всё это поверх колоссального объёма: по заявлениям — около 500 000 реставраций в месяц (уточнить у компании), 5 000+ сотрудников (уточнить), выручка $700M+ (уточнить) и заявление о крупнейшей зуботехнической лаборатории в мире (уточнить). Суть не в том, что Glidewell «изобрёл ИИ» — нет; суть в том, что компания вывела ИИ-дизайн на масштаб и сделала его маршрутом по умолчанию для рутинных случаев. Сергей Азерников, VP CAD/CAM Software и де-факто лидер по ИИ, описывает замкнутый контур качества: миллионы облачных кейсов обучают генеративную модель, чьи модель теперь создаёт свыше 95% дизайнов реставраций (Glidewell, 2025–26) — дизайн настолько хорош, что человеку редко нужно его трогать.<br><br><b>Почему это важно — маховик.</b> Этот бит И ЕСТЬ тезис, сделанный осязаемым. Весь аргумент фильма — сделать лучшую стоматологию доступной — держится на одном двигателе: дешевле производить значит шире доступ, шире доступ финансирует реинвестиции, реинвестиции делают ещё дешевле. ИИ-дизайн — это место, где маховик становится видимым и неоспоримым. Когда модель проектирует коронку за секунды — теперь свыше 95% дизайнов реставраций — на полумиллионе единиц в месяц, стоимость самого трудоёмкого шага обрушивается — и масштаб плюс ИИ становится доказательством доступности, а не лозунгом. Доступ — это сквозная линия, и здесь она перестаёт быть мечтой и становится арифметикой.<br><br><b>Связь со следующим поколением.</b> Каждый прежний бит — ставка Джима на собственное производство, переход к цифровому сканированию, BruxZir и фрезерованный диоксид циркония в объёме — был ступенью той же лестницы: каждая снижала себестоимость единицы и втягивала в зону доступа больше пациентов. ИИ-дизайн — просто новейшая и самая острая ступень. Пионеры построили объём; это поколение научило объём проектировать самого себя. Именно эту преемственность фильм должен дать зрителю почувствовать — не внезапный технологический скачок, а ту же идею, с которой начинал Джим, наконец вышедшую на сложный процент.<br><br><b>Современное эхо.</b> Эхо — это сам замкнутый контур, работающий прямо сейчас: каждый случай, который отгружает лаборатория, кормит следующий дизайн, и система продолжает становиться дешевле и лучше без новой фабрики и новых наймов. Идея — пусть Азерников откроет «чёрный ящик» ИИ на камеру: показать сырой скан, предложенную моделью коронку, те ~98%, что уходят нетронутыми, и ручную доводку на остальных. Эта одна демонстрация превращает абстрактное заявление в то, что зритель видит вживую, и ставит маховик как центральный двигатель фильма через Части 5, 8, 9 и 12.<br><br><b>Кто может об этом говорить.</b> Сергей Азерников несёт этот бит — генеративный дизайн коронок, обучающая выборка из облачных кейсов, свыше 95% ИИ-дизайнов и что на деле означает замкнутый контур качества. Дэвид Лисон, VP Engineering, — об автоматизации, которая позволяет дизайну стать готовой реставрацией на таком объёме. Джим — о «зачем»: почему доступность всегда была целью и почему ИИ — это средство, а не заголовок.<br><br><b>Проверить до экрана.</b> Подтвердить ВСЕ цифры приватно с компанией прежде, чем что-либо попадёт на экран: ~500 000 единиц в месяц, 5 000+ сотрудников, выручка $700M+, заявление о «крупнейшей лаборатории в мире» и цифру >95% ИИ-дизайнов. Считать каждое число здесь непроверенным заявлением, пока Glidewell не подтвердит; веб-источников недостаточно по приватным финансам. Держать язык — «вывели ИИ-дизайн на масштаб», «сделали маршрутом по умолчанию», никогда «изобрели ИИ»."}},
  {y:"2026 · Today", tr:"i", j:["restorative","digital","ce","implants","preventive"], tier:1, sc:[11,12,14],
    t:{en:"AI + chairside frontier",ru:"ИИ + кресло: фронтир"},
    d:{en:"Automated monolithic milling is the norm; AI + robotics + single-visit define the frontier.",ru:"Автоматическая фрезеровка монолита — норма; ИИ + роботы + один визит определяют фронтир."},
    th:{en:"An arc the length of one life: craft → digital → automation.",ru:"Дуга длиной в жизнь: ремесло→цифра→автоматика."},
    full:{en:"<b>What happened.</b> This is the present — the beat the film is shot from, in 2026. Automated monolithic milling, the same-visit zirconia crown Glidewell helped push to scale, is no longer remarkable; it is simply how chairside dentistry runs. The frontier has moved to three converging fronts: AI that reads scans and drafts restoration designs, robotics that guide the hand in surgery, and the single-visit promise extended from the crown to the whole treatment. By late 2025, AI-assisted CAD tools were reported to cut design time by 30–45 minutes per case and reduce remakes by roughly 18 percent, while Neocis cleared its next-generation Yomi S implant robot with FDA, its planning AI auto-segmenting anatomy from CBCT scans — a system now reachable by general dentists, not just specialists.<br><br><b>Why it matters — access, today.</b> Every prior beat in this film bent toward one line: make the best dentistry affordable. The 2026 frontier is that same throughline, now carried by software and machines. AI design and chairside automation compress chair time, labor, and remakes — and cost follows time. The honest claim here is not that anyone “invented” single-visit or robotic dentistry; it is that the tools are being made the default and brought within reach of the everyday practice, which is exactly where access lives or dies.<br><br><b>The link to the next generation.</b> This is the hinge into Part 14. The present is not an endpoint but a vantage point: from here the film looks forward to a generation of dentists who will treat AI co-design and robotic guidance as ordinary, the way this generation treats the milling unit. Idea: shoot Abdul mid-case in 2026 as the living present, then let his work dissolve into the forecast — the same chair, a decade on.<br><br><b>Modern echo.</b> Use Bill Dorfman as the lay-audience, future-facing voice: the mainstream-famous face who can translate the frontier for a non-dentist viewer and deliver the 10-year and 50-year forecast (clearly framed as forecast, not fact). Set his optimism against the frontier voices — Azernikov and Leeson on AI and robotics — and against Jim's long view. Idea: let Dorfman ask the questions a patient would ask, and let the engineers and Jim answer, so the optimistic close lands as earned, not asserted. Tie it back to the patient and to Abdul's chair so the future stays human, not gadgetry.<br><br><b>Who can speak to it.</b> Bill Dorfman (lay-audience, forecast); Azernikov and Leeson (AI plus robotics frontier); Jim Glidewell (the long view, access throughline); Abdul (the present, in-office); the patient (the human stakes). Parts 11, 12, 14.<br><br><b>Verify before screen.</b> Confirm the Yomi S FDA clearance date and that it is clearance, not “approval,” before any on-screen claim (Neocis announced it around November 2025). Treat the AI design time-savings and remake-reduction figures as 2025 study-reported, single-source — re-check or attribute on screen, do not state as settled. Every 10-year and 50-year statement is forecast and must be labeled as one speaker's prediction, not fact. Hold the line on language: affordable, the default, brought to scale — never “invented.”<br><br><b>The close (Eldon #52 + our conflict).</b> End the film on the note Eldon suggested — Glidewell never rests on what it has built; it keeps reimagining what's possible so quality smile care can reach everyone. Pair it with the honest tension that carries the whole film: for all the millions of smiles the industry and Glidewell have restored, in the US alone 72 million adults still have no dental insurance — and worldwide, more than two billion still can't get the care they need — and AI, 3D printing and the next generation are where that unfinished work goes next. Not a triumph — a promise still being kept.",ru:"<b>Что произошло.</b> Это настоящее — точка, из которой снят фильм, 2026 год. Автоматизированное фрезерование монолитных коронок, то самое «за один визит» из циркония, которое Glidewell помог вывести на массовый масштаб, больше не сенсация; так просто работает современная chairside-стоматология. Фронтир сместился на три сходящихся направления: ИИ, который читает сканы и набрасывает дизайн реставраций; робототехника, направляющая руку в хирургии; и обещание одного визита, расширенное с коронки на весь курс лечения. К концу 2025 года ИИ-ассистированные CAD-инструменты, по сообщениям, сокращали время дизайна на 30–45 минут на случай и снижали переделки примерно на 18 процентов, а Neocis получил FDA-clearance на следующее поколение имплант-робота Yomi S, чей планировочный ИИ автоматически сегментирует анатомию по CBCT-снимкам — система, доступная теперь и врачам общей практики, а не только специалистам.<br><br><b>Почему это важно — доступ, сегодня.</b> Каждая прежняя веха фильма сгибалась к одной линии: сделать лучшую стоматологию доступной. Фронтир 2026-го — та же сквозная линия, но теперь её несут софт и машины. ИИ-дизайн и chairside-автоматизация сжимают время в кресле, труд и переделки — а за временем следует цена. Честная формулировка тут не в том, что кто-то «изобрёл» однопосещенческую или роботизированную стоматологию; в том, что эти инструменты делаются нормой по умолчанию и подводятся к рядовой практике — а именно там доступ живёт или умирает.<br><br><b>Связь со следующим поколением.</b> Это шарнир в Часть 14. Настоящее — не конечная точка, а точка обзора: отсюда фильм смотрит вперёд, на поколение врачей, для которых ИИ-содизайн и роботизированное наведение будут обыденностью — как для нынешнего поколения фрезерный блок. Идея: снять Абдула в работе над случаем в 2026-м как живое настоящее, а затем растворить его работу в прогнозе — то же кресло, десять лет спустя.<br><br><b>Современное эхо.</b> Использовать Билла Дорфмана как голос массовой аудитории, обращённый в будущее: знаменитое лицо, способное перевести фронтир для зрителя-нестоматолога и дать прогноз на 10 и 50 лет (чётко обозначив как прогноз, а не факт). Поставить его оптимизм против голосов фронтира — Азерникова и Лисона об ИИ и робототехнике — и против долгого взгляда Джима. Идея: пусть Дорфман задаёт вопросы, которые задал бы пациент, а инженеры и Джим отвечают — тогда оптимистичный финал прозвучит как заслуженный, а не назначенный. Привязать обратно к пациенту и креслу Абдула, чтобы будущее осталось человеческим, а не про гаджеты.<br><br><b>Кто может об этом говорить.</b> Билл Дорфман (массовая аудитория, прогноз); Азерников и Лисон (фронтир ИИ плюс робототехника); Джим Глайдвелл (долгий взгляд, сквозная линия доступа); Абдул (настоящее, в кабинете); пациент (человеческая ставка). Части 11, 12, 14.<br><br><b>Проверить до эфира.</b> Подтвердить дату FDA по Yomi S и что это именно clearance, а не «approval», прежде чем любое экранное утверждение (Neocis объявил об этом около ноября 2025). Считать цифры экономии времени дизайна и снижения переделок данными исследований 2025 года из одного источника — перепроверить или дать атрибуцию на экране, не подавать как устоявшийся факт. Любое утверждение про 10 и 50 лет — прогноз и должно быть помечено как предсказание одного спикера, а не факт. Держать линию в языке: доступно, по умолчанию, выведено на масштаб — никогда «изобрёл».<br><br><b>Финал (Eldon #52 + наш конфликт).</b> Закрыть фильм на ноте Элдона — Glidewell не почивает на построенном; продолжает переосмыслять возможное, чтобы качественная забота об улыбке дошла до каждого. Соединить с честным напряжением, что несёт весь фильм: при всех миллионах улыбок, восстановленных индустрией и Glidewell, только в США 72 млн взрослых всё ещё без стомат-страховки — а в мире больше двух миллиардов всё ещё не могут получить помощь — и ИИ, 3D-печать и следующее поколение — это то, куда идёт дальше эта незавершённая работа. Не триумф — обещание, которое ещё держат."}}
];

const SCENE_DESC = {
  1:{en:"The film opens by showing what dentistry used to be: a slow, analog craft where a single crown or denture was shaped by hand in wax and plaster, took weeks to make, and left the patient waiting and uncomfortable. We watch a craftsman at his bench in this almost-vanished world — and though it is shot today, it is staged to look at first like old archive footage, with the truth revealed only later. This is the film’s baseline, the “before” against which everything that follows is measured, so we can feel just how far dentistry has come — and how much faster, cheaper, and easier Glidewell would help make it.",ru:"Фильм открывается тем, какой стоматология была раньше: медленное аналоговое ремесло, где одну коронку или протез вручную лепили из воска и гипса, на изготовление уходили недели, а пациент всё это время ждал и терпел неудобство. Мы видим мастера за рабочим столом в этом почти исчезнувшем мире — и хотя снято это сегодня, подано так, что поначалу выглядит как старая архивная плёнка, а правда раскрывается лишь позже. Это точка отсчёта фильма, то самое «до», с которым сравнивается всё последующее, чтобы зритель почувствовал, как далеко шагнула стоматология — и насколько быстрее, дешевле и проще её помогла сделать Glidewell."},
  2:{en:"This part makes the problem personal. Before any technology, the film pauses on people: someone who covers their mouth when they laugh, who puts off a crown because it costs too much, who lives with a missing tooth because good dental work was slow, expensive, or simply out of reach. We hear what that gap actually costs — the shame of a hidden smile, the self-esteem that erodes, the health quietly lost by those who could never afford care. It sets the human stakes the rest of the film answers: this is the pain that makes the mission — the best dentistry, made affordable — worth pursuing.",ru:"Эта часть делает проблему личной. Ещё до всякой технологии фильм останавливается на людях: на том, кто прикрывает рот, когда смеётся; кто откладывает коронку, потому что слишком дорого; кто живёт с отсутствующим зубом, потому что хорошая стоматология была медленной, дорогой или попросту недоступной. Мы видим, чего на самом деле стоит этот разрыв — стыд за спрятанную улыбку, подтачиваемую самооценку, тихо теряемое здоровье тех, кто так и не смог позволить себе помощь. Здесь задаются человеческие ставки, на которые отвечает весь остальной фильм: это та боль, ради которой стоит браться за миссию — сделать лучшую стоматологию доступной."},
  3:{en:"The film's engine starts here: the same act, cut side by side across fifty years — the impression tray against the scanning wand, the hand wax-up against an AI design proposal, the courier box against a file in the cloud. And the spine begins: one real same-day crown, timecoded from a broken tooth in the morning to a seated crown by late afternoon. The patient stays in the chair and watches their own crown designed and milled — “put the block in, change the bur, close the door, hit start.” What used to be the entire plot of a crown — weeks, second visits, waiting with a hole in your smile — becomes a single scene. The film’s promise, made physical.",ru:"Здесь запускается двигатель фильма: одно и то же действие, смонтированное встык через пятьдесят лет — ложка со слепочной массой против сканера, восковка руками против ИИ-предложения дизайна, коробка курьера против файла в облаке. И начинается хребет: одна настоящая same-day коронка с таймкодом — от сломанного зуба утром до установленной коронки к вечеру. Пациент остаётся в кресле и смотрит, как его коронку проектируют и фрезеруют — «поставь блок, смени бор, закрой дверцу, нажми старт». То, что раньше было целым сюжетом коронки — недели, вторые визиты, ожидание с дыркой в улыбке, — становится одной сценой. Обещание фильма, ставшее физическим."},
  4:{en:"The honest counterweight: roughly half the profession still pours physical impressions — and the film refuses to mock them. The barriers are real: an investment around $55K, a learning curve that eats your evenings, and the quiet fear of “who do I call if the software fails mid-appointment.” Nobody converts on camera here — the longitudinal arc is gone by design. Instead, the people who DID cross tell what the crossing cost: Abdul was skeptical, kept backup impressions “just in case technology fails me,” and needed a pandemic to make the leap; even the company’s own people admit change is difficult for everybody. This chapter gives resistance its dignity — because the film’s thesis only lands if the wall is real.",ru:"Честный противовес: примерно половина профессии до сих пор льёт физические слепки — и фильм отказывается над ними смеяться. Барьеры реальны: вложение около $55K, кривая обучения, съедающая вечера, и тихий страх «кому я позвоню, если софт упадёт посреди приёма». Никто не конвертируется в кадре — лонгитюдная арка убрана сознательно. Вместо этого те, кто перешёл, рассказывают, чего стоил переход: Абдул был скептиком, держал страховочные слепки «на случай, если технология меня подведёт», и ему понадобилась пандемия, чтобы сделать прыжок; даже люди самой компании признают — перемены трудны для всех. Эта глава даёт сопротивлению его достоинство: тезис фильма работает, только если стена настоящая."},
  5:{en:"The film follows the start of the production pipeline: Glidewell specialists taking the physical molds a dentist sends in and converting them into clean, precise digital files. On screen you see the people and machines on the line — impressions being scanned, raw shapes turning into 3D data that a technician checks and tidies up. This is the upstream source that feeds everything downstream: the same digital cases train and guide the AI and drive the automated factory. It matters to the film's thesis because affordable, scalable dentistry begins with capturing every case as reliable data, and it shows the largely invisible workforce of roughly five thousand people whose hands make that scale possible.",ru:"Здесь фильм показывает начало производственного конвейера: специалисты Glidewell берут физические слепки, присланные стоматологом, и превращают их в чистые, точные цифровые файлы. На экране — люди и техника «на линии»: слепки сканируются, сырые формы становятся трёхмерными данными, которые техник проверяет и доводит до чистоты. Это исток всего потока: те же оцифрованные кейсы обучают и направляют ИИ и питают автоматизированную фабрику. Для тезиса фильма это важно, потому что доступная и масштабируемая стоматология начинается с превращения каждого случая в надёжные данные, и здесь показана почти невидимая рабочая сила — около пяти тысяч человек, чьи руки и делают этот масштаб возможным."},
  6:{en:"The other half of the gap: even when the technology is ready, the patient does not come. The walls are fear (numbing, discomfort, someone working in your mouth), time, and money — “dentistry is not cheap.” And a quieter wall: awareness. Most people do not know a same-day crown exists — ask on the street and they will say no. The chapter’s answer is not a gadget: trust is the number one factor, the relationship that calms everything else; showing the patient the process reinforces it. This is where the film says its hardest sentence out loud: technology by itself does not equal access.",ru:"Вторая половина разрыва: даже когда технология готова, пациент не приходит. Стены — страх (анестезия, дискомфорт, кто-то работает у тебя во рту), время и деньги — «стоматология не дешёвая». И стена потише: осведомлённость. Большинство не знает, что same-day коронка существует, — спроси на улице, и скажут «нет». Ответ главы — не гаджет: доверие — фактор номер один, отношения, которые успокаивают всё остальное; показ пациенту процесса это доверие усиливает. Здесь фильм произносит вслух свою самую трудную фразу: технология сама по себе не равна доступу."},
  7:{en:"The film names the problem the rest of the story answers: good dentistry has long been slow and expensive — and the two are the same fact. Here the viewer feels the old workflow from the patient’s side of the chair: visits stretched across weeks, time off work, the bill — and that quieter tax, the second appointment that was “easy work” for the dentist but another numbing, another absence, another fee for the patient. The chapter runs on the visits arithmetic: two or three appointments where one now suffices; chair time that cost the dentist and the patient alike. It sets up the question the price-formula chapter answers with numbers: why does a crown cost what it costs — and which line items did the change of eras actually delete?",ru:"Фильм называет проблему, на которую отвечает вся остальная история: хорошая стоматология долго была медленной и дорогой — и это один и тот же факт. Здесь зритель чувствует старый workflow со стороны пациента: визиты, растянутые на недели, отгулы, счёт — и тихий налог: второй приём, который для врача был «лёгкой работой», а для пациента — ещё одной анестезией, ещё одним отсутствием, ещё одной оплатой. Глава держится на арифметике визитов: два-три приёма там, где теперь хватает одного; кресло-часы, которые стоили и врачу, и пациенту. Она ставит вопрос, на который глава формулы цены ответит цифрами: почему коронка стоит столько — и какие строки затрат смена эпох реально удалила?"},
  8:{en:"The film turns from the problem to the man who answered it: this is where the film shows how Jim Glidewell actually solved the cost-versus-quality bind. We meet the man behind it — a self-taught craftsman who started a removable-dental lab on his own in 1970, and we see how his hard-won principles became a way of running a business. The heart of the chapter is the flywheel: make the work cheaper, which widens the market because more dentists and patients can afford it, then reinvest the gains to make it cheaper still. It matters because this is the engine of the whole thesis — affordability is not a discount, it is a self-reinforcing loop that keeps spinning, and everything later in the film rides on it.",ru:"Здесь фильм поворачивает от проблемы к человеку, который её решил: здесь фильм показывает, как именно Джим Глайдвелл развязал узел «цена против качества». Мы знакомимся с самим этим человеком — мастером-самоучкой, который в 1970-м сам, в одиночку, открыл лабораторию съёмного протезирования; и видим, как его выстраданные принципы превратились в способ вести дело. Сердце главы — маховик: сделать работу дешевле, отчего рынок расширяется, ведь больше стоматологов и пациентов могут себе её позволить, а выигрыш реинвестируется, чтобы сделать ещё дешевле. Это важно, потому что здесь — двигатель всего тезиса: доступность это не скидка, а самоподдерживающийся цикл, который продолжает раскручиваться, и на нём держится всё дальнейшее в фильме."},
  9:{en:"The film breaks open the price of a dental restoration to show what actually drives it: a simple formula of line-items times the number of patient visits. The viewer sees how a traditional crown stacks up cost on every return trip and every outside lab and provider involved, then watches that math collapse when the work is done chairside in a single visit — using same-day milling (fastmill.io/glidewell.io), Next-Day turnaround and materials like BruxZir. The takeaway is the strategy itself: cut the visits, cut the providers, and the price falls with them. It is the mechanical heart of the film’s thesis — vertical integration is how the best dentistry is made affordable, not by cutting corners but by collapsing the formula.",ru:"Здесь фильм разбирает цену зубной реставрации, чтобы показать, из чего она реально складывается: простая формула — число позиций, умноженное на число визитов пациента. Зритель видит, как обычная коронка накапливает стоимость с каждым повторным визитом и каждой внешней лабораторией и исполнителем, а затем наблюдает, как эта арифметика схлопывается, когда работа делается в кресле за один визит — благодаря фрезеровке в тот же день (fastmill.io/glidewell.io), производству Next-Day и материалам вроде BruxZir. Главная мысль — сама стратегия: сократи визиты, сократи число исполнителей, и цена падает вместе с ними. Это механическое сердце тезиса фильма: вертикальная интеграция — это способ сделать лучшую стоматологию доступной, не срезая углы, а схлопывая саму формулу."},
  10:{en:"This part steps back from the story to state Glidewell's core philosophy in plain terms: drive the cost of quality dentistry down, widen access so more patients can be treated, and keep pushing the field forward — all powered by one tightly controlled, end-to-end vertical system that owns each step from materials to milling to finished restoration.<br><br>On screen the viewer sees that machine in motion: the company disrupting its own products, the wave of new materials it brought to market through the 2010s, its education arm (symposia, CE centers, the Online Study Club, Guiding Leaders), and direct-to-dentist channels like Glidewell Direct and chairside milling. Because Glidewell sells to dentists rather than patients, the payoff is leverage — make something cheaper and better once, and it spreads across thousands of practices and the patients they serve.<br><br>It lands as the film’s thesis stated outright, the spine that ties the earlier chapters together before the arc moves toward proof and what comes next.",ru:"Эта часть делает шаг назад от повествования и проговаривает философию Glidewell начистоту: снижать стоимость качественной стоматологии, расширять доступ, чтобы помощь получало больше пациентов, и постоянно двигать отрасль вперёд — и всё это за счёт одной плотно контролируемой вертикальной системы, которая владеет каждым шагом от материалов до фрезеровки и готовой реставрации.<br><br>На экране зритель видит эту машину в работе: компанию, которая не боится конкурировать сама с собой, волну новых материалов, выведенных на рынок в 2010-х, образовательное крыло (симпозиумы, CE-центры, Online Study Club, Guiding Leaders) и прямые каналы к стоматологу вроде Glidewell Direct и фрезеровки у кресла. Поскольку Glidewell продаёт стоматологам, а не пациентам, эффект масштабируется: сделай что-то дешевле и лучше один раз — и это расходится по тысячам клиник и их пациентам.<br><br>Это звучит как прямо высказанный тезис фильма, стержень, связывающий предыдущие главы воедино, прежде чем дуга движется к доказательствам и к тому, что будет дальше."},
  11:{en:"This part shows that the future the film has been building toward is already underway — and lets us see who is making it. We go onto the floor of Glidewell’s automated, AI-driven manufacturing. This is the BruxZir factory that, by the company’s own figures, turns out on the order of half a million restorations a month.<br><br>David Leeson’s engineering team runs the banks of robotic mills; Sergei Azernikov’s software designs the crowns with AI before they are ever cut — the company says that, as of April 2026, more than 30 million cases sit in its cloud and over 95% of restoration designs are now proposed by the AI.<br><br>Around the factory are the tools reaching dentists right now: the glidewell.io system that lets a practice scan, design and seat a crown in a single visit; an in-house micro-CT scanner that checks each unit’s quality (a step the independent press has covered); and the new fastsmile.io facial scanner. The point for the thesis is concrete — this is not a promise about tomorrow but production happening today, and as it scales, the same affordable, high-quality dentistry reaches hundreds of thousands more patients.",ru:"Эта часть показывает, что будущее, к которому фильм вёл зрителя, уже наступает — и даёт увидеть, кто его делает. Мы выходим в цех автоматизированного производства Glidewell на базе ИИ. Это фабрика BruxZir, которая, по собственным данным компании, выпускает порядка полумиллиона реставраций в месяц.<br><br>Инженерная команда Дэвида Лисона ведёт связки роботизированных фрезеров; программа Сергея Азерникова проектирует коронки с помощью ИИ ещё до того, как их вырежут, — компания сообщает, что на апрель 2026 года в её облаке больше 30 миллионов кейсов, и свыше 95% дизайнов реставраций теперь предлагает ИИ.<br><br>Вокруг фабрики — инструменты, доходящие до врачей прямо сейчас: система glidewell.io, позволяющая практике отсканировать, спроектировать и установить коронку за один визит; собственный микро-КТ-сканер, проверяющий качество каждой единицы (этот шаг освещала независимая пресса); и новый сканер лица fastsmile.io. Для главной идеи фильма мысль предельно конкретна — это не обещание про завтра, а производство, идущее сегодня, и по мере масштабирования та же доступная и качественная стоматология доходит до сотен тысяч новых пациентов."},
  12:{en:"The film turns from Glidewell’s past to its future — where the company is placing its next bets. Behind that future is a real engine room: an R&D group of more than 150 people, including roughly a dozen PhDs, a U.S. patent portfolio approaching 100 (with dozens more pending as of 2023), and an enormous library of digital scan data — which is what actually trains the company’s AI.<br><br>A few people carry that future most directly, and each is worth an interview. Sergei Azernikov built and runs the AI that now designs the crowns — software that proposes the shape of the tooth before a human ever touches it. David Leeson is the engineer behind the automated, robotic factory that then makes those crowns at scale. Maggie Liu’s materials team works the next frontier: 3D-printed permanent restorations and dentures, the likely successor to milling. They work under CEO Stephenie Goddard, while founder and president Jim Glidewell holds the “why” — all of it exists to drive the cost of good dentistry down.<br><br>The company also grows by buying its way into new ground — for example ORB Innovations in 2023, a smart sensor mouthguard that points it toward data and prevention — and by keeping its platform open to scans from any scanner, not just its own. The honest throughline: every one of these bets aims at a single goal — making the best dentistry reachable for more patients — but technology by itself is not access. It still takes the next generation of dentists to carry it to the people who need it.",ru:"Здесь фильм разворачивается от прошлого Glidewell к будущему — куда компания делает следующие ставки. За этим будущим стоит настоящее «машинное отделение»: подразделение R&D больше чем из 150 человек, включая около десятка докторов наук, патентный портфель под сотню в США (и ещё десятки в рассмотрении на 2023 год) и огромная библиотека цифровых данных сканирования — именно она и обучает ИИ компании.<br><br>Несколько человек несут это будущее напрямую, и каждого стоит снять. Сергей Азерников создал и ведёт ИИ, который теперь проектирует коронки, — программу, предлагающую форму зуба ещё до того, как к ней притронется человек. Дэвид Лисон — инженер, стоящий за автоматизированной роботизированной фабрикой, которая затем делает эти коронки в масштабе. Команда Мэгги Лю по материалам работает над следующим рубежом: 3D-печатными постоянными реставрациями и протезами, вероятным преемником фрезеровки. Все они работают под началом CEO Стефани Годдард, тогда как основатель и президент Джим Глайдвелл держит «зачем» — всё это существует, чтобы снижать стоимость хорошей стоматологии.<br><br>Компания растёт и через покупки — например, ORB Innovations в 2023 году, умный сенсорный капп, разворачивающий её в сторону данных и профилактики, — и через открытую платформу, которая принимает скан с любого сканера, а не только своего. Честная сквозная мысль такая: каждая из этих ставок целит в одно — сделать лучшую стоматологию доступнее большему числу пациентов, — но технология сама по себе доступом не является. Донести её до тех, кому она нужна, всё равно должно новое поколение врачей."},
  13:{en:"The film closes by turning toward the future: the young dental interns and residents who will carry the craft forward. We meet the next generation through Glidewell’s education and mentorship programs — Guiding Leaders, the continuing-education centers, the symposia — where new clinicians learn implants, esthetics, and the discipline of the trade. This is the flywheel reinvesting in itself: the profits and know-how from making great dentistry affordable are plowed back into the people who will keep that mission going. It matters because the thesis only holds if the craft outlives any one company or founder — the future of dentistry depends on who gets trained next.",ru:"Фильм завершается поворотом к будущему: молодые стоматологи-интерны и ординаторы, которым предстоит понести ремесло дальше. Со следующим поколением мы знакомимся через образовательные и наставнические программы Glidewell — Guiding Leaders, центры непрерывного образования, симпозиумы, — где новые врачи осваивают имплантацию, эстетику и саму дисциплину профессии. Это маховик, реинвестирующий сам в себя: прибыль и знания, полученные от того, что качественную стоматологию сделали доступной, вкладываются обратно в людей, которые продолжат эту миссию. Это важно, потому что тезис фильма держится только если ремесло переживёт любую отдельную компанию или основателя — будущее стоматологии зависит от того, кого обучат следующим."},
  14:{en:"The film closes by looking ahead: if the past chapters showed how Glidewell drove down the cost of high-quality dentistry, this part asks where that road leads—10 years out, then 50. Through the people we have followed and voices from across the field, we hear an optimistic forecast: better materials, faster digital and chairside workflows, and care that keeps reaching more patients who once couldn’t afford it. The tone is hopeful rather than triumphant, anchored in Jim Glidewell’s creed of constant change and in glidewell.io as a signpost of where the work is headed. It lands on the emotional payoff of the whole arc—the smiles that haven’t lit up yet, the ones this future is meant to make possible.",ru:"Фильм завершается взглядом вперёд: если предыдущие главы показали, как Glidewell снижала стоимость качественной стоматологии, то эта часть спрашивает, куда ведёт эта дорога — через 10 лет, а затем через 50. Через героев, за которыми мы следили, и голоса со всей отрасли звучит оптимистичный прогноз: лучшие материалы, более быстрые цифровые и кресельные процессы и помощь, доходящая до всё большего числа пациентов, которым она раньше была не по карману. Тон скорее обнадёживающий, чем триумфальный, и опирается на кредо Джима Глайдвелла о постоянных переменах и на glidewell.io как ориентир того, куда движется работа. Финал выходит на эмоциональную развязку всей арки — на улыбки, которые ещё не зажглись, те самые, ради которых и задумано это будущее."}

  1:{en:"The opening looks like old film, though it is shot in the present. We move through tight, detail shots: (A) a technician carving a prosthesis by hand; (B) a dentist mixing material and taking a physical impression; then A and B together. Over it runs voice-over about how it used to be done. We gradually pull out to wide shots — and only at the end, from the details (a finished restoration; the dentist on the phone), do we realize this is the present day. Two recurring figures are seeded here: intern #1 (learning the old way in university training) and an old-school dentist who still mails Glidewell physical impressions rather than scans.<br><br>⚙ <b>Open production question:</b> we don’t yet have a place to FILM this legacy, hand-made process (carving a crown, casting, taking a physical impression the old way). We need to find one — a friendly lab or workshop, a university program, or Orange Coast College (where Jim trained — it may still teach the analog method and let us shoot the process). This is a question for Eric. Ties to tasks t2 (old-school dentist) and t8 (analog lab).",

         ru:"Группа Guiding Leaders физически на кампусе 16–17 июля — наше окно, чтобы снять программу в движении и кандидатов-героев из выпускников, которых рекомендовала Бобби (Ellen Paulisick, Nadia Rodriguez, Bianca Clark, Jim Lam). Снимаем в пятницу 17-го. Логистику и согласия заранее свести с Бобби Нортон; это первый большой съёмочный день с несколькими героями.\n**Образовательные интервью, которые брать здесь** (тема со всех сторон — короткие, в контексте, заряженные и открытые к разговору):\n• **Bobbie Norton** — ведёт GL; почему Glidewell отдаёт это бесплатно.\n• **Jim Glidewell** — образование как связь (программа 1980 → GITC → симпозиумы); почему вкладывается в обучение.\n• **David Rice (IgniteDDS)** — наставник следующего поколения; голос «пайплайна».\n• **Setareh Lavasani** — академический преподаватель (3D-визуализация); учит новое поколение читать современную технику.\n• **Dar Radfar** — обучает тысячи практик (сон/лазеры); расширяет, что лечит дантист; личная история-разворот.\n• **Eric Johnson** — коуч по лидерству и выгоранию, KOL/Study Club Glidewell; человеческая сторона профессии.\n• **Jinny Bender** — заново собрала карьеру вокруг цифры; учит glidewell.io (арка переоснащения).\n• **Christina Do** — лидер OC Dental Society + ранний адаптер fastmill; доступ + инновации.\n• **Danielle Brown** — Инглвуд, корни в общинных клиниках; репрезентация и доступ.\n• **Justin Chi / Taylor Manalili** — внутренние преподаватели по клин-технологиям и ортопедии.\n• **Выпускницы GL** (Ellen / Bianca / Jim Lam / Nadia) — что программа изменила для них.\n**Даты GL 2026 (карта под рукой, всё очно, Ирвайн — жирным = ещё впереди, с номером в серии):** "+glDatesLine('ru')+"."}},

   desc:{en:"The Guiding Leaders finale — the DOTR symposium, Oct 15–16 at the Glidewell Clinical Education Center, Irvine. Bobbie confirms this IS the graduation, and it's likely the film's climax.\nWhy it's gold for us: a tour of the world's largest dental lab (B-roll), and an exclusive party at Mesa Manor — Jim & Parvina Glidewell's home (intimate access that doubles for the personal film). Day 1 = real cases / wins & setbacks; Day 2 = hands-on workshops (guided implant surgery, smile design, scanning, 3D printing, same-day).\n**Speakers** (from the program — photos to add; backgrounds to confirm/expand with Bobbie):\n• **Jim Glidewell, CDT** — founder & president; the origin of the whole story.\n• **Ellen Paulisick, DDS, FAGD** — GL alumna & our hero candidate; built a brand-new practice fully on Glidewell (mill, scanner, HT implants).\n• **Bianca Clark, DDS** — GL alumna & our hero candidate; the program's go-to voice on 3D printing.\n• **Taylor Manalili, DDS** — on our roster: Glidewell Director of Clinical Prosthodontics, first Glidewell Fellow (2018); materials, AI, women in dentistry.\n• **Brittany Bergeron, DDS** — cosmetic practice owner (Towson, MD), women-in-dentistry leader & pro-bono access work; GL alumna.\n• **Bhumika Patel, DDS** — Bobbie singled her out on the program: owns her practice AND her own company selling wireless X-ray sensors (A2Z Imaging); hadn't spoken for GL before — “she's gonna be phenomenal.” Clinician-inventor; strong on innovation & women founders.\n• **David Rice, DDS** — founder of IgniteDDS (largest community for new dentists), DentistryIQ editor; the mentorship/pipeline voice.\n• **Setareh Lavasani, DDS, MS** — board-certified oral radiologist & professor (Western U); teaches reading modern 3D imaging.\n• **Dar Radfar, DDS** — trains thousands of practices in sleep medicine & lasers; expanding what dentists treat; a personal redirect story.\n• **Eric Johnson, DDS** — San Clemente owner, USAF vet, leadership/burnout coach & Glidewell KOL.\n• **Jinny Bender, DMD** — Glidewell clinician who reinvented late-career around digital; teaches glidewell.io.\n• **Christina Do, DDS** — Costa Mesa owner, OC Dental Society leader, fastmill power-user.\n• **Danielle Brown, DDS** — Glidewell clinician from Inglewood, community-clinic roots, NDA “40 Under 40”.\n(Identities web-confirmed; cross-check exact 2026 DOTR billing & a few titles before screen.)\nConfirm the exact graduation moment and our shooting access with Bobbie.",
         ru:"Финал Guiding Leaders — симпозиум DOTR, 15–16 октября в Glidewell Clinical Education Center, Ирвайн. Бобби подтверждает: это и есть выпускной, и вероятная кульминация фильма.\nЧем ценно для нас: тур по крупнейшей зуботехнической лаборатории мира (B-roll) и закрытая вечеринка в Mesa Manor — доме Джима и Парвины Глайдвелл (интимный доступ, который работает и на личный фильм). День 1 — реальные кейсы / удачи и провалы; День 2 — практические воркшопы (управляемая имплант-хирургия, дизайн улыбки, сканирование, 3D-печать, «за один визит»).\n**Спикеры** (из программы — фото добавим; бэкграунд сверить/дополнить с Бобби):\n• **Jim Glidewell, CDT** — основатель и президент; исток всей истории.\n• **Ellen Paulisick, DDS, FAGD** — выпускница GL и наш кандидат-герой; построила новую практику целиком на Glidewell (фрезер, сканер, импланты HT).\n• **Bianca Clark, DDS** — выпускница GL и наш кандидат-герой; главный голос программы по 3D-печати.\n• **Taylor Manalili, DDS** — из нашего ростера: директор по клинической ортопедии Glidewell, первый Glidewell Fellow (2018); материалы, ИИ, женщины в стоматологии.\n• **Brittany Bergeron, DDS** — владелица косметической практики (Towson, MD), лидер «женщин в стоматологии» и pro-bono помощь; выпускница GL.\n• **Bhumika Patel, DDS** — Бобби особо её выделила на программке: владеет практикой И своей компанией (A2Z Imaging — беспроводные рентген-сенсоры); раньше для GL не выступала — «будет блестящей». Клиницист-изобретатель; сильна по теме инноваций и женщин-основателей.\n• **David Rice, DDS** — основатель IgniteDDS (крупнейшее сообщество молодых дантистов), редактор DentistryIQ; голос наставничества/пайплайна.\n• **Setareh Lavasani, DDS, MS** — сертифицированный оральный радиолог и профессор (Western U); учит читать современную 3D-визуализацию.\n• **Dar Radfar, DDS** — обучает тысячи практик медицине сна и лазерам; расширяет, что лечит дантист; личная история-разворот.\n• **Eric Johnson, DDS** — владелец практики (San Clemente), ветеран ВВС, коуч по лидерству/выгоранию, KOL Glidewell.\n• **Jinny Bender, DMD** — клиницист Glidewell, заново собрала карьеру вокруг цифры; учит glidewell.io.\n• **Christina Do, DDS** — владелица практики (Costa Mesa), лидер OC Dental Society, power-user fastmill.\n• **Danielle Brown, DDS** — клиницист Glidewell из Инглвуда, корни в общинных клиниках, NDA «40 Under 40».\n(Личности подтверждены по сети; точное участие в DOTR-2026 и ряд титулов сверить до экрана.)\nТочный момент выпуска и наш доступ к съёмке сверить с Бобби."}}

  jim:{nm:"Jim Glidewell", a:1, sc:[8,13,14], g:"e", status:"ok",
    brief:{en:"<b>Who he is.</b> Jim Glidewell, CDT — founder and president. Studied dental technology at Orange Coast College (graduated 1969); in January 1970 opened a one-man dental ceramics lab at his kitchen table in Orange County — founder and only employee — and built it into the world’s largest dental laboratory (5,000+ employees, ~500K restorations a month, company-stated). Author of «Constant Change» (2020). Since 2021 Stephenie Goddard is CEO; Jim remains founder and president — in the building, making major decisions. In THIS film he is not the protagonist but the man of both eras who enters at the Midpoint: the answer to «who built this world».<br><br><b>Why this film.</b> Jim carries #8 (the flywheel: cheaper → wider → reinvest), the honesty scene of BruxZir authorship (Robin Carden’s process, Mike DiTolla’s clinical voice, Jim’s bet and money — «brought to market», never «invented»), and the frame of #14. His own archive is the film’s treasure: the 2007 confession that he «felt there was no way you were ever going to duplicate what we do as technicians with a machine» — and the same interview’s prophecy of 90% digital (<a href='https://glidewelldental.com/education/chairside-magazine/volume-1-issue-3/cadcam-technology' target='_blank' rel='noopener'>Chairside Vol. 1-3, 2007</a>); his «зачем» on record: «we’re not really trying to put money in our pocket, we’re trying to lower the cost of dentistry… for patients of all economic strata, not only for rich people» (50th-anniversary interview, 2020).<br><br><b>What only he gives.</b> Both eras in one man: the hands that waxed crowns in 1970 and the will that built the robot factory — the film’s entire seam, embodied. And the bet-maker’s perspective: every revolution in this story was someone’s risk before it was everyone’s standard.<br><br><b>What to ask (full guide: Documents/Jim_CompanyFilm_Interview_Guide.md).</b><br>1) “In 2007 you said you’d felt no machine could ever duplicate a technician’s hands. Tell us about being wrong — happily wrong.” — why: the skeptic-founder is the film’s most disarming scene.<br>2) “Walk us through January 1970 — the kitchen table, the first crown, the first customer.” — why: the Midpoint origin, told at the reconstruction set.<br>3) “The flywheel — cheaper, wider, reinvest. When did you first understand that lowering the price WAS the business?” — why: the thesis as biography, not strategy slide.<br>4) “BruxZir, 2009: Robin Carden’s process, DiTolla’s clinical push — and your money on the table in a recession. What did that bet feel like?” — why: the authorship honesty scene, from the man who paid for it.<br>5) “Walk the factory with us. What do you feel watching robots do what your hands did?” — why: the film’s emotional Midpoint shot; pairs with Venard’s version of the same walk.<br>6) “What hasn’t changed since 1970?” — why: the constant under the constant change — his own book’s question, inverted.<br><br><b>How to approach / caution.</b> HIS BLOCK IS SPECIAL: sit-down interview + «1970 kitchen table» reconstruction + factory walk, scheduled around his availability (days-available still an open question — request dates via Eric). Respect first: he is the founder, president and employer — never frame him as a «device» of the film. Keep THIS film’s interview off the personal-film territories (childhood, «328», family, IPO/succession) — those belong to the separate Jim film session; shared footage is fine, shared questions are not. Honesty guardrail in every phrasing: brought to market / made affordable / made the default — never «invented».<br><br><b>Verify before shooting.</b> Which company milestones he wants told on camera (align with comms); the 50th-anniversary interview source for the «all economic strata» quote; current on-screen title he prefers (founder and president); his days available (open).<br><br><b>Confidence.</b> Facts: high — internal materials, his book, verified archive. The block’s scope: pending his dates.",ru:"<b>Кто он.</b> Джим Глайдвелл, CDT — основатель и президент. Учился зуботехническому делу в Orange Coast College (выпуск 1969); в январе 1970-го открыл лабораторию зубной керамики на одного человека за кухонным столом в округе Ориндж — основатель и единственный сотрудник — и вырастил её в крупнейшую зуботехническую лабораторию мира (5000+ сотрудников, ~500K реставраций в месяц, по данным компании). Автор «Constant Change» (2020). С 2021 года CEO — Стефани Годдард; Джим остаётся основателем и президентом — в здании, принимает ключевые решения. В ЭТОМ фильме он не протагонист, а человек обеих эпох, входящий на Midpoint: ответ на вопрос «кто построил этот мир».<br><br><b>Зачем фильму.</b> Джим несёт #8 (маховик: дешевле → шире → реинвест), сцену честности об авторстве BruxZir (процесс Робина Кардена, клинический голос Майка ДиТоллы, ставка и деньги Джима — «вывел на рынок», никогда «изобрёл») и рамку #14. Его собственный архив — сокровище фильма: признание 2007 года, что он «чувствовал: машина никогда не повторит то, что мы делаем как техники», — и пророчество о 90% цифры из того же интервью (<a href='https://glidewelldental.com/education/chairside-magazine/volume-1-issue-3/cadcam-technology' target='_blank' rel='noopener'>Chairside Vol. 1-3, 2007</a>); его «зачем» on record: «мы не пытаемся положить деньги себе в карман — мы пытаемся снизить стоимость стоматологии… для пациентов всех экономических слоёв, не только для богатых» (интервью к 50-летию, 2020).<br><br><b>Что только он даёт.</b> Обе эпохи в одном человеке: руки, которые лепили коронки из воска в 1970-м, и волю, построившую фабрику роботов, — весь шов фильма во плоти. И взгляд делающего ставки: каждая революция этой истории была чьим-то риском до того, как стала общим стандартом.<br><br><b>О чём спрашивать (полный гайд: Documents/Jim_CompanyFilm_Interview_Guide.md).</b><br>1) «В 2007-м вы сказали, что чувствовали: машина никогда не повторит руки техника. Расскажите, каково быть неправым — счастливо неправым.» — зачем: основатель-скептик — самая обезоруживающая сцена фильма.<br>2) «Проведите нас через январь 1970-го — кухонный стол, первая коронка, первый клиент.» — зачем: исток Midpoint, рассказанный на площадке реконструкции.<br>3) «Маховик — дешевле, шире, реинвест. Когда вы впервые поняли, что снижение цены И ЕСТЬ бизнес?» — зачем: тезис как биография, а не слайд стратегии.<br>4) «BruxZir, 2009: процесс Кардена, клинический напор ДиТоллы — и ваши деньги на столе в рецессию. Каково было делать эту ставку?» — зачем: сцена честности авторства от того, кто за неё заплатил.<br>5) «Пройдите с нами по фабрике. Что вы чувствуете, глядя, как роботы делают то, что делали ваши руки?» — зачем: эмоциональный кадр Midpoint; в паре с той же прогулкой Венарда.<br>6) «Что НЕ изменилось с 1970 года?» — зачем: константа под constant change — вопрос его собственной книги, перевёрнутый.<br><br><b>Как заходить / осторожно.</b> ЕГО БЛОК ОСОБЫЙ: интервью + реконструкция «кухонный стол 1970» + проход по фабрике, под его график (сколько дней он готов — открытый вопрос; даты запросить через Эрика). Сначала уважение: он основатель, президент и работодатель — никогда не подавать его как «приём» фильма. Интервью ЭТОГО фильма держать вне территорий личного фильма (детство, «328», семья, IPO/преемственность) — это отдельная сессия фильма о Джиме; общий футаж — да, общие вопросы — нет. Гардрейл честности в каждой формулировке: вывел на рынок / сделал доступным / сделал стандартом — никогда «изобрёл».<br><br><b>Проверить перед съёмкой.</b> Какие вехи компании он сам хочет рассказать на камеру (сверить с comms); источник цитаты «всех экономических слоёв» (интервью к 50-летию); предпочитаемый экранный титул (основатель и президент); его доступные дни (открыто).<br><br><b>Уверенность.</b> Факты: высокая — внутренние материалы, его книга, выверенный архив. Объём блока: ждёт его дат."},

  venard:{nm:"Phil Venard", a:2, sc:[1,8], g:"x", status:"limited",
    brief:{en:"<b>Who he is.</b> Phil Venard is the roster’s institutional memory of the analog era — the R&D hand who lived the lab when crowns were wax, stone and molten metal. Retired (per our own information; public databases lag and may still show old titles — we go with ours). Book as a dedicated, unhurried visit.<br><br><b>Why this film.</b> Venard carries the elegy layer of part #1 (the analog world, firsthand) and the witness seat of part #8 (Jim as a boss in the analog years). If Steve Lam is not found, Venard is our “hands of the old craft” on camera; if the “Old Way” reconstruction happens, he is consultant and possibly the hands themselves.<br><br><b>What only he gives.</b> Decades inside the same company across both eras — the one person who can compare the analog Glidewell and the robotic Glidewell from the inside, with names, smells and specific benches. The film’s memory-of-hands, unfaked.<br><br><b>What to ask.</b><br>1) “Walk us through one crown, start to finish, as your bench made it in your first years — every station, every hand.” — why: the spine of the ‘было’ world; pairs with Abdul’s lost-wax story from the lab’s side.<br>2) “What could an experienced hand feel that the machine still can’t?” — why: the elegy question; his answer sets the film’s tone about loss without nostalgia-kitsch.<br>3) “What was Jim like as a boss back then — one story that shows how he decided things?” — why: part #8 needs Jim-then from a witness, not from archive text.<br>4) “When the first scanners and mills arrived — what did your colleagues say out loud, and what did they say quietly?” — why: the transition’s human sound, from inside the lab.<br>5) “Walk the BruxZir Factory with us. What do you feel watching the robots do your old job?” — why: the single most emotional scene available to this film; shoot it, don’t just ask it.<br><br><b>How to approach / caution.</b> RECORD EARLY — age is the deadline (our standing rule). Arrange a dedicated visit through Eric (retired — do not slot into studio-day grids). Approach with respect for the craft, not pity for its passing — he is a master, not a museum piece. His “last wax-up” scene idea must be OFFERED, never imposed.<br><br><b>Verify before shooting.</b> Exact years at Glidewell and departments. Any photo/bio online is thin — build the lower-third from his own words. Ask whether he keeps old tools (props for the reconstruction).<br><br><b>Confidence.</b> Film role: high (our own project materials). Biography: thin public record — fill at the visit.",ru:"<b>Кто он.</b> Фил Венард — институциональная память аналоговой эры в нашем касте: человек R&D, заставший лабораторию, когда коронки были воском, гипсом и расплавленным металлом. На пенсии (по нашей собственной информации; публичные базы отстают и могут показывать старые титулы — верим своей). Букинг — отдельным неспешным визитом.<br><br><b>Зачем фильму.</b> Венард несёт слой элегии части #1 (аналоговый мир из первых рук) и место свидетеля в части #8 (Джим-босс аналоговых лет). Если Steve Lam не найдётся — он наши «руки старого ремесла» в кадре; если случится реконструкция «The Old Way» — он консультант и, возможно, сами руки.<br><br><b>Что только он даёт.</b> Десятилетия внутри одной компании через обе эпохи — единственный, кто может сравнить аналоговый Glidewell и роботизированный Glidewell изнутри, с именами, запахами и конкретными верстаками. Память рук фильма, без подделки.<br><br><b>О чём спрашивать.</b><br>1) «Проведите нас через одну коронку от начала до конца, как её делал ваш верстак в ваши первые годы — каждая станция, каждая рука.» — зачем: хребет мира «было»; в паре с lost-wax историей Абдула — но со стороны лаборатории.<br>2) «Что чувствовала опытная рука из того, чего машина не может до сих пор?» — зачем: вопрос элегии; его ответ задаёт тон фильма о потере — без ностальгического китча.<br>3) «Каким Джим был боссом тогда — одна история, показывающая, как он принимал решения?» — зачем: части #8 нужен Джим-тогда от свидетеля, а не из архивного текста.<br>4) «Когда появились первые сканеры и фрезеры — что коллеги говорили вслух, а что — тихо?» — зачем: человеческий звук перехода изнутри лаборатории.<br>5) «Пройдите с нами по фабрике BruxZir. Что вы чувствуете, глядя, как роботы делают вашу старую работу?» — зачем: самая эмоциональная сцена, доступная этому фильму; её надо снять, а не просто спросить.<br><br><b>Как заходить / осторожно.</b> ПИСАТЬ РАНО — возраст и есть дедлайн (наше действующее правило). Организовать отдельный визит через Эрика (на пенсии — в сетки студийных дней не ставить). Заходить с уважением к ремеслу, а не жалостью к его уходу: он мастер, не музейный экспонат. Идею сцены «последняя восковка» — ПРЕДЛОЖИТЬ, никогда не навязывать.<br><br><b>Проверить перед съёмкой.</b> Точные годы в Glidewell и отделы. Публичного фото/био почти нет — титр строить из его собственных слов. Спросить, хранит ли старые инструменты (реквизит для реконструкции).<br><br><b>Уверенность.</b> Роль в фильме: высокая (наши собственные материалы). Биография: публичный след тонкий — добрать на визите."},

    role:{en:"R&D engineer (retired)",ru:"Инженер R&D (в отставке)"},
    loc:{en:"— (via Glidewell)",ru:"— (через Glidewell)"},
    theme:{en:"Experience · the early, pre-digital years that anchor the analog→digital arc.",ru:"Опыт · ранние, доцифровые годы, на которых держится дуга аналог→цифра."},
    bruxzir:{en:"<b>How:</b> a long-tenured R&D engineer who holds the institutional memory of the materials and R&D culture that <i>preceded</i> monolithic zirconia. <b>Why:</b> not a BruxZir originator — he gives the “before BruxZir” context (what the lab worked with and why the leap mattered) and remembers the early people and decisions. Limited public footprint + age → record sooner than later.",ru:"<b>Как:</b> давний инженер R&D, носитель институциональной памяти о материалах и культуре R&D <i>до</i> монолитного циркония. <b>Почему:</b> не автор BruxZir — даёт контекст «до BruxZir» (с чем работала лаборатория и почему скачок был важен), помнит ранних людей и решения. Мало публичного следа + возраст → записать как можно раньше."},
    access:{en:"Contact and verify via Glidewell (R&D / HR). Value is the oral history — record sooner than later.",ru:"Контакт и проверка — через Glidewell (R&D / HR). Ценность — устная история; записать как можно раньше."}},
  ditolla:{nm:"Mike DiTolla", a:20, sc:[3,8,10], g:"x", status:"ok",
    quote:{q:"…when you send us a digital file you've saved us all that work and material, which we've calculated to be about $20, so we pass those savings on to you.", src:"Chairside Magazine, Vol. 9-2 (Glidewell)", url:"https://glidewelldental.com/education/chairside-magazine/volume-9-issue-2/one-on-one-with-dr-michael-ditolla-interview-with-dr-david-little"},
    brief:{en:"<b>Who he is.</b> Dr. Michael DiTolla is the film’s man of the transition, in one résumé: University of the Pacific DDS (1988), fifteen years in private practice in the analog era — then fifteen years as Glidewell’s Director of Clinical Education, the clinical voice that carried BruxZir to dentists — and now back at the chair (Valley Dental Esthetics, Lodi, CA) while serving as VP of Clinical Affairs & Communication for the Aegis Dental Network (his LinkedIn/practice site). Over 1,000 lectures; his videos have 15M+ views among dentists. From 2012–2015 he presented Clinicians Report’s iconic “Dentistry Update” lectures — meaning he is personally trusted by BOTH our anchor authorities: Glidewell and the Christensens.<br><br><b>Why this film.</b> DiTolla is the witness of the shift (#1 last analog years, #3, #8 the BruxZir bet, #10) — and the owner of our best archive scene: in 2007 he interviewed Jim for Chairside and recorded the 90%-digital prophecy (<a href='https://glidewelldental.com/education/chairside-magazine/volume-1-issue-3/cadcam-technology' target='_blank' rel='noopener'>Vol. 1-3, 2007</a>). Him re-reading that page on camera, nineteen years later, is a ready-made seam. As an ex-insider now independent, his testimony reads as witness, not marketing.<br><br><b>What only he gives.</b> The inside story of how BruxZir reached dentists — told from OUTSIDE the company today. And the column: years of “One-on-One with Dr. DiTolla” interviews make him the Chairside archive’s living index — he interviewed half the era.<br><br><b>What to ask.</b><br>1) “Re-read your 2007 interview with Jim with us — out loud, on camera. What did you both get right, and what did nobody see coming?” — why: the prophecy-payoff scene; bring the printed page as a prop.<br>2) “Tell the 2009 BruxZir launch honestly: the recession, the skeptics, Robin Carden’s process, Jim’s bet.” — why: the authorship scene (#8) needs his clinical half of the story.<br>3) “You spent 15 analog years at the chair, then 15 digital years teaching. When did you personally stop mourning the old way?” — why: his arc mirrors the profession’s; gives #1/#4 a personal spine.<br>4) “You presented Dentistry Update for the Christensens. What does THEIR standard of proof demand that marketing never does?” — why: welds our two independent pillars together on camera.<br>5) “Now you’re back in practice in Lodi. What of the digital gospel did real patients revise?” — why: honesty beat; the evangelist audited by his own chair.<br><br><b>How to approach / caution.</b> Independent now — approach as a witness and colleague, never as a Glidewell asset; his value IS the distance (roster tag ‘tentative’ — enter softly). Lodi is NorCal: plan a dedicated visit or catch him at an industry event; his Aegis role means he understands production — an ally on set. Media-savvy: he will give polished answers; push past the first take.<br><br><b>Verify before shooting.</b> Current Aegis title and practice status (his sites); the 1988/15+15 career math; permission to show the 2007 magazine page on camera (Glidewell owns it — easy); whether he still lectures for CR.<br><br><b>Confidence.</b> Career arc and archive trail: high (his own bios + our verified articles). Current roles: medium — confirm at booking.",ru:"<b>Кто он.</b> Д-р Майкл ДиТолла — человек перелома в одном резюме: DDS Университета Пасифик (1988), пятнадцать лет частной практики в аналоговую эру — затем пятнадцать лет директором клинического образования Glidewell, тем клиническим голосом, который донёс BruxZir до врачей, — а теперь снова у кресла (Valley Dental Esthetics, Лоди, Калифорния) плюс VP по клиническим вопросам и коммуникациям Aegis Dental Network (его LinkedIn/сайт практики). 1000+ лекций; 15M+ просмотров его видео среди дантистов. В 2012–2015 он читал фирменные лекции «Dentistry Update» Clinicians Report — то есть ему лично доверяют ОБА наших якоря: и Glidewell, и Кристенсены.<br><br><b>Зачем фильму.</b> ДиТолла — свидетель перехода (#1 последние аналоговые годы, #3, #8 ставка BruxZir, #10) — и владелец нашей лучшей архивной сцены: в 2007-м он взял у Джима интервью для Chairside и записал пророчество о 90% цифры (<a href='https://glidewelldental.com/education/chairside-magazine/volume-1-issue-3/cadcam-technology' target='_blank' rel='noopener'>Vol. 1-3, 2007</a>). Он, перечитывающий эту страницу на камеру девятнадцать лет спустя, — готовый шов. Как экс-инсайдер, ныне независимый, его показания читаются как свидетельство, не маркетинг.<br><br><b>Что только он даёт.</b> Внутреннюю историю того, как BruxZir дошёл до врачей, — рассказанную сегодня СНАРУЖИ компании. И колонку: годы интервью «One-on-One with Dr. DiTolla» делают его живым указателем архива Chairside — он сам интервьюировал половину эпохи.<br><br><b>О чём спрашивать.</b><br>1) «Перечитайте с нами ваше интервью с Джимом 2007 года — вслух, на камеру. Что вы оба угадали, и чего не увидел никто?» — зачем: сцена выплаты пророчества; принести печатную страницу как реквизит.<br>2) «Расскажите запуск BruxZir 2009-го честно: рецессия, скептики, процесс Робина Кардена, ставка Джима.» — зачем: сцене авторства (#8) нужна его клиническая половина истории.<br>3) «15 аналоговых лет у кресла, потом 15 цифровых лет на сцене. Когда вы лично перестали скорбеть по старому способу?» — зачем: его арка зеркалит арку профессии; личный хребет для #1/#4.<br>4) «Вы читали Dentistry Update для Кристенсенов. Чего требует ИХ стандарт доказательства, чего никогда не требует маркетинг?» — зачем: сваривает два наших независимых столпа на камеру.<br>5) «Теперь вы снова практикуете в Лоди. Что из цифрового евангелия пересмотрели реальные пациенты?» — зачем: бит честности; евангелист, проверенный собственным креслом.<br><br><b>Как заходить / осторожно.</b> Теперь независим — заходить как к свидетелю и коллеге, никогда как к «активу Glidewell»; его ценность И ЕСТЬ дистанция (в ростере тег tentative — заходить мягко). Лоди — север штата: отдельный визит или ловить на индустрийном событии; его роль в Aegis значит, что он понимает продакшн — союзник на площадке. Медиа-опытен: даст отполированные ответы — пробиваться за первый дубль.<br><br><b>Проверить перед съёмкой.</b> Текущий титул в Aegis и статус практики (его сайты); арифметику 1988/15+15; разрешение показать страницу 2007 года в кадре (владелец — Glidewell, просто); читает ли он ещё для CR.<br><br><b>Уверенность.</b> Арка карьеры и архивный след: высокая (его биографии + наши выверенные статьи). Текущие роли: средняя — подтвердить при букинге."},
    rl:{en:"ex-Glidewell CE · back at the chair",ru:"экс-CE Glidewell · снова практикует"},
    role:{en:"Former Glidewell Dir. of Clinical Education; now practicing & educator (Valley Dental Esthetics, Lodi)",ru:"Бывший дир. клин. образования Glidewell; снова практикует и преподаёт (Valley Dental Esthetics, Lodi)"},
    loc:{en:"Lodi, CA · Valley Dental Esthetics",ru:"Lodi, CA · Valley Dental Esthetics"},
    theme:{en:"Restorative / BruxZir · the \u201CRevolution\u201D beat — the insider origin story, told from outside.",ru:"Реставрация / BruxZir · бит «Революция» — инсайдерская история истоков, рассказанная снаружи."},
    bruxzir:{en:"<b>How:</b> led the clinical team that brought BruxZir to market (2006–2009) and launched Chairside — first-person “how we did it” of the 2009 turning point. <b>Why:</b> the #1 get for the “Revolution” beat — now outside the company, so it reads as testimony, not marketing; knows how the idea was born, how skeptics were won over, and the demand-from-below nugget (zirconia took off only once dentists started asking their labs for it).",ru:"<b>Как:</b> вёл клиническую команду, выведшую BruxZir на рынок (2006–2009), и запустил Chairside — рассказ из первых рук о повороте 2009-го. <b>Почему:</b> гет №1 на бит «Революция» — теперь вне компании, поэтому звучит как свидетельство, а не реклама; знает, как родилась идея, как переубеждали скептиков, и нюанс спроса «снизу» (цирконий пошёл, только когда дантисты сами стали просить его у лабораторий)."},
    access:{en:"Lodi, CA (in-state, easy). Now back at the chair → independent practicing voice. Plan tag\u201Ctentative\u201D — approach as an independent voice.",ru:"Lodi, CA. Тёплый контакт, но статус «предварительно» — заходить как к независимому голосу."}},
  friebauer:{nm:"Wolfgang Friebauer", a:20, sc:[3,8,11,12,13], g:"g", status:"verify",
    brief:{en:"<b>Who he is.</b> Wolfgang Friebauer is Glidewell’s Director of R&D and Education (title confirmed by his own LinkedIn) — the materials man: the territory of BruxZir zirconia and Obsidian lithium silicate, how powders become blocks and blocks become teeth. He has essentially no public interviews or authored articles we could find — a lab person, not a stage person — so everything substantive will be first-generation from our shoot.<br><br><b>Why this film.</b> He carries the materials science of the seams: the chalk-soft disc, the furnace at ~1500 °C, the 20% shrink, the decade-of-chewing durability question (#11 materials at scale, #12 what’s next). The film needs one person who can hold a pre-sintered disc in one hand and a finished crown in the other and explain the miracle between them — that is his scene.<br><br><b>What only he gives.</b> The tactile heart of the “стало” world: materials explained by the person responsible for them, at the bench, with props. Nobody else on the roster can demystify zirconia without slides.<br><br><b>What to ask.</b><br>1) “Hold the disc. It scratches with a fingernail. Now hold the crown — harder than enamel. Explain what the furnace does, like we’re patients.” — why: the single best show-and-tell in the film; feeds the литьё↔фрезеровка seam.<br>2) “What is BruxZir actually made of — and what did it take to make a material both strong and tooth-like?” — why: the materials arc honestly (credit the R&D team story; Robin Carden holds the process patent — respect authorship).<br>3) “How do you test a crown for ten years of chewing without waiting ten years?” — why: durability credibility; pairs with the Christensens’ TRAC validation from the independent side.<br>4) “Milling versus printing: when does a printed permanent crown become real?” — why: his bench is where #12’s forecast either happens or doesn’t.<br>5) “What material failure taught you the most?” — why: honesty beat; a materials man’s war story humanizes the lab.<br><br><b>How to approach / caution.</b> Studio Day 2, with bench props (discs, blocks, failed samples if he’ll bring them). Let him teach — the Education half of his title is our advantage. AUTHORSHIP guardrail: BruxZir’s technical creator on record is Robin Carden (patent US 9,434,651 B2) — Friebauer speaks for materials TODAY, not as the inventor. ⚠ Known incident: we once had the WRONG PHOTO — another man with the same name; double-check every image against someone who knows him.<br><br><b>Verify before shooting.</b> Title (LinkedIn says Director of R&D and Education — matches our roster; confirm internally). His actual role timeline vs BruxZir/Obsidian development years. Candidate archive trail: “R&D Corner: What’s in the Zirconia Crowns You Place?” (Chairside Vol. 14-2) — authorship unconfirmed, read before linking. Photo identity — verified against a colleague.<br><br><b>Confidence.</b> Role and territory: high. Everything biographical: low-to-medium (no public record) — fill at the interview.",ru:"<b>Кто он.</b> Вольфганг Фрибауэр — директор R&D и образования Glidewell (титул подтверждён его собственным LinkedIn) — человек материалов: территория циркония BruxZir и литий-силиката Obsidian, того, как порошки становятся дисками, а диски — зубами. Публичных интервью и авторских статей мы практически не нашли — человек лаборатории, не сцены, — поэтому всё содержательное будет первого поколения, с нашей съёмки.<br><br><b>Зачем фильму.</b> Он несёт материаловедение швов: меловой диск, печь ~1500 °C, усадка 20%, вопрос «десятилетия жевания» (#11 материалы в масштабе, #12 что дальше). Фильму нужен один человек, который держит недоспечённый диск в одной руке и готовую коронку в другой и объясняет чудо между ними — это его сцена.<br><br><b>Что только он даёт.</b> Тактильное сердце мира «стало»: материалы, объяснённые тем, кто за них отвечает, — у верстака, с реквизитом. Никто другой в касте не демистифицирует цирконий без слайдов.<br><br><b>О чём спрашивать.</b><br>1) «Подержите диск — он царапается ногтем. Теперь коронку — твёрже эмали. Объясните, что делает печь, как пациентам.» — зачем: лучший show-and-tell фильма; кормит шов литьё↔фрезеровка.<br>2) «Из чего на самом деле сделан BruxZir — и чего стоило сделать материал и прочным, и похожим на зуб?» — зачем: честная арка материалов (история команды R&D; патент на процесс у Робина Кардена — уважаем авторство).<br>3) «Как проверить коронку на десять лет жевания, не ожидая десять лет?» — зачем: доверие к долговечности; в паре с независимой TRAC-валидацией Кристенсенов.<br>4) «Фрезеровка против печати: когда печатная постоянная коронка станет реальностью?» — зачем: прогноз #12 случается (или нет) именно на его верстаке.<br>5) «Какой провал материала научил вас больше всего?» — зачем: бит честности; военная история материаловеда очеловечивает лабораторию.<br><br><b>Как заходить / осторожно.</b> Студийный день №2, с реквизитом (диски, блоки, неудачные образцы, если принесёт). Дать ему учить — «образовательная» половина титула работает на нас. Гайдрейл АВТОРСТВА: технический создатель BruxZir on record — Робин Карден (патент US 9,434,651 B2); Фрибауэр говорит о материалах СЕГОДНЯ, не как изобретатель. ⚠ Известный инцидент: у нас уже было ЧУЖОЕ ФОТО — другой человек с тем же именем; каждое изображение сверять с тем, кто его знает лично.<br><br><b>Проверить перед съёмкой.</b> Титул (LinkedIn: Director of R&D and Education — совпадает с ростером; подтвердить внутри). Хронологию его роли против лет разработки BruxZir/Obsidian. Кандидат в архивный след: «R&D Corner: What’s in the Zirconia Crowns You Place?» (Chairside Vol. 14-2) — авторство не подтверждено, прочитать перед линковкой. Фото — сверено с коллегой.<br><br><b>Уверенность.</b> Роль и территория: высокая. Всё биографическое: низкая-средняя (нет публичного следа) — добрать на интервью."},
