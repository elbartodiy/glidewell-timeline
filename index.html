<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glidewell — Documentary timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#13171B;--ink-2:#4A555F;--paper:#F4F6F8;--card:#FFFFFF;--line:#E4E8EC;
    --navy:#1C2024;--slate:#9098A0;--teal:#137C7C;--clay:#E11B2A;
    --red:#E11B2A;--red-bright:#F5404B;--red-tint:#FCEDEE;
    --ok:#1F7A57;--warn:#B07A16;--mute:#8A929B;
    --disp:"Space Grotesk",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3{font-family:var(--disp);font-weight:600;margin:0;line-height:1.05}
  .mono{font-family:var(--mono)}

  header.top{background:var(--ink);color:#EDF1F5;padding:12px 26px;position:relative}
  header.top .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red-bright)}
  header.top h1{font-family:var(--disp);font-weight:300;font-size:12.5px;letter-spacing:.01em;margin:0;max-width:none;color:#E11B2A;white-space:normal;line-height:1.3;display:flex;flex-direction:column}
  header.top h1 .hmsg{display:block}
  header.top h1 .hmsg.mid{font-style:normal;color:#fff;font-weight:400}
  header.top .brandrow{display:flex;align-items:center;gap:14px}
  header.top .gwmark{flex:none;display:block;line-height:0;text-decoration:none}
  header.top .gwmark svg{display:block}
  header.top .gwmark .gw-logo-svg{height:30px;width:auto}
  header.top .brandtext{min-width:0}
  .hmsg-link{color:inherit;text-decoration:none;border:none;font:inherit;cursor:default}
  footer .aimos{display:inline-flex;align-items:center;gap:18px;color:#9FB0BE;text-decoration:none;text-transform:none;letter-spacing:.02em}
  footer .aimos img{height:18px;width:auto;display:block;opacity:.95}
  footer .aimos .aimos-wm{font-family:var(--disp);font-weight:600;letter-spacing:.02em;color:#EDF1F5}
  footer .aimos .aimos-logo{height:38px;width:auto;display:block;mix-blend-mode:screen}
  footer .aimos .mw-txt{font-family:var(--mono);text-transform:uppercase;letter-spacing:.3em;font-size:12px;color:var(--slate)}
  footer .sheetlink{color:inherit;text-decoration:none;cursor:text}
  header.top .hint{font-family:var(--mono);font-size:12px;color:#9FB0BE;margin-top:8px;letter-spacing:.02em;max-width:90ch}
  .langtoggle{position:absolute;top:20px;right:26px;display:flex;border:1px solid #2A3744;border-radius:20px;overflow:hidden}
  .langtoggle button{font-family:var(--mono);font-size:12px;letter-spacing:.06em;background:#10161D;color:#9FB0BE;border:0;padding:7px 14px;cursor:pointer}
  .langtoggle button[aria-pressed="true"]{background:var(--red);color:#fff}

  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#10161D;color:#9FB0BE;padding:11px 26px;border-top:1px solid #243039;position:sticky;top:0;z-index:40}
  .bar .nav{display:flex;gap:6px;flex-wrap:wrap}
  .bar button{font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:#C7D1DA;background:#1B232C;border:1px solid #2A3744;border-radius:16px;padding:5px 11px;cursor:pointer;white-space:nowrap}
  .bar button:hover{border-color:var(--red-bright);color:#fff}
  .bar .legend{margin-left:auto;display:flex;gap:14px;font-family:var(--mono);font-size:11px;flex-wrap:wrap}
  .bar .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .lg-g i{background:var(--navy)} .lg-i i{background:var(--slate)} .lg-m i{background:var(--teal)} .lg-s i{background:#fff;border-radius:50%}

  .scroller{overflow-x:auto;overflow-y:hidden;cursor:grab}
  .scroller.grabbing{cursor:grabbing}
  .scroller::-webkit-scrollbar{height:12px}
  .scroller::-webkit-scrollbar-track{background:#E1E6EC}
  .scroller::-webkit-scrollbar-thumb{background:#B9C2CC;border-radius:8px;border:3px solid #E1E6EC}
  .stage{position:relative;height:940px}
  .stage.dim .chip:not(.hl){opacity:.32}
  .stage.dim .ev:not(.hl){opacity:.4}

  svg.draw{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .stalk{stroke:#AAB2BC;stroke-width:1.6px;fill:none;transition:stroke .15s}
  .stalk.hl{stroke:var(--clay);stroke-width:2.4px}
  .mainrail{filter:drop-shadow(0 1.5px 1px rgba(28,32,36,.18))}
  .nd{stroke:#fff;stroke-width:2px;transition:r .18s cubic-bezier(.2,.7,.2,1),fill .18s;cursor:pointer;pointer-events:auto;filter:drop-shadow(0 1px 1.5px rgba(28,32,36,.22))}
  .nd.t-g{fill:var(--navy)} .nd.t-i{fill:var(--slate)} .nd.t-m{fill:var(--teal)}
  .nd:hover{r:9} .nd.hl{fill:var(--clay);r:8.5}
  .nd:focus-visible{outline:none;stroke:var(--clay);stroke-width:3px}
  .eraband{fill:#000;opacity:.022}
  .eradiv{stroke:#E0E4E9;stroke-width:1px;stroke-dasharray:2 5}
  .eralbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;fill:#8A94A0;text-transform:uppercase}
  .baseline-cap{font-family:var(--mono);font-size:11px;fill:#9AA3AE}

  .chip{position:absolute;transform:translate(-50%,-50%);background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:6px 12px 6px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;
    box-shadow:0 1px 2px rgba(20,30,40,.06);transition:opacity .15s,box-shadow .15s,border-color .15s;z-index:5}
  .chip:hover,.chip.hl{border-color:var(--clay);background:var(--red-tint);box-shadow:0 3px 10px rgba(225,27,42,.12)}
  .chip .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .chip .nm{font-family:var(--body);font-weight:500;font-size:13px;color:var(--ink)}
  .chip .rl{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.02em}
  /* dot = group marker on the line. For now: only Glidewell staff (Internal) shown, in red. Other groups hidden until we wire a scheme. */
  .dot.g-g{background:var(--clay)} .dot.g-x,.dot.g-k,.dot.g-e{display:none}

  .ev{position:absolute;transform:translateX(-50%);width:226px;background:var(--card);border:1px solid var(--line);
    border-radius:8px;border-top:3px solid var(--navy);padding:12px 13px;cursor:pointer;transition:box-shadow .15s,transform .15s,opacity .15s;z-index:4}
  .ev.t-i{border-top-color:var(--slate)} .ev.t-m{border-top-color:var(--teal)}
  .ev:hover,.ev.hl{box-shadow:0 10px 28px -6px rgba(28,32,36,.20),0 2px 6px rgba(28,32,36,.08);transform:translateX(-50%) translateY(-3px);border-color:var(--slate)}
  .ev:focus-visible{outline:none;box-shadow:0 0 0 2px var(--clay);transform:translateX(-50%) translateY(-3px)}
  .ev .yr{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--navy)}
  .ev.t-i .yr{color:var(--slate)} .ev.t-m .yr{color:var(--teal)}
  .ev h3{font-size:18px;letter-spacing:-.01em;margin:3px 0 5px}
  .ev .d{font-size:12px;line-height:1.45;color:var(--ink-2)}
  .ev .th{font-size:11.5px;line-height:1.4;color:var(--teal);font-style:italic;margin-top:8px;border-top:1px dashed var(--line);padding-top:7px}
  .ev .star{position:absolute;top:-9px;right:-7px;background:var(--clay);color:#fff;font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:2px 7px;border-radius:10px}
  .morep{position:absolute;z-index:5;background:var(--card);border:1px dashed var(--slate);border-radius:8px;padding:7px 11px;cursor:pointer;max-width:172px;transition:box-shadow .15s,transform .15s}
  .morep:hover{box-shadow:0 4px 14px rgba(19,23,27,.10);transform:translateY(-2px)}
  .morep .mp-ttl{font-family:var(--body);font-size:13px;font-weight:600;color:var(--navy)}
  .morep .mp-sub{font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:2px}
  .scq{margin:14px 0;padding:12px 14px;background:var(--card);border:1px solid var(--slate);border-radius:10px}
  .scq-h{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .scq-h img{width:44px;height:44px;border-radius:50%;object-fit:cover}
  .scq-h b{cursor:pointer}
  .scq-ok{color:#1DA24A;font-weight:800}
  .scq.plan{border-style:dashed}
  .scq-ask{color:#B08F33;font-weight:800}
  .scq-role{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;border:1px solid;border-radius:9px;padding:1px 7px;white-space:nowrap}
  .scq-d{color:var(--mute);font-size:12px}
  .scq-b{font-size:13.5px;line-height:1.55}
  .linelegend{position:absolute;z-index:5;font-family:var(--mono);white-space:nowrap}
  .linelegend .lgnd-ttl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-bottom:5px}
  .lgnd-row{display:flex;align-items:center;gap:8px;font-size:11px;white-space:nowrap;color:var(--ink-2);cursor:pointer;padding:2px 5px;border-radius:5px;transition:background .15s}
  .lgnd-row:hover{background:var(--card)}
  .lgnd-sw{width:22px;height:0;border-top-width:2px;border-top-style:solid;flex:0 0 auto}
  .lgnd-sw.cap{border-top-color:#E11B2A}
  .lgnd-sw.terr{border-top-color:#2C6E9E}
  .lgnd-sw.emp{border-top-color:#5A5550;border-top-style:dashed}
  .bld{position:absolute;z-index:6;transform:translateX(-50%);cursor:pointer;line-height:0}
  .bld::after{content:"";position:absolute;left:50%;top:16px;width:1px;height:22px;background:#2C6E9E;opacity:.4}
  .bld .bld-ico{display:block;fill:#2C6E9E;stroke:var(--paper,#fdfcf9);stroke-width:1.6px;paint-order:stroke;transition:fill .15s}
  .bld:hover .bld-ico{fill:var(--red)}
  .bld:hover{transform:translateX(-50%) translateY(-2px)}
  .ppl{position:absolute;z-index:6;transform:translateX(-50%);cursor:pointer;line-height:0}
  .ppl::after{content:"";position:absolute;left:50%;top:16px;width:1px;height:22px;background:#5A5550;opacity:.4}
  .ppl .ppl-ico{display:block;fill:#5A5550;stroke:var(--paper,#fdfcf9);stroke-width:1.4px;paint-order:stroke;transition:fill .15s}
  .ppl:hover .ppl-ico{fill:var(--red)}
  .ppl:hover{transform:translateX(-50%) translateY(-2px)}
  #panel .scthemes{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  #panel .scth-t{font-size:13.5px;color:var(--ink);font-weight:600;line-height:1.4}
  #panel .scth-who{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
  #panel .thspk{font-family:var(--mono);font-size:11px;background:var(--card,#f3f1ec);border:1px solid var(--line);border-radius:20px;padding:3px 10px;cursor:pointer;color:var(--ink-2);transition:background .12s,border-color .12s,color .12s}
  #panel .thspk:hover{border-color:var(--red);color:var(--red)}
  #panel .scth-none{font-size:12px;color:var(--mute);font-style:italic}
  /* preview frame thumbnails on the line */
  .frame-thumb{position:absolute;z-index:5;border-radius:4px;overflow:hidden;cursor:pointer;background:#EAEEF1;border:1px solid var(--line,#d9d6cf);box-shadow:0 1px 4px rgba(19,23,27,.08);transition:transform .15s,box-shadow .15s}
  .frame-thumb:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(19,23,27,.16);border-color:var(--red)}
  .frame-thumb .frame-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .frame-thumb .frame-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--mute)}
  .line-photo{position:absolute;z-index:6;border-radius:4px;overflow:hidden;background:#EAEEF1;border:1px solid var(--line,#d9d6cf);box-shadow:0 1px 5px rgba(19,23,27,.12);transition:transform .15s,box-shadow .15s}
  .line-photo:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 6px 18px rgba(19,23,27,.2);border-color:var(--red)}
  .line-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .lp-film{cursor:pointer;border-color:var(--red);box-shadow:0 1px 6px rgba(225,27,42,.3)}
  .lp-film .lp-badge{position:absolute;left:0;right:0;bottom:0;z-index:2;background:linear-gradient(transparent,rgba(16,20,24,.85));color:#fff;font-family:var(--mono,monospace);font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:12px 3px 3px;line-height:1;pointer-events:none}
  .lp-film:hover .lp-badge{background:linear-gradient(transparent,rgba(225,27,42,.9))}
  .spk-brief{font-size:12.5px;line-height:1.6;color:var(--ink)}
  .spk-brief b{color:var(--navy);font-weight:700}
  .allsc{display:flex;flex-direction:column;gap:14px;margin-top:6px}
  .allsc-row{border-left:3px solid var(--line);padding-left:12px}
  .allsc-h{background:none;border:none;padding:0;cursor:pointer;font-family:var(--head,inherit);font-size:15px;font-weight:700;color:var(--navy);text-align:left;line-height:1.3}
  .allsc-h:hover{color:var(--red)}
  .allsc-n{font-family:var(--mono);font-size:11px;color:var(--mute);margin-right:4px}
  .allsc-d{font-size:13px;line-height:1.55;color:var(--ink);margin-top:4px}
  /* enlarged frames at the top of the scene panel */
  #panel .scframes{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 14px}
  #panel .scframe{margin:0;flex:0 1 auto;max-width:240px}
  #panel .scframe img{display:block;width:auto;max-width:240px;max-height:150px;border-radius:8px;border:1px solid var(--line)}
  #panel .scframe.noimg img{display:none}
  #panel .scframe.noimg{width:200px;height:120px;border:1px dashed var(--slate);border-radius:8px;background:var(--card)}
  #panel .scframe figcaption{font-size:11.5px;color:var(--mute);margin-top:5px;line-height:1.4;max-width:240px}
  #panel .metric-rows .mrow{font-size:13.5px;line-height:1.5;margin:5px 0;color:var(--ink-2)}
  #panel .metric-rows .mrow b{color:var(--ink);font-family:var(--mono);margin-right:8px}
  #panel .mp-row{font-size:14px;line-height:1.5;margin:6px 0;color:var(--ink-2);display:flex;align-items:center;gap:9px}
  #panel .mp-row b{color:var(--ink)}
  #panel .mp-av{height:60px;width:60px;flex:0 0 auto;border-radius:7px;object-fit:cover;background:var(--line,#e5e3df)}
  #panel .mp-tx{min-width:0}
  #panel .pers-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
  #panel .pers-card{display:flex;align-items:center;gap:11px;width:calc(50% - 6px);cursor:pointer;padding:7px;border-radius:9px;transition:background .12s}
  #panel .pers-card:hover{background:var(--line,#ece9e4)}
  #panel .pers-card img{height:72px;width:72px;flex:0 0 auto;border-radius:8px;object-fit:cover;background:var(--line,#e5e3df)}
  #panel .pers-card .pc-nm{font-size:14px;font-weight:600;color:var(--ink)}
  #panel .pers-card .pc-role{font-size:12px;line-height:1.35;color:var(--ink-2);margin-top:2px}
  /* survey controls inside the Personalities panel */
  #panel .sv-card{align-items:flex-start;cursor:default}
  #panel .sv-card:hover{background:transparent}
  #panel .sv-card .pc-tx{flex:1;min-width:0}
  #panel .sv-card img{cursor:pointer}
  #panel .sv-card .pc-nm{cursor:pointer;display:inline-block}
  #panel .sv-card .pc-nm:hover{text-decoration:underline;text-underline-offset:2px}
  #panel .sv-fams{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 6px}
  #panel .sv-connected{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 11px;border-radius:20px;background:#E4F4D6;color:#3C7A2E;border:1px solid #C5E5AE;cursor:default;user-select:none}
  .gw-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 3px;margin-left:7px;border:1.4px solid var(--red,#E11B2A);border-radius:4px;color:var(--red,#E11B2A);font-weight:800;font-size:11px;line-height:1;vertical-align:middle;font-family:var(--disp,Georgia,serif);cursor:default}
  #panel .sv-fam{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border:1px solid var(--line);border-radius:20px;background:#fff;color:var(--ink-2);cursor:pointer;transition:background .12s,border-color .12s,color .12s}
  #panel .sv-fam:hover{border-color:var(--slate)}
  #panel .sv-fam.on{background:var(--navy,#1E3A8A);color:#fff;border-color:var(--navy,#1E3A8A)}
  #panel .sv-connect{width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;box-sizing:border-box}
  #panel .sv-foot{position:sticky;bottom:-30px;background:var(--paper,#fdfcf9);padding:12px 0 34px;margin-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;box-shadow:0 -10px 14px -10px rgba(19,23,27,.14)}
  #panel .sv-name{font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;flex:0 1 240px;max-width:240px;min-width:140px}
  #panel .sv-send{font-family:var(--mono);font-size:13px;padding:9px 18px;border:none;border-radius:7px;background:var(--red,#E11B2A);color:#fff;cursor:pointer}
  #panel .sv-send:hover{opacity:.9}
  #panel .sv-status{font-size:12px;color:var(--mute)}
  #panel .sv-resplink{color:inherit;text-decoration:none;cursor:text}
  #panel .sv-back{display:flex;align-items:center;gap:10px;width:100%;text-align:left;margin:2px 0 16px;padding:10px 13px;border:1px solid var(--navy,#1E3A8A);border-radius:9px;background:rgba(30,58,138,.06);color:var(--navy,#1E3A8A);font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:background .12s}
  #panel .sv-back:hover{background:rgba(30,58,138,.13)}
  #panel .sv-back-note{margin-left:auto;font-family:var(--ui,system-ui);font-weight:400;font-size:11px;color:var(--mute);white-space:nowrap}
  #panel .pers-card .pc-tx{min-width:0}

  #panel{position:fixed;left:0;right:0;bottom:0;z-index:60;background:#fff;border-top:1px solid var(--line);
    box-shadow:0 -10px 40px rgba(20,30,40,.18);transform:translateY(110%);transition:transform .28s ease;height:38vh;overflow:hidden}
  #panel.open{transform:none}
  #panel.full{height:100vh;height:100dvh}
  #panel .pfull{position:absolute;top:14px;right:max(58px, calc(50% - 390px));z-index:2;border:1px solid var(--line);background:#fff;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;line-height:1;color:var(--ink-2)}
  #panel .pfull:hover{border-color:var(--slate,#9aa3ab)}
  #panel .inner{max-width:880px;margin:0 auto;padding:22px 26px 30px;height:100%;overflow-y:auto;overflow-x:hidden;box-sizing:border-box}
  #panel .x{position:absolute;top:14px;right:max(16px, calc(50% - 432px));z-index:2;border:1px solid var(--line);background:#fff;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:17px;line-height:1;color:var(--ink-2)}
  #panel .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--clay)}
  #panel .kicker .pers-back{cursor:pointer;text-decoration:underline;text-underline-offset:2px;color:var(--clay);opacity:.85;transition:opacity .15s}
  #panel .kicker .pers-back:hover{opacity:1;color:var(--red)}
  #panel h2{font-size:30px;letter-spacing:-.015em;margin:6px 0 2px}
  #panel .role{font-size:14px;color:var(--navy);font-weight:500}
  #panel .loc{font-family:var(--mono);font-size:12px;color:var(--mute);margin-top:2px}
  #panel .chiprow{margin:10px 0 4px}
  #panel .metarow{display:flex;align-items:center;gap:10px;margin:9px 0 2px;flex-wrap:wrap}
  #panel .metarow .loc{margin:0}
  #panel .st{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:14px}
  .st.ok{background:#E5F1EA;color:var(--ok)} .st.verify{background:#F6ECD8;color:var(--warn)} .st.limited{background:#ECEFF2;color:var(--mute)}
  #panel dl{margin:14px 0 0;border-top:1px solid var(--line);padding-top:12px}
  #panel dt{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-top:13px}
  #panel dt:first-child{margin-top:0}
  #panel dd{margin:3px 0 0;font-size:14.5px;line-height:1.55;color:var(--ink-2)}
  #panel dd b{color:var(--ink)}
  #panel .who{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  #panel .who button{font-family:var(--body);font-size:13px;background:var(--red-tint);border:1px solid #F2C9CD;color:#9A1620;border-radius:10px;padding:6px 12px;cursor:pointer}
  #panel .who button:hover{background:#F8DCDF}
  #panel .who button b{font-family:var(--mono);font-weight:600}
  #panel .nofacts{font-size:13px;color:var(--mute);font-style:italic}
  #panel .scdesc{font-size:15px;line-height:1.5;color:var(--ink);margin:10px 0 4px}
  #panel .scdesc p{margin:0 0 10px}
  #panel .scdesc p:last-child{margin-bottom:0}
  .beat-ind{margin:16px 0 2px;padding:12px 14px;border:2px solid #1f5fa8;border-radius:8px;background:#eef4fb}
  .beat-ind-tag{display:inline-block;font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:700;color:#1f5fa8;border:1.5px solid #1f5fa8;border-radius:5px;padding:2px 8px;margin-right:9px;vertical-align:middle}
  .beat-ind-txt{font-size:13.5px;line-height:1.6;color:var(--ink)}
  .beat-ind-flag{color:#8a7a52;font-style:italic;font-size:.92em}
  #panel .scdesc .fmt-li{margin:5px 0 5px 18px;position:relative}
  #panel .scdesc .fmt-li:before{content:"•";position:absolute;left:-15px;color:var(--mute)}
  #panel .spk-quote{margin:6px 0 2px;padding:6px 0 6px 14px;border-left:3px solid var(--line);font-style:italic;color:var(--ink);font-size:14.5px;line-height:1.5}
  #panel .spk-quote cite{display:block;margin-top:6px;font-style:normal;font-size:12px;color:var(--mute)}
  #panel .spk-quote cite a{color:var(--mute);text-decoration:underline}
  #panel .wholist{display:flex;flex-direction:column;gap:6px;margin-top:6px}
  #panel .whorow{display:flex;flex-direction:column;align-items:flex-start;gap:1px;text-align:left;width:100%;background:#F6F8FA;border:1px solid #E4E8EC;border-radius:10px;padding:7px 11px;cursor:pointer;transition:background .12s,border-color .12s}
  #panel .whorow:hover{background:var(--red-tint);border-color:#F2C9CD}
  #panel .whorow .wn{font-family:var(--body);font-size:14px;font-weight:600;color:var(--ink)}
  #panel .whorow .wa{font-family:var(--body);font-size:12.5px;line-height:1.4;color:var(--slate)}

  footer{background:var(--ink);color:#9FB0BE;padding:24px 26px;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;display:flex;justify-content:flex-start;flex-wrap:wrap;gap:12px}

  /* meanings tier — the 5 journeys */
  .tierdiv{stroke:#CDD4DC;stroke-width:1px}
  .tierlbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;fill:#8A94A0;text-transform:uppercase}
  .laneltr{font-family:var(--mono);font-size:16px;font-weight:700;fill:#1C2024;fill-opacity:.22;text-anchor:middle}
  .tierlbl-link{cursor:pointer;fill:var(--red);text-decoration:underline;pointer-events:auto}
  .tierlbl-link:hover{fill:var(--red-bright)}
  .cast-cand{display:flex;gap:14px;padding:14px 0;border-top:1px solid var(--line)}
  .cast-cand img{width:84px;height:84px;object-fit:cover;border-radius:8px;flex:none;background:#EEF1F3}
  .cast-cand img.noimg{visibility:hidden}
  .cast-cb{min-width:0}
  .cast-nm{font-size:16px;font-weight:700;color:var(--ink)}
  .cast-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:2px}
  .cast-ph{width:84px;height:84px;border-radius:8px;flex:none;opacity:.9}
  .cast-loc{font-size:13px;font-weight:700;color:var(--ink);margin:2px 0 3px}
  .cast-loc .pin{color:var(--red);margin-right:3px}
  .cast-meta{font-family:var(--mono);font-size:11px;color:var(--mute);margin:0 0 6px}
  .cast-ig{color:var(--teal);text-decoration:none;pointer-events:auto}
  .cast-ig:hover{text-decoration:underline}
  .cast-story{font-size:12.5px;line-height:1.45;color:var(--ink-2)}
  .cast-rec{margin-top:8px}
  .cast-rec button{font-family:var(--mono);font-size:10.5px;color:var(--teal);background:none;border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer}
  .cast-rec button:hover{border-color:var(--teal);background:#F0F6F6}
  .cast-hero{padding:12px 0;border-top:1px solid var(--line)}
  .cast-hero-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .cast-dot{width:11px;height:11px;border-radius:50%;flex:none}
  .cast-hero-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex:none;background:#EEF1F3}
  .cast-hero-img.noimg{visibility:hidden}
  .cast-hn{font-size:14.5px;font-weight:700;color:var(--ink)}
  .cast-status{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px}
  .cast-status.ok{background:#1F7A57;color:#fff}
  .cast-status.tbd{background:#EEF1F3;color:var(--mute)}
  .cast-status.rec{cursor:pointer;border:1px solid #BFE0DA;background:#E8F3F1;color:var(--teal);text-transform:none;letter-spacing:.02em;pointer-events:auto}
  .cast-status.rec:hover{background:#D9EEE9}
  .cast-sum{font-size:12.5px;line-height:1.42;color:var(--ink-2);margin:5px 0 7px}
  .cast-sec{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin:20px 0 4px}
  .jlane{pointer-events:auto;cursor:pointer;transition:opacity .15s}
  .jlane .jhit{fill:transparent;pointer-events:all}
  .jbar{stroke-width:7px;stroke-linecap:round;opacity:.82;transition:stroke-width .15s,opacity .15s}
  .jmk{fill:#fff;stroke-width:2px;transition:r .15s}
  .jlbl{font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.01em}
  .jlane.prov .jbar{opacity:.5}
  .jlane:hover .jbar,.jlane.hl .jbar{opacity:1;stroke-width:9px}
  .jlane:hover .jmk,.jlane.hl .jmk{r:5.5}
  .jlane:hover .jlbl,.jlane.hl .jlbl{font-weight:600}
  .stage.dim .jlane:not(.hl){opacity:.3}

  /* Jim — parallel life line */
  .jimline{stroke:#C6CCD2;stroke-width:1.5px;stroke-linecap:round}
  .jim-ev{pointer-events:auto;cursor:pointer;transition:opacity .15s}
  .jim-ev .jhit{fill:transparent;pointer-events:all}
  .jim-nd{fill:#5A5550;stroke:#fff;stroke-width:1.5px;transition:fill .15s}
  .jim-lbl{font-family:var(--mono);font-size:11px;fill:#5A5550;text-anchor:middle;opacity:0;transition:opacity .15s;paint-order:stroke;stroke:var(--paper);stroke-width:4px;stroke-linejoin:round}
  .jim-ev:hover .jim-nd,.jim-ev.hl .jim-nd{fill:var(--red)}
  .jim-ev:hover .jim-lbl,.jim-ev.hl .jim-lbl{opacity:1;fill:var(--ink)}
  .stage.dim .jim-ev:not(.hl){opacity:.3}

  /* storyboard / film line */
  .filmline{stroke:#C6CCD2;stroke-width:1.5px;stroke-linecap:round}
  .film-ev{pointer-events:auto;cursor:pointer;transition:opacity .15s}
  .film-ev .fhit{fill:transparent;pointer-events:all}
  .film-clip{fill:#fff;stroke:#C6CCD2;stroke-width:1px;transition:fill .15s,stroke .15s;pointer-events:all}
  .film-clip.alt{fill:#EAEEF1}
  .film-n{font-family:var(--mono);font-size:10px;fill:#5A5550;text-anchor:middle;transition:fill .15s}
  .film-lbl{font-family:var(--mono);font-size:11px;fill:#5A5550;text-anchor:middle;opacity:0;transition:opacity .15s;paint-order:stroke;stroke:var(--paper);stroke-width:4px;stroke-linejoin:round}
  .film-ev:hover .film-clip,.film-ev.hl .film-clip{fill:var(--red-tint);stroke:var(--red)}
  .film-ev:hover .film-n,.film-ev.hl .film-n{fill:var(--red)}
  .film-ev:hover .film-lbl,.film-ev.hl .film-lbl{opacity:1;fill:var(--ink)}
  .arl{stroke:var(--red);stroke-width:1.4px;stroke-dasharray:4 4;opacity:0;transition:opacity .15s;pointer-events:none}
  .arl.on{opacity:.85}
  .stage.dim .film-ev:not(.hl){opacity:.3}
  /* storyboard scene blocks (HTML) */
  .film-block{position:absolute;box-sizing:border-box;background:#fff;border:1px solid #C6CCD2;border-radius:7px;padding:6px 9px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;overflow:hidden;transition:background .12s,border-color .12s,box-shadow .12s}
  .film-block.alt{background:#EAEEF1}
  .film-block:hover,.film-block.hl{background:var(--red-tint);border-color:var(--red);box-shadow:0 2px 10px rgba(225,27,42,.12)}
  .film-block .fb-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .film-block .fb-n{font-family:var(--mono);font-size:12px;font-weight:600;color:#5A5550}
  .film-block:hover .fb-n,.film-block.hl .fb-n{color:var(--red)}
  .film-block .fb-en{font-size:11px;line-height:1}
  .film-block .fb-en.up{color:#137C7C}
  .film-block .fb-en.down{color:#A2561E}
  .film-block .fb-title{font-family:var(--body);font-size:12px;line-height:1.2;color:var(--ink);font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .stage.dim .film-block:not(.hl){opacity:.32}
  /* pillar dots inside each storyboard part — sit right after the number */
  .film-block .fb-top{justify-content:flex-start}
  .film-block .fb-en{margin-left:auto}
  .film-block .fb-pills{display:inline-flex;gap:3px;align-items:center}
  .fb-pill{width:8px;height:8px;border-radius:50%;cursor:pointer;display:inline-block;border:1px solid rgba(0,0,0,.18);transition:transform .1s}
  .fb-pill:hover{transform:scale(1.4)}
  /* production calendar lane (months) — clickable month blocks, markers sit on the line */
  .cal-month{position:absolute;overflow:hidden;box-sizing:border-box;background:#fff;border:1px solid #C6CCD2;border-radius:7px;display:flex;align-items:center;justify-content:flex-start;padding-left:11px;color:#5A5550;font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.02em;cursor:pointer;transition:background .12s,border-color .12s,box-shadow .12s}
  .cal-days{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .cal-month .cm-nm{position:relative;z-index:1}
  .cal-month.alt{background:#F5F7F8}
  .cal-month:hover{background:var(--red-tint);border-color:var(--red);box-shadow:0 2px 10px rgba(225,27,42,.12)}
  .cal-month:hover .cm-nm{color:var(--red)}
  .cal-ev{position:absolute;cursor:pointer;transform:translate(-7px,-50%);z-index:5;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .cal-ev .ce-dot{flex:none;display:block;width:13px;height:13px;border-radius:50%;border:2px solid var(--paper);box-shadow:0 0 0 1px rgba(0,0,0,.22);transition:transform .1s}
  .cal-ev.star .ce-dot{width:14px;height:14px;border-radius:2px;transform:rotate(45deg)}
  .cal-ev:hover .ce-dot{transform:scale(1.3)}
  .cal-ev.star:hover .ce-dot{transform:rotate(45deg) scale(1.25)}
  .cal-ev .ce-lbl{font-family:var(--mono);font-size:10.5px;font-weight:700;line-height:1.1;text-shadow:0 0 3px var(--paper),0 0 3px var(--paper),0 0 3px var(--paper)}
  .cal-ev:hover .ce-lbl{text-decoration:underline}
  .cal-ev.tent .ce-dot{border-style:dashed}
  .cal-ev.tent .ce-lbl{font-style:italic;font-weight:600;opacity:.92}
  .tent-banner{display:inline-block;margin:8px 0 2px;padding:3px 9px;border:1px dashed #BD6A45;border-radius:3px;background:rgba(189,106,69,.08);color:#BD6A45;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.02em}
  .lp-archive{cursor:pointer;border-color:var(--navy);box-shadow:0 1px 6px rgba(28,32,36,.3)}
  .lp-archive .lp-badge{position:absolute;left:0;right:0;bottom:0;z-index:2;background:linear-gradient(transparent,rgba(16,20,24,.85));color:#fff;font-family:var(--mono,monospace);font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:12px 3px 3px;line-height:1;pointer-events:none}
  .lp-archive:hover .lp-badge{background:linear-gradient(transparent,rgba(28,32,36,.92))}
  /* --- archive hunt page --- */
  .arc-sec-h{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin:22px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .arc-sec-h:first-of-type{margin-top:16px}
  .arc-stages{display:flex;flex-direction:column;gap:8px}
  .arc-stage{border:1px solid var(--line);border-radius:9px;padding:10px 13px;background:var(--card)}
  .arc-stage.now{border-color:var(--red);background:var(--red-tint)}
  .arc-stage.done{opacity:.55}
  .arc-stage-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .arc-stage-nm{font-size:14px;font-weight:700;color:var(--ink)}
  .arc-stage.now .arc-stage-nm{color:var(--red)}
  .arc-stage-cnt{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--mute);white-space:nowrap}
  .arc-tasks{margin-top:6px;display:flex;flex-direction:column;gap:4px}
  .arc-task{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.4;color:var(--ink-2)}
  .arc-task.done{color:var(--mute);text-decoration:line-through;text-decoration-color:var(--line)}
  .arc-check{flex:none;width:15px;height:15px;border:1.5px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ok);line-height:1;margin-top:1px}
  .arc-task.done .arc-check{border-color:var(--ok);background:var(--ok);color:#fff}
  .arc-st{flex:none;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .arc-people,.arc-sources{display:flex;flex-direction:column;gap:9px}
  .arc-person,.arc-src{border:1px solid var(--line);border-radius:9px;padding:10px 13px;background:var(--card)}
  .arc-person-head,.arc-src-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .arc-person-nm{font-size:14px;font-weight:700;color:var(--ink)}
  .arc-person-role{font-family:var(--mono);font-size:10.5px;color:var(--teal);margin-top:2px}
  .arc-src-nm{font-size:14px;font-weight:700;color:var(--ink)}
  .arc-person-note,.arc-src-note{font-size:12.5px;line-height:1.5;color:var(--ink-2);margin-top:5px}
  .arc-mats{display:flex;flex-direction:column;gap:10px}
  .arc-mat{display:flex;gap:11px}
  .arc-thumb{position:relative;flex:none;width:96px;height:66px;border-radius:6px;overflow:hidden;background:#EAEEF1;border:1px solid var(--line)}
  .arc-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .arc-thumb.noimg{display:flex;align-items:center;justify-content:center}
  .arc-thumb-ph{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mute)}
  .arc-thumb-tag{position:absolute;left:3px;bottom:3px;z-index:2;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#fff;padding:2px 6px;border-radius:20px}
  .arc-mat-tx{min-width:0;flex:1}
  .arc-mat-nm{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.3}
  .arc-mat-note{font-size:12px;line-height:1.45;color:var(--ink-2);margin-top:3px}
  /* "now" vertical line marker */
  .cal-now{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:6}
  .cal-now .cn-lbl{font-family:var(--mono);font-size:10.5px;font-weight:700;margin-bottom:3px;white-space:nowrap;text-shadow:0 0 3px var(--paper),0 0 3px var(--paper),0 0 3px var(--paper)}
  .cal-now .cn-line{flex:1;width:2.5px;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,.5)}
  /* month detail (panel) */
  .calmo-nav{display:flex;align-items:center;gap:12px}
  .calmo-nav button{border:1px solid var(--line);background:#fff;border-radius:7px;width:30px;height:26px;cursor:pointer;font-size:12px;color:var(--ink-2);transition:background .12s,border-color .12s}
  .calmo-nav button:hover:not([disabled]){background:var(--red-tint);border-color:var(--red);color:var(--red)}
  .calmo-nav button[disabled]{opacity:.3;cursor:default}
  .calmo-nav .calmo-navttl{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--mute)}
  .calmo{margin-top:10px}
  .calmo-row{padding:11px 0;border-top:1px solid var(--line)}
  .calmo-row:first-child{border-top:none}
  .calmo-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .calmo-kind{flex:none;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;padding:2px 7px;border-radius:4px;line-height:1.5}
  .calmo-nm{font-size:14px;font-weight:700;color:var(--ink);line-height:1.25}
  .calmo-date{flex:none;margin-left:auto;font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--ink-2);white-space:nowrap}
  .calmo-tbc{font-family:var(--mono);font-size:8.5px;font-weight:700;color:var(--mute);border:1px solid var(--line);border-radius:3px;padding:1px 4px;text-transform:uppercase;letter-spacing:.03em}
  .calmo-detail{font-size:12.5px;line-height:1.42;color:var(--ink-2);margin-top:5px}
  .calmo-full{margin-top:9px;padding:10px 12px;background:#F5F7F8;border-radius:8px;border:1px solid var(--line)}
  .calmo-full .scdesc{margin:0}
  .calmo-full p{font-size:12.5px;line-height:1.45;color:var(--ink-2);margin:0 0 6px}
  .calmo-full .fmt-li{font-size:12.5px;line-height:1.4;color:var(--ink-2)}
  .calmo-more{margin-top:9px}
  .calmo-more button{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--teal);background:none;border:1px solid var(--line);border-radius:6px;padding:5px 10px;cursor:pointer;transition:background .12s,border-color .12s}
  .calmo-more button:hover{border-color:var(--teal);background:#F0F6F6}
  .calmo-row.done{opacity:.5}

  /* pillars tier */
  .accline{stroke:#E11B2A;stroke-width:1.5px;opacity:.45}
  .prowlbl{font-family:var(--mono);font-size:11px;font-weight:500;paint-order:stroke;stroke:var(--paper);stroke-width:3px;stroke-linejoin:round}
  .plbl-click{cursor:pointer;pointer-events:all}
  .plbl-click:hover{text-decoration:underline}
  .chip .mw{font-size:11px;vertical-align:baseline}
  #panel .mwline{font-family:var(--body);font-size:13px;color:var(--slate);margin-top:8px}
  /* story-beat ruler */
  .beatblk{position:absolute;box-sizing:border-box;height:24px;background:#fff;border:1px solid #C6CCD2;border-radius:5px;padding:0 7px;display:flex;align-items:center;justify-content:space-between;gap:6px;cursor:pointer;overflow:hidden;transition:background .12s,border-color .12s}
  .beatblk.alt{background:#EAEEF1}
  .beatblk:hover{background:var(--red-tint);border-color:var(--red)}
  .beatblk .bk-n{font-family:var(--body);font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .beatblk .bk-p{font-family:var(--mono);font-size:9px;color:var(--slate);flex:none}
  .beatblk:hover .bk-n{color:var(--red)}
  .beatpin{position:absolute;cursor:pointer;z-index:4}
  .beatpin .pin-stem{position:absolute;left:-1px;top:0;width:2px;height:30px;background:var(--slate);border-radius:1px}
  .beatpin .pin-dot{position:absolute;left:-5px;top:10px;width:10px;height:10px;box-sizing:border-box;background:#fff;border:2px solid var(--ink);transform:rotate(45deg)}
  .beatpin .pin-lbl{position:absolute;left:-52px;width:104px;text-align:center;font-family:var(--body);font-size:8.5px;font-weight:700;color:var(--ink);white-space:nowrap;line-height:1.1}
  .beatpin .pin-lbl.lo{top:30px}
  .beatpin .pin-lbl.hi{top:40px}
  .beatpin:hover .pin-stem{background:var(--red)}
  .beatpin:hover .pin-dot{border-color:var(--red);background:var(--red)}
  .beatpin:hover .pin-lbl{color:var(--red)}
  .spk-avatar{float:left;width:190px;height:auto;border-radius:6px;object-fit:cover;margin:2px 18px 10px 0;border:1px solid #E2E6EA;box-shadow:0 1px 4px rgba(0,0,0,.14)}
  #panel:has(.spk-avatar) dl{clear:left}
  .ptick{stroke:#fff;stroke-width:1px;transition:opacity .15s}
  .pchip{stroke:#fff;stroke-width:0;transition:opacity .15s}
  .sguide{stroke:var(--mute);stroke-width:1px;stroke-dasharray:2 4;opacity:0;transition:opacity .15s}
  .sguide.on{opacity:.55}
  .stage.dim .pchip:not(.hl){opacity:.22}
  .stage.dim .ptick:not(.hl){opacity:.3}
  .pchip.hl,.ptick.hl{stroke:var(--ink);stroke-width:1.5px}
  /* heroes / airtime bars */
  .herobar{cursor:pointer;pointer-events:all;transition:opacity .15s;fill-opacity:.85}
  .herobar:hover,.herobar.hl{stroke:var(--ink);stroke-width:1.5px;fill-opacity:1}
  .stage.dim .herobar:not(.hl){opacity:.32}

  /* speaker initials at scenes (variant A) */
  .spkpill{cursor:pointer;transition:opacity .15s;pointer-events:auto}
  .spp-bg{fill:#fff;stroke:#C0C7CE;stroke-width:1px;transition:fill .15s,stroke .15s;pointer-events:all}
  .spp-tx{font-family:var(--mono);font-size:9px;fill:#5A5550;text-anchor:middle;transition:fill .15s}
  .spkpill:hover .spp-bg,.spkpill.hl .spp-bg{fill:var(--red);stroke:var(--red)}
  .spkpill:hover .spp-tx,.spkpill.hl .spp-tx{fill:#fff}
  .stage.dim .spkpill:not(.hl){opacity:.3}
  .spp-nm{font-family:var(--body);font-size:12px;font-weight:600;fill:var(--ink);text-anchor:middle;opacity:0;transition:opacity .15s;paint-order:stroke;stroke:var(--paper);stroke-width:4px;stroke-linejoin:round;pointer-events:none}
  .spkpill:hover .spp-nm{opacity:1}

  /* view toggle + scene tags + spine mode */
  .viewtoggle{display:flex;border:1px solid #2A3744;border-radius:16px;overflow:hidden}
  .viewtoggle button{font-family:var(--mono);font-size:11px;letter-spacing:.04em;background:#10161D;color:#9FB0BE;border:0;padding:5px 12px;cursor:pointer;white-space:nowrap}
  .viewtoggle button[aria-pressed="true"]{background:var(--red);color:#fff}
  .ev .sc{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--mute);margin-bottom:3px}
  .ev.tier-1 .sc{color:var(--red)}
  .stage.mode-spine .ev.tier-3{display:none}
  .stage.mode-spine .ev.tier-2{opacity:.5}
  .stage.mode-spine .nd.tier-3{opacity:.45}
  .stage.mode-spine .nd.tier-1{r:8}
  .stage.mode-spine .ev.tier-1{border-top-width:4px}
  #panel .scl{color:var(--ink-2);font-size:13.5px;line-height:1.5}
  #panel .scl b{color:var(--red);font-family:var(--mono);font-size:11px}

  @media(prefers-reduced-motion:reduce){#panel{transition:none}.ev,.chip,.nd,.stalk,.jbar,.jmk{transition:none}}

  /* === Task board (Glidewell-logo button → half-screen panel) === */
  header.top .gwmark{background:none;border:none;padding:0;margin:0;cursor:pointer;display:inline-flex;align-items:center;border-radius:8px;transition:opacity .15s,box-shadow .15s}
  header.top .gwmark:hover{opacity:.82}
  header.top .gwmark:focus-visible{outline:2px solid var(--red);outline-offset:3px}
  #taskpanel{position:fixed;left:0;right:0;bottom:0;height:50vh;background:var(--paper,#fdfcf9);border-top:1px solid var(--line);box-shadow:0 -10px 40px rgba(20,30,40,.18);z-index:61;transform:translateY(110%);transition:transform .28s ease;display:flex;flex-direction:column;font-family:var(--body)}
  #taskpanel.open{transform:none}
  #taskpanel.full{height:100vh;height:100dvh}
  #taskpanel .tp-controls{display:flex;align-items:center;gap:12px}
  #taskpanel .tp-full{background:none;border:none;font-size:18px;line-height:1;color:var(--mute);cursor:pointer;padding:0 4px}
  #taskpanel .tp-full:hover{color:var(--ink)}
  #taskpanel .tp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line,#e5e3df);flex:0 0 auto}
  #taskpanel .tp-ttl{font-size:16px;font-weight:600;color:var(--navy,#1E3A8A)}
  #taskpanel .tp-sub{font-family:var(--mono);font-size:11px;color:var(--mute);font-weight:400;letter-spacing:.06em}
  #taskpanel .tp-x{background:none;border:none;font-size:26px;line-height:1;color:var(--mute);cursor:pointer;padding:0 4px}
  #taskpanel .tp-x:hover{color:var(--ink)}
  #taskpanel .tp-body{flex:1 1 auto;overflow:auto;padding:14px 16px}
  /* kanban */
  .kb{display:flex;gap:12px;align-items:stretch;height:100%}
  .kb-col{flex:1 1 0;min-width:150px;background:rgba(0,0,0,.025);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
  .kb-colh{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);display:flex;justify-content:space-between;padding:2px 4px 4px}
  .kb-card{background:#fff;border:1px solid var(--line,#e5e3df);border-left:3px solid var(--slate,#9aa3ab);border-radius:8px;padding:9px 10px;cursor:pointer;transition:box-shadow .15s,transform .15s}
  .kb-card:hover{box-shadow:0 4px 14px rgba(19,23,27,.10);transform:translateY(-2px)}
  .kb-card .kc-id{font-family:var(--mono);font-size:9.5px;color:var(--mute)}
  .kb-card .kc-t{font-size:13px;line-height:1.35;color:var(--ink);margin-top:2px}
  .kb-card.c-ideas{border-left-color:#9aa3ab;background:#fff}
  .kb-card.c-progress{border-left-color:#E0A100;background:#FFFBF0}
  .kb-card.c-done{border-left-color:#2E7D32;background:#F2F8F2}
  .kb-card.c-archive{border-left-color:#c4bdb2;background:#f6f5f2;opacity:.8}
  /* card detail */
  #taskpanel .kb-detail{max-width:880px;margin:0 auto}
  .kb-detail .kd-back{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--clay);cursor:pointer;background:#fff;border:1.5px solid var(--clay);border-radius:8px;padding:9px 15px;margin-bottom:14px;display:inline-flex;align-items:center;gap:3px;transition:background .12s,color .12s}
  .kb-detail .kd-back:hover{color:#fff;background:var(--clay);border-color:var(--clay)}
  .kb-detail .kd-back .kd-back-arw{font-size:21px;line-height:1;font-weight:700;position:relative;top:-1px}
  .kb-detail h3{font-size:18px;color:var(--ink);margin:2px 0 6px}
  .kb-detail .kd-meta{font-family:var(--mono);font-size:10.5px;color:var(--mute);margin-bottom:12px}
  .kb-detail .kd-notes{font-size:14px;line-height:1.55;color:var(--ink-2)}
  .kb-detail .kd-notes p{margin:0 0 11px}
  .kb-detail .kd-notes p:last-child{margin-bottom:0}
  .kb-detail .kd-notes .kn-li{margin:4px 0 4px 18px;position:relative}
  .kb-detail .kd-notes .kn-li:before{content:"•";position:absolute;left:-15px;color:var(--mute)}
  .kb-detail .kd-sec{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin:16px 0 6px}
  .kb-detail .kd-link{font-size:13px;color:var(--ink-2);padding:3px 0}
  .kb-detail .kd-media img{max-width:100%;border-radius:8px;border:1px solid var(--line);margin-top:8px}
  /* task feedback */
  .kb-card .kc-fb{float:right;font-size:11px;opacity:.85}
  .kb-detail .kd-fb{width:100%;box-sizing:border-box;min-height:74px;resize:vertical;font-family:var(--body);font-size:13.5px;line-height:1.5;padding:9px 11px;border:1px solid var(--line);border-radius:8px;margin-top:4px}
  .kb-detail .kd-fb:focus{outline:none;border-color:var(--navy,#1E3A8A)}
  #taskpanel .tp-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;padding:11px 16px;border-top:1px solid var(--line,#e5e3df);background:var(--paper,#fdfcf9)}
  #taskpanel .tk-name{font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;flex:0 1 220px;max-width:220px;min-width:130px}
  #taskpanel .tk-send{font-family:var(--mono);font-size:13px;padding:9px 18px;border:none;border-radius:7px;background:var(--red,#E11B2A);color:#fff;cursor:pointer}
  #taskpanel .tk-send:hover{opacity:.9}
  #taskpanel .tk-send:disabled{background:#cfd4d8;cursor:default}
  #taskpanel .tk-status{font-size:12px;color:var(--mute)}
  @media(prefers-reduced-motion:reduce){#taskpanel{transition:none}}
  /* === Lightbox (frosted glass + photo to foreground) === */
  #lightbox{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:4vh 4vw;
    background:rgba(22,26,30,.42);backdrop-filter:blur(16px) saturate(.92);-webkit-backdrop-filter:blur(16px) saturate(.92);
    opacity:0;transition:opacity .22s ease;cursor:zoom-out}
  #lightbox.open{display:flex;opacity:1}
  #lightbox figure{margin:0;max-width:90vw;max-height:94vh;display:flex;flex-direction:column;align-items:center;
    transform:scale(.84);transition:transform .28s cubic-bezier(.2,.8,.25,1)}
  #lightbox.open figure{transform:scale(1)}
  #lightbox img{max-width:90vw;max-height:84vh;object-fit:contain;border-radius:7px;background:#fff;box-shadow:0 26px 90px rgba(0,0,0,.5)}
  #lightbox figcaption{margin-top:15px;color:#fff;font-family:var(--body);font-size:14px;line-height:1.45;text-align:center;max-width:72ch;text-shadow:0 1px 4px rgba(0,0,0,.55)}
  .scframe img{cursor:zoom-in}
  .line-photo{cursor:zoom-in}
  @media(prefers-reduced-motion:reduce){#lightbox,#lightbox figure{transition:none}}
  /* ============================================================
     LINE CANVAS — dark "CAD viewport / scan" theme (2026-07-22)
     Scoped to #scroller via token overrides; side panels stay light.
     Grounded in the film's subject: intraoral scanning, CAD, precision.
     ============================================================ */
  #scroller{
    --paper:#0C0F13; --card:#161C24; --line:rgba(196,222,230,.12);
    --ink:#E9EEF3; --ink-2:#AEBAC6; --mute:#8391A0; --slate:#6E7B89;
    --navy:#7FE0D2; --teal:#7FE0D2; --red-tint:rgba(245,64,75,.14);
    background:#0C0F13; color:var(--ink);
  }
  #scroller .stage{background:transparent;position:relative}
  /* subtle grain to break the flat dark — the "screen" texture */
  #scroller .stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.05;mix-blend-mode:soft-light;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  /* the rail glows like a scan sweep instead of casting a dark shadow */
  #scroller .mainrail{filter:drop-shadow(0 0 4px rgba(127,224,210,.45))}
  #scroller .nd{filter:drop-shadow(0 0 5px rgba(127,224,210,.55))}
  #scroller .nd{stroke:#0C0F13}
  #scroller .nd.hl{fill:var(--red-bright);filter:drop-shadow(0 0 7px rgba(245,64,75,.7))}
  #scroller .baseline-cap{fill:#7C8794}
  #scroller .eralbl{fill:#6E7B89}
  #scroller .eraband{fill:#CFE7E2;opacity:.03}
  #scroller .eradiv{stroke:rgba(196,222,230,.10)}
  /* dark-glass milestone cards: hairline + soft glow lift, not a black shadow */
  #scroller .ev{box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 8px 24px -14px rgba(0,0,0,.7)}
  #scroller .ev:hover,#scroller .ev.hl{box-shadow:0 0 0 1px rgba(127,224,210,.35),0 14px 34px -10px rgba(0,0,0,.75);border-color:transparent}
  #scroller .ev .star{background:var(--red-bright);box-shadow:0 0 10px rgba(245,64,75,.5)}
  #scroller .morep{background:var(--card);border-color:var(--slate)}
  /* employees metric line was near-black — lift it for the dark canvas */
  #scroller .lgnd-sw.emp{border-top-color:#8391A0}
  #scroller .film-block,#scroller .film-clip{}
</style>
</head>

  {y:"1969–70", tr:"g", j:[], tier:1, sc:[1,8],
    t:{en:"Founded",ru:"Основание"},
    d:{en:"Jim, a hand technician, founds a one-man ceramics lab in Orange County, CA.",ru:"Джим, техник-ручник, основывает в округе Ориндж лабораторию из одного человека."},
    th:{en:"One man, one bench — betting that affordable was a business model.",ru:"Один человек, один верстак — ставка на то, что доступность может быть бизнес-моделью."},
    full:{en:"<b>What happened.</b> In January 1970, Jim Glidewell opened a one-man dental ceramics lab in Orange County, California, working off a kitchen table — at once the founder and the sole employee. He had finished studying dental technology at Orange Coast College in 1969 and started as a bench technician who knew the craft with his hands. Before any of this came the hard road: a Kentucky farm upbringing near the Cumberland River, a latchkey childhood, and a Navy hitch during the Vietnam era.<br><br><b>Why it earns its place.</b> This is the genesis of the entire thesis. A man with no pedigree and no capital bets that he can do good dentistry cheaper and grow it relentlessly — which is exactly the company's promise scaled up: the best dentistry, made affordable. The origin is not that Jim invented anything; it is that a hand technician with nothing decided access was a business model. Every later chapter (BruxZir, digital, AI) is this same bet compounding.<br><br><b>The link to the next generation.</b> The one-man bench rhymes directly with Dr. Abdul Alas mentoring interns and with the Guiding Leaders alum — people who came up without inheritance and are now lifting the next ones. Jim raised himself; the company now raises others. The latchkey kid who taught himself the craft is the prototype for everyone in our cast who started behind and built forward.<br><br><b>Modern echo.</b> The kitchen table became the world's largest dental lab. The echo lives in scale (thousands of employees), in education programs, and in the cultural insistence that a technician's hands matter — the same hands our old-school dentist #2 still uses to take physical impressions. The before-and-after of the film is literally Jim's own arc: one bench to a global platform.<br><br><b>Who can speak to it.</b> Jim Glidewell himself carries this beat on camera — it is his memory and his myth. Phil Venard (40+ years R&D, retired) is living memory of the early lab culture and can corroborate what the bench era felt like. Mike DiTolla and Neil Park can speak to how the founding ethos still shapes the place. IDEA 1: open the personal film on Jim's hands at a bench, then hard-cut to the floor of the modern lab — same gesture, planetary scale.<br><br><b>Verify before screen.</b> Founding date January 1970 — confirmed by company history. Sole employee / kitchen-table start — confirmed. Orange Coast College, dental technology, 1969 — confirmed. Navy during Vietnam, posted to the Philippines — reported, treat as solid but confirm with Jim. Kentucky / Cumberland River upbringing, latchkey childhood — reported, confirm. Exact city (Newport Beach vs greater Orange County) for the first lab — to-confirm; say Orange County if unsure. Guardrail: Jim made dentistry affordable, never that he invented it.",ru:"<b>Что произошло.</b> В январе 1970 года Джим Глайдвелл открыл лабораторию зубной керамики на одного человека в округе Ориндж, Калифорния, работая буквально за кухонным столом — он был одновременно основателем и единственным сотрудником. Незадолго до этого, в 1969 году, он отучился на зубного техника в Orange Coast College и начал карьеру как мастер, знающий ремесло руками. А до всего этого был тяжёлый путь: ферма в Кентукки у реки Камберленд, детство «с ключом на шее», служба во флоте в годы Вьетнама.<br><br><b>Почему это важно.</b> Это генезис всего тезиса фильма. Человек без родословной и без капитала ставит на то, что сможет делать хорошую стоматологию дешевле и неустанно её масштабировать — а это и есть обещание компании в увеличенном масштабе: лучшая стоматология, сделанная доступной. Суть истоков не в том, что Джим что-то изобрёл, а в том, что мастер-техник без гроша решил, что доступность — это бизнес-модель. Каждая последующая глава (BruxZir, цифра, ИИ) — та же ставка, растущая сложным процентом.<br><br><b>Связь со следующим поколением.</b> Верстак на одного человека напрямую рифмуется с доктором Абдулом Аласом, который наставляет интернов, и с выпускницей Guiding Leaders — людьми, поднявшимися без наследства и теперь тянущими следующих. Джим вырастил себя сам; компания теперь растит других. Мальчишка с ключом на шее, сам освоивший ремесло, — прообраз всех в нашем составе, кто стартовал с отставанием и строил вперёд.<br><br><b>Современное эхо.</b> Кухонный стол стал крупнейшей зуботехнической лабораторией мира. Эхо живёт в масштабе (тысячи сотрудников), в образовательных программах и в культурной убеждённости, что руки техника важны — те самые руки, которыми наш старой школы дантист №2 до сих пор снимает физические слепки. «До и после» фильма — это буквально собственная дуга Джима: один верстак — глобальная платформа.<br><br><b>Кто может рассказать об этом.</b> Сам Джим Глайдвелл несёт этот эпизод в кадре — это его память и его миф. Фил Венард (40+ лет в R&D, на пенсии) — живая память ранней культуры лаборатории, может подтвердить, каким был век верстака. Майк ДиТолла и Нил Парк могут рассказать, как дух основания до сих пор формирует компанию. ИДЕЯ 1: открыть личный фильм на руках Джима за верстаком, затем резкий переход на цех современной лаборатории — тот же жест, планетарный масштаб.<br><br><b>Проверить до эфира.</b> Дата основания — январь 1970 — подтверждено историей компании. Единственный сотрудник / старт за кухонным столом — подтверждено. Orange Coast College, зубная техника, 1969 — подтверждено. Флот в годы Вьетнама, служба на Филиппинах — по сообщениям, считать надёжным, но сверить с Джимом. Кентукки / река Камберленд, детство с ключом на шее — по сообщениям, сверить. Точный город (Newport Beach vs округ Ориндж в целом) для первой лаборатории — to-confirm; при сомнении говорить «округ Ориндж». Гардрейл: Джим сделал стоматологию доступной, но не изобрёл её."}},

    d:{en:"Jim owns and runs nine labs across Southern California.",ru:"Джим владеет и управляет девятью лабораториями по всей Южной Калифорнии."},
    th:{en:"Scattered scale — powerful, but not yet one machine.",ru:"Разрозненный масштаб — мощно, но ещё не единая машина."},
    full:{en:"<b>What happened.</b> By 1979 the one-man ceramics lab Jim opened in 1970 had multiplied into nine separate labs spread across Southern California. It was real scale — but scale by addition: nine locations, nine sets of overhead, nine places to manage, rather than one machine. <br><br><b>Why it matters — scattered scale.</b> This is the company a half-step before its defining idea. The first direct-mail campaign had already broken the “only serve dentists nearby” rule — cases were now arriving by post from far beyond any single lab’s neighborhood. So the nine-lab sprawl and the mail-order reach pull in opposite directions: demand is becoming national while production is still local and fragmented. That tension is the whole point of the beat — it is the problem that forces the next move. <br><br><b>The pivot it sets up.</b> It leads straight to 1984: the nine labs merge into a single centralized plant in Orange (15,000 sq ft, 42 staff), fed nationally by mail. That is the birth of the model that actually scales — one machine, one standard, cost driven down by volume. Tell 1979 as the “before,” and 1984 lands as the turn. <br><br><b>Modern echo.</b> The logical endpoint of “one machine” is today’s single massive Glidewell campus in Irvine — the largest dental lab in the world. The instinct to consolidate, standardize and drive cost down, visible here in embryo, is the same one that underwrites the whole affordability thesis. <br><br><b>Who can speak to it.</b> The longest-tenured employees (someone 40+ years in, e.g. Phil Venard) or Jim himself — on what running nine scattered labs actually felt like, and the decision to pull them into one. If anyone remembers the multi-lab era firsthand, that memory is gold and rare. <br><br><b>Verify before screen.</b> This beat is thin on hard facts — treat the specifics as to-confirm: the exact count of nine, which cities/areas, the precise year (1979), and whether Jim “owned” vs “operated” them. Confirm the direct-mail timing relative to 1979 and the clean through-line to the 1984 consolidation (15,000 sq ft, 42 staff) before any of it goes on screen.",ru:"<b>Что произошло.</b> К 1979 году лаборатория-одиночка по керамике, которую Джим открыл в 1970-м, разрослась в девять отдельных лабораторий по всей Южной Калифорнии. Это был настоящий масштаб — но масштаб через сложение: девять точек, девять статей расходов, девять мест для управления, а не одна машина. <br><br><b>Почему это важно — разрозненный масштаб.</b> Это компания за полшага до своей определяющей идеи. Первая кампания прямой почтовой рассылки уже сломала правило «обслуживать только ближних врачей» — кейсы теперь приходили почтой далеко за пределы района любой отдельной лабы. И девять разбросанных лабораторий и почтовый охват тянут в разные стороны: спрос становится национальным, а производство всё ещё локальное и раздробленное. Это напряжение — и есть суть бита: это проблема, которая вынуждает следующий ход. <br><br><b>К чему это ведёт.</b> Напрямую к 1984-му: девять лабораторий сливаются в одно централизованное производство в Оранже (15 000 кв. футов, 42 человека), питаемое почтой со всей страны. Это рождение модели, которая реально масштабируется — одна машина, один стандарт, себестоимость вниз за счёт объёма. Расскажи 1979-й как «до» — и 1984-й сыграет как поворот. <br><br><b>Современное воплощение.</b> Логический финал «одной машины» — сегодняшний единый огромный кампус Glidewell в Ирвайне, крупнейшая зуботехническая лаборатория в мире. Инстинкт консолидировать, стандартизировать и давить себестоимость, видный здесь в зародыше, — тот же, что лежит в основе всего тезиса о доступности. <br><br><b>Кто может рассказать.</b> Самые давние сотрудники (кто-то с 40+ годами стажа, например Фил Венард) или сам Джим — о том, каково это было на самом деле, управлять девятью разбросанными лабами, и о решении собрать их в одну. Если кто-то помнит эпоху многих лабораторий из первых рук — это редкое золото. <br><br><b>Проверить перед экраном.</b> Этот бит беден твёрдыми фактами — отнестись к конкретике как к «уточнить»: точное число девять, какие города/районы, точный год (1979) и «владел» ли Джим или «управлял». Сверить тайминг прямой почтовой рассылки относительно 1979-го и чистую сквозную связь с консолидацией 1984-го (15 000 кв. футов, 42 человека) перед выводом на экран."}},
  {y:"1980", tr:"g", j:["ce"], tier:2, sc:[13],
    t:{en:"Study program",ru:"Программа обучения"},
    d:{en:"An International Study Program brings dentists in from Japan and abroad to train in the US — the root of Jim's lifelong belief in teaching and symposia.",ru:"Международная программа обучения привозит стоматологов из Японии и других стран на учёбу в США — корень пожизненной веры Джима в обучение и симпозиумы."},
    th:{en:"Education as a bond — long before it was a marketing channel.",ru:"Обучение как связь — задолго до того, как стать маркетингом."},
    full:{en:"<b>What happened.</b> In 1980 Glidewell began flying dentists in from Japan and other countries to train in the US — the International Study Program. It was a bold move for a lab that was only just beginning to scale nationally, and it became one of the foundational milestones that shaped the company's philosophy for decades.<br><br><b>Education as a bond.</b> Jim used teaching long before it became a standard marketing tool. For him it was a way to build bridges and exchange know-how with the profession — a connection, not an add-on to the product. That instinct later grew into a full media and education wing (the Chairside and Lab Perspectives magazines among them). His conviction is blunt: in business it is critical that people like and trust you — “people don't buy from people they don't like.” Teaching, and hosting guests in his own home, became the tools for building that almost family-like bond.<br><br><b>The link to the next generation.</b> Jim's younger children weren't born yet in 1980, but the milestone connects directly to how they take part today. He pulls his kids — Lila and Jimmy — into running these same symposia: suits and ties on, greeting guests, shaking hands. He says it teaches them to be personal and responsible rather than “ordinary teenagers.” The kids note that having the family present turns a strictly commercial event into a real home gathering, where guests feel like they're visiting friends.<br><br><b>Modern echo.</b> This belief, started in 1980, led to the opening of the Glidewell International Technology Center (GITC) in July 2011 — a modern hub for training dentists from around the world.<br><br><b>Who can speak to it.</b> A long-tenured employee (someone 40+ years in, like Phil Venard) or Jim himself — on how a small initiative with Japanese dentists grew into a global education effort and, along the way, a method for raising his own children.<br><br><b>Verify before screen.</b> Confirm the exact program name and 1980 start, the first countries involved, and the GITC opening date (July 2011) before they go on screen.",ru:"<b>Что произошло.</b> В 1980 году Glidewell начала привозить стоматологов из Японии и других стран на обучение в США — Международная образовательная программа (International Study Program). Это был смелый шаг для лаборатории, которая тогда только начинала масштабироваться на национальном уровне, и одна из фундаментальных вех, определивших философию компании на десятилетия вперёд.<br><br><b>Обучение как связь.</b> Джим использовал обучение задолго до того, как оно стало стандартным маркетинговым инструментом. Для него это был способ навести мосты и обменяться опытом с профессиональным сообществом — именно связь, а не дополнение к продукту. Эта интуиция позже переросла в полноценное медийное и образовательное крыло компании (в том числе журналы Chairside и Lab Perspectives). Его убеждение прямое: в бизнесе критично, чтобы вас любили и доверяли вам — «люди не покупают у тех, кто им не нравится». Обучение и приём гостей в собственном доме стали инструментами создания этой почти семейной связи.<br><br><b>Связь со следующим поколением.</b> Младшие дети Джима в 1980-м ещё не родились, но веха напрямую связана с тем, как они участвуют в деле сегодня. Он вовлекает детей — Лилу и Джимми — в проведение тех самых симпозиумов: костюмы и галстуки, встреча гостей, рукопожатия. По его словам, это учит их быть персональными и ответственными, а не просто «обычными подростками». Дети отмечают, что присутствие семьи превращает строго коммерческое мероприятие в настоящую домашнюю встречу, где гости чувствуют себя как в гостях у друзей.<br><br><b>Современное воплощение.</b> Эта вера, начавшаяся в 1980-м, привела к открытию в июле 2011 года Международного технологического центра Glidewell (Glidewell International Technology Center, GITC) — современного хаба для обучения врачей со всего мира.<br><br><b>Кто может рассказать.</b> Кто-то из давних сотрудников (проработавших 40+ лет, как Фил Венард) или сам Джим — о том, как маленькая инициатива с японскими врачами выросла в глобальное образовательное направление и попутно — в метод воспитания его собственных детей.<br><br><b>Проверить перед экраном.</b> Сверить точное название программы и старт в 1980-м, первые страны-участницы и дату открытия GITC (июль 2011) перед выводом на экран."}},

  {y:"1988", tr:"g", j:["restorative"],
    t:{en:"BioTemps",ru:"BioTemps"},
    d:{en:"BioTemps provisional restorations — lab-made PMMA temporaries that doubled as an esthetic “blueprint” the patient could approve before the final.",ru:"Провизорные реставрации BioTemps — лабораторные временные коронки из PMMA, служившие эстетическим «макетом», который пациент одобряет ещё до финальной работы."},
    th:{en:"A second product proves the lab can build categories, not just crowns.",ru:"Второй продукт доказывает: лаборатория умеет создавать категории, а не только коронки."},
    full:{en:"<b>What it is.</b> BioTemps are lab-fabricated provisional (temporary) crowns and bridges in tooth-colored PMMA acrylic — roughly a 6-month wear life, ~3-day lab turnaround. (There's also a chairside version, “BioTemps NOW,” milled in-office from PMMA blocks.)<br><br><b>Why it's more than a temporary.</b> The real value is as an esthetic <i>blueprint</i>: the provisional's design is stored and reused for the final restoration (later a BruxZir or e.max crown), so the patient can see, wear and approve the look, bite and speech <i>before</i> committing — “no surprises on the final visit.” It also shapes gum tissue and restores collapsed bite height. A clean early example of the Glidewell pattern: own the whole workflow in-house and take the risk out for the dentist.<br><br><b>Date — be careful.</b> Glidewell's own sources conflict: a company blog says BioTemps “first launched in the late 1980s,” while the official corporate history clusters it “by the turn of the century” (~2000). Treat the exact year as uncertain; if unsure on screen, say “developed by ~2000.” What IS documented: around <b>2002</b> the BioTemps business was spun into a dedicated fixed-ceramics lab, later named <b>BDL Prosthetics</b> — literally “formerly BioTemps” (OCBJ).<br><br><b>The “92,000 sq ft building (2001)” claim — drop it.</b> There is no source for a dedicated 92,000 sq ft BioTemps building in 2001; the number, the year and the dedicated-building framing all fail verification — do NOT put it on screen. The only real 2002-era real-estate fact is Glidewell buying the adjacent “FedEx building” (~$8M, OCBJ). Documented footprint numbers are different and later: ~72,000 sq ft (MacArthur, Newport Beach), 74,000 (Von Karman, Irvine, 2007), ~250,000 (Dupont, 2018).<br><br><b>Link to the arc.</b> BioTemps shows the vertical, in-house, materials-driven model Glidewell would later scale dramatically with BruxZir zirconia (2009). Honesty caveat: “BioTemps built the muscle that led to BruxZir” is a tidy interpretation, not documented cause-and-effect — frame it as part of a broader vertical-integration strategy, not a straight line.<br><br><b>Sources.</b> Glidewell product pages (BioTemps Provisionals; BioTemps NOW); Glidewell official history; OCBJ (BDL “formerly BioTemps,” 2002; FedEx-building purchase). Launch year and any volume figures: to-confirm.",ru:"<b>Что это.</b> BioTemps — лабораторные провизорные (временные) коронки и мосты из тонированного PMMA-акрила: срок службы ~6 месяцев, изготовление в лабе ~3 дня. (Есть и кресельная версия, «BioTemps NOW», фрезеруемая в кабинете из PMMA-блоков.)<br><br><b>Почему это больше, чем «времянка».</b> Главная ценность — эстетический <i>макет</i>: дизайн провизорной коронки сохраняется и переиспользуется для финальной работы (позже коронка BruxZir или e.max), так что пациент видит, носит и одобряет форму, прикус и речь <i>до</i> того, как решится, — «никаких сюрпризов на финальном визите». Заодно формирует десну и восстанавливает «просевшую» высоту прикуса. Чистый ранний пример паттерна Glidewell: держать весь процесс in-house и снимать риск с врача.<br><br><b>Дата — осторожно.</b> Источники самого Glidewell расходятся: блог компании пишет, что BioTemps «впервые запущен в конце 1980-х», а официальная корпоративная история относит его «к рубежу веков» (~2000). Считать точный год неопределённым; если не уверены в кадре — говорить «разработан к ~2000». Что задокументировано: примерно в <b>2002</b> бизнес BioTemps выделили в отдельную лабораторию фикс-керамики, позже названную <b>BDL Prosthetics</b> — буквально «formerly BioTemps» (OCBJ).<br><br><b>Заявление «здание 92 000 кв. футов (2001)» — убрать.</b> Нет ни одного источника про отдельное здание BioTemps на 92 000 кв. футов в 2001-м; и число, и год, и сама формулировка «отдельное здание» не подтверждаются — НЕ давать в кадре. Единственный реальный факт о недвижимости той поры — покупка прилегающего «здания FedEx» (~$8M, OCBJ). Документированные площади другие и позже: ~72 000 кв. футов (MacArthur, Newport Beach), 74 000 (Von Karman, Ирвайн, 2007), ~250 000 (Dupont, 2018).<br><br><b>Связь с дугой.</b> BioTemps показывает вертикальную, in-house, материаловедческую модель, которую Glidewell позже резко масштабирует с цирконием BruxZir (2009). Оговорка о честности: «BioTemps наработал мускул, приведший к BruxZir» — это аккуратная интерпретация, а не задокументированная причинно-следственная связь; подавать как часть более широкой стратегии вертикальной интеграции, а не прямую линию.<br><br><b>Источники.</b> Продуктовые страницы Glidewell (BioTemps Provisionals; BioTemps NOW); официальная история Glidewell; OCBJ (BDL «formerly BioTemps», 2002; покупка «здания FedEx»). Год запуска и любые цифры объёма — to-confirm."}},

    t:{en:"Newport Beach",ru:"Newport Beach"},

  {y:"1995", tr:"g", j:["preventive"], tier:2, sc:[10],
    t:{en:"Operatory · PlaySafe",ru:"Клиника · PlaySafe"},
    d:{en:"An in-house operatory opens to test materials on real patients; PlaySafe mouthguards launch.",ru:"Открывается внутренняя клиника для тестов материалов на реальных пациентах; запуск капп PlaySafe."},
    th:{en:"Test where dentists work — and step beyond the crown.",ru:"Тестировать там, где работают врачи — и выйти за пределы коронки."},
    full:{en:"<b>What happened.</b> In 1995 Glidewell opened a small in-house dental operatory — a working clinic inside the lab — so the company could test materials and restorations on real patients rather than only on bench models. The same year it launched PlaySafe, a line of custom-fitted athletic mouthguards (to-confirm exact launch year and product name spelling — verify against Glidewell archives). This is a minor, connective beat: low on its own, but it marks two firsts worth one short timeline card.<br><br><b>Why it matters (the realism move).</b> Two small things start here. First, R&D realism: a crown that survives a lab jig is not the same as one that survives a human bite, saliva, and a hurried dentist — putting chairs in the building meant Glidewell could see failure where it actually happens. Second, it is the company's first clear step beyond the crown, into prevention and sport. Modest in scale, but it shows the instinct that later defines the firm: control more of the chain, and don't stop at the restoration.<br><br><b>The link to the next generation.</b> Testing where dentists actually work becomes a permanent habit. The reflex that put real patients in front of new materials in 1995 is the same one that, decades later, validates digital workflows, scanners, and AI-designed restorations against clinical reality rather than slideware — a straight line from one operatory to today's clinical-education and R&D testing culture.<br><br><b>Modern echo.</b> Neil Park's clinical-education work and the R&D group's real-world validation of digital and AI tools are the grown-up version of this room. The principle — prove it in a real mouth before you ship it — runs unbroken.<br><br><b>Who can speak to it.</b> Phil Venard (40+ yrs R&D) on why bench testing was never enough and what an in-house operatory changed; Jim on the decision to bring patients and prevention in-house; Neil Park on how that testing instinct lives in clinical education now.<br><br><b>Verify before screen.</b> To-confirm: operatory opening year (1995) and whether it was patient-facing from day one; PlaySafe launch year, exact name, and whether it was made/branded by Glidewell vs. brought to market; honesty guardrail — frame as “brought to market / made available,” never “invented.” Part 10 idea: use this as the seed image for the vertical-integration / beyond-the-crown thread — one quiet room of dental chairs as the origin of “test it where it's actually used, and don't stop at the crown.”",ru:"<b>Что произошло.</b> В 1995 году Glidewell открыл небольшую собственную стоматологическую операционную — рабочий кабинет прямо внутри лаборатории, — чтобы тестировать материалы и реставрации на реальных пациентах, а не только на стендовых моделях. В том же году вышла линейка PlaySafe — индивидуальные спортивные капы (уточнить год запуска и точное написание названия по архивам Glidewell). Это второстепенный, связующий момент: сам по себе небольшой, но он фиксирует два «первых раза», достойных одной короткой карточки.<br><br><b>Почему это важно (ход к реализму).</b> Здесь начинаются две небольшие вещи. Первая — реализм R&D: коронка, пережившая лабораторный зажим, — это не то же самое, что коронка, пережившая человеческий прикус, слюну и спешащего врача; кресла в здании означали, что Glidewell видит поломку там, где она реально случается. Вторая — это первый явный шаг за пределы коронки, в профилактику и спорт. Скромно по масштабу, но видно тот самый инстинкт, который позже определит компанию: контролировать больше звеньев цепочки и не останавливаться на реставрации.<br><br><b>Связь со следующим поколением.</b> Тестировать там, где реально работают стоматологи, становится постоянной привычкой. Тот же рефлекс, что в 1995-м поставил реальных пациентов перед новыми материалами, десятилетиями позже проверяет цифровые процессы, сканеры и реставрации, спроектированные ИИ, на клинической реальности, а не на слайдах, — прямая линия от одной операционной к сегодняшней культуре клинического образования и R&D-тестов.<br><br><b>Современное эхо.</b> Работа Нила Парка по клиническому образованию и проверка цифровых и ИИ-инструментов в R&D на реальных случаях — это взрослая версия той самой комнаты. Принцип — докажи в настоящем рту, прежде чем выпускать, — проходит непрерывно.<br><br><b>Кто может рассказать.</b> Фил Венард (40+ лет R&D) — почему стендовых тестов всегда было мало и что изменила собственная операционная; Джим — о решении завести пациентов и профилактику внутри компании; Нил Парк — как этот тестовый инстинкт живёт в клиническом образовании сегодня.<br><br><b>Проверить до съёмки.</b> Уточнить: год открытия операционной (1995) и была ли она с первого дня для пациентов; год запуска PlaySafe, точное название и было ли это произведено/брендировано Glidewell или «выведено на рынок»; гарантия честности — формулировать как «вывели на рынок / сделали доступным», никогда «изобрели». Идея для Части 10: использовать это как образ-зерно для нити вертикальной интеграции / «за пределами коронки» — одна тихая комната со стоматологическими креслами как исток принципа «тестируй там, где этим реально пользуются, и не останавливайся на коронке»."}},
  {y:"1996", tr:"g", j:["preventive"], tier:2, sc:[10],
    t:{en:"Silent Nite",ru:"Silent Nite"},
    d:{en:"Silent Nite anti-snoring appliances launch — Glidewell's signature move into sleep and prevention.",ru:"Запуск аппаратов против храпа Silent Nite — фирменный шаг Glidewell в сон и профилактику."},
    th:{en:"Dentistry beyond repair: keeping problems from starting.",ru:"Стоматология не только про починку: не дать проблеме начаться."},
    full:{en:"<b>What happened.</b> In 1996, Glidewell introduced the Silent Nite sleep appliance — a custom, dentist-delivered oral device that gently advances the lower jaw to keep the airway open during sleep, reducing snoring and mild obstructive sleep apnea. It was deliberately built to be comfortable, adjustable, and inexpensive enough for any general dentist to fit, not just sleep specialists. Treat this as a minor but telling connective beat: not a flashy crown or implant story, but the moment the lab stepped into a whole new category of care. (Launch year 1996 confirmed via Glidewell sources; to-confirm: exact month — company blog suggests August 1996.)<br><br><b>Why it matters — dentistry beyond repair.</b> Every previous Glidewell product fixed something already broken: a worn tooth, a missing tooth, a failed restoration. Silent Nite is different — it keeps a problem from starting. It is prevention, not repair. That is a quiet but real shift in what a dental lab believes it is for: not only rebuilding mouths, but protecting sleep, breathing, and health. For a film whose throughline is access, this is access widened to a problem most patients never thought to bring to a dentist.<br><br><b>The link to the next generation.</b> Silent Nite proved the lab could build an entire product category from scratch — sourcing materials, designing the mechanism, training dentists, making the economics work — not just manufacture one more crown. That product-categories instinct is the seed of everything modern: the same muscle that launched a snoring appliance in 1996 later launched implant systems, milling materials, and full digital workflows. It is the flywheel learning it can spin in any direction.<br><br><b>Modern echo.</b> The appliance lives on as the Silent Nite 3D, now designed and produced digitally — the same idea carried from analog impressions into the scan-and-print present. With sleep-disordered breathing now a mainstream health concern, the 1996 bet looks
