  azernikov:{nm:"Sergei Azernikov, PhD", a:27, sc:[5,12,13], g:"g", status:"ok",
    quote:{q:"There's a lot of excitement around our work because, until now, real-world, tangible applications of GANs did not exist… To my knowledge, this is the first time anybody has generated a physical object with this technique.", src:"Chairside Magazine, Vol. 13-2 (Glidewell), 2018", url:"https://glidewelldental.com/education/chairside-magazine/volume-13-issue-2/crowns-artifical-intelligence"},
    brief:{en:"<span style=\"color:#1DA24A;font-weight:800\">✓</span> <b>Interview — what we already have (9 Jul):</b><br>• <i>AI pipeline (#5):</i> &quot;A generative network now designs essentially all our crowns — in 2015–16 that was unheard of; the technician is the first human to see the case, just approving it.&quot; (align to our &gt;95% figure)<br>• <i>Scale (#5/#11):</i> &quot;~50 → ~200 crowns a day; the designer&#39;s role shifted from designing to quality assurance.&quot;<br>• <i>The moat (#10):</i> &quot;Like a self-driving car — millions of cases make it better; that&#39;s what no one can just replicate.&quot;<br>• <i>Transition (#13):</i> &quot;The machine won&#39;t replace you — someone who knows how to use it will.&quot; (automation was planned around retraining/relocating people, no mass layoffs)<br>• <i>Handmade myth (#4):</i> &quot;Nobody says &#39;a handmade car&#39; anymore — the machine is more accurate than the hand and the stone model.&quot;<br>• <i>Same-day (#3):</i> &quot;Scan, design and place the crown in under two hours — one day instead of three visits.&quot;<br>• <i>Future (#12/#14):</i> &quot;Connect the clinic&#39;s systems before you make them smarter.&quot; · &quot;Self-driving companies in 10–20 years.&quot; · &quot;People would ask for a faster horse — until someone brings the disruption.&quot;<br>• <i>Why he does it (#2):</i> &quot;A crown made wrong hurts someone&#39;s quality of life — that&#39;s what drives me.&quot;<br><b>Full transcript, chopped by theme (+ the Jim-film pile):</b> Documents/07_09_Azernikov_Verbatim_by_Theme.md.<br><br>———<br><br><b>Who he is.</b> Sergei Azernikov is Glidewell's VP of CAD/CAM Software and the company's de-facto AI lead. He holds a PhD in computational geometry and is the engineer who, from roughly 2014, pushed Glidewell's design pipeline into the cloud and into machine learning long before that was obvious. Inside the building he is the brain behind generative crown design — a system that, reportedly, generates more than 95% of the lab's restoration designs (Glidewell, 2025–26), learning from millions of cloud cases inside a closed quality loop. He sits on the Dental AI Council and speaks publicly on AI fairly often, so he is comfortable explaining hard technical ideas to non-engineers. Articulate and camera-ready, he is the rare technical leader who can make an algorithm feel like a story.<br><br><b>Why this film.</b> He anchors the early 20s · AI · scale beat and carries our Future chapter (Parts #5 specialists digitizing impressions, #12 R&D and patents, and #13 the next generation). His job in the narrative is to make the thesis tangible: constant innovation is what keeps the best dentistry affordable. He shows that scale plus AI is not a slogan — it is millions of cases quietly improving a crown design no human could tune by hand. He is the proof that Glidewell's edge today is software and data, not just manufacturing.<br><br><b>What only he gives.</b> No one else on the roster can open the AI black box from the inside and make it intuitive — what it actually means for a machine to design a tooth from millions of prior cases, and what self-driving manufacturing looks like in practice. He turns abstraction into the film's most forward-looking, visually rich material, and he can do it without jargon.<br><br><b>What to ask.</b><br>1) Walk me through what happens, second by second, when a scan comes in and the AI designs the crown — where does the human still decide? — this unlocks a concrete, visual sequence for the Future beat and grounds the >95% figure in process rather than marketing. <br>2) You have millions of cloud cases. What can the system see across all of them that a single master technician, however brilliant, never could? — ladders toward scale-as-advantage without us asserting it. <br>3) When you say manufacturing could become self-driving, what is still hard — where does it break, and what keeps a person in the loop? — invites honesty and avoids a utopia reel; the caveats make the optimism credible. <br>4) What problem are you and your team chasing now that isn't solved yet? — opens R&D and patents (#12) and shows a living frontier. <br>5) What do you want the interns and new grads (#13) to be able to do that you couldn't when you started? — humanizes the next generation beat and connects the technology back to people.<br><br><b>How to approach / caution.</b> He is internal, fluent, and willing — low-friction to book at Irvine HQ. Pair him with Leeson as planned; the two of them can volley the business-and-science story. Approach him as a builder and a scientist, not a hype man — invite precision and even the limits of the technology, and he will give richer answers than a pure pitch would. Avoid letting the conversation drift into competitor comparisons or unverifiable first-ever claims; per our honesty guardrail, frame Glidewell as having brought AI design to scale and made it the default, never as having invented AI or geometry. Let him quantify; we hold the editorial line.<br><br><b>Verify before shooting.</b> Confirm his exact current title and whether VP of CAD/CAM Software is the precise wording. Pin down the >95%-AI-generated figure — what it measures, over what period, and how acceptance is defined — so we can caption it honestly or attribute it to him in his own words. Verify the millions of cases number and the ~2014 start date for the cloud/ML move. Confirm his Dental AI Council membership and PhD field/institution. The phrase self-driving manufacturing appears to be his own framing — check whether he uses it on record or whether it is our shorthand.<br><br><b>Confidence.</b> Role, background, and his place in the Future beat are solid; the >95% figure, the millions count, and self-driving as his own phrase are his claims to confirm on camera, and pairing logic with Leeson is our editorial interpretation.",ru:"<span style=\"color:#1DA24A;font-weight:800\">✓</span> <b>Интервью — что у нас уже есть (9 июля):</b><br>• <i>ИИ-пайплайн (#5):</i> «Генеративная сеть теперь проектирует практически все наши коронки — в 2015–16 это было немыслимо; техник — первый человек, кто видит кейс, он лишь утверждает». (свести к нашей цифре >95%)<br>• <i>Масштаб (#5/#11):</i> «~50 → ~200 коронок в день; роль дизайнера сместилась с проектирования на контроль качества».<br>• <i>Ров (#10):</i> «Как самоуправляемая машина — миллионы кейсов делают её лучше; это нельзя просто повторить».<br>• <i>Переход (#13):</i> «Машина тебя не заменит — заменит тот, кто умеет ею пользоваться». (автоматизацию планировали с переобучением/перемещением людей, без массовых увольнений)<br>• <i>Миф о рукотворном (#4):</i> «Никто не говорит „сделанная вручную машина“ — машина точнее руки и гипсовой модели».<br>• <i>За один визит (#3):</i> «Сканируют, проектируют и ставят коронку меньше чем за два часа — один день вместо трёх визитов».<br>• <i>Будущее (#12/#14):</i> «Сначала соединить системы клиники, потом делать их умнее». · «Самоуправляемые компании — через 10–20 лет». · «Люди просили бы лошадь побыстрее — пока кто-то не принесёт дизрапшн».<br>• <i>Что им движет (#2):</i> «Плохо сделанная коронка бьёт по качеству жизни человека — вот что меня движет».<br><b>Полная расшифровка, раскроенная по темам (+ стопка для фильма о Джиме):</b> Documents/07_09_Azernikov_Verbatim_by_Theme.md.<br><br>———<br><br><b>Кто он.</b> Сергей Азерников — VP CAD/CAM ПО в Glidewell и фактический руководитель направления ИИ. У него PhD по вычислительной геометрии, и именно он примерно с 2014 года повёл пайплайн дизайна в облако и в машинное обучение задолго до того, как это стало очевидным шагом. Внутри компании он — мозг за генеративным дизайном коронок: система, которая, по имеющимся данным, выдаёт приемлемую свыше 95% дизайнов реставраций (Glidewell, 2025–26), обучаясь на миллионах облачных кейсов в замкнутом контуре качества. Он состоит в Dental AI Council и довольно часто выступает публично по теме ИИ, поэтому умеет объяснять сложное неинженерам. Красноречив и готов к камере — редкий технический лидер, у которого алгоритм звучит как история.<br><br><b>Зачем фильму.</b> Он якорит бит early 20s · AI · scale и несёт нашу главу Будущее (части #5 специалисты оцифровывают слепки, #12 R&D и патенты, #13 следующее поколение). Его роль в нарративе — сделать тезис осязаемым: именно постоянные инновации удерживают лучшую стоматологию доступной. Он показывает, что масштаб плюс ИИ — не лозунг, а миллионы кейсов, которые незаметно улучшают дизайн коронки так, как не настроить вручную ни одному человеку. Он — доказательство того, что преимущество Glidewell сегодня — это софт и данные, а не только производство.<br><br><b>Что только он даёт.</b> Больше никто в ростере не вскроет ИИ-чёрный ящик изнутри и не сделает его интуитивным — что на самом деле значит, когда машина проектирует зуб из миллионов прежних кейсов, и как выглядит самоуправляемое производство на практике. Он превращает абстракцию в самый устремлённый в будущее и визуально богатый материал фильма — и делает это без жаргона.<br><br><b>О чём спрашивать.</b><br>1) Проведите меня по шагам: что происходит, секунда за секундой, когда приходит скан и ИИ проектирует коронку — где всё ещё решает человек? — это даёт конкретную визуальную сцену для бита Будущее и заземляет цифру >95% в процессе, а не в маркетинге. <br>2) У вас миллионы облачных кейсов. Что система видит на всём массиве, чего никогда не увидел бы один мастер-техник, каким бы блестящим он ни был? — ведёт к идее масштаб как преимущество, не вкладывая её ему в уста. <br>3) Когда вы говорите, что производство может стать самоуправляемым, что всё ещё трудно — где оно ломается и что держит человека в контуре? — приглашает к честности и спасает от утопического ролика; оговорки делают оптимизм достоверным. <br>4) Какую задачу вы с командой решаете сейчас, которая ещё не решена? — открывает R&D и патенты (#12) и показывает живой фронтир. <br>5) Что вы хотите, чтобы умели интерны и выпускники (#13), чего не умели вы в начале? — очеловечивает бит следующее поколение и связывает технологию с людьми.<br><br><b>Как заходить / осторожно.</b> Он внутренний, свободно говорит и готов — снять на штабе в Irvine легко. Ставьте в пару к Leeson, как и планировалось: вдвоём они перебрасывают историю бизнеса и науки. Заходите к нему как к инженеру и учёному, а не к промоутеру — приглашайте к точности и даже к пределам технологии, и он даст более богатые ответы, чем при чистом питче. Не давайте разговору уйти в сравнения с конкурентами или в непроверяемые заявления первые в мире; по нашему гайдрейлу честности подаём Glidewell как тех, кто вывел ИИ-дизайн на масштаб и сделал его дефолтом, но никогда как изобрёл ИИ или геометрию. Пусть он называет цифры; редакторскую рамку держим мы.<br><br><b>Проверить перед съёмкой.</b> Подтвердить точную текущую должность и точна ли формулировка VP CAD/CAM ПО. Уточнить цифру >95% ИИ-дизайнов — что именно она измеряет, за какой период и как определяется принятие, — чтобы честно подписать её или отдать его собственными словами. Проверить число миллионы кейсов и дату ~2014 для перехода в облако/ML. Подтвердить членство в Dental AI Council и область/институт PhD. Фраза самоуправляемое производство, похоже, его собственная — проверить, использует ли он её под запись, или это наша стенография.<br><br><b>Уверенность.</b> Роль, бэкграунд и его место в бите Будущее надёжны; цифра >95%, счёт миллионы и самоуправляемое как его собственная фраза — его заявления, которые подтверждаем на камере, а логика пары с Leeson — наша редакторская интерпретация."},

  farran:{nm:"Howard Farran", a:19, sc:[7,8,9], g:"x", status:"ok",
    brief:{en:"<b>Who he is.</b> Dr. Howard Farran, DDS, MBA, is dentistry’s megaphone: founder of Dentaltown (the profession’s town square — 200K+ dentists) and host of “Dentistry Uncensored”, which he has run to 1,700+ episodes and still publishes EVERY WEEKDAY (episodes #1706–1709 in June 2026 alone). His mantra — faster, easier, higher quality, lower cost — is our film’s thesis in four words, coined independently of Glidewell. He interviewed Jim on the podcast (our notes: ep. 1341), and in June 2026 hosted Dr. Jack Hahn — the inventor behind the Hahn implant Glidewell manufactures. His own Chairside appearance: “The Rise of Dentaltown” (<a href='https://glidewelldental.com/education/chairside-magazine/volume-5-issue-1/practice-management-the-rise-of-dentaltown' target='_blank' rel='noopener'>Vol. 5-1, 2010</a>) — “no dentist ever has to practice solo again”.<br><br><b>Why this film.</b> Farran is reach and independent framing (#2 the gap, #6, #7, #14): the man who can say “cheaper and faster IS better medicine” with the authority of a quarter-century platform — and zero Glidewell payroll. He also digitized the profession’s KNOWLEDGE the way Glidewell digitized its production — a parallel the film can draw in one cut.<br><br><b>What only he gives.</b> The industry-wide view from ground level: 1,700 interviews’ worth of what working dentists actually complain about, fear and adopt. And a distribution superpower worth noting for later: his platform reaches exactly the film’s dentist audience.<br><br><b>What to ask.</b><br>1) “Your four words — faster, easier, higher quality, lower cost. Where did they come from, and where does the profession still fail them?” — why: the thesis from independent lips (#7).<br>2) “You’ve run 1,700 episodes. What do dentists say off-air about going digital that they won’t say on stage?” — why: the honest Debate material nobody else has heard.<br>3) “Rank the three walls — cost, fear, time. Which falls first when same-day dentistry arrives in a town?” — why: his call, his data (#6).<br>4) “You interviewed Jim. What makes his lab different from the ones that didn’t survive?” — why: witness assessment, not endorsement (#8/#10).<br>5) “Ten years out: what gets cheaper, what disappears, what stays stubbornly human?” — why: forecast from the profession’s best-connected observer (#14).<br><br><b>How to approach / caution.</b> Phoenix, AZ — remote/local crew or batch with Spear (Scottsdale) per our travel plan; alternatively film him in his own studio, where he is happiest and fastest to book (offer a podcast-swap: Jim or our director as his guest). He is blunt by brand — do not try to pre-shape his answers; the bluntness IS the value. Independent: never frame as Glidewell’s friend, frame as the industry’s witness.<br><br><b>Verify before shooting.</b> Dentaltown current member count (200K+ is our old note); episode number of the Jim interview (1341 per our notes — confirm + get rights if we want clips); his exact titles for the lower-third; whether the Hahn episode (June 2026) is useful footage and what rights apply.<br><br><b>Confidence.</b> Platform, activity, mantra, 2010 article: high (verified). Member counts and episode numbers: medium — confirm.",ru:"<b>Кто он.</b> Д-р Ховард Фарран, DDS, MBA, — мегафон стоматологии: основатель Dentaltown (городская площадь профессии — 200K+ дантистов) и ведущий «Dentistry Uncensored», который он довёл до 1700+ эпизодов и до сих пор выпускает КАЖДЫЙ БУДНИЙ ДЕНЬ (только в июне 2026-го — эпизоды #1706–1709). Его мантра — faster, easier, higher quality, lower cost — это тезис нашего фильма в четырёх словах, придуманный независимо от Glidewell. Он интервьюировал Джима в подкасте (по нашим заметкам — эп. 1341), а в июне 2026-го принимал д-ра Джека Хана — изобретателя импланта Hahn, который производит Glidewell. Его собственный след в Chairside: «The Rise of Dentaltown» (<a href='https://glidewelldental.com/education/chairside-magazine/volume-5-issue-1/practice-management-the-rise-of-dentaltown' target='_blank' rel='noopener'>Vol. 5-1, 2010</a>) — «ни один дантист больше не должен практиковать в одиночку».<br><br><b>Зачем фильму.</b> Фарран — охват и независимая рамка (#2 разрыв, #6, #7, #14): человек, который может сказать «дешевле и быстрее — ЭТО и есть лучшая медицина» с авторитетом платформы в четверть века — и нулевой зарплатой от Glidewell. И он оцифровал ЗНАНИЕ профессии так же, как Glidewell оцифровал её производство, — параллель, которую фильм может провести одним стыком.<br><br><b>Что только он даёт.</b> Взгляд на всю индустрию с уровня земли: 1700 интервью о том, на что работающие дантисты реально жалуются, чего боятся и что принимают. И дистрибуционная суперсила на потом: его платформа — ровно та аудитория врачей, для которой фильм.<br><br><b>О чём спрашивать.</b><br>1) «Ваши четыре слова — faster, easier, higher quality, lower cost. Откуда они взялись — и где профессия им до сих пор изменяет?» — зачем: тезис из независимых уст (#7).<br>2) «У вас 1700 эпизодов. Что дантисты говорят о переходе в цифру вне эфира — чего не скажут со сцены?» — зачем: честный материал для Debate, который не слышал никто другой.<br>3) «Расставьте три стены — цена, страх, время. Какая падает первой, когда в город приходит same-day стоматология?» — зачем: его вердикт, его данные (#6).<br>4) «Вы интервьюировали Джима. Чем его лаборатория отличается от тех, что не выжили?» — зачем: оценка свидетеля, не индоссамент (#8/#10).<br>5) «Через десять лет: что подешевеет, что исчезнет, что останется упрямо человеческим?» — зачем: прогноз от самого сетевого наблюдателя профессии (#14).<br><br><b>Как заходить / осторожно.</b> Финикс, Аризона — удалённая/локальная команда или батч со Спиром (Скоттсдейл) по нашему плану выездов; вариант — снять его в его собственной студии, где он счастлив и где букинг быстрее всего (предложить обмен: Джим или наш режиссёр гостем к нему). Прямолинеен по бренду — не пытаться заранее формовать ответы; прямота И ЕСТЬ ценность. Независим: подавать не как «друга Glidewell», а как свидетеля индустрии.<br><br><b>Проверить перед съёмкой.</b> Текущее число участников Dentaltown (200K+ — наша старая пометка); номер эпизода с Джимом (1341 по нашим заметкам — подтвердить + права, если нужны клипы); точные титулы для титра; полезен ли эпизод с Ханом (июнь 2026) как футаж и какие там права.<br><br><b>Уверенность.</b> Платформа, активность, мантра, статья 2010-го: высокая (выверено). Счётчики участников и номера эпизодов: средняя — подтвердить."},

  sasaki:{nm:"Glenn Sasaki", a:27, sc:[9,10,14], g:"e", status:"ok",
    brief:{en:"<b>Who he is.</b> Glenn Sasaki has been Glidewell’s Chief Financial Officer since June 2005 — the custodian of revenue, scale and growth numbers for a private company that publishes none of them. Background of the disciplined kind: senior manager at KPMG, then finance at Advanced Medical Optics (medical devices), CSU Long Beach behind him (business databases; verify internally — he has, tellingly, no public interviews we could find). Not a showman — and that is the point: when he states a figure, it lands as audited fact, not marketing.<br><br><b>Why this film.</b> Sasaki is the business voice of the flywheel (#8) and the price formula (#9), and a witness to the film’s central economic bet: he was in the CFO chair when BruxZir launched into the bottom of the 2009 recession as the affordable alternative to gold. Everything the film claims about “cheaper → wider → reinvest” is adjectives until he attaches numbers to it.<br><br><b>What only he gives.</b> The only person who can put actual, first-party numbers on the thesis on camera — twenty years of them — and the only one who can describe what staying private DOES economically: the freedom to price down and reinvest without a shareholder asking why margins fell.<br><br><b>What to ask.</b><br>1) “Cheaper → more volume → reinvest → cheaper. Walk us through one real decision where you priced down and the volume answered.” — why: turns the flywheel from a slogan into a case with numbers.<br>2) “June 2009: the economy is at the bottom, and the company launches its biggest product as the affordable crown. From the CFO chair — how scary was that bet?” — why: he lived the Midpoint moment; gives it stakes from the money side.<br>3) “What does ‘affordability’ look like on a spreadsheet — which cost lines did digital actually delete?” — why: hard content for #9; pairs with Christensen’s 2007 fee analysis (Chairside Vol. 2-1, 2007).<br>4) “What does staying private let you do that a public company can’t?” — why: the reinvestment freedom argument, told as finance, not philosophy (the never-sell theme itself belongs to the Jim film).<br>5) “Which number are you proudest of — and which one still bothers you?” — why: honesty beat; gives the numbers keeper a human face.<br><br><b>How to approach / caution.</b> Studio Day 2 (with Manalili and Friebauer). CRITICAL: pre-agree with him and Eric exactly which figures may be said on camera — private company, no revenue specifics without sign-off; our rule stands that any on-screen number must be his or comms-approved. Keep him off the never-IPO story on camera for THIS film (that is the Jim-film’s territory); here he speaks economics of access. He is the designated source of truth for every figure in our fact-check shield.<br><br><b>Verify before shooting.</b> Title and start date (June 2005) — business databases, confirm internally. KPMG / Advanced Medical Optics background — same. No public quotes exist to lift — everything must be gathered at the interview.<br><br><b>Confidence.</b> Role and tenure: high (multiple databases agree). Background details: medium — database-sourced, verify. All substantive content will be first-generation from our interview.",ru:"<b>Кто он.</b> Гленн Сасаки — финансовый директор Glidewell с июня 2005 года, хранитель цифр выручки, масштаба и роста частной компании, которая их не публикует. Бэкграунд дисциплинированного рода: senior manager в KPMG, затем финансы в Advanced Medical Optics (медустройства), за плечами CSU Long Beach (по бизнес-базам; подтвердить внутри — показательно, что ни одного публичного интервью мы не нашли). Не шоумен — и в этом суть: когда он называет цифру, она звучит как аудированный факт, а не маркетинг.<br><br><b>Зачем фильму.</b> Сасаки — деловой голос маховика (#8) и формулы цены (#9) и свидетель главной экономической ставки фильма: он сидел в кресле CFO, когда BruxZir запускался на дне рецессии 2009-го как доступная альтернатива золоту. Всё, что фильм утверждает про «дешевле → шире → реинвест», — прилагательные, пока он не подставит цифры.<br><br><b>Что только он даёт.</b> Единственный, кто может на камеру подкрепить тезис настоящими цифрами из первых рук — за двадцать лет, — и единственный, кто может объяснить, что экономически ДАЁТ частность: свободу снижать цену и реинвестировать без акционера, спрашивающего, почему упала маржа.<br><br><b>О чём спрашивать.</b><br>1) «Дешевле → больше объём → реинвест → ещё дешевле. Проведите нас через одно реальное решение, где вы снизили цену — и объём ответил.» — зачем: превращает маховик из лозунга в кейс с цифрами.<br>2) «Июнь 2009-го: экономика на дне, а компания запускает главный продукт как доступную коронку. Из кресла CFO — насколько страшной была эта ставка?» — зачем: он прожил момент Midpoint; даёт ему ставки со стороны денег.<br>3) «Как выглядит ‘доступность’ в таблице — какие строки затрат цифра реально удалила?» — зачем: твёрдое содержание для #9; в паре с анализом цен Кристенсена (Chairside Vol. 2-1, 2007).<br>4) «Что даёт частность из того, чего не может публичная компания?» — зачем: аргумент свободы реинвестирования, рассказанный как финансы, а не философия (сама тема never-sell — территория фильма о Джиме).<br>5) «Какой цифрой вы горды больше всего — и какая до сих пор беспокоит?» — зачем: бит честности; даёт хранителю цифр человеческое лицо.<br><br><b>Как заходить / осторожно.</b> Студийный день №2 (с Маналили и Фрибауэром). КРИТИЧНО: заранее согласовать с ним и Эриком, какие именно цифры можно произносить на камеру — компания частная, никакой конкретики по выручке без визы; наше правило в силе: любая экранная цифра — его или одобренная comms. На камеру для ЭТОГО фильма не заводить его в тему never-IPO (это территория фильма о Джиме); здесь он говорит про экономику доступности. Он — назначенный источник истины для каждой цифры фактчек-щита.<br><br><b>Проверить перед съёмкой.</b> Титул и дата старта (июнь 2005) — по бизнес-базам, подтвердить внутри. KPMG / Advanced Medical Optics — там же. Публичных цитат не существует — весь материал будет первого поколения, с нашего интервью.<br><br><b>Уверенность.</b> Роль и стаж: высокая (базы сходятся). Детали бэкграунда: средняя — из баз, проверить. Всё содержательное — только с интервью."},

  park:{nm:"Neil Park, DMD", a:26, sc:[10,13], g:"g", status:"ok",
    quote:{q:"What we do here at Glidewell is present high-quality, affordable education in a very approachable way.", src:"Neil Park · Chairside Magazine, Vol. 21-1 (Glidewell), 2026", url:"https://glidewelldental.com/education/chairside-magazine/volume-21-issue-1/featured-qa-with-neil-park"},
    brief:{en:"<b>Who he is.</b> Dr. Neil Park, DMD, is the profession-facing voice of Glidewell’s clinical world: VP of Clinical Affairs, editor-in-chief of Chairside Magazine, host of the Chairside Live podcast (which he has fronted since its 2020 launch), and scientific chair of the Glidewell Symposium. Retired and no longer in Irvine (per our own information; public materials lag — he may still front the podcast remotely). Plan him as a dedicated visit, not part of the SoCal studio block.<br><br><b>Why this film.</b> Park is the natural on-camera host-explainer (#3 making same-day believable, #13 education, #14): decades of interviewing clinicians — including Jim about his book — mean he knows how to make technology sound like medicine, not marketing. His own on-record line carries our education theme: presenting “high-quality, affordable education in a very approachable way”.<br><br><b>What only he gives.</b> The connective tissue: he has interviewed half the roster on his own shows, knows everyone’s best stories, and can deliver polished bridges between the film’s chapters if we need a recurring explainer voice — the closest thing the cast has to a professional broadcaster.<br><br><b>What to ask.</b><br>1) “You’ve interviewed hundreds of clinicians about going digital. What is the one sentence that finally convinces a skeptic?” — why: distills a decade of persuasion into a usable film line (#3/#4).<br>2) “You interviewed Jim about his book. What did you learn about him that surprised you?” — why: witness texture for the Midpoint, from a professional interviewer.<br>3) “What does ‘approachable education’ mean — what do you refuse to do on stage that others do?” — why: his own thesis; feeds #13 without PR gloss.<br>4) “After all these years explaining the future of dentistry — what did YOU get wrong?” — why: honesty beat from the man who narrates certainty for a living.<br><br><b>How to approach / caution.</b> Dedicated trip (retired, not in Irvine — our standing note); confirm his location and willingness via Eric before planning. He is a broadcaster: expect polish, plan follow-ups that break script. If he is indeed stepping back, his archive of Chairside Live episodes is itself a footage mine — ask about access.<br><br><b>Verify before shooting.</b> His location; title for the lower-third (use his LAST title + «retired» framing as he prefers); his book-interview episode number with Jim; rights/access to Chairside Live archive footage.<br><br><b>Confidence.</b> Roles and public record: high. Location and availability: to confirm via Eric.",ru:"<b>Кто он.</b> Д-р Нил Парк, DMD, — обращённый к профессии голос клинического мира Glidewell: VP по клиническим вопросам, главред Chairside Magazine, ведущий подкаста Chairside Live (с его запуска в 2020-м) и научный председатель симпозиума Glidewell. На пенсии и не в Ирвайне (по нашей собственной информации; публичные материалы отстают — подкаст он может вести и удалённо). Планировать отдельным визитом, не в SoCal-блок.<br><br><b>Зачем фильму.</b> Парк — естественный экранный ведущий-объяснитель (#3 «поверить в same-day», #13 образование, #14): десятилетия интервью с клиницистами — включая Джима о его книге — научили его говорить о технологии как о медицине, а не маркетинге. Его собственная on-record строка несёт нашу тему образования: подавать «качественное, доступное образование очень доступным способом».<br><br><b>Что только он даёт.</b> Соединительную ткань: он сам интервьюировал половину нашего ростера, знает лучшие истории каждого и может дать отполированные мостики между главами фильма, если понадобится сквозной голос-объяснитель — самый близкий к профессиональному телеведущему человек в касте.<br><br><b>О чём спрашивать.</b><br>1) «Вы взяли сотни интервью о переходе в цифру. Какая одна фраза наконец убеждает скептика?» — зачем: дистиллирует десятилетие убеждения в пригодную для фильма строку (#3/#4).<br>2) «Вы интервьюировали Джима о его книге. Что в нём вас удивило?» — зачем: свидетельская фактура для Midpoint от профессионального интервьюера.<br>3) «Что значит ‘доступное образование’ — что вы отказываетесь делать со сцены из того, что делают другие?» — зачем: его собственный тезис; кормит #13 без PR-глянца.<br>4) «После всех лет объяснения будущего стоматологии — в чём ошиблись ВЫ?» — зачем: бит честности от человека, который профессионально озвучивает уверенность.<br><br><b>Как заходить / осторожно.</b> Отдельный выезд (на пенсии, не в Ирвайне — наша действующая пометка); локацию и готовность подтвердить через Эрика до планирования. Он телеведущий: ждать полировки, готовить follow-up'ы, ломающие сценарий. Если он действительно отходит от дел — его архив эпизодов Chairside Live сам по себе шахта футажа; спросить про доступ.<br><br><b>Проверить перед съёмкой.</b> Его локация; титул для титра (последний титул + рамка «retired», как он предпочитает); номер эпизода его интервью с Джимом о книге; права/доступ к архиву footage Chairside Live.<br><br><b>Уверенность.</b> Роли и публичный след: высокая. Локация и доступность: подтвердить через Эрика."},
    rl:{en:"VP Clinical Affairs · Chairside",ru:"VP по клинике · Chairside"},
    role:{en:"VP of Clinical Affairs; editor-in-chief, Chairside",ru:"VP по клиническим вопросам; главред Chairside"},
    loc:{en:"Irvine, CA",ru:"Irvine, CA"},
    theme:{en:"Support / CE · the connective in-house host and clinical voice.",ru:"Поддержка / CE · связующий внутренний ведущий и клинический голос."},
    access:{en:"Irvine HQ; internal. A natural on-camera host / narrator-type figure.",ru:"Штаб в Irvine; внутренний. Естественный ведущий/нарратор в кадре."}},
  dorfman:{nm:"Bill Dorfman", a:19, sc:[2,6,14], g:"x", status:"ok",
    quote:{q:"In our society, confidence is currency. If you don't have confidence, a lot of times you just feel broken.", src:"SWAGGER Magazine, Aug 2025", url:"https://www.swaggermagazine.com/features/inside-the-famed-lifestyle-of-celebrity-cosmetic-dentist-dr-bill-dorfman/"},
    brief:{en:"<b>Who he is.</b> Dr. Bill Dorfman, “America’s Dentist”: 30+ years of cosmetic practice in Century City / Beverly Hills, the featured dentist of ABC’s Extreme Makeover and a recurring co-host on CBS’ The Doctors — the only mass-audience face in our cast. Beyond the glamour, two philanthropies matter to us: the LEAP Foundation (youth leadership) and Smiles For Life (charity funding children’s causes) — his own bridge to the access theme.<br><br><b>Why this film.</b> Dorfman carries the patient-side emotions the clinicians can’t (#2, #6): fear, shame, what a smile does to a life — he has watched cameras film exactly that transformation for years. LA location = 45 min from HQ, the easiest external shoot we have.<br><br><b>What only he gives.</b> Recognition (a face non-dentists know) and the vocabulary of transformation: nobody else can describe the moment a person sees their new smile with this much witnessed experience.<br><br><b>What to ask.</b><br>1) “People hide their smiles every day. What have you learned about the shame side of dental care?” — why: #2/#6 human stakes from the man who saw it on national TV.<br>2) “On Extreme Makeover you watched lives change on camera. What actually changes first — the mouth or the person?” — why: the film’s smile-payoff, articulated by its most experienced witness.<br>3) “Cosmetic dentistry is called a luxury. Defend it as medicine.” — why: reframes esthetics into wellbeing — feeds the access argument from an unexpected side.<br>4) “Через Smiles For Life you fund children’s causes. Where does charity end and the system’s failure begin?” — why: his own access angle; honest #2 material.<br><br><b>How to approach / caution.</b> ⚠ NO documented Glidewell tie — vet the fit first (our standing note): he must appear as an industry/patient-experience voice, never implying endorsement. Celebrity logistics: book through his office, expect media training; his energy is an asset for the trailer but keep him OUT of technology claims — that’s not his lane. Verify LEAP/Smiles-For-Life current status before на экран.<br><br><b>Verify before shooting.</b> Current practice/title; The Doctors era (show ended — say “longtime co-host”, not present tense); foundation statuses; whether he uses any Glidewell products at all (do not assume).<br><br><b>Confidence.</b> Public profile: high. Fit for THIS film: medium — decided by the vet call, not by fame.",ru:"<b>Кто он.</b> Д-р Билл Дорфман, «дантист Америки»: 30+ лет косметической практики в Сенчури-Сити / Беверли-Хиллз, лицо ABC Extreme Makeover и постоянный со-ведущий CBS The Doctors — единственное массово узнаваемое лицо в нашем касте. За глянцем — две благотворительности, важные нам: LEAP Foundation (лидерство для молодёжи) и Smiles For Life (сборы на детские программы) — его собственный мост к теме доступа.<br><br><b>Зачем фильму.</b> Дорфман несёт пациентские эмоции, которые не дадут клиницисты (#2, #6): страх, стыд, что улыбка делает с жизнью — он годами смотрел, как камеры снимают ровно эту трансформацию. Локация LA = 45 минут от HQ, самый лёгкий внешний выезд.<br><br><b>Что только он даёт.</b> Узнаваемость (лицо, которое знают не-дантисты) и словарь трансформации: никто другой не опишет момент, когда человек видит свою новую улыбку, с таким насмотренным опытом.<br><br><b>О чём спрашивать.</b><br>1) «Люди прячут улыбки каждый день. Что вы узнали о стыдной стороне стоматологии?» — зачем: человеческие ставки #2/#6 от человека, видевшего это на национальном ТВ.<br>2) «На Extreme Makeover вы смотрели, как жизни меняются в кадре. Что меняется первым — рот или человек?» — зачем: выплата-улыбка фильма, сформулированная самым опытным её свидетелем.<br>3) «Косметическую стоматологию называют роскошью. Защитите её как медицину.» — зачем: переворачивает эстетику в благополучие — кормит аргумент доступа с неожиданной стороны.<br>4) «Через Smiles For Life вы финансируете детские программы. Где кончается благотворительность и начинается провал системы?» — зачем: его собственный угол доступа; честный материал #2.<br><br><b>Как заходить / осторожно.</b> ⚠ Документированной связи с Glidewell НЕТ — сначала проверить fit (наша действующая пометка): он появляется как голос индустрии/пациентского опыта, никогда как одобряющий бренд. Логистика селебрити: букинг через офис, ждать медиа-тренированности; его энергия — актив для трейлера, но держать его ВНЕ технологических утверждений — не его полоса. Статусы фондов проверить до экрана.<br><br><b>Проверить перед съёмкой.</b> Текущая практика/титул; эпоха The Doctors (шоу закончилось — говорить «многолетний со-ведущий», не в настоящем времени); статусы фондов; пользуется ли он вообще продуктами Glidewell (не предполагать).<br><br><b>Уверенность.</b> Публичный профиль: высокая. Fit для ЭТОГО фильма: средняя — решает разведочный звонок, не слава."},
    rl:{en:"\u201CAmerica's Dentist\u201D",ru:"«Стоматолог Америки»"},
    role:{en:"Celebrity cosmetic dentist",ru:"Знаменитый косметический стоматолог"},

    theme:{en:"Reach / esthetics · pulls in a general audience and the emotional \u201Csmile\u201D hook.",ru:"Охват / эстетика · затягивает широкую аудиторию и даёт эмоциональный крючок «улыбки»."},

  norton:{nm:"Bobbie Norton", a:25, sc:[1,10,13], g:"g", status:"ok", glsummary:{en:"<b>Who she is — a strong on-camera voice, not just our fixer.</b> Bobbie Norton has been at Glidewell about 16 years and in dentistry about 28 (since 1998). She came up the hands-on way: she started as an RDA (registered dental assistant), spent 13 years chairside before Glidewell, then about 6 years as a TA in the implant call center, worked in marketing, and edited the company magazine (reaching ~80,000 dentists). Her drive is simple — make dentists' lives easier and take the friction out: “if their business succeeds, ours does.” She is high-energy and lifts the room. What only she gives: a first-hand account of how the field changed across ~30 years — from developing X-ray film and gag-inducing physical impressions to instant digital scans — which makes her a natural narrator for the analog→digital arc, not only the guide to Guiding Leaders.<br><br><b>Context.</b> From the meeting with Bobbie (she runs Guiding Leaders). She put forward four GL alumni as hero candidates and walked through the July session. Full details + contacts: Documents/Guiding_Leaders_Alumni_and_Bobbie_Meeting.md (local, not published).<br><br><b>Four hero candidates (GL alumni).</b> Each has a visible arc — from where they started to where they are now — and a raw application video on file that makes a striking before.<br><img src='gl_photos/ellen.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Ellen Paulisick</b> — Mount Pleasant, SC (DMD, owns Longboard Dental; @longboarddental). Joined in 2024 just after a divorce while opening a brand-new practice; built it out on Glidewell (mill, scanner, HT implants) and runs on it daily. Went from new owner to mentor and stage speaker at Dentistry on the Rise.<br><img src='gl_photos/nadia.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Nadia Rodriguez</b> — New York, NY (DMD, owns No Limits Dental; @nolimitsdental). A young dentist in a tiny Manhattan office; came in 2022 wanting cosmetics, learned clinical photography in the program and built a cosmetic practice around it. Strong arc — but the 2022 timing means the early footage may need recreating.<br><img src='gl_photos/bianca.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Bianca Clark</b> — Chicago, IL (DDS, part-owner West Loop / Hyde Park Smile Studio; @mseddds). Barely into 3D printing when she joined in 2024; became the program's go-to voice on printing and a natural on camera.<br><img src='gl_photos/jimlam.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Jim Lam</b> — Canutillo, TX (DDS, owns Doniphan Family Dental; @2019corvettezr1). 2025 cohort; started with no mill, now runs two across two practices, serving a lower-income community and working to keep care affordable — the clearest fit for the film's access thesis. Cut prep-and-scan to ~30 minutes and his week from five days to three.<br><b>What we need.</b> One hero to follow across the ~3-4-month production window, camera on the emotion of the work (not just the tech), ideally a story that shows care becoming more affordable.<br><br><b>July session — 16-17 July.</b> We film Friday the 17th: short self-intros from willing participants, plus interviews in the breaks, at lunch and after, staying unobtrusive. Thursday is teaching (executive presence; HR); Friday is practice management (Stephanie Mapp, who dropped insurance) and a closing committee panel filmed for Glidewell TV. Rob Macy already films the whole program and has flagged ~5 dentists to follow; Regina coordinates. (Times/logistics in the local doc.)<br><br><b>Finale.</b> October — Dentistry on the Rise + graduation (a celebration, then a yacht): the natural end of our window. Bobbie can put whichever doctors we follow on the graduation stage.<br><br><b>Note.</b> Guiding Leaders teaches business and leadership; product loyalty follows. Good geographic spread (SC, NY, IL, TX) — worth leaning east. Bobbie will send names, photos and the curriculum link.",ru:"<b>Кто она — сильный голос в кадр, а не только наш «решала».</b> Bobbie Norton около 16 лет в Glidewell и около 28 лет в стоматологии (с 1998). Поднималась руками: начинала ассистентом (RDA), 13 лет chairside до Glidewell, затем ~6 лет TA в имплант-колл-центре, работала в маркетинге и была редактором журнала компании (тираж ~80 000 дантистов). Её движок прост — облегчать жизнь дантистам и убирать трение: «если у них успешный бизнес, у нас успешный бизнес». Высокая энергия, заряжает всех вокруг. Что даёт только она: рассказ из первых рук о том, как менялась профессия за ~30 лет — от проявки рентген-плёнки и «рвотных» физических слепков до мгновенных сканов, — а значит, она естественный рассказчик арки «аналог→цифра», не только гид по Guiding Leaders.<br><br><b>Контекст.</b> Со встречи с Bobbie (ведёт Guiding Leaders). Предложила четырёх выпускников GL как кандидатов-героев и провела по июльской сессии. Полные детали и контакты — Documents/Guiding_Leaders_Alumni_and_Bobbie_Meeting.md (локально, не публикуется).<br><br><b>Четыре кандидата-героя (выпускники GL).</b> У каждого виден путь — откуда начинал и где сейчас, — и есть сырое application-видео, дающее яркое «до».<br><img src='gl_photos/ellen.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Ellen Paulisick</b> — Маунт-Плезант, Южная Каролина (DMD, владеет Longboard Dental; @longboarddental). Пришла в 2024-м сразу после развода, открывая новую практику; собрала её на Glidewell (фрезер, сканер, HT-импланты) и работает на этом каждый день. Путь от нового владельца до ментора и спикера на сцене Dentistry on the Rise.<br><img src='gl_photos/nadia.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Nadia Rodriguez</b> — Нью-Йорк (DMD, владеет No Limits Dental; @nolimitsdental). Молодой врач в крошечном офисе на Манхэттене; пришла в 2022-м за косметикой, освоила клиническую фотографию в программе и выстроила на ней косметическую практику. Путь сильный, но из-за 2022 года раннее видео, возможно, придётся воссоздавать.<br><img src='gl_photos/bianca.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Bianca Clark</b> — Чикаго (DDS, совладелица West Loop / Hyde Park Smile Studio; @mseddds). Едва начинала с 3D-печати, когда пришла в 2024-м; стала главным голосом программы по печати и органична в кадре.<br><img src='gl_photos/jimlam.jpg' style='height:74px;border-radius:6px;vertical-align:middle;margin-right:10px'><b>Jim Lam</b> — Канутилло, Техас (DDS, владеет Doniphan Family Dental; @2019corvettezr1). Когорта 2025; начинал без фрезера, теперь их два на две практики; работает с малообеспеченной аудиторией и держит лечение доступным — самый прямой match к тезису доступности. Сократил «препарирование + скан» до ~30 минут, а неделю — с пяти дней до трёх.<br><b>Что нам нужно.</b> Один герой, за которым следим ~3-4 месяца производства, с камерой на эмоции работы (не только на технику), в идеале — история о том, как помощь становится доступнее.<br><br><b>Июльская сессия — 16-17 июля.</b> Снимаем в пятницу 17-го: короткие самопрезентации желающих + интервью в перерывы, на обеде и после, держась незаметно. Четверг — обучение (executive presence; HR); пятница — practice management (Stephanie Mapp, отказалась от страховки) и закрывающая панель комитета для Glidewell TV. Rob Macy уже снимает всю программу и отметил ~5 врачей; координирует Regina. (Тайминги/логистика — в локальном файле.)<br><br><b>Финал.</b> Октябрь — Dentistry on the Rise + выпускной (праздник, затем яхта): естественный конец окна. Bobbie может вывести наших героев на сцену выпускного.<br><br><b>Заметка.</b> Guiding Leaders учит бизнесу и лидерству; лояльность к продуктам приходит следом. Хороший географический разброс (SC, NY, IL, TX) — стоит тянуть на восток. Bobbie пришлёт имена, фото и ссылку на curriculum."},
    brief:{en:"<b>Who she is.</b> Bobbie Norton is Glidewell’s Director of Strategic Partner Relations and the owner-builder of Guiding Leaders — and her authority is earned the long way: she started in dentistry ~28 years ago as an RDA, hands-on in oral surgery, orthodontics and prosthodontics, and has spent 10+ years at Glidewell running the machinery of Symposia and KOL relations (<a href='https://guidingleaders.com/about-us/' target='_blank' rel='noopener'>guidingleaders.com</a>; Deals for Dentists podcast, with CEO Goddard). Guiding Leaders is her program from the ground up — free leadership and practice-development training for women dentists, four-plus cohorts run, ~100 alumni, and a fresh scale-up: 43 dentists selected for the 2026 cohort (press release, May 2026).<br><br><b>Why this film.</b> Norton owns the film’s B story: education as the thing that makes the transition HOLD (#13, #10). She is our gateway to the graduates (Ellen, Nadia, Bianca, Jim Lam, Bhumika) and to the DOTR graduation on Oct 15–16 — the third-act scene. When the film asks «why does a for-profit lab give education away», she is the answer’s human face.<br><br><b>What only she gives.</b> The program itself, told by its builder — nobody else can walk one dentist’s arc from first session to the DOTR stage with real names and real before/after. And a production superpower: she knows exactly what happens in that graduation room and can tell us what not to miss with the cameras.<br><br><b>What to ask.</b><br>1) “You started as an RDA twenty-eight years ago, assisting in surgeries. What does that hands-on past give you when you build programs for dentists?” — why: grounds her authority in biography, not title.<br>2) “Walk us through one dentist — first session to the graduation stage. What actually changes in her?” — why: the B-story arc in one concrete answer.<br>3) “Forty-three dentists in the 2026 cohort. What do they arrive NOT knowing — the thing dental school never taught?” — why: fresh number; names the gap the program fills (business, leadership, ownership).<br>4) “Honestly: why does a for-profit lab give this away free — what does Glidewell get back?” — why: the reinvestment thesis, answered without PR gloss.<br>5) “October 15–16, the graduation. What happens in that room that our cameras must not miss?” — why: she is the scene’s owner; her answer is our shot list.<br><br><b>How to approach / caution.</b> Our warmest insider — already connected, holds the keys to graduates and DOTR logistics. One framing landmine (flagged in our GL notes): publicly the program is framed for practicing women dentists, while our internal shorthand said «under-represented and emerging dentists» — reconcile the on-camera language with her BEFORE the interview. If we cite «women are now the majority of graduating dentists», verify the stat first. Studio Day 3 slot.<br><br><b>Verify before shooting.</b> Exact title (Director of Strategic Partner Relations — sources vary: also seen as Director of Partnerships); «28 years in dentistry», «10+ years at Glidewell», cohort counts (~100 alumni; 43 in 2026) — confirm with her; the women-graduates statistic before any on-screen use.<br><br><b>Confidence.</b> Program facts and her role: high (multiple sources incl. her program site). Career-start details: medium (from program materials/podcast). Framing question is REAL — resolve before camera.",ru:"<b>Кто она.</b> Бобби Нортон — директор по стратегическим партнёрствам Glidewell и создательница Guiding Leaders, и её авторитет заработан длинной дорогой: она начала в стоматологии ~28 лет назад ассистенткой (RDA), руками — в хирургии, ортодонтии и протезировании, и больше 10 лет в Glidewell ведёт машинерию симпозиумов и отношений с лидерами мнений (<a href='https://guidingleaders.com/about-us/' target='_blank' rel='noopener'>guidingleaders.com</a>; подкаст Deals for Dentists, вместе с CEO Годдард). Guiding Leaders — её программа с нуля: бесплатное лидерское и бизнес-обучение для женщин-стоматологов, 4+ когорты, ~100 выпускников, и свежий масштаб: в когорту 2026 отобраны 43 врача (пресс-релиз, май 2026).<br><br><b>Зачем фильму.</b> Нортон владеет B-линией фильма: образование как то, что УДЕРЖИВАЕТ переход (#13, #10). Она — наш вход к выпускникам (Ellen, Nadia, Bianca, Jim Lam, Bhumika) и к выпускному DOTR 15–16 октября — сцене третьего акта. Когда фильм спрашивает «зачем коммерческая лаборатория раздаёт образование бесплатно», она — человеческое лицо ответа.<br><br><b>Что только она даёт.</b> Программу, рассказанную её строителем: никто другой не проведёт арку одной врача от первой сессии до сцены DOTR с настоящими именами и настоящим «до/после». И продюсерская суперсила: она точно знает, что происходит в зале выпускного, и скажет, что нельзя упустить камерам.<br><br><b>О чём спрашивать.</b><br>1) «Вы начали двадцать восемь лет назад ассистенткой, в хирургиях. Что этот опыт руками даёт вам, когда вы строите программы для врачей?» — зачем: авторитет из биографии, не из титула.<br>2) «Проведите нас через одну врача — от первой сессии до сцены выпускного. Что в ней реально меняется?» — зачем: арка B-линии одним конкретным ответом.<br>3) «Сорок три врача в когорте 2026-го. Чего они НЕ знают, приходя, — то, чему не научила школа?» — зачем: свежая цифра; называет пробел, который закрывает программа (бизнес, лидерство, владение практикой).<br>4) «Честно: зачем коммерческая лаборатория раздаёт это бесплатно — что Glidewell получает взамен?» — зачем: тезис реинвестирования без PR-глянца.<br>5) «15–16 октября, выпускной. Что произойдёт в зале такого, что наши камеры не имеют права упустить?» — зачем: она хозяйка сцены; её ответ — наш shot list.<br><br><b>Как заходить / осторожно.</b> Наш самый тёплый инсайдер — уже на связи, держит ключи к выпускникам и логистике DOTR. Одна мина в формулировках (помечена в наших GL-заметках): публично программа — для практикующих женщин-стоматологов, а наш внутренний шорткат говорил «недопредставленные и начинающие врачи» — сверить экранный язык с ней ДО интервью. Если цитируем «женщины — уже большинство выпускников», сначала проверить статистику. Слот студийного дня №3.<br><br><b>Проверить перед съёмкой.</b> Точный титул (Director of Strategic Partner Relations — в источниках встречается и Director of Partnerships); «28 лет в стоматологии», «10+ лет в Glidewell», счёт когорт (~100 выпускников; 43 в 2026) — подтвердить у неё; статистику о выпускницах — до любого экранного использования.<br><br><b>Уверенность.</b> Факты программы и роль: высокая (несколько источников, включая сайт программы). Детали старта карьеры: средняя (из материалов программы/подкаста). Вопрос формулировок — РЕАЛЬНЫЙ, решить до камеры."}, rl:{en:"Guiding Leaders",ru:"Guiding Leaders"}, role:{en:"Director of Strategic Partner Relations; Director of Guiding Leaders, Glidewell",ru:"Director of Strategic Partner Relations; директор программы Guiding Leaders, Glidewell"}, loc:{en:"Newport Beach, CA (in-house)",ru:"Ньюпорт-Бич, Калифорния (внутр.)"}, theme:{en:"Education & reinvestment in the profession · the human face of \u201Cgive back to dentists\u201D — mentorship and the next generation.",ru:"Образование и реинвест в профессию · человеческое лицо принципа \u201Cотдавать дантистам\u201D — менторство и следующее поколение."}},
};

function clusterLabels(xs,y,name,color,attr){
  if(!xs.length) return '';
  xs=xs.slice().sort((a,b)=>a-b);
  const cls=attr?'prowlbl plbl-click':'prowlbl';
  let out='', gs=xs[0], prev=xs[0];
  const flush=gx=>{ out+='<text class="'+cls+'" '+(attr||'')+' x="'+(gx-13)+'" y="'+y+'" fill="'+color+'" text-anchor="end">'+name+'</text>'; };
  for(let i=1;i<xs.length;i++){ if(xs[i]-prev>650){ flush(gs); gs=xs[i]; } prev=xs[i]; }
  flush(gs); return out;
}
