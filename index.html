   desc:{en:"A \"before\" snapshot — the tone, the world and the hero's flaw before any change. It sets the bar the Final Image will answer.",ru:"Снимок «до» — тон, мир и изъян героя до изменений. Задаёт планку, на которую ответит финальный образ."},
   idea:{en:"• Open on Hero #2, the old-school dentist, taking a physical impression — the tray of putty pressed into a patient’s mouth, the gag, the wait, the plaster model drying on a shelf. No words, just the slow analog ritual. This is the “before” world the whole film answers: craft that hasn’t changed in decades, and a patient kept waiting. The flaw on display is friction — dentistry that is slow, uncomfortable and, by extension, hard to access. The Final Image can rhyme this exact moment with a digital scan and a same-visit crown.<br>• Cold open on a young Jim Glidewell starting from nothing: a title card or a quiet narration line landing on a man who began with no advantages. Pair it with imagery of the Kentucky farm and the latchkey kid letting himself into an empty house. The tone is small, rural, overlooked — a man with no obvious reason to win. It sets the bar the Final Image answers when that same man has built the world’s largest dental lab by driving cost down. (Maybe open on his hands rather than his face, to hold the reveal.)<br>• Open on the access gap as lived experience — possibly through Jim Lam’s lower-income community: a patient who has put off care because the best dentistry has always meant the most expensive dentistry. We see the empty chair, the hesitation, the price implied but unspoken. The flaw here is systemic, not personal — “best” and “affordable” treated as opposites. This plants the thesis (access as throughline) as a problem before Glidewell is ever named as the answer.<br>• Open inside Dr. Abdul Alas’s practice at dawn, before patients arrive — an intern watching, learning, uncertain; the mentor not yet in frame. It establishes the dentist line that carries the narrative and the generational handoff, but in a “before” key: knowledge still locked in one experienced pair of hands, not yet democratized by technology. The Final Image can return to this room with the intern now confident and the tools doing what only mastery once could. (Speculative on exact staging — director’s call on dawn vs. first patient.)",ru:"• Открыть на Герое №2, дантисте старой школы, снимающем физический слепок — ложка с массой вдавливается в рот пациента, рвотный рефлекс, ожидание, гипсовая модель сохнет на полке. Без слов, только медленный аналоговый ритуал. Это и есть мир «до», на который отвечает весь фильм: ремесло, не менявшееся десятилетиями, и пациент, которого заставляют ждать. Изъян на виду — трение: стоматология медленная, неудобная и оттого труднодоступная. Финальный образ может срифмовать этот самый момент с цифровым сканом и коронкой за один визит.<br>• Холодное открытие на молодом Джиме Глайдвелле, начинающем с нуля: титр или тихая закадровая строка о человеке, начавшем без всяких преимуществ. Соединить с образами кентуккской фермы и ребёнка-латчкей, который сам открывает дверь в пустой дом. Тон — маленький, сельский, незамеченный — человек без явной причины победить. Это задаёт планку, на которую отвечает Финальный образ, когда тот же человек построил крупнейшую в мире зуботехническую лабораторию, снижая стоимость. (Возможно, открыть на его руках, а не на лице, чтобы придержать раскрытие.)<br>• Открыть на разрыве в доступе как на прожитом опыте — возможно, через сообщество с низким доходом Джима Лэма: пациент, который откладывал лечение, потому что лучшая стоматология всегда означала самую дорогую. Мы видим пустое кресло, колебание, подразумеваемую, но не названную цену. Изъян здесь системный, а не личный — «лучшее» и «доступное» поданы как противоположности. Это закладывает тезис (доступ как сквозная линия) как проблему ещё до того, как Glidewell назван ответом.<br>• Открыть внутри практики доктора Абдула Аласа на рассвете, до прихода пациентов — интерн наблюдает, учится, не уверен; наставник ещё не в кадре. Это устанавливает линию дантиста, несущую повествование, и передачу между поколениями, но в тональности «до»: знание всё ещё заперто в одной опытной паре рук, ещё не демократизировано технологией. Финальный образ может вернуться в эту комнату, где интерн уже уверен, а инструменты делают то, что прежде требовало мастерства. (Точная постановка спекулятивна — рассвет или первый пациент на усмотрение режиссёра.)"}},
  {nm:{en:"Theme Stated",ru:"Заявление темы"}, pos:5, pct:"5%", t:{en:"5:00",ru:"5:00"},
   desc:{en:"Someone states (often to the hero, who ignores it) what the story is really about — the truth the hero must learn by the end.",ru:"Кто-то проговаривает (часто герою, который пропускает мимо ушей), о чём история на самом деле — истину, которую герою предстоит усвоить."},
   idea:{en:"• Theme Stated through Dr. Abdul Alas to an intern. In his practice, a young intern frets over the cost or perfectionism of a single restoration. Abdul, mid-procedure or over a coffee break, says something like “the best dentistry doesn’t matter if the patient can’t afford to walk in” — naming access as the real point. The intern half-listens, focused on technique; the line lands later. This maps the dentist throughline directly onto the thesis and plants the truth early.<br>• Theme Stated as the old-school dentist’s unwitting rebuttal. Hero #2, still pouring physical impressions, says with pride “I do it the way I was taught — the right way.” Played straight, not mocking, this is the inverse of the theme: craft for its own sake versus craft that scales to reach more people. The audience hears the truth precisely because the hero is ignoring where the field is going. (Maybe pair with a later beat where the same dentist sees a digital workflow.)<br>• Theme Stated via young Jim being written off. Over a still or recreation of Jim starting out with no advantages, an instructor or peer voice (archival or implied) effectively says he isn’t cut out for this. The unspoken counter-theme — that worth is proven by what you make accessible, not by where you started — is stated against him and ignored by everyone, including young Jim, who must spend a lifetime proving it. Possibly speculative on exact wording; ground only in confirmed facts of his early life.<br>• Theme Stated through a Guiding Leaders alum, Jim Lam. Serving a lower-income community with two mills, Lam says to a patient or to camera “most people here couldn’t get this work done five years ago.” The theme — affordability as access — is voiced by someone living it, while the broader industry (and maybe Lam’s own earlier assumptions) treated premium dentistry as a luxury. Actionable as a vérité chairside moment.",ru:"• Заявление темы через доктора Абдула Аласа — интерну. В его практике молодой интерн переживает из-за стоимости или перфекционизма одной реставрации. Абдул, прямо во время процедуры или за кофе, говорит что-то вроде «лучшая стоматология ничего не значит, если пациент не может позволить себе прийти» — называя доступность настоящей сутью. Интерн слушает вполуха, поглощён техникой; фраза откликнется позже. Это напрямую накладывает линию стоматолога на тезис и закладывает истину рано.<br>• Заявление темы как невольное возражение старомодного дантиста. Герой №2, всё ещё снимающий физические слепки, с гордостью говорит «я делаю так, как меня учили — правильно». Подано всерьёз, без насмешки, это инверсия темы: ремесло ради ремесла против ремесла, которое масштабируется, чтобы охватить больше людей. Зритель слышит истину именно потому, что герой игнорирует, куда движется отрасль. (Возможно, связать с поздней вехой, где тот же дантист видит цифровой процесс.)<br>• Заявление темы через молодого Джима, которого списали со счетов. Поверх фото или реконструкции, где Джим начинает с нуля, голос преподавателя или сокурсника (архив или подразумеваемый) фактически говорит, что он не создан для этого. Невысказанная контртема — что ценность доказывается тем, что ты делаешь доступным, а не тем, откуда ты стартовал — заявлена против него и проигнорирована всеми, включая молодого Джима, которому придётся доказывать это всю жизнь. Возможно, спекулятивно по точной формулировке; опираться только на подтверждённые факты его ранней жизни.<br>• Заявление темы через выпускника Guiding Leaders — Джима Лама. Обслуживая сообщество с низким доходом на двух фрезерах, Лам говорит пациенту или в камеру «пять лет назад большинство здесь не смогли бы сделать такую работу». Тема — доступность как доступ — озвучена тем, кто живёт ею, тогда как отрасль в целом (а может, и прежние установки самого Лама) считала премиальную стоматологию роскошью. Реализуемо как наблюдательный момент у кресла."}},
  {nm:{en:"Set-Up",ru:"Завязка"}, pos:8, a:1, b:10, pct:"1–10%", t:{en:"0–10 min",ru:"0–10 мин"},
   desc:{en:"Establish the hero, their world, what's missing, the stakes and the supporting cast. Plant the things that will pay off later.",ru:"Знакомим с героем, его миром, тем, чего не хватает, ставками и окружением. Сеем то, что выстрелит позже."},
   idea:{en:"• Idea A — the “before” world through Hero #2 (old-school dentist). Open not on Glidewell but on the old-school dentist who still takes physical impressions: the alginate tray, the patient’s gag reflex, a plaster model drying on a shelf, a courier carrying the box away. This establishes what’s missing — slow, costly, uncomfortable — and quietly plants the stake: this is how dentistry worked for decades, and for many patients that friction is the access barrier itself. Pays off later against the one-second digital scan at Hero #1’s practice.<br>• Idea B — Hero #1 (Dr. Abdul Alas) as our guide, with his interns. Meet Alas in his practice: a practice owner who mentors interns. Through him we set up the dentist line as the narrative thread and introduce our supporting cast — young interns who don’t yet know what their craft will become. What’s missing: the bridge between what’s taught and what a practice can actually afford to offer. Maybe a line of mentoring from Alas to an intern plants the “pass it to the next generation” theme that rhymes with the 14-part frame.<br>• Idea C — a parallel prologue on young Jim. Intercut against the present-day world to set up the personal film: Jim starts out with no advantages, raised himself (a Kentucky farm, a latchkey kid), Navy and Vietnam. What’s missing for the hero is a fair starting hand; the stake is survival and the urge to do it differently. Plant the seed: in 1970 he’ll open a one-man ceramics lab. It rhymes with the dentists’ world — both fragments are about barriers that must come down.<br>• Idea D — set up the affordability stake via the Guiding Leaders as supporting cast. Briefly introduce the roster we’ll follow for ~4 months: Ellen Paulisick (built a brand-new practice fully on Glidewell), Nadia Rodriguez (young NY cosmetic dentist), Bianca Clark (3D printing), Jim Lam (two mills, serves a lower-income community — the direct face of affordability). Plant the film’s promise — “the best dentistry made affordable” — and tag the figures who will later prove it in action. Maybe open on Jim Lam specifically, so access sounds out from the very first frame.",ru:"• Идея A — мир «до» через Героя №2 (старая школа). Открываем сцену не с Glidewell, а с дантиста старой закалки, который до сих пор снимает физические слепки: ложка с альгинатом, рвотный рефлекс пациента, гипсовая модель сохнет на полке, курьер увозит коробку. Это устанавливает «чего не хватает» — медленно, дорого, неудобно. Тихо закладываем ставку: так лечилась стоматология десятилетиями, и для многих пациентов это и есть барьер доступа. Пейофф позже — цифровой скан за секунды у Героя №1.<br>• Идея B — Герой №1 (д-р Абдул Алас) как наш проводник и его интерны. Знакомим с Аласом в его клинике: он владелец практики и наставник стажёров. Через него задаём дантистскую линию как нить повествования и нашу команду персонажей — молодые интерны, которые ещё не знают, каким будет их ремесло. «Чего не хватает»: мост между тем, чему учат, и тем, что реально доступно практике. Возможно, реплика-наставление Аласа интерну закладывает тему передачи знаний следующему поколению (рифма с 14-частной рамкой «next generation»).<br>• Идея C — параллельный пролог про молодого Джима. Перебивкой к современному миру даём установку личного фильма: Джим начинает без всяких преимуществ, рос сам по себе (ферма в Кентукки, ребёнок с ключом на шее), Флот и Вьетнам. «Чего не хватает» у героя — стартовые карты против него; ставка — выживание и желание сделать иначе. Это сажает зерно: в 1970-м он откроет керамическую лабораторию на одного человека. Перо к перу с миром дантистов — оба фрагмента про барьеры, которые надо снести.<br>• Идея D — установка ставки доступности через Guiding Leaders как поддерживающий состав. Коротко представляем альманах героев, за которыми пойдём ~4 месяца: Эллен Полисик (с нуля построила практику целиком на Glidewell), Надя Родригес (молодой косметический дантист, Нью-Йорк), Бьянка Кларк (3D-печать), Джим Лэм (две фрезы, обслуживает небогатое сообщество — прямое лицо темы доступности). Закладываем обещание фильма — «лучшая стоматология по доступной цене» — и помечаем фигуры, которые позже это докажут на деле. Возможно, открыть именно с Джима Лэма, чтобы доступность зазвучала с первого кадра."}},
  {nm:{en:"Catalyst",ru:"Катализатор"}, pos:11, pct:"10–12%", t:{en:"10–12 min",ru:"10–12 мин"},
   desc:{en:"The inciting incident — news or an event that knocks the hero's world off balance. No going back to the way things were.",ru:"Запускающее событие — новость или случай, выбивающий мир героя из равновесия. Назад к прежнему уже нельзя."},
   idea:{en:"• Hero #2 (the old-school dentist) gets a lab callback that does not fit his world: a same-day digital crown is ready while his physical impression is still curing in a tray. The Catalyst is the moment he realizes the workflow he has trusted for thirty years has quietly become the slow lane. We shoot the goopy alginate impression, the gag reflex, the mailed-out box on one side, and the intraoral scan plus a milled restoration on the other. No going back: once he watches a patient walk out same-day, the old way reads as a choice he can no longer defend on cost or comfort.<br>• For Hero #1, Dr. Abdul Alas, the Catalyst is generational, not personal — and Abdul is already digital, so his beat is being pushed by the next generation to pass the workflow ON: an intern brings a fully-digital case, and the question shifts from &quot;should I switch?&quot; to &quot;how do I teach this so it reaches more patients?&quot; He is the bridge who already crossed — the &quot;still does it the long way / retool-or-retire&quot; tension belongs to a transition hero (the old-school dentist #2 or a Guiding Leaders alum mid-switch), not Abdul. (Maybe pair this with a specific patient who could not previously afford the work, to keep access as the throughline.)<br>• Jim Glidewell rhyme — the founder's Catalyst. Cut from a 2026 dentist staring at a price quote to 1970: a one-man ceramics lab, Jim deciding the bill for quality dentistry is simply too high and refusing to accept it as fixed. The inciting event of the whole company is a single stubborn decision — bring the cost down, never sell, never go public. His off-balance world is the dentistry he was trained inside; the irreversible step is starting the lab alone. Honesty guardrail: frame it as him setting out to make the best dentistry affordable, never as inventing the technology.<br>• Guiding Leaders Catalyst (possibly the company film's version) — open on Ellen Paulisick standing in an empty, unbuilt practice. The inciting incident is the decision to build a brand-new clinic fully on Glidewell from day one, with no analog fallback to retreat to. The point of no return is literal: the lease is signed, the old way was never installed. Contrast-cut to Jim Lam running two mills for a lower-income community to keep affordability the engine of the access throughline.",ru:"• Герой №2 (дантист старой школы) получает из лаборатории звонок, который не вписывается в его мир: цифровая коронка в день обращения уже готова, пока его физический оттиск ещё застывает в ложке. Катализатор — момент, когда он осознаёт, что рабочий процесс, которому он доверял тридцать лет, тихо стал медленной полосой. Снимаем липкий альгинатный оттиск, рвотный рефлекс, отправленную почтой коробку с одной стороны — и внутриротовой скан плюс фрезерованную реставрацию с другой. Назад дороги нет: увидев, как пациент уходит с готовой работой в тот же день, старый способ читается как выбор, который он больше не может оправдать ни ценой, ни комфортом.<br>• Для Героя №1, доктора Абдула Аласа, Катализатор поколенческий, а не личный — Абдул уже в цифре, поэтому его бит — не «переходить ли», а как передать процесс дальше: интерн приносит полностью цифровой кейс, и вопрос смещается к «как научить этому, чтобы дошло до большего числа пациентов». Он — мост, который уже перешёл. Арка «почему до сих пор по-старому / переоснаститься или уйти» принадлежит герою-переходнику (олдскул-дантист №2 или выпускник GL в процессе перехода), а не Абдулу. (Возможно, связать с конкретным пациентом, который раньше не мог позволить себе такую работу, чтобы доступность оставалась сквозной линией.)<br>• Рифма Джима Глайдвелла — Катализатор основателя. Склейка от дантиста 2026 года, глядящего на ценник, к 1970-му: лаборатория керамики из одного человека, Джим решает, что счёт за качественную стоматологию просто слишком высок, и отказывается принимать его как данность. Завязка всей компании — одно упрямое решение: снизить стоимость, никогда не продавать, никогда не выходить на биржу. Его выбитый из равновесия мир — та самая стоматология, внутри которой его учили; необратимый шаг — открыть лабораторию в одиночку. Гарантия честности: подаём это как намерение сделать лучшую стоматологию доступной, но никогда как изобретение технологии.<br>• Катализатор «Guiding Leaders» (возможно, версия для фильма о компании) — открываем на Эллен Полисик, стоящей в пустой, ещё не построенной практике. Завязка — решение построить новую клинику полностью на Glidewell с первого дня, без аналогового запасного варианта, к которому можно отступить. Точка невозврата буквальна: аренда подписана, старого способа здесь никогда и не было. Контрастная склейка на Джима Лэма, который держит две фрезерные машины для района с низким доходом, чтобы доступность оставалась двигателем сквозной линии."}},
  {nm:{en:"Debate",ru:"Спор"}, pos:14, a:12, b:25, pct:"12–25%", t:{en:"12–25 min",ru:"12–25 мин"},
   desc:{en:"The hero hesitates — \"should I go?\" The last gasp of the old way; the central question of the film is posed.",ru:"Герой колеблется — «идти ли?». Последний вздох старого уклада; ставится центральный вопрос фильма."},
   idea:{en:"• Hero #2, the old-school dentist, as the living Debate. We shoot his last gasp of the old way: the physical impression — the goopy tray seated in a patient’s mouth, the gag, the wait, the plaster pour. Intercut with a Glidewell intraoral scan finishing in seconds. His own hesitation is the beat: on camera he weighs whether to change — “I’ve done it this way for thirty years; why should I go digital now?” He poses the film’s central question without us narrating it.<br>• Dr. Abdul Alas (Hero #1) voices the question on behalf of the next generation. With an intern at the chair, he frames the choice the whole profession faces — stay analog and safe, or commit to the digital path. Maybe we let the intern push back, so the Debate is a real two-sided conversation, not a lecture, and Abdul lands the throughline: this is really about getting good dentistry to more patients.<br>• Jim’s rhyme: the 1970 founding as his own Debate moment. Archive-style or recreation of the one-man ceramics lab — a single bench, one pair of hands — over his memory of starting with no advantages and raising himself on a Kentucky farm. The hesitation rhymes with the dentists’: should a man with nothing to fall back on bet everything on a harder, cheaper, better way? Possibly pair this with a beat where he’s urged to sell or go public and refuses — the same “should I go?” said no to.<br>• A Guiding Leaders fork dramatizes the choice as two paths shot side by side. Ellen Paulisick, who built a brand-new practice fully on Glidewell, against the old-school dentist still pouring stone — same question, opposite answers. Maybe open on Ellen mid-decision (the empty buildout, the equipment not yet installed) so we catch the hesitation before the leap, not just the result. Affordability stays the stake via Jim Lam if we need a second voice.",ru:"• Герой №2, дантист старой школы, как живой Спор. Снимаем последний вздох старого способа: физический слепок — ложка с массой во рту пациента, рвотный рефлекс, ожидание, заливка гипса. Перебиваем кадрами Glidewell-сканирования, которое завершается за секунды. Сам беат — его колебание: на камеру он взвешивает, менять ли привычку: «Я делаю так тридцать лет — зачем мне сейчас уходить в цифру?» Он задаёт центральный вопрос фильма без нашего закадра.<br>• Доктор Абдул Алас (Герой №1) проговаривает вопрос от лица следующего поколения. С интерном у кресла он формулирует выбор, перед которым стоит вся профессия: остаться в безопасной аналоговой зоне или решиться на цифровой путь. Возможно, дадим интерну возразить, чтобы Спор был настоящим двусторонним разговором, а не лекцией, и Абдул выводит на сквозную линию: на деле речь о том, чтобы хорошая стоматология дошла до большего числа пациентов.<br>• Рифма Джима: основание лаборатории в 1970 как его собственный момент Спора. Архивный по фактуре кадр или реконструкция лаборатории керамики на одного человека — один стол, одна пара рук — поверх его воспоминания о старте без всяких преимуществ и о том, как он растил себя сам на ферме в Кентукки. Его колебание рифмуется с дантистами: стоит ли человеку, которому не на что опереться, ставить всё на более трудный, дешёвый и лучший путь? Возможно, соединить с беатом, где его уговаривают продать компанию или выйти на биржу, а он отказывается — то самое «идти ли?», на которое сказано нет.<br>• Развилка Guiding Leaders как два пути, снятых параллельно. Эллен Полайсик, построившая новую практику полностью на Glidewell, против дантиста старой школы, всё ещё льющего гипс, — один вопрос, противоположные ответы. Возможно, открыть на Эллен в момент решения (пустое помещение, оборудование ещё не установлено), чтобы поймать колебание до прыжка, а не только результат. Ставка доступности держится через Джима Лама, если нужен второй голос."}},
  {nm:{en:"Break into Two",ru:"Переход во 2-й акт"}, pos:25, pct:"25%", t:{en:"25 min",ru:"25 мин"},
   desc:{en:"The hero makes a choice and steps into the new world of Act Two — deliberately, the antithesis of the opening.",ru:"Герой делает выбор и шагает в новый мир второго акта — осознанно; антитеза открытию."},
   idea:{en:"• The Break into Two — the first, deliberate crossing from tray to scanner — belongs to a transition hero, NOT Abdul (who is already digital). We shoot the old-school dentist (Hero #2) or a Guiding Leaders alum sending their first full case to a chairside scanner instead of the impression tray: they turn the old tray over, set it down, and walk to the scanner with Abdul or an intern watching. This is the literal antithesis of the analog opening and hands the dentist-line its forward motion. Abdul's role here is the mentor who already made this leap and now guides it — invent no specific quote.<br>• Cut Jim Glidewell's own threshold against the hero's: 1970, the decision to walk away from working for someone else and open the one-man ceramics lab. The beat is the rhyme — Jim stepping into his new world alone in a small room maps onto Alas (or a Guiding Leaders alum) stepping into the digital workflow. Shoot present-day Jim describing that 1970 choice as a point of no return; possibly stage it in a confined space that visually echoes the original one-man lab.<br>• A Guiding Leaders alum carries the company-film version of the step: Ellen Paulisick deciding to build her brand-new practice fully on Glidewell — the moment of commitment, signing or laying out the empty operatory. Because she goes all-in from zero, she IS the Break into Two made visible: a clinician choosing the new world with nothing to fall back on. We follow this choice as the launch of the ~4-month arc. Possibly intercut with Jim Lam's choice to run two mills for a lower-income community, tying the step to the affordability throughline.<br>• Thematic-frame mapping (analog past → digital present): use the Hero #2 old-school dentist as the held-breath counterweight at the threshold — the hero who does NOT step through, still taking physical impressions. Place his refusal directly before our protagonist's crossing so the audience feels the choice as a choice, not an inevitability. This stays honest to the guardrail: Glidewell brought digital workflow to market and made it affordable, it did not invent it.",ru:"• Переход во 2-й акт — первое осознанное пересечение от ложки к сканеру — принадлежит герою-переходнику, НЕ Абдулу (он уже в цифре). Снимаем, как олдскул-дантист (Герой №2) или выпускник Guiding Leaders впервые отправляет полный кейс на интраоральный сканер вместо слепочной ложки: вертит в руке старую ложку, откладывает и идёт к сканеру под взглядом Абдула или интерна. Это буквальная антитеза аналоговому открытию и придаёт линии дантиста движение вперёд. Роль Абдула здесь — наставник, который уже сделал этот шаг и теперь ведёт других; конкретную цитату не выдумывать.<br>• Монтажно сталкиваем собственный порог Джима Глайдвелла с порогом героя: 1970 год, решение уйти от работы на других и открыть одноместную керамическую лабораторию. Бит — это рифма: Джим, в одиночку входящий в свой новый мир в маленькой комнате, ложится на Аласа (или выпускницу Guiding Leaders), входящего в цифровой рабочий процесс. Снять сегодняшнего Джима, описывающего тот выбор 1970-го как точку невозврата; возможно, поставить кадр в тесном пространстве, визуально перекликающемся с той самой первой лабораторией.<br>• Выпускница Guiding Leaders несёт версию шага для корпоративного фильма: Эллен Полисик решает построить свою новую практику целиком на Glidewell — момент обязательства, подпись или планировка пустого операционного кабинета. Раз она идёт ва-банк с нуля, именно она и есть зримый Переход во 2-й акт: клиницист выбирает новый мир, не имея запасного пути. Следим за этим выбором как за стартом ~4-месячной арки. Возможно, переплести с выбором Джима Лама держать две фрезы ради малообеспеченного сообщества, привязывая шаг к сквозной теме доступности.<br>• Привязка к тематической рамке (аналоговое прошлое → цифровое настоящее): используем дантиста старой школы (Герой №2) как затаивший дыхание противовес у порога — герой, который НЕ переступает, по-прежнему снимая физические слепки. Ставим его отказ прямо перед переходом нашего протагониста, чтобы зритель ощутил выбор как выбор, а не как неизбежность. Это честно по отношению к ограничению: Glidewell вывел цифровой рабочий процесс на рынок и сделал его доступным, но не изобрёл его."}},
  {nm:{en:"B Story",ru:"Второстепенная линия (B)"}, pos:28, pct:"22–30%", t:{en:"25–30 min",ru:"25–30 мин"},
   desc:{en:"A new relationship begins — the \"love story\" or mentor — and it's the one that carries the theme.",ru:"Начинается новая линия отношений — «любовная» или менторская — именно она несёт тему."},
   idea:{en:"• Dr. Abdul Alas and his intern as the literal “love story” of the film. The B Story is the mentor relationship Abdul has with a young dentist he is training in his practice. We follow Abdul teaching the intern to trust digital workflow — scan, design, deliver same-day — and through that teaching he voices the theme out loud: that affordable, fast dentistry only reaches the patient if the next dentist is willing to learn it. The intern is the audience surrogate; the affordable-access thesis lands as care passed hand to hand, not as a corporate claim.<br>• Rhyme the mentor beat against Jim having no mentor. Cut Abdul guiding his intern against Jim’s memory of starting out with no advantages and raising himself as a Kentucky latchkey kid — a man who had nobody to teach him. The B Story relationship becomes the thing Jim never got and effectively built the company to provide: a system that mentors every dentist who plugs into it. The personal film and company film meet here on the theme of access.<br>• Ellen Paulisick as a mentor-by-example we can actually shoot over ~4 months. As a Guiding Leaders alumna who built a brand-new practice fully on Glidewell, Ellen could carry the B Story as the relationship between a young owner and the system that makes her independence possible. Maybe pair her on camera with Jim Lam (two mills, lower-income community) so the “love story” is really the bond between a new dentist and the promise of affordable care reaching patients who could not otherwise get it — access as the throughline, made human.<br>• The old-school dentist (Hero #2) as a reluctant mentor crossing over. Possibly stage the B Story as the relationship between the impression-tray veteran and a digital convert (Bianca Clark on 3D printing, or Nadia Rodriguez) — the analog past handing the craft to the digital present. The warmth is generational respect, not a takedown; the theme rides on the elder admitting the new way reaches more patients for less. Speculative — depends on whether the old-school dentist will appear alongside a younger lead on camera.",ru:"• Доктор Абдул Алас и его интерн как буквальная «история любви» фильма. Линия B — это наставнические отношения Абдула с молодым дантистом, которого он обучает в своей практике. Мы видим, как Абдул учит интерна доверять цифровому потоку — скан, дизайн, выдача в тот же день, — и через это обучение он вслух проговаривает тему: доступная и быстрая стоматология дойдёт до пациента только если следующий дантист готов ей учиться. Интерн становится проводником для зрителя; тезис о доступности звучит как забота, передаваемая из рук в руки, а не как корпоративное заявление.<br>• Срифмовать наставника с тем, что у Джима наставника не было. Смонтировать, как Абдул ведёт интерна, против воспоминания Джима о том, как он начинал без всяких преимуществ и растил себя сам — ребёнок с ключом на шее на ферме в Кентукки, которого некому было учить. Отношения линии B становятся тем, чего Джим так и не получил и ради чего, по сути, построил компанию: систему, которая наставляет каждого дантиста, подключившегося к ней. Личный и корпоративный фильмы встречаются здесь на теме доступа.<br>• Эллен Полисик как наставник примером, которого мы реально можем снимать ~4 месяца. Как выпускница Guiding Leaders, построившая новую практику целиком на Glidewell, Эллен может вести линию B как отношения молодого владельца и системы, которая делает её независимость возможной. Возможно, свести её в кадре с Джимом Лэмом (две фрезы, район с низким доходом), чтобы «история любви» оказалась связью нового дантиста с обещанием доступной помощи, доходящей до пациентов, которые иначе её не получили бы, — доступ как сквозная линия, очеловеченный.<br>• Старомодный дантист (Герой №2) как нехотя переходящий на сторону наставник. Возможно, выстроить линию B как отношения ветерана физических оттисков и новообращённого в цифру (Бьянка Кларк с 3D-печатью или Надя Родригес) — аналоговое прошлое, передающее ремесло цифровому настоящему. Теплота тут в уважении поколений, а не в развенчании; тема держится на том, что старший признаёт: новый способ доходит до большего числа пациентов и дешевле. Спекулятивно — зависит от того, появится ли старомодный дантист в кадре рядом с молодым героем."}},
  {nm:{en:"Fun and Games",ru:"Игры и забавы"}, pos:33, a:26, b:50, pct:"25–50%", t:{en:"25–50 min",ru:"25–50 мин"},
   desc:{en:"The \"promise of the premise\" — the set-pieces the audience came for. The hero explores the new world, in up or down beats.",ru:"«Обещание идеи» — то, ради чего пришёл зритель. Герой исследует новый мир — на подъёме или спаде."},
   idea:{en:"• Hero #1 — Dr. Abdul Alas, same-day crown set-piece: shoot the full single-visit arc in his practice — intraoral scan, design on screen, the chairside mill carving the block, glaze, seat — intercut with an intern watching over his shoulder. This is the literal “promise of the premise”: a patient walks out with a finished crown in one appointment. The up-beat showpiece of the digital world.<br>• Hero #2 contrast cut, the old-school dentist taking a physical impression: the goopy tray, the gag, the wait for the lab. Run it back-to-back with the Alas same-day scene as the down-beat “before.” Same procedure, two worlds — let the audience feel the gap rather than narrate it.<br>• Guiding Leaders road trip — visit two or three alumni and let each one be a different set-piece: Ellen Paulisick walking her brand-new practice built fully on Glidewell; Bianca Clark pulling a finished part off the 3D printer; Jim Lam running his two mills for a lower-income community. Each is a “what this world makes possible” beat; affordability lands hardest on Jim Lam’s floor. (Maybe pick the two strongest on-camera presences rather than all of them.)<br>• Jim memory rhyme — the 1970 one-man ceramics lab as origin set-piece: hands shaping a single crown at a bench, recreated or shown through archive/stills, then hard-cut to the modern factory floor at scale. Possibly let young Jim’s bench dissolve into a wall of mills — the same act of making a tooth, multiplied. (Speculative on exact archive availability.)",ru:"• Герой №1 — доктор Абдул Алас, сет-пис «коронка за один визит»: снять полную дугу одного приёма в его клинике — интраоральный скан, дизайн на экране, фрезер, вытачивающий блок, глазуровка, посадка — с перебивками на интерна, наблюдающего из-за плеча. Это буквально «обещание завязки»: пациент уходит с готовой коронкой за один приём. Главный позитивный аттракцион цифрового мира.<br>• Контрастная склейка — Герой №2, старой школы, снимает физический слепок: липкая ложка, рвотный рефлекс, ожидание лаборатории. Поставить встык со сценой Аласа как негативное «до». Та же процедура, два мира — дать зрителю почувствовать разрыв, а не проговаривать его.<br>• Роуд-трип Guiding Leaders — заехать к двум-трём выпускницам, и каждая — отдельный сет-пис: Эллен Полисик, проводящая нас по своей новой клинике, целиком построенной на Glidewell; Бьянка Кларк, снимающая готовую деталь с 3D-принтера; Джим Лэм, запускающий два своих фрезера для небогатого сообщества. Каждый — бит «что этот мир делает возможным»; доступность сильнее всего звучит на площадке Джима Лэма. (Возможно, выбрать двух самых сильных в кадре, а не всех.)<br>• Рифма-воспоминание Джима — лаборатория керамики «в одни руки» 1970 года как сет-пис истоков: руки, формирующие одну коронку у верстака, через архив или реконструкцию, затем резкая склейка на современный заводской цех в масштабе. Возможно, верстак молодого Джима растворяется в стене фрезеров — тот же акт создания зуба, помноженный. (Спекулятивно по доступности архива.)"}},
  {nm:{en:"Midpoint",ru:"Средняя точка"}, pos:50, pct:"50%", t:{en:"50 min",ru:"50 мин"},
   desc:{en:"A false victory or a false defeat. Stakes rise, the A and B stories cross, and the clock often starts ticking.<br><br><i>A beat marks a % of the film and a principle, not a calendar year — the same self-disruption move shows up in Jim's 1970s bet (scene #8) and again in glidewell.io / chairside (2017–19), so those layers sit side by side here on purpose.</i>",ru:"Ложная победа или ложное поражение. Ставки растут, линии A и B пересекаются, нередко запускается «часы».<br><br><i>Бит — это % фильма и принцип, а не календарный год: тот же ход самодизрапшна виден и в ставке Джима 1970-х (сцена #8), и в glidewell.io / chairside (2017–19), поэтому слои лежат рядом намеренно.</i>"},
   idea:{en:"• False victory through Dr. Abdul Alas (Hero #1): build the Midpoint around a single perfect case — Abdul places a chairside crown designed, milled and seated in one visit, the patient smiles in the mirror, the intern he mentors looks on like it is magic. Shoot it as a triumph: this is the future working flawlessly. Then turn it — Abdul names the cost that made it possible, or admits how many patients down the street still cannot get this. The win is real but partial; access is still the unfinished job. Cross the B story by cutting to a Jim line that the point was never one perfect crown, it was millions of them affordable.<br>• False defeat in the field — Jim Lam, the two-mill dentist serving a lower-income community (affordability hero): stage the Midpoint as a setback. Maybe a print fails, a margin is off, a remake is needed, or a patient cannot afford even the lower price — the digital promise stumbles in the exact place it matters most. Let it land as a gut punch, the clock now ticking on whether affordable really reaches the people Jim Lam built his practice for. This raises the stakes from neat technology to a human cost.<br>• A-and-B crossing on the founder's-bet rhyme — intercut Jim Glidewell's earliest gamble (the one-man lab, no money, no advantages) with a present-day Guiding Leaders alumnus hitting a wall, possibly Ellen Paulisick mid-build of her brand-new all-Glidewell practice or Nadia Rodriguez early in her cosmetic career. Frame the Midpoint as a false victory that wobbles: the new practice opens, the ribbon is cut, then the real weight lands — debt, doubt, the question of whether betting everything on this was wise. His earliest, lowest moment becomes the mirror: the bottom is not the end of the story, it is the middle. (Speculative on exactly which alumnus and which obstacle — to confirm against footage.)<br>• Thematic Midpoint as the analog-to-digital hinge — pair the old-school dentist (Hero #2) still taking physical impressions with the digital present. Possibly cut from the gag-inducing impression tray to a clean intraoral scan as the apparent victory, then complicate it: the old-school dentist is not wrong, his patients trust the hands they know, and going digital costs money he is weighing. The false victory is &#34;digital won&#34;; the truth underneath is that the transition is uneven and the clock is the next generation deciding which way the whole profession tips. (Maybe place Bianca Clark and 3D printing here as the rising tide.)",ru:"• Ложная победа через доктора Абдула Аласа (Герой №1): построить Среднюю точку вокруг одного идеального кейса — Абдул ставит коронку, спроектированную, отфрезерованную и установленную за один визит, пациент улыбается в зеркало, а интерн, которого он наставляет, смотрит на это как на чудо. Снять как триумф: вот оно, будущее, работающее безупречно. А потом повернуть — Абдул называет цену, которая сделала это возможным, или признаёт, скольким пациентам по соседству это всё ещё недоступно. Победа настоящая, но неполная; доступность — всё ещё незавершённая работа. Скрестить с линией B, перейдя к реплике Джима о том, что смысл был не в одной идеальной коронке, а в миллионах доступных.<br>• Ложное поражение в поле — Джим Лам, дантист с двумя фрезерами, обслуживающий небогатую общину (герой доступности): поставить Среднюю точку как срыв. Возможно, печать не удалась, край не сошёлся, нужна переделка, или пациент не может позволить себе даже сниженную цену — цифровое обещание спотыкается ровно там, где это важнее всего. Дать этому ударить под дых, и теперь тикают часы: дойдёт ли «доступное» до тех людей, ради которых Джим Лам строил свою практику. Это поднимает ставку от красивой технологии до человеческой цены.<br>• Скрещение A и B на рифме «ставки основателя» — смонтировать самую раннюю ставку Джима Глайдвелла (лаборатория-одиночка, без денег, без преимуществ) с сегодняшним выпускником Guiding Leaders, упирающимся в стену; возможно, Эллен Полизик в середине постройки своей новой практики целиком на Glidewell или Надия Родригес в начале косметической карьеры. Подать Среднюю точку как ложную победу, которая шатается: новая практика открывается, ленту перерезали, а потом наваливается настоящий груз — долг, сомнение, вопрос, разумно ли было ставить на это всё. Самый ранний, низший момент Джима становится зеркалом: дно — не конец истории, а её середина. (Спекулятивно, какой именно выпускник и какое препятствие — уточнить по материалу.)<br>• Тематическая Средняя точка как петля «аналог — цифра» — соединить старомодного дантиста (Герой №2), всё ещё снимающего физические оттиски, с цифровым настоящим. Возможно, перейти от вызывающей рвотный рефлекс оттискной ложки к чистому интраоральному скану как видимой победе, а затем усложнить: старомодный дантист не неправ, его пациенты доверяют рукам, которые знают, а переход в цифру стоит денег, и он их взвешивает. Ложная победа — «цифра победила»; правда под ней — что переход неравномерен, и часы — это следующее поколение, решающее, в какую сторону качнётся вся профессия. (Возможно, поставить сюда Бианку Кларк и 3D-печать как восходящую волну.)"}},
  {nm:{en:"Bad Guys Close In",ru:"Враги сжимают кольцо"}, pos:55, a:50, b:75, pct:"50–75%", t:{en:"50–75 min",ru:"50–75 мин"},
   desc:{en:"External and internal pressure mounts; the team frays and doubts grow as the antagonist regroups.",ru:"Внешнее и внутреннее давление нарастает; команда трещит, сомнения растут, антагонист перегруппируется."},
   idea:{en:"• HERO ARC (Abdul Alas + the old-school dentist as antagonist-figure): Bad Guys Close In as the squeeze on the independent practice. Shoot Dr. Alas late in a day — the press of overhead, lab bills, insurance reimbursements falling, a young intern watching him do math that does not work. Cut against Hero #2, the old-school dentist still pouring physical impressions: not a villain but the embodiment of the antagonist (the analog past, rising cost, slowness) closing in on people who cannot keep up. The pressure is structural, not personal — the question hanging over the intern is “can a normal dentist even survive doing it the right way?” Maps to the analog-past beat of the 14-part frame.<br>• INTERNAL DOUBT (Guiding Leaders alumni mid-journey): roughly the 2-to-3-month mark of the ~4-month follow, when the honeymoon is over. Ellen Paulisick built a brand-new practice entirely on Glidewell — film the night the chairs are empty and the loan is real; the bet that looked bold now feels exposed. Intercut Jim Lam running two mills for a lower-income community where margins are thin and patients still hesitate at any price. The team frays not from a competitor but from fatigue and the math of access — the very mission is what is straining them.<br>• JIM RHYME (his earliest low as the antagonist regrouping): place Jim’s lowest data point here — starting out with no advantages, the latchkey kid on the Kentucky farm with no one coming to help. Possibly (maybe) the one-man-lab years of 1970 as the matching low: alone, undercapitalized, told to sell or go public and refusing while the pressure mounts. The “bad guys” are the people and conventions that said he would not make it; this beat lets the film sit in that doubt before the flywheel turns. Maps to the analog-to-flywheel hinge of the frame.<br>• POSSIBLY — converging multi-hero montage: a short pressure sequence cross-cutting every thread at its hardest moment (Alas’s overhead, Ellen’s empty practice, Lam’s tight margins, young Jim’s earliest low), all scored to the same rising tension, so the audience feels the cost of doing dentistry the affordable, honest way before any relief arrives. Speculative as an edit choice, but it makes “access is hard” land emotionally rather than as a talking point.",ru:"• АРКА ГЕРОЯ (Абдул Алас + дантист старой школы как фигура антагониста): «Враги сжимают кольцо» как давление на независимую практику. Снять доктора Аласа в конце тяжёлого дня — груз накладных расходов, счета лаборатории, падающие страховые выплаты, молодой интерн смотрит, как наставник считает цифры, которые не сходятся. Смонтировать встык с Героем №2, дантистом старой школы, который всё ещё льёт физические слепки: он не злодей, а воплощение антагониста (аналоговое прошлое, рост издержек, медлительность), сжимающего кольцо вокруг тех, кто не успевает. Давление структурное, не личное — над интерном висит вопрос: «может ли обычный дантист вообще выжить, делая всё правильно?» Ложится на бит аналогового прошлого из 14-частной рамки.<br>• ВНУТРЕННЕЕ СОМНЕНИЕ (выпускники Guiding Leaders в середине пути): примерно на 2–3-м месяце четырёхмесячного наблюдения, когда медовый месяц закончился. Эллен Полисик построила новую практику полностью на Glidewell — снять вечер, когда кресла пусты, а кредит реален; ставка, казавшаяся смелой, теперь ощущается как уязвимость. Перебить с Джимом Лэмом, который держит две фрезы для небогатого района, где маржа тонкая, а пациенты всё равно медлят при любой цене. Команду рвёт не конкурент, а усталость и арифметика доступности — сама миссия и есть то, что их выматывает.<br>• РИФМА ДЖИМА (ранний низ как перегруппировка антагониста): поставить сюда низшую точку Джима — старт без всяких преимуществ, мальчик-латчки на кентуккской ферме, которому никто не спешит помочь. Возможно (maybe) годы лаборатории-одиночки с 1970-го как парная низшая точка: один, без капитала, ему говорят продаться или выйти на биржу, а он отказывается, пока давление растёт. «Враги» — это люди и устои, говорившие, что он не справится; этот бит позволяет фильму побыть в сомнении, прежде чем закрутится маховик. Ложится на стык аналог → маховик.<br>• ВОЗМОЖНО — сходящийся монтаж нескольких героев: короткая сцена давления, перекрёстно сшивающая каждую линию в её самый трудный момент (накладные Аласа, пустая практика Эллен, тонкая маржа Лэма, ранний низ Джима) под единую нарастающую тревогу, чтобы зритель почувствовал цену честной и доступной стоматологии до первого облегчения. Спекулятивно как монтажное решение, но это делает мысль «доступ даётся трудно» эмоциональной, а не тезисной."}},
  {nm:{en:"All Is Lost",ru:"Всё потеряно"}, pos:75, pct:"75%", t:{en:"75 min",ru:"75 мин"},
   desc:{en:"The lowest point — the opposite of the Midpoint. Often a \"whiff of death\": something or someone is lost.",ru:"Низшая точка — противоположность средней. Часто «дыхание смерти»: что-то или кто-то теряется."},
   idea:{en:"• The old-school dentist (Hero #2) faces the whiff of death — for his practice. Shoot him alone in an emptying office: the physical impression tray in his hands, a patient who left for a faster, cheaper digital practice down the street, a phone that stops ringing. He is the before made literal — the analog past that the digital present may leave behind. The loss here is not a person but a way of working, and the fear that it takes the dentist down with it. This is the dark mirror to the Guiding Leaders who already crossed over.<br>• Jim Glidewell, starting out with no advantages, raised as a latchkey kid on a Kentucky farm — map All Is Lost to his lowest personal point before the lab existed. Maybe the Navy/Vietnam stretch, or the moment a one-man ceramics operation in 1970 nearly failed under its own thin margins: no safety net, no inheritance, no one coming to save him. The whiff of death is the very real chance that the man who started with nothing simply does not make it. Intercut his rock-bottom with the old-school dentist's, so the personal film and the company film hit the floor together.<br>• A Guiding Leaders alum at the breaking point — possibly Jim Lam, who runs two mills serving a lower-income community on thin affordability margins, or Ellen Paulisick, who bet an entire brand-new practice on Glidewell. Shoot the night the math does not work: a mill down, a case remade, a patient who cannot pay, the founder's debt against a community that needs care it can barely afford. The loss is the threat that affordable and survivable cannot both be true — the thesis itself on the operating table. (Speculative — confirm with the alum which low point was real before building on it.)<br>• Theme-frame version, no single person: stage All Is Lost as the death of the analog era itself. The funeral of the hand-poured impression — gypsum models boxed up, a darkened bench, the silence of a craft ending. Treat it as a genuine loss, not a punchline, so the digital present has something real to mourn before it earns the flywheel. Possibly the cleanest beat for the company film if we want the low point to belong to the whole field rather than one hero.",ru:"• Старый дантист (Герой №2) сталкивается с «дыханием смерти» — для своей практики. Снять его одного в пустеющем кабинете: ложка для физического оттиска в руках, пациент, ушедший в более быструю и дешёвую цифровую клинику по соседству, телефон, который перестал звонить. Он — буквальное «до», аналоговое прошлое, которое цифровое настоящее может оставить позади. Здесь теряется не человек, а способ работы, и есть страх, что он утянет дантиста за собой. Это тёмное зеркало к Guiding Leaders, которые уже перешли черту.<br>• Джим Глайдвелл, начинавший без всяких преимуществ, выросший как latchkey-ребёнок на ферме в Кентукки, — связать «Всё потеряно» с его низшей личной точкой до появления лаборатории. Возможно, флот/Вьетнам, или момент, когда лаборатория керамики из одного человека в 1970-м чуть не рухнула под тонкой маржой: ни страховки, ни наследства, никто не придёт спасать. «Дыхание смерти» — вполне реальный шанс, что человек, начавший с нуля, просто не выживет. Смонтировать его дно встык с дном старого дантиста, чтобы личный и корпоративный фильмы коснулись пола вместе.<br>• Выпускник Guiding Leaders на грани — возможно, Джим Лэм с двумя фрезерами, обслуживающий менее обеспеченное сообщество на тонкой марже доступности, или Эллен Полисик, поставившая на Glidewell целую новую практику с нуля. Снять ночь, когда математика не сходится: фрезер встал, кейс переделывают, пациент не может заплатить, долг основателя против сообщества, которому нужна помощь, едва ему по карману. Потеря — угроза того, что «доступно» и «выживаемо» не могут быть правдой одновременно: сам тезис на операционном столе. (Спекулятивно — уточнить у выпускника, какая низшая точка была реальной, прежде чем на ней строить.)<br>• Версия по тематическому каркасу, без одного человека: поставить «Всё потеряно» как смерть самой аналоговой эпохи. Похороны оттиска, отлитого вручную: гипсовые модели убирают в коробки, тёмный стол, тишина уходящего ремесла. Подать как настоящую утрату, а не шутку, чтобы цифровому настоящему было о чём горевать прежде, чем оно заслужит маховик. Возможно, самый чистый вариант бита для корпоративного фильма, если хотим, чтобы низшая точка принадлежала всей отрасли, а не одному герою."}},
  {nm:{en:"Dark Night of the Soul",ru:"Тёмная ночь души"}, pos:79, a:75, b:85, pct:"75–85%", t:{en:"75–85 min",ru:"75–85 мин"},
   desc:{en:"The hero wallows in hopelessness before finding the answer — the darkness just before the dawn.",ru:"Герой тонет в безнадёжности, прежде чем найти ответ — темнота перед рассветом."},
   idea:{en:"• The old-school dentist (Hero #2) as the field-wide Dark Night. We sit with him at the end of a long day, mixing alginate, pulling a physical impression that makes the patient gag, knowing the case will take weeks and may come back wrong. This is the hopelessness of the old way — slow, costly, shutting patients out. His quiet admission that he is not sure how much longer he can keep doing it this way is the darkness; the dawn belongs to the next beat, when the digital path arrives.<br>• Maybe an affordability low point through Jim Lam — the Guiding Leaders alum with two mills serving a lower-income community (possibly, pending what the ~4 months of footage shows). The Dark Night here is a patient who almost walks away because the crown costs too much, and a dentist staring at the math of serving people who cannot pay specialist prices. The despair is the gap between what the patient needs and what they can afford; the answer that ends the night is the mill in the back room driving that cost down to where the patient says yes.<br>• Dr. Abdul Alas (Hero #1) carrying the narrative dentist line into his own doubt. Possibly stage the Dark Night as a mentoring moment turned heavy — an intern doing it the slow analog way, a remake, a frustrated late night where Alas questions whether good, affordable dentistry can scale at all. His near-giving-up beat is the human low; the dawn is him choosing to teach the better way rather than abandon the problem.",ru:"• Дантист старой школы (Герой №2) как тёмная ночь всей отрасли. Мы сидим с ним в конце долгого дня: он мешает альгинат, снимает физический слепок, от которого пациента подташнивает, и знает, что работа займёт недели и может вернуться с ошибкой. Это безнадёжность старого способа — медленного, дорогого, закрывающего двери перед пациентами. Его тихое признание, что он не уверен, сколько ещё сможет так работать, и есть тьма; рассвет отдан следующему биту, когда приходит цифровой путь.<br>• Возможно, нижняя точка про доступность через Джима Лама — выпускника Guiding Leaders с двумя фрезерами, обслуживающего небогатую общину (возможно, в зависимости от того, что покажут ~4 месяца съёмок). Тёмная ночь здесь — пациент, который едва не уходит, потому что коронка слишком дорогая, и дантист, глядящий на арифметику обслуживания людей, которым не по карману цены специалистов. Отчаяние — в разрыве между тем, что пациенту нужно, и тем, что он может себе позволить; ответ, завершающий ночь, — фрезер в подсобке, сбивающий стоимость до уровня, на котором пациент говорит «да».<br>• Доктор Абдул Алас (Герой №1), ведущий нарративную линию дантиста в собственное сомнение. Возможно, поставить тёмную ночь как наставнический момент, ставший тяжёлым: интерн делает по медленному аналоговому пути, переделка, измотанный поздний вечер, где Алас сомневается, можно ли вообще масштабировать хорошую и доступную стоматологию. Его бит «почти сдался» — человеческое дно; рассвет — это его выбор учить лучшему способу, а не бросать проблему."}},
  {nm:{en:"Break into Three",ru:"Переход в 3-й акт"}, pos:85, pct:"85%", t:{en:"85 min",ru:"85 мин"},
   desc:{en:"Thanks to the B story and the theme, the hero finds the solution. Act Three begins; the A and B stories converge.",ru:"Благодаря линии B и теме герой находит решение. Начинается третий акт; линии A и B сходятся."},
   idea:{en:"• The dentist line delivers the turn. Hero #1 Dr. Abdul Alas, who mentors interns, voices the realization that has been building through the B story: the choice was never old-school craft versus cheap shortcuts — it is access. He decides to fully commit a workflow (digital scan to same-day restoration) not because it is new, but because it lets him say yes to a patient he would once have had to turn away on price. Shoot it as a quiet decision in his operatory, then cut hard to him telling an intern the same thing — the mentor passing the solution forward is the A and B stories converging.<br>• Rhyme the hero's decision with Jim's founding choice. Intercut Alas committing to the affordable path with Jim Glidewell, 1970, alone in a one-man ceramics lab, and his refusal to sell or go public — the same instinct to drive cost down so the work reaches more people. The theme (make the best dentistry affordable through innovation) lands as the bridge: the hero solves his problem by arriving at the principle Jim has lived. Use Jim's memory of starting with nothing as the emotional underline — the man written off finds the answer everyone smarter missed.<br>• Map to the 14-part frame at the analog-to-digital hinge turning toward flywheel. The before character (Hero #2, the old-school dentist still taking physical impressions) is the contrast that makes the turn legible: we leave the analog past behind here. Possibly (maybe) hand the literal Act Three trigger to a Guiding Leaders alum mid-arc — Jim Lam, two mills serving a lower-income community — as living proof the solution scales to the people who need it most, so the convergence is shown, not just stated.<br>• Optional B-story carrier: if Ellen Paulisick (built a brand-new practice fully on Glidewell) is the relationship that taught the hero the theme across the ~4-month shoot, let her be the voice the hero recalls at the moment of decision. Possibly (возможно) a short scene where her early gamble is reframed as the proof the hero needed — her faith becomes his solution, closing the B story as Act Three opens.",ru:"• Линия дантиста даёт перелом. Герой №1 доктор Абдул Алас, наставник интернов, проговаривает осознание, которое копилось через линию B: выбор был не между старым ремеслом и дешёвыми обходными путями — а в доступности. Он решает полностью перейти на цифровой процесс (скан и реставрация в тот же день) не потому, что это ново, а потому, что это позволяет сказать «да» пациенту, которому раньше пришлось бы отказать из-за цены. Снять как тихое решение в его кабинете, затем резкий монтаж на сцену, где он говорит то же самое интерну — наставник передаёт решение дальше, и линии A и B сходятся.<br>• Срифмовать решение героя с основополагающим выбором Джима. Перемонтировать переход Аласа на доступный путь с Джимом Глайдвеллом, 1970 год, один в маленькой керамической лаборатории, и его отказом продавать или выходить на биржу — тот же инстинкт снижать стоимость, чтобы работа дошла до большего числа людей. Тема (сделать лучшую стоматологию доступной через инновации) звучит как мост: герой решает свою проблему, придя к принципу, которым Джим жил. Использовать память Джима о старте с нуля как эмоциональное подчёркивание — человек, которого списали, находит ответ, который умники упустили.<br>• Привязать к 14-частной раме на стыке «аналог — цифра», поворачивающем к маховику. Персонаж «до» (Герой №2, дантист старой школы, всё ещё снимающий физические слепки) — контраст, делающий перелом читаемым: здесь мы оставляем аналоговое прошлое позади. Возможно, отдать буквальный триггер третьего акта выпускнику Guiding Leaders в середине арки — Джиму Ламу, две фрезы, обслуживает район с низкими доходами — как живое доказательство, что решение масштабируется на тех, кому оно нужнее всего, чтобы схождение было показано, а не заявлено.<br>• Опциональный носитель линии B: если Эллен Полисик (построила новую практику полностью на Glidewell) — те отношения, что научили героя теме за ~4 месяца съёмок, пусть её голос герой вспоминает в момент решения. Возможно, короткая сцена, где её ранний риск переосмыслен как доказательство, нужное герою — её вера становится его решением, закрывая линию B в момент начала третьего акта."}},
  {nm:{en:"Finale",ru:"Финал"}, pos:89, a:85, b:99, pct:"85–99%", t:{en:"85–99 min",ru:"85–99 мин"},
   desc:{en:"The hero applies the lesson and acts; the world is set right and the change is proven — the new way wins.",ru:"Герой применяет урок и действует; мир выправляется, изменение доказано — новый путь побеждает."},
   idea:{en:"• Idea A — Dr. Alas closes the loop (the new way wins, proven on the dentist line). Finale lands on Hero #1, Dr. Abdul Alas, in his own practice: he sits chairside with an intern he has mentored and, in a single same-day visit, scans, designs and seats a restoration while the patient waits — the exact procedure that once meant weeks, impressions and a second appointment. Intercut the old-school dentist (Hero #2) we met taking a physical impression at the start; the contrast is the proof. Alas hands the intern the next case and steps back — the lesson is no longer his to hold, it propagates. Close on the patient seeing the result in the mirror: access made literal, one smile at a time.\n\n• Idea B — The flywheel turns to the next generation (theme 13). Map the Finale onto the “молодые интерны, кто двинет индустрию завтра” theme using a Guiding Leaders alumnus we have followed ~4 months. Strongest candidate: Jim Lam (TX, two mills, serves a lower-income community) — the Finale shows him doing for his patients exactly what Jim Glidewell did for the industry: driving cost down so care reaches people who were priced out. Possibly cross-cut with Ellen Paulisick’s brand-new practice built fully on Glidewell as the “started from zero and it works” proof. The hero applies the lesson (affordability through innovation) and the world is set right in a community that previously went without.\n\n• Idea C — Jim’s origin rhyme pays off (personal film). Hold the macro-arc against the micro-arc: the man who started with no advantages, raised himself on a Kentucky farm, came back from the Navy and built a one-man 1970 ceramics lab into the world’s largest dental lab — by refusing to sell, refusing to go public, and driving cost down. Finale states the lesson plainly in his own voice: he never invented the technology, he brought the best dentistry within reach. Possibly close on the “часы / watch” artifact he sets on the table and a quiet handoff toward sons Jimmy and William — the bet is proven and it will outlive him.\n\n• Idea D — Split-screen finale that fuses both films. Run the two films’ endings as one beat: left frame, Jim — from nothing to the largest lab in the world; right frame, a young dentist (Alas’s intern, or a Guiding Leaders alum) seating their first single-visit crown. The shared line is access. End on the open question the thesis demands — “how many smiles have not lit up yet?” — so the change is proven but the work is not finished (constant change). Possibly title-card the through-thesis: make the best dentistry affordable, for the sake of smiles.",ru:"• Идея A — доктор Алас замыкает петлю (новый способ побеждает, доказано на линии дантиста). Финал — на Герое №1, докторе Абдуле Аласе, в его собственной практике: он сидит у кресла с интерном, которого менторит, и за один визит того же дня сканирует, проектирует и сажает реставрацию, пока пациент ждёт — ровно та процедура, что раньше означала недели, слепки и второй приём. Перебивка на дантиста старой школы (Герой №2), которого мы видели в начале со слепочной массой; контраст и есть доказательство. Алас отдаёт интерну следующий случай и отступает — урок больше не держится на нём, он распространяется. Закрываемся на пациенте, видящем результат в зеркале: доступность буквально, по одной улыбке за раз.\n\n• Идея B — маховик передаётся следующему поколению (тема 13). Кладём Финал на тему «молодые интерны, кто двинет индустрию завтра» через выпускника Guiding Leaders, за которым мы следили ~4 месяца. Сильнейший кандидат — Jim Lam (TX, два фрезера, обслуживает менее обеспеченное сообщество): Финал показывает, как он делает для своих пациентов ровно то, что Джим Глайдвелл сделал для индустрии — снижает цену, и помощь доходит до тех, для кого она была недоступна. Возможно, перекрёстная склейка с практикой Ellen Paulisick, построенной с нуля полностью на Glidewell — как доказательство «начали с нуля, и это работает». Герой применяет урок (доступность через инновации), и мир выправляется в сообществе, которое раньше оставалось без помощи.\n\n• Идея C — окупается рифма истоков Джима (личный фильм). Держим макро-арку против микро-арки: человек, начавший без всяких преимуществ, вырастивший себя сам на ферме в Кентукки, вернувшийся из ВМС и превративший одноместную керамическую лабораторию 1970 года в крупнейшую зуботехническую лабораторию мира — отказавшись продавать, отказавшись от IPO и снижая цену. Финал произносит урок прямо, его собственным голосом: он не изобрёл технологию — он сделал лучшую стоматологию доступной. Возможно, закрытие на артефакте «часы», который он кладёт на стол, и тихая передача в сторону сыновей Джимми и Уильяма — ставка доказана и переживёт его.\n\n• Идея D — финал в сплит-скрине, сплавляющий оба фильма. Прогоняем концовки двух фильмов как один бит: слева Джим — от нуля до крупнейшей лаборатории мира; справа молодой дантист (интерн Аласа или выпускник Guiding Leaders), сажающий свою первую коронку за один визит. Общая линия — доступность. Заканчиваем на открытом вопросе, которого требует тезис — «сколько улыбок ещё НЕ засияло?» — так что перемена доказана, но работа не закончена (constant change). Возможно, титром вынести сквозной тезис: сделать лучшую стоматологию доступной, ради улыбок."}},

   idea:{en:"• Mirror the old-school dentist (Hero #2) — if the Opening Image was his hands pressing a tray of physical impression goop into a patient's mouth, the Final Image is the same chair, same dentist, now holding a digital scanner wand: a clean wave of light over the teeth, the goo gone, the lab miles away yet instant. Same room, same hands, opposite world. (Speculative: whether he actually adopts digital in the shoot window — flag as возможно; if he never converts, hold the mirror instead on an intern who replaces him.)<br>• Close on the dentist line, Dr. Abdul Alas (Hero #1) — if we opened on him as a learner, end on him as the teacher: an intern he mentored now seating a Glidewell restoration solo while Abdul watches from the doorway. The 'access' throughline lands as generational handoff — the knowledge, not just the crown, is passed down. Maps to the 14-part frame's 'next generation' panel.<br>• Rhyme Jim's origin with the present — if the Opening Image referenced 1970 (one man, a single bench, a one-man ceramics lab), the Final Image is a slow lift over the floor of the world's largest dental lab today: thousands of units moving, mills running, the same restoration that once took weeks now leaving overnight. Hold a beat on one empty bench on that floor to echo the man who started alone. (Confirmed facts only: 1970 one-man lab, refused to sell/go public, drove cost down to scale.)<br>• Affordability made human via Jim Lam — if we opened on a patient who could not afford care, close in Jim Lam's practice (two mills, lower-income community): a working-class patient sees their finished crown in a hand mirror and smiles. Final Image is that smile — the abstract thesis ('best dentistry made affordable') collapsed into one face. Pair with a Jim Glidewell memory beat (raised on a Kentucky farm, started with nothing) so the founder's origin rhyme underwrites why the smile is the whole point: dentistry for the kid he once was.",ru:"• Зеркало к старому дантисту (Герой №2) — если в Стартовом образе были его руки, вдавливающие ложку со слепочной массой в рот пациента, то Финальный образ — то же кресло, тот же врач, но теперь в руке цифровой сканер: чистая волна света по зубам, массы нет, лаборатория за много миль, но результат мгновенный. Та же комната, те же руки, противоположный мир. (Спекулятивно: успеет ли он реально перейти на цифру в окне съёмок — пометить «возможно»; если он так и не перейдёт, держать зеркало на интерне, который его сменяет.)<br>• Замкнуть линию дантиста на Др. Абдуле Аласе (Герой №1) — если открывали им как учеником, закончить им как учителем: интерн, которого он наставлял, теперь сам сажает реставрацию Glidewell, а Абдул смотрит из дверного проёма. Сквозная тема «доступа» приходит как передача поколению — передаётся знание, а не только коронка. Ложится на панель «следующее поколение» из 14-частной рамки.<br>• Срифмовать исток Джима с настоящим — если Стартовый образ отсылал к 1970-му (один человек, один верстак, лаборатория керамики на одного), Финальный образ — медленный подъём камеры над цехом крупнейшей в мире зуботехнической лаборатории сегодня: тысячи единиц в движении, работающие фрезеры, та реставрация, что когда-то занимала недели, уходит за ночь. Задержаться на одном пустом верстаке в цеху — эхо человека, начавшего в одиночку. (Только подтверждённые факты: лаборатория-одиночка 1970, отказ продавать и выходить на биржу, снижение себестоимости ради масштаба.)<br>• Доступность через человека — Джим Лэм — если открывали пациентом, который не мог позволить себе лечение, закончить в практике Джима Лэма (два фрезера, район с низким доходом): пациент из рабочей семьи видит готовую коронку в ручном зеркальце и улыбается. Финальный образ — эта улыбка: абстрактный тезис («лучшая стоматология, ставшая доступной») сжат в одно лицо. Сопроводить памятным битом Джима Глайдвелла (рос на ферме в Кентукки, начинал с нуля), чтобы рифма истоков основателя объясняла, почему именно эта улыбка — суть всего: стоматология для того мальчишки, каким он был сам."}}
