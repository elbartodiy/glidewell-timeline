 early rather than odd. (To-confirm: current cumulative units delivered — company materials cite 400,000-plus.)<br><br><b>Who can speak to it.</b> Phil Venard, for how R&D decided to chase a category nobody expected a lab to enter, and what it took to make it cheap and easy enough for a general dentist. Neil Park, for the clinical education angle — teaching dentists to see themselves as part of sleep and prevention. Jim, for the founder's instinct: why bother with snoring at all, and how he thinks about building categories versus products.<br><br><b>Verify before screen.</b> Confirm exact launch month (1996 is solid; August is likely). Confirm the cumulative-units figure before quoting it on screen. Frame carefully per the honesty guardrail: Glidewell brought an affordable, dentist-friendly sleep appliance to market — do not imply it invented mandibular advancement therapy, which predates this product.",ru:"<b>Что произошло.</b> В 1996 году Glidewell выпустил каппу Silent Nite — индивидуальное ротовое устройство, устанавливаемое стоматологом, которое мягко выдвигает нижнюю челюсть вперёд, удерживая дыхательные пути открытыми во сне и снижая храп и лёгкое обструктивное апноэ. Его специально сделали удобным, регулируемым и достаточно недорогим, чтобы установить мог любой врач общей практики, а не только специалист по сну. Это второстепенная, но показательная связующая веха: не громкая история про коронку или имплант, а момент, когда лаборатория шагнула в совершенно новую категорию помощи. (Год выпуска — 1996, подтверждён источниками Glidewell; к уточнению: точный месяц — блог компании указывает на август 1996.)<br><br><b>Почему это важно — стоматология за пределами ремонта.</b> Все прежние продукты Glidewell чинили уже сломанное: стёртый зуб, отсутствующий зуб, неудавшуюся реставрацию. Silent Nite — другое: он не даёт проблеме начаться. Это профилактика, а не ремонт. Это тихий, но реальный сдвиг в том, чем лаборатория себя считает: не только восстановление зубов, но защита сна, дыхания и здоровья в целом. Для фильма, где сквозная тема — доступность, это доступность, расширенная на проблему, с которой большинство пациентов даже не думали идти к стоматологу.<br><br><b>Связь со следующим поколением.</b> Silent Nite доказал, что лаборатория способна построить целую продуктовую категорию с нуля — найти материалы, спроектировать механизм, обучить врачей, свести экономику — а не просто изготовить ещё одну коронку. Этот инстинкт «строить категории» — зерно всего современного: та же мышца, что выпустила противохраповую каппу в 1996-м, позже выпустила имплант-системы, фрезеруемые материалы и полные цифровые рабочие потоки. Это маховик, который учится крутиться в любом направлении.<br><br><b>Современное эхо.</b> Устройство живёт как Silent Nite 3D — теперь проектируется и производится цифровым способом; та же идея, перенесённая из аналоговых слепков в нынешнее «отсканируй и напечатай». Сейчас, когда нарушения дыхания во сне стали массовой темой здоровья, ставка 1996 года выглядит ранней, а не странной. (К уточнению: текущее суммарное число поставленных устройств — материалы компании называют более 400 000.)<br><br><b>Кто может об этом рассказать.</b> Фил Венард — как R&D решился гнаться за категорией, которой от лаборатории никто не ждал, и чего стоило сделать её дешёвой и простой для рядового стоматолога. Нил Парк — клинико-образовательный ракурс: как научить врачей видеть себя частью сна и профилактики. Джим — инстинкт основателя: зачем вообще браться за храп и как он думает о построении категорий, а не продуктов.<br><br><b>Проверить до съёмки.</b> Уточнить точный месяц запуска (1996 — надёжно; август — вероятно). Подтвердить цифру по суммарному числу устройств до того, как ставить её в кадр. Формулировать аккуратно по правилу честности: Glidewell вывел на рынок доступную, удобную для стоматолога каппу для сна — нельзя намекать, что он изобрёл саму терапию выдвижения челюсти, которая существовала и до этого продукта."}},
  {y:"1998", tr:"g", j:["ce"], tier:2, sc:[10,13],
    t:{en:"Chairside Perspectives",ru:"Chairside Perspectives"},
    d:{en:"The Chairside Perspectives newsletter begins — the seed of the Chairside magazine and Glidewell's teaching voice.",ru:"Стартует бюллетень Chairside Perspectives — зерно будущего журнала Chairside и обучающего голоса Glidewell."},
    th:{en:"Teaching becomes a channel — reach turns into trust.",ru:"Обучение становится каналом — охват превращается в доверие."},
    full:{en:"<b>What happened.</b> In August 1998 Glidewell began mailing a modest clinical newsletter to its dentist customers — “Chairside Perspectives” (exact title spelling and launch month to-confirm). It was short, practical, and unglamorous: proven tips and techniques shared by the lab's own on-staff clinicians, the dentists who practiced inside what was becoming the nation's largest dental laboratory. It ran in this newsletter form for roughly eight years before outgrowing the format.<br><br><b>Why it matters (a seed, not the harvest).</b> Be honest about scale: this is a connective beat, not a headline event. A few mailed pages did not move the industry in 1998. What matters is what it seeded — the founding instinct that Glidewell should not only make restorations but teach the dentist how to use them. That instinct is the through-line from the 1980 “education as a bond” beat to everything that follows. Reach, even small reach, was being converted into trust.<br><br><b>The link to the next generation.</b> The newsletter was the chrysalis. By early 2006 the short format could no longer hold the volume and detail Jim wanted to share, and it became “Chairside” magazine — Glidewell's first full-length, magazine-quality clinical publication, later the platform Neil Park edits and extends into Chairside Live. The 1998 leaflet is where that voice first learned to speak directly to a chair-side clinician.<br><br><b>Modern echo.</b> Today the same logic runs on video, webinars, and on-demand CE: teaching is a channel, and the channel builds the relationship that sells the product. One concrete way to fit this to our film — bridge Part 10 (the flywheel) and Part 13 (philosophy): show 1998 as the first turn of a teaching-to-trust flywheel — Glidewell teaches a technique, the dentist succeeds with it, the dentist returns, and that loop, not advertising, is how the best dentistry is made affordable at scale. Teaching becomes a channel; reach becomes trust; trust is the engine of access.<br><br><b>Who can speak to it.</b> Neil Park, as editor-in-chief of Chairside and host of Chairside Live, is the natural narrator of the publishing arc and can trace the editorial DNA from newsletter to magazine to live show. Phil Venard (40+ years, retired) can place 1998 in lived context — what dentists actually received in the mail and why a lab teaching its customers felt novel. Jim can speak to the original intent: why he wanted his clinicians, not marketers, doing the teaching.<br><br><b>Verify before screen.</b> Confirm the exact title (“Chairside Perspective” vs. “Chairside Perspectives”) and the precise launch date (August 1998 per public sources) from an original masthead or archived issue. Confirm the eight-year run and the early-2006 transition to Chairside magazine. Source a scan of an actual 1998 issue for B-roll, and verify who the on-staff clinical authors were at launch. Treat any claim that this was the “first” lab newsletter of its kind as unverified.<br><br><b>CE channels today (Eldon #46).</b> “CE” = Continuing Education — the ongoing courses and credits dentists take across their careers. Glidewell's channels, roughly by reach: <b>live courses</b> (the Symposium is the flagship); the <b>Online Study Club</b> (a weekly webinar — live for CE credit, or on-demand later); <b>online CE courses</b>; <b>Glidewell TV</b>; <b>Chairside magazine</b>; and <b>YouTube</b>. Use this whole spread when the film talks education — don't let Guiding Leaders stand in for all of it.",ru:"<b>Что произошло.</b> В августе 1998 года Glidewell начал рассылать дантистам-клиентам скромный клинический бюллетень — «Chairside Perspectives» (точное написание названия и месяц запуска — на подтверждение). Он был коротким, практичным и нарочито непарадным: проверенные приёмы и техники от собственных штатных клиницистов лаборатории — дантистов, практиковавших внутри будущей крупнейшей зуботехнической лаборатории страны. В формате бюллетеня он выходил около восьми лет, прежде чем перерос формат.<br><br><b>Почему это важно (это семя, а не урожай).</b> Будем честны о масштабе: это связующая веха, а не громкое событие. Несколько страниц по почте не сдвинули индустрию в 1998-м. Важно то, что отсюда выросло — изначальный инстинкт: Glidewell должен не только делать реставрации, но и учить дантиста ими пользоваться. Этот инстинкт — сквозная линия от вехи 1980 года («образование как связь») ко всему дальнейшему. Охват, пусть и малый, превращался в доверие.<br><br><b>Связь со следующим поколением.</b> Бюллетень был коконом. К началу 2006 года короткий формат уже не вмещал объём и детализацию, которыми хотел делиться Джим, и он стал журналом «Chairside» — первым полноформатным клиническим изданием Glidewell, позднее той площадкой, которую редактирует и развивает Нил Парк, вплоть до Chairside Live. Листовка 1998 года — то место, где этот голос впервые научился обращаться напрямую к клиницисту у кресла.<br><br><b>Современное эхо.</b> Сегодня та же логика работает на видео, вебинарах и CE по запросу: обучение — это канал, а канал строит отношения, которые продают продукт. Один конкретный ход для нашего фильма — связать Часть 10 (маховик) и Часть 13 (философия): показать 1998 год как первый оборот маховика «обучение → доверие» — Glidewell учит технике, дантист добивается успеха, дантист возвращается, и эта петля, а не реклама, делает лучшую стоматологию доступной в масштабе. Обучение становится каналом; охват становится доверием; доверие — двигатель доступа.<br><br><b>Кто может об этом рассказать.</b> Нил Парк как главный редактор Chairside и ведущий Chairside Live — естественный рассказчик издательской арки; он проследит редакционную ДНК от бюллетеня к журналу и к живому шоу. Фил Венард (40+ лет, на пенсии) поместит 1998 год в живой контекст — что именно дантисты получали по почте и почему лаборатория, обучающая своих клиентов, казалась чем-то новым. Джим расскажет об изначальном замысле: почему обучать должны были его клиницисты, а не маркетологи.<br><br><b>Проверить до эфира.</b> Подтвердить точное название («Chairside Perspective» или «Chairside Perspectives») и точную дату запуска (по открытым источникам — август 1998) по оригинальному выпуску или архивному скану. Подтвердить восьмилетний срок выхода и переход к журналу Chairside в начале 2006 года. Найти скан реального выпуска 1998 года для B-roll и проверить, кто были штатные клинические авторы на старте. Утверждение, что это был «первый» подобный лабораторный бюллетень, считать неподтверждённым.<br><br><b>Каналы CE сегодня (Eldon #46).</b> «CE» = Continuing Education — продолженное образование, курсы и кредиты, которые дантисты проходят по жизни. Каналы Glidewell, примерно по охвату: <b>живые курсы</b> (флагман — Symposium); <b>Online Study Club</b> (еженедельный вебинар — live за кредиты или запись потом); <b>онлайн-CE-курсы</b>; <b>Glidewell TV</b>; журнал <b>Chairside</b>; <b>YouTube</b>. Использовать весь этот спектр, когда фильм говорит об образовании — не давать Guiding Leaders подменять его собой."}},
  {y:"1999", tr:"m", j:["restorative"],
    t:{en:"In-Ceram Zirconia",ru:"In-Ceram Zirconia"},
    d:{en:"In-Ceram Zirconia material arrives — zirconia enters the lab a full decade before BruxZir.",ru:"Появляется материал In-Ceram Zirconia — цирконий входит в лабораторию за целое десятилетие до BruxZir."},
    th:{en:"The zirconia story starts quietly, long before the revolution.",ru:"История циркония начинается тихо, задолго до революции."}},
  {y:"~2000", tr:"g", star:{en:"R&D",ru:"R&D"}, j:["restorative","digital","ce"], tier:1, sc:[8,9,10],
    t:{en:"R&D is born",ru:"Рождение R&D"},
    d:{en:"Burned by depending on an outside material (Artglass), and inspired by Dr. Rella Christensen's idea of a “Volkscrown” everyone could afford, Jim builds Glidewell's own Research & Development — the engine behind BruxZir and everything after.",ru:"Обжёгшись на зависимости от чужого материала (Artglass) и загоревшись идеей д-ра Реллы Кристенсен о «Volkscrown» — коронке, доступной каждому, — Джим строит собственный R&D Glidewell: двигатель будущего BruxZir и всего, что за ним."},
    th:{en:"Own the science, so you can own the quality and the price.",ru:"Владей наукой — чтобы владеть качеством и ценой."},
    full:{en:"<b>What happened.</b> Around the turn of the 2000s Glidewell stopped relying on outside vendors for its key materials and began building its own Research &amp; Development. Two moments pushed Jim there. First, a bad experience betting on an outside material — Artglass, a lab veneering composite — taught him that if you don't own the material, you don't own your quality or your future. Second, a conversation with independent researcher Dr. Rella Christensen about a “Volkscrown” — a people's crown, affordable to everyone, that performed like cast gold. Together they pointed at one conclusion: to make the best dentistry affordable <i>and</i> dependable, Glidewell needed its own science.<br><br><b>Why it matters — the engine room.</b> This belongs early in the story, before BruxZir, not after. Every later breakthrough — the CAD build-out (~2000), BruxZir (2009), the automated factory (2019), AI-driven design — grows out of this one decision to build in-house R&D. It is the structural reason the company can keep making the best affordable: it controls the materials and the process end to end. By ~2000 Glidewell had already developed dozens of materials and lab services and was expanding the R&D team that today numbers 150+ people, including a dozen-plus PhDs.<br><br><b>Who can speak to it (arrows).</b> Jim Glidewell — the “why” and the bet. Dr. Rella Christensen — the Volkscrown conversation, and an independent voice. Wolfgang Friebauer and today's R&D team — how the science is actually built. Robin Carden — the technical lead who, years later, turned this R&D into BruxZir (now external to the company).<br><br><b>Verify before screen.</b> The Artglass story is insider knowledge — CONFIRM with Eldon Thompson (not found in public sources). Pin the real founding / turning-point year of the R&D department: public history says the team had already grown by ~2000, but the exact start year is to-confirm (likely late 1990s — NOT 1980). Confirm the wording and timing of the Rella Christensen “Volkscrown” conversation. Keep the framing precise: Glidewell built the <i>ability to make the best affordable</i> — it did not invent zirconia.<br><br><b>Sources.</b> Glidewell company history (R&D grown by ~2000; 150+ R&D, 12+ PhDs); BruxZir / Rella Christensen “Volks crown” materials. Artglass anecdote: to confirm internally with Eldon.",ru:"<b>Что произошло.</b> На рубеже 2000-х Glidewell перестал полагаться на внешних поставщиков ключевых материалов и начал строить собственный R&D. К этому Джима подтолкнули два момента. Первый — неудачная ставка на чужой материал Artglass (лабораторный облицовочный композит): если материал не твой — не твои ни качество, ни будущее. Второй — разговор с независимым исследователем д-ром Реллой Кристенсен про «Volkscrown»: «народную коронку», доступную каждому, но прочную, как литое золото. Вместе это вело к одному выводу: чтобы делать лучшее доступным <i>и</i> надёжным, Glidewell нужна своя наука.<br><br><b>Почему это важно — машинное отделение.</b> Это место в истории — рано, до BruxZir, а не после. Каждый последующий прорыв — цифровая стройка (~2000), BruxZir (2009), автоматизированная фабрика (2019), ИИ-дизайн — вырастает из этого решения построить собственный R&D. Это структурная причина, почему компания может и дальше делать лучшее доступным: она контролирует материалы и процесс от начала до конца. К ~2000 Glidewell уже разработал десятки материалов и услуг и расширял R&D-команду, в которой сегодня 150+ человек, включая дюжину с лишним PhD.<br><br><b>Кто может рассказать (стрелки).</b> Джим Глайдвелл — «зачем» и ставка. Д-р Релла Кристенсен — разговор о Volkscrown и независимый голос. Вольфганг Фрибауэр и нынешняя R&D-команда — как реально строится наука. Робин Карден — технический лидер, который годы спустя превратил этот R&D в BruxZir (сейчас вне компании).<br><br><b>Проверить до экрана.</b> История с Artglass — инсайдерское знание, СВЕРИТЬ с Элдоном Томпсоном (в открытых источниках не найдено). Закрепить реальный год основания / точку отсчёта R&D-департамента: по истории компании команда уже выросла к ~2000, но точный год старта — на подтверждение (вероятно конец 1990-х, НЕ 1980). Подтвердить формулировку и тайминг разговора с Реллой Кристенсен про «Volkscrown». Держать формулировку точной: Glidewell построил <i>способность делать лучшее доступным</i> — он не изобретал цирконий.<br><br><b>Источники.</b> История компании Glidewell (R&D вырос к ~2000; 150+ в R&D, 12+ PhD); материалы BruxZir / «Volks crown» Реллы Кристенсен. Анекдот про Artglass — сверить внутри с Элдоном."}},
  {y:"~2000", tr:"i", j:["digital","restorative"],
    t:{en:"CAD revolution",ru:"CAD-революция"},
    d:{en:"Dental labs go digital: scanning, on-screen design and milling start to replace hand-built copings. Glidewell adopts it early — chasing zirconia at a PFM price.",ru:"Лаборатории переходят на цифру: сканирование, дизайн на экране и фрезеровка начинают вытеснять колпачки, сделанные руками. Glidewell подхватывает рано — с целью «цирконий по цене PFM»."},
    th:{en:"Craft gives way to design and the mill — the seed of BruxZir.",ru:"Ремесло уступает дизайну и фрезеру — зерно будущего BruxZir."},
    full:{en:"<b>What happened.</b> Through the late 1990s and early 2000s the dental laboratory went digital. Instead of building a crown's substructure (coping) by hand, technicians began scanning the model, designing the coping on a computer, and milling it from a block. CAD/CAM moved from a niche into the mainstream of the lab.<br><br><b>Who actually pioneered it.</b> Not Glidewell. Nobel Biocare's Procera (mid-1990s) was the first CAD/CAM ceramic substructure; around 2001–2002 milled-zirconia frameworks arrived from others — 3M ESPE's Lava, Dentsply's Cercon, Nobel's Procera Forte. Those outside systems opened the door.<br><br><b>What Glidewell did.</b> As one of the largest labs, Glidewell adopted digital manufacturing early (working with the Cercon and Wol-Ceram systems around 2002), then built its own. Around 2004 it hired engineer Mervyn Rudgley (from 3D Systems) to lead digital manufacturing, with one explicit goal: <i>make a zirconia substructure at a PFM price.</i> In 2006 that became Prismatik CZ — Glidewell's own milling-plus-software system, paired with a 3Shape scanner. A clever trick (milling thin copings from a softer, bisque-fired block and sintering afterward) let them skip costly diamond tooling and push cost down.<br><br><b>Why it matters to the film.</b> This is the hinge between the analog craft of Part 1 and the monolithic-zirconia revolution of 2009. It is the moment the machine first enters Glidewell's bench — and, true to the thesis, the angle from day one was not 'newest technology' but 'best technology at an affordable price.' Without this quiet early-2000s digital build-out, BruxZir (2009) and the automated factory (2019) would not have been possible.<br><br><b>Who can speak to it.</b> Phil Venard (R&D — lived the analog→digital turn inside the lab); Mike DiTolla (joined ~2001, watched it from clinical education); later David Leeson and Wolfgang Friebauer on how this seeded materials and automation.<br><br><b>Verify before screen.</b> The ~2002 digital start, the Rudgley hire (~2004), the 2006 Prismatik CZ launch and the 'zirconia at a PFM price' quote come from a 2007 Chairside-era account — confirm exact dates and wording with the company. Keep Procera / Lava / Cercon framed as the outside pioneers (Glidewell adopted and made affordable, did not invent).<br><br><b>Sources.</b> Compendium, 'A History of Dental Ceramics'; Oral Health Group, zirconia marketplace history; Design Technology Gizmo (2007) on Glidewell / Prismatik CZ and Mervyn Rudgley; Glidewell / Prismatik Dentalcraft materials.",ru:"<b>Что произошло.</b> В конце 1990-х — начале 2000-х зуботехническая лаборатория перешла на цифру. Вместо того чтобы строить каркас коронки (колпачок) вручную, техники стали сканировать модель, проектировать колпачок на компьютере и фрезеровать его из блока. CAD/CAM из ниши перешёл в мейнстрим лаборатории.<br><br><b>Кто это на самом деле создал.</b> Не Glidewell. Procera от Nobel Biocare (середина 1990-х) — первый CAD/CAM-каркас из керамики; около 2001–2002 фрезерованные циркониевые каркасы пришли от других — Lava (3M ESPE), Cercon (Dentsply), Procera Forte (Nobel). Именно эти внешние системы открыли дверь.<br><br><b>Что сделал Glidewell.</b> Как одна из крупнейших лабораторий, Glidewell рано взял цифровое производство (работа с системами Cercon и Wol-Ceram около 2002), а затем построил своё. Около 2004 наняли инженера Мервина Раджли (Mervyn Rudgley, из 3D Systems) возглавить цифровое производство с одной явной целью: <i>сделать циркониевый каркас по цене PFM.</i> В 2006 это стало Prismatik CZ — собственная система Glidewell (фрезер + ПО) в паре со сканером 3Shape. Хитрый приём (фрезеровать тонкие колпачки из более мягкого, бисквитно-обожжённого блока и спекать потом) позволил обойтись без дорогого алмазного инструмента и снижать цену.<br><br><b>Почему это важно фильму.</b> Это шарнир между аналоговым ремеслом Части 1 и революцией монолитного циркония 2009 года. Это момент, когда машина впервые входит на верстак Glidewell — и, верно тезису, угол с самого начала был не «новейшая технология», а «лучшая технология по доступной цене». Без этой тихой цифровой стройки начала 2000-х не было бы ни BruxZir (2009), ни автоматизированной фабрики (2019).<br><br><b>Кто может рассказать.</b> Фил Венард (R&D — прожил переход аналог→цифра внутри лаборатории); Майк ДиТолла (пришёл ~2001, наблюдал со стороны клинического образования); позже Дэвид Лисон и Вольфганг Фрибауэр — как это дало старт материалам и автоматизации.<br><br><b>Проверить перед экраном.</b> Старт цифры (~2002), наём Раджли (~2004), запуск Prismatik CZ (2006) и цитата «цирконий по цене PFM» — из материала эпохи 2007 (Chairside); сверить точные даты и формулировки с компанией. Procera / Lava / Cercon оставлять как внешних пионеров (Glidewell адаптировал и удешевил, не изобрёл).<br><br><b>Источники.</b> Compendium, «A History of Dental Ceramics»; Oral Health Group, история рынка циркония; Design Technology Gizmo (2007) о Glidewell / Prismatik CZ и Mervyn Rudgley; материалы Glidewell / Prismatik Dentalcraft."}},
  {y:"2000", tr:"g", j:[],
    t:{en:"Plastic injection",ru:"Литьё пластика"},
    d:{en:"An in-house plastic-injection division starts making boxes, articulators and supplies — the vertical-integration playbook.",ru:"Своё подразделение литья пластика начинает делать коробки, артикуляторы и расходники — старт вертикальной интеграции."},
    th:{en:"Own the supply chain so you can own the price.",ru:"Владей цепочкой поставок, чтобы владеть ценой."}},
  {y:"2001", tr:"g", j:["digital","ce"],
    t:{en:"Web · clinical voice",ru:"Сайт · клинический голос"},
    d:{en:"The first Glidewell Laboratories website goes live; the brand gains its clinical-education voice on camera.",ru:"Запускается первый сайт Glidewell Laboratories; у бренда появляется клинико-образовательный голос в кадре."},
    th:{en:"The lab learns to publish — online and on camera.",ru:"Лаборатория учится публиковать — онлайн и в кадре."}},
  {y:"2009", tr:"g", star:{en:"Revolution",ru:"Революция"}, j:["restorative","ce"], tier:1, sc:[3,9,10],
    t:{en:"BruxZir",ru:"BruxZir"},
    d:{en:"The monolithic solid-zirconia crown goes mainstream — the #1 brand; the biggest cost-and-speed inflection.",ru:"Монолитная цельноциркониевая коронка становится массовой — бренд №1; крупнейший слом по цене и скорости."},
    th:{en:"Revolution: the best, made affordable — and the default.",ru:"Революция: лучшее — сделано доступным и стало стандартом."},
    full:{en:"<b>What happened.</b> In late 2009 Glidewell launched BruxZir — a full-contour, <i>monolithic</i> solid-zirconia crown milled as one solid piece, with no porcelain veneering layer to chip. Important honesty point: zirconia and CAD/CAM were already in dentistry (In-Ceram Zirconia ~1999; Lava, Cercon, Procera ~2001–02). Glidewell did <b>not</b> invent zirconia. What it did was take monolithic full-contour zirconia, drive it through its own high-volume lab, and offer it at a price and turnaround ordinary dentists could actually say yes to — then make it the default. The first pitch was blunt: “more brawn than beauty” — a tough, near-unbreakable crown for grinders, implant cases and tight-bite molars where metal-backed crowns (PFMs) or gold used to be the only safe answer.<br><br><b>Why it matters — the revolution.</b> This is the single biggest cost-and-speed inflection in the film, and the cleanest proof of the thesis: the best, made affordable — and made the <i>default</i>. A monolithic crown has no veneer to fracture, mills fast, and undercuts the PFM on price. The narrative nugget is the tell: the revolution went mainstream not through advertising but when dentists started phoning their <i>own</i> local labs and asking for “that BruxZir thing.” Demand pulled it in. Today BruxZir reportedly makes up the majority of Glidewell's fixed-crown volume and the brand counts tens of millions of units placed since 2009 (EXACT FIGURES TO CONFIRM — Glidewell cites 28M+ units and 70%+ of its fixed units). This is where “affordable access” stops being a slogan and becomes a crown in a real patient's mouth.<br><br><b>Who actually made it (the credit, honestly).</b> Three roles, not one — the “Jim vs Carden” question dissolves once you separate them. <b>Founder vision &amp; funding — Jim Glidewell:</b> no source, not even Glidewell's own, says he invented it at the bench; his own words credit “our R&D teams.” His real, substantial credit is the bet — investing in in-house milling and materials research so it could exist. <b>The technical creator — Robin (Robert) A. Carden,</b> VP of R&D: he led development and holds the process patent (US 9,434,651 B2, granted 2016) for the binder-free colloidal / slip-cast zirconia-blank method, and is the subject of the 2013 “I Made BruxZir” interview. <b>Clinical champion — Dr. Mike DiTolla:</b> drove dentist adoption (Chairside magazine, the on-camera “hammer test”) — an evangelist, not a materials inventor. One honest wrinkle: the earliest slip-cast filing (2007 priority) names Haksung Moon and was abandoned, so “one genius invented it” is too clean. Defensible on-screen line: “Developed by Glidewell's R&D team, led by Robin Carden, on founder Jim Glidewell's bet — launched 2009.” (Sources: Dental Products Report “I Made BruxZir,” 2013; Google Patents US9434651B2 / US8298329B2 / US2009-0115084 Moon.)<br><br><b>The link to the next generation.</b> Tie this straight into Part 3. Dr. Abdul Alas (Hero #1) is the working dentist who inherited a world where the strong, affordable crown is simply normal — he never had to fight the old cost-vs-strength trade-off. Stage him against the old-school dentist (Hero #2), who remembers ordering PFMs, waiting longer, paying more, and watching porcelain chip off. The generational handoff <i>is</i> the BruxZir story: yesterday's premium, hard call is today's default order.<br><br><b>Modern echo.</b> Carry it into Parts 9–10: the same crown that was “brawn over beauty” in 2009 evolved into BruxZir Esthetic and Anterior — more translucent, now trusted in the visible smile zone, not just back molars. The echo for the close: the affordable workhorse kept getting better until it could also be beautiful — innovation compounding, access never given back.<br><br><b>Who can speak to it.</b> Mike DiTolla led the BruxZir launch (~2006–2009) and is now independent — he reads as a <i>witness to the revolution</i>, not a salesman; make him the on-camera narrator of how it actually broke. Gordon and Rella Christensen are the independent proof: Rella's TRAC Research ran a 10+ year multi-brand monolithic-zirconia study, the strongest outside validation we have. Phil Venard (R&D) speaks to how the material and milling were made cheap and repeatable at scale. Jim Glidewell owns the “why” — make the best affordable. The cleanest screen device: the <b>before-vs-now crown trick</b> — put an old chipped PFM in one hand and a solid BruxZir in the other, on camera, and let a dentist explain the difference in three seconds.<br><br><b>Verify before screen.</b> CONFIRM all hard numbers before locking: the “100% survival, zero terminal fractures after 10+ years” claim (attributed to Rella Christensen / TRAC Research on the <i>original</i> BruxZir — verify exact study length, sample size and wording, and that it refers specifically to original full-strength BruxZir, not later esthetic formulations); the 28M+ units placed and 70%+ of fixed-unit volume figures (Glidewell's own numbers — attribute as such); the late-2009 launch date; and DiTolla's exact launch-lead dates (~2006–2009). Keep the framing precise: monolithic full-contour brought to market affordably and made default — never “invented zirconia.”<br><br><b>Sources.</b> Glidewell (BruxZir product/history pages, Chairside Magazine); Rella Christensen / TRAC Research interviews and the “BruxZir after 10 Years” feature; independent Gordon J. Christensen Clinicians Report. Treat all figures and the 100% claim as to-confirm against primary sources.<br><br><b>Materials note (Eldon #45) — Obsidian.</b> Obsidian (Glidewell's glass-ceramic) can be mentioned as part of the materials range, but keep it minor — it's nowhere near as popular or successful as BruxZir zirconia. Its main lab use now is PFM restorations (a tiny minority of cases); there's a chairside formula for fastmill.io, but far less used than BruxZir NOW. A brief nod, not a main beat.",ru:"<b>Что произошло.</b> В конце 2009-го Glidewell выпустил BruxZir — цельную, <i>монолитную</i> коронку из твёрдого циркония, фрезерованную из одного куска, без облицовочного слоя фарфора, которому нечего скалываться. Важная честная оговорка: цирконий и CAD/CAM уже были в стоматологии (In-Ceram Zirconia ~1999; Lava, Cercon, Procera ~2001–02). Glidewell <b>не изобретал</b> цирконий. Он взял монолитную полноконтурную коронку, прогнал её через собственную лабораторию большого объёма и предложил по цене и срокам, на которые обычный стоматолог мог реально согласиться, — и сделал её стандартом. Первый посыл был прямым: «больше силы, чем красоты» — прочная, почти неубиваемая коронка для тех, кто стискивает зубы, для имплантов и тесного прикуса, где раньше спасал только металлокерамический каркас (PFM) или золото.<br><br><b>Почему это важно — революция.</b> Это самый крупный перелом по цене и скорости во всём фильме и самое чистое доказательство тезиса: лучшее — сделать доступным и сделать <i>стандартом</i>. У монолитной коронки нет облицовки, которая трескается, фрезеруется она быстро и стоит дешевле PFM. Главный нерв сюжета: революция стала массовой не через рекламу, а когда стоматологи сами начали звонить в <i>свои</i> местные лаборатории и просить «вот ту штуку, BruxZir». Спрос потянул её сам. Сегодня BruxZir, по данным компании, составляет большую часть фиксированных коронок Glidewell, а счёт установленных единиц с 2009-го идёт на десятки миллионов (ТОЧНЫЕ ЦИФРЫ ПОДТВЕРДИТЬ — Glidewell называет 28 млн+ единиц и 70%+ своих фиксированных работ). Здесь «доступность» перестаёт быть лозунгом и становится коронкой во рту реального пациента.<br><br><b>Кто на самом деле это сделал (честно про авторство).</b> Не один человек, а три роли — и вопрос «Джим или Карден» снимается, как только их разделить. <b>Видение и финансирование — Джим Глайдвелл:</b> ни один источник, включая собственные материалы Glidewell, не говорит, что он изобрёл это за верстаком; его собственные слова отдают заслугу «нашим командам R&D». Его реальная и весомая заслуга — это ставка: вложения в собственную фрезеровку и материаловедение, чтобы продукт мог появиться. <b>Технический создатель — Робин (Роберт) А. Карден,</b> вице-президент по R&D: вёл разработку и держит патент на процесс (US 9,434,651 B2, выдан 2016) на метод безбиндерной коллоидной / шликерной отливки циркониевых заготовок; он же — герой интервью 2013 года «I Made BruxZir». <b>Клинический евангелист — д-р Майк ДиТолла:</b> двигал принятие врачами (журнал Chairside, «hammer test» в кадре) — пропагандист, а не изобретатель материала. Одна честная оговорка: самая ранняя заявка на шликерную отливку (приоритет 2007) названа на имя Haksung Moon и была заброшена — так что «изобрёл один гений» слишком гладко. Защитимая формулировка для экрана: «Разработано командой R&D Glidewell под руководством Робина Кардена, на ставку основателя Джима Глайдвелла — запуск в 2009». (Источники: Dental Products Report «I Made BruxZir», 2013; Google Patents US9434651B2 / US8298329B2 / заявка US2009-0115084 Moon.)<br><br><b>Связь со следующим поколением.</b> Вшить прямо в Часть 3. Доктор Абдул Алас (Герой №1) — практикующий стоматолог, унаследовавший мир, где прочная доступная коронка просто норма; ему не пришлось биться со старым компромиссом «цена против прочности». Поставить его против старой школы (Герой №2), который помнит, как заказывал PFM, дольше ждал, больше платил и смотрел, как скалывается фарфор. Передача поколений <i>и есть</i> история BruxZir: вчерашний дорогой и трудный выбор — сегодняшний заказ по умолчанию.<br><br><b>Современный отголосок.</b> Перенести в Части 9–10: та же коронка, что в 2009-м была «силой без красоты», выросла в BruxZir Esthetic и Anterior — прозрачнее, теперь ей доверяют и в видимой зоне улыбки, не только в жевательных. Отголосок для финала: доступная рабочая лошадка становилась всё лучше, пока не стала ещё и красивой, — инновация накапливается, доступ не отбирают назад.<br><br><b>Кто может об этом рассказать.</b> Майк ДиТолла вёл запуск BruxZir (~2006–2009) и сейчас независим — он читается как <i>свидетель революции</i>, а не продавец; сделать его закадровым рассказчиком того, как это реально прорвало. Гордон и Релла Кристенсен — независимое доказательство: исследование TRAC Research под руководством Реллы вело 10+ лет многомарочное наблюдение монолитного циркония, наша сильнейшая внешняя валидация. Фил Венард (R&D) расскажет, как материал и фрезеровку сделали дешёвыми и воспроизводимыми в масштабе. Джим Глайдвелл держит «зачем» — сделать лучшее доступным. Самый чистый экранный приём: <b>трюк «коронка до и сейчас»</b> — старая скол PFM в одной руке, цельный BruxZir в другой, на камеру, и стоматолог в три секунды объясняет разницу.<br><br><b>Проверить до экрана.</b> ПОДТВЕРДИТЬ все жёсткие цифры до фиксации: заявление «100% выживаемость, ноль терминальных переломов за 10+ лет» (приписывается Релле Кристенсен / TRAC Research по <i>оригинальному</i> BruxZir — уточнить длительность исследования, размер выборки и точную формулировку и то, что речь именно об оригинальном full-strength BruxZir, а не о поздних эстетических версиях); цифры 28 млн+ единиц и 70%+ фиксированного объёма (собственные данные Glidewell — так и атрибутировать); дату запуска — конец 2009-го; точные годы, когда ДиТолла вёл запуск (~2006–2009). Держать формулировку точной: монолитную полноконтурную коронку вывели на рынок доступно и сделали стандартом — никогда «изобрели цирконий».<br><br><b>Источники.</b> Glidewell (страницы о BruxZir и его истории, Chairside Magazine); интервью Реллы Кристенсен / TRAC Research и материал «BruxZir после 10 лет»; независимый Gordon J. Christensen Clinicians Report. Все цифры и заявление о 100% считать подлежащими подтверждению по первоисточникам.<br><br><b>Заметка по материалам (Eldon #45) — Obsidian.</b> Obsidian (стеклокерамику Glidewell) можно упомянуть как часть линейки, но держать второстепенно — он далеко не так популярен и успешен, как цирконий BruxZir. Основное лабораторное применение сейчас — PFM-реставрации (крошечная доля случаев); есть chairside-формула для fastmill.io, но куда менее востребована, чем BruxZir NOW. Короткое упоминание, не главный бит."}},
  {y:"2010s", tr:"i", j:["digital"],
    t:{en:"Scanners · scale",ru:"Сканеры · масштаб"},
    d:{en:"Intraoral scanners go mainstream; Glidewell becomes the world's largest lab.",ru:"Интраоральные сканеры становятся нормой; Glidewell — крупнейшая лаборатория мира."},
    th:{en:"Scale through vertical integration.",ru:"Масштаб через вертикальную интеграцию."},
    full:{en:"<b>Leadership note (Eldon #42) — don't over-sell scanners.</b> Intraoral scanners are now near-universal — roughly 70% of dentists have already switched — so scanning itself is <b>not</b> Glidewell's differentiator, and we shouldn't be heavy-handed about it. A quick, honest nod to how slow and error-prone physical impressions used to be is enough — it's still one of the few genuinely visual, emotional, recreatable “before” scenes we have, so keep it, just dial down its weight. Where Glidewell actually stands apart is downstream: <b>AI crown design, the automated BruxZir Factory, and chairside milling via fastmill.io.</b> Frame scanning as the on-ramp, not the story.",ru:"<b>Заметка руководства (Eldon #42) — не педалировать сканеры.</b> Интраоральные сканеры теперь почти везде — около 70% дантистов уже перешли, — поэтому само сканирование <b>не</b> дифференциатор Glidewell, и перегибать не стоит. Достаточно короткого честного кивка на то, какими медленными и ошибочными были физические слепки — это всё ещё одна из немногих по-настоящему наглядных, эмоциональных и воссоздаваемых сцен «до», так что оставляем, просто снижаем значимость. Настоящее отличие Glidewell — дальше по цепочке: <b>ИИ-дизайн коронки, автоматизированная BruxZir Factory и кресельная фрезеровка fastmill.io.</b> Сканирование — въезд, а не сама история."}},
  {y:"2015", tr:"g", j:["implants","restorative"], tier:2, sc:[10],
    t:{en:"Glidewell HT",ru:"Glidewell HT"},
    d:{en:"Glidewell's own implant, co-designed with Dr. Jack Hahn — premium quality at a fraction of the price.",ru:"Собственный имплант Glidewell, созданный с д-ром Джеком Ханом — премиум за долю цены."},
    th:{en:"The BruxZir move, applied to the most expensive tooth — premium, made affordable.",ru:"Ход BruxZir, применённый к самому дорогому зубу — премиум, сделанный доступным."},
    full:{en:"<b>Name:</b> shown by its current name, Glidewell HT; launched in 2015 as the Hahn Tapered Implant System and renamed ~2023–24.<br><br><b>Chronology.</b><br>• <b>1997</b> — Dr. Jack Hahn (creator of the NobelReplace implant) designs the original tapered implant; his own pre-history, not Glidewell's.<br>• <b>2000s–early 2010s</b> — Glidewell enters implants from the side, not with its own implant: the Inclusive line of FDA-cleared prosthetic components (abutments, screws, copings) compatible with most third-party systems, made in-house by Prismatik Dentalcraft. The point is vertical integration — cut the OEM markup, offer flat, predictable lab fees.<br>• <b>2014</b> — Hahn begins working with Glidewell's engineers and Jim Glidewell to design a new implant.<br>• <b>2015 — LAUNCH of the Hahn Tapered Implant System.</b> It becomes one of the fastest-growing implant systems in the US, adopted by thousands of dentists. Stated goal: a high-quality implant at a fraction of the price, finished with a BruxZir crown, under a lifetime warranty from implant to restoration.<br>• <b>2019</b> — the Inclusive component line expands to 22 major implant systems; clinical studies (2-year, then 6-year) show a 99.2% success rate and under 0.2 mm bone loss.<br>• <b>2020</b> — medical-grade titanium scan bodies bring implant restorations into the digital workflow.<br>• <b>~2023–24</b> — Hahn Tapered is renamed the Glidewell HT Implant System.<br>• <b>2024–25</b> — the Glidewell Tooth Replacement Solution (full digital bundle) and major 2025 upgrades (a 6.0 mm implant, new guided-surgery kits).<br><br><b>What it is today.</b><br>As a private company Glidewell publishes no product-level revenue split, so an exact share can't be cited. Qualitatively: it is one of Glidewell's core product lines and one of the fastest-growing implant systems in the US; Glidewell has restored hundreds of thousands of implant cases and makes both the implant and its components in-house through Prismatik Dentalcraft (ISO-certified, FDA-cleared), positioning implant dentistry as a standard of care across the economic spectrum. Any on-screen percentage must come from the company — no placeholder numbers.<br><br><b>The connections (why implants link to so much on the timeline).</b><br>• <b>BruxZir / restorative</b> — the implant is finished with the same BruxZir crown; one warranty from implant to restoration.<br>• <b>Vertical integration</b> — Prismatik makes the parts in-house, kills the markup, enables flat pricing; the same move as the 2000 plastic-injection beat.<br>• <b>Digital / glidewell.io</b> — scan bodies, guided surgery, digital treatment planning.<br>• <b>CE / education</b> — world-class education and symposia, the Misch lineage through Resnik, teaching GPs to place implants.<br>• <b>Jim personally</b> — Hahn and Jim Glidewell co-devised the system.<br>• <b>Accessibility</b> — the throughline: a fraction of the price, across the economic spectrum.<br><br><b>Editorial note — placement.</b><br>2015 is the clean, citable anchor: the launch of Glidewell's own implant. It sits in the Monolithic &amp; automation era, right after BruxZir (2009) and beside glidewell.io (2017–19), and it rhymes with BruxZir — the best, made affordable, made the default — now applied to the most expensive tooth. Possible second card: earlier (~2000s) the Inclusive line / in-house parts (the roots that explain how a whole implant could later be made cheaply), or later (2024–25) Glidewell HT + Tooth Replacement Solution (implants folded fully into the digital/AI ecosystem).<br><br><b>Sources:</b> Glidewell Dental / Glidewell Direct; Chairside &amp; Integrate magazines; Dental Tribune (2015–16); PR Newswire (2019–20); Compendium (2023). Cost benchmarks (single implant ~$3,000–6,000; full arch ~$12,000–25,000+) from GoodRx, Aspen Dental, ClearChoice, 2024–2026.<br><br><b>Leadership flag (Eldon #48 + recurring) — implants are under-covered.</b> Leadership keeps noting the implant story isn't told enough; Eldon frames it as a huge part of vertical integration, the bulk of Glidewell's education, and a driver of a new standard of care. Right now it only links to Part 10 — it needs to run wider (Parts 3, 9, 10, 13) and connect to a hero: ideally a GP who used to refer implant cases out and, through Glidewell CE, learns to place them himself — the arc that hits all four pillars. Get the specifics from Eldon (task t23); it may deserve its own follow-up episode (task t28).",ru:"<b>Название:</b> карточка названа по текущему имени — Glidewell HT; запущен в 2015 как Hahn Tapered Implant System, переименован ~2023–24.<br><br><b>Хронология.</b><br>• <b>1997</b> — д-р Джек Хан (создатель импланта NobelReplace) проектирует свой оригинальный конический имплант; это его преистория, не Glidewell.<br>• <b>2000-е — начало 2010-х</b> — Glidewell заходит в импланты сбоку, не своим имплантом: линия Inclusive — протетические компоненты с FDA-клиренсом (абатменты, винты, копинги), совместимые с большинством чужих систем, производятся in-house на Prismatik Dentalcraft. Смысл — вертикальная интеграция: убрать наценку OEM, держать фиксированную предсказуемую цену реставрации.<br>• <b>2014</b> — Хан начинает работать с инженерами Glidewell и Джимом Глайдвеллом над новым имплантом.<br>• <b>2015 — ЗАПУСК Hahn Tapered Implant System.</b> Становится одной из самых быстрорастущих имплант-систем в США, её принимают тысячи врачей. Заявленная цель: качественный имплант за долю цены, с коронкой BruxZir сверху, при пожизненной гарантии от импланта до реставрации.<br>• <b>2019</b> — линия компонентов Inclusive расширена до 22 крупных систем; клинические исследования (2 года, затем 6 лет) показывают 99,2% выживаемости и менее 0,2 мм потери кости.<br>• <b>2020</b> — титановые scan bodies медицинского класса вводят имплант-реставрации в цифровой workflow.<br>• <b>~2023–24</b> — Hahn Tapered переименован в Glidewell HT Implant System.<br>• <b>2024–25</b> — Glidewell Tooth Replacement Solution (полный цифровой набор) и крупные апгрейды 2025 года (имплант 6,0 мм, новые наборы для управляемой хирургии).<br><br><b>Что это сейчас.</b><br>Компания частная и разбивку выручки по продуктам не публикует — точную долю указать нельзя. Качественно: это одна из основных продуктовых линий и один из самых быстрорастущих имплантов в США; Glidewell восстановил сотни тысяч имплант-кейсов и сам производит и имплант, и компоненты через Prismatik Dentalcraft (ISO-сертификация, FDA), позиционируя имплантологию как стандарт помощи по всему экономическому спектру. Любой процент на экране — только от компании, без плейсхолдеров.<br><br><b>Связи (почему импланты так много с чем сцеплены на таймлайне).</b><br>• <b>BruxZir / реставрация</b> — имплант венчает та же коронка BruxZir; одна гарантия от импланта до реставрации.<br>• <b>Вертикальная интеграция</b> — Prismatik делает детали in-house, убивает наценку, даёт фикс-цену; тот же ход, что веха «Литьё пластика, 2000».<br>• <b>Цифра / glidewell.io</b> — scan bodies, управляемая хирургия, цифровое планирование.<br>• <b>Обучение / CE</b> — world-class education и симпозиумы, линия Миша через Resnik, обучение врачей общей практики ставить импланты.<br>• <b>Джим лично</b> — Hahn придумали Хан и Джим Глайдвелл вдвоём.<br>• <b>Доступность</b> — сквозная нить: доля цены, по всему экономическому спектру.<br><br><b>Редакторская заметка — размещение.</b><br>2015 — чистый и citable якорь: запуск собственного импланта Glidewell. Ложится в эру «Монолит и автоматика», сразу за BruxZir (2009) и рядом с glidewell.io (2017–19), и рифмуется с BruxZir — лучшее, сделанное доступным и ставшее стандартом — теперь в применении к самому дорогому зубу. Возможная вторая карточка: ранняя (≈2000-е) — линия Inclusive / детали in-house (корни, объясняющие, как позже удалось дёшево сделать целый имплант), либо поздняя (2024–25) — Glidewell HT + Tooth Replacement Solution (импланты полностью втянуты в цифровую/ИИ-экосистему).<br><br><b>Источники:</b> Glidewell Dental / Glidewell Direct; журналы Chairside и Integrate; Dental Tribune (2015–16); PR Newswire (2019–20); Compendium (2023). Бенчмарки цены (один имплант ~$3,000–6,000; полная челюсть ~$12,000–25,000+) — GoodRx, Aspen Dental, ClearChoice, 2024–2026.<br><br><b>Флаг руководства (Eldon #48 + повторяется) — импланты недораскрыты.</b> Руководство раз за разом отмечает, что тема имплантов не раскрыта; Элдон подаёт их как огромную часть вертикальной интеграции, основной объём образования Glidewell и двигатель нового стандарта лечения. Сейчас связано только с Частью 10 — нужно шире (Части 3, 9, 10, 13) и с героем: в идеале GP, который отправлял имплант-кейсы спецу и через CE Glidewell учится ставить сам — арка на все 4 пилона. Детали — у Элдона (задача t23); может стать отдельным эпизодом (задача t28)."}},
  {y:"2017–19", tr:"g", j:["digital","ce","implants"], tier:1, sc:[3,4,9,10],
    t:{en:"glidewell.io",ru:"glidewell.io"},
    d:{en:"In-office: fastdesign / fastmill / BruxZir NOW — single-visit crowns.",ru:"В кабинете: fastdesign / fastmill / BruxZir NOW — коронка за один визит."},
    th:{en:"Future: the lab moves into the chair.",ru:"Будущее: лаборатория переезжает в кресло."},
    full:{en:"<b>What happened.</b> In November 2017, at its first Glidewell Dental Symposium in Dallas, Glidewell unveiled glidewell.io — a complete in-office ecosystem that put the lab's whole workflow on the dentist's own counter. Three pieces: an intraoral scanner (the iTero Element, through a partnership with Align), fastdesign.io software that uses machine-learning to propose the crown design, and the fastmill.io in-office mill. The breakthrough material was BruxZir NOW — a fully-sintered zirconia block that comes out of the mill finished, with no firing oven required. The promise: scan, design, mill and seat a single crown in roughly one visit — about an hour — instead of sending an impression to a lab and bringing the patient back in two weeks. (Launch date and the one-hour figure to-confirm against Glidewell's own materials.)<br><br><b>Why it matters — the lab moves into the chair.</b> For decades the lab was a separate place: you took an impression, mailed it, waited, called back the patient. glidewell.io collapses that distance — the lab's capability now lives inside the operatory. This is the cleanest expression of the film's thesis: Glidewell did not invent chairside CAD/CAM (CEREC predates it by decades), but it made the best chairside outcome affordable and brought a same-visit, oven-free crown to the everyday practice. Access, again: fewer visits for the patient, less travel, faster care.<br><br><b>The link to the next generation.</b> This is literally the machine our hero Dr. Abdul Alas has to learn. The whole arc bends here. The technology is no longer the barrier — fear is. His real line is “I'm afraid to press the button — who do I call if it fails?” glidewell.io is the answer to that fear: an integrated system plus Glidewell's support and design-checking behind it, so a solo practice owner can mill a crown chairside without a lab tech on staff. Idea for Parts 9–10: shoot the literal first press of the button — Abdul's hand hovering, the mill starting, the finished crown lifted out — and cut to the support voice on the phone that made him willing to press it.<br><br><b>Modern echo.</b> Frame this as the “Future” feel arriving early — the lab dissolving into the chair, AI proposing the design, the human still deciding. It sets up Parts 3 (the flywheel: lab scale feeds the in-office tool) and 4 (philosophy: best made affordable, made the default). Idea: intercut the analog past — impression tray, courier, two-week wait — against Abdul scanning and milling in one sitting, same patient, same chair, one afternoon.<br><br><b>Who can speak to it.</b> Dr. Abdul Alas (#1) on the fear and the moment it broke. The old-school dentist (#2) as the skeptical counterweight. Neil Park on why the company pushed the lab's capability into the office. Michael DiTolla on the clinical workflow and what same-visit really changes for a patient. Jim Glidewell on the conviction that the best dentistry should not require a two-week wait. (Confirm who was actually on the glidewell.io team in 2017.)<br><br><b>Verify before screen.</b> Confirm the launch date (reported November 21, 2017, Dallas Symposium) and the original bundle (iTero Element via Align — note Glidewell later added its own scanner and Medit compatibility, so phrase the 2017 lineup carefully). Confirm BruxZir NOW = fully-sintered, no-oven, straight-from-the-mill. Treat the “one hour / single visit” timing as a marketing figure until verified. Honesty rule: say “brought same-visit, oven-free crowns to the everyday practice” — never “invented chairside milling.”",ru:"<b>Что произошло.</b> В ноябре 2017 года на первом собственном симпозиуме Glidewell Dental в Далласе компания представила glidewell.io — полноценную внутриофисную экосистему, которая перенесла весь рабочий процесс лаборатории на стол самого стоматолога. Три части: интраоральный сканер (iTero Element, по партнёрству с Align), софт fastdesign.io с машинным обучением, предлагающий дизайн коронки, и фрезер fastmill.io. Ключевой материал — BruxZir NOW: полностью спечённый блок циркония, который выходит из фрезера готовым, без печи для обжига. Обещание: отсканировать, спроектировать, отфрезеровать и установить коронку примерно за один визит — около часа — вместо отправки слепка в лабораторию и повторного приёма через две недели. (Дату запуска и цифру «один час» — уточнить по материалам Glidewell.)<br><br><b>Почему это важно — лаборатория переезжает в кресло.</b> Десятилетиями лаборатория была отдельным местом: снимаешь слепок, отправляешь, ждёшь, перезваниваешь пациенту. glidewell.io стягивает это расстояние — возможности лаборатории теперь живут прямо в кабинете. Это самое чистое выражение тезиса фильма: Glidewell не изобретал chairside CAD/CAM (CEREC появился на десятилетия раньше), но сделал лучший результат у кресла доступным и вывел на рынок коронку за один визит, без печи, для обычной практики. И снова доступ: меньше визитов, меньше дороги, быстрее помощь.<br><br><b>Связь со следующим поколением.</b> Это буквально та машина, которую должен освоить наш герой, доктор Абдул Алас. Вся арка ломается именно здесь. Технология больше не барьер — барьер страх. Его настоящая реплика: «Я боюсь нажать кнопку — кому я позвоню, если что-то пойдёт не так?» glidewell.io и есть ответ на этот страх: интегрированная система плюс поддержка и проверка дизайна со стороны Glidewell, чтобы владелец одиночной практики мог отфрезеровать коронку у кресла без зубного техника в штате. Идея для частей 9–10: снять буквально первое нажатие кнопки — рука Абдула замирает, фрезер запускается, готовая коронка вынимается — и склейка с голосом поддержки в трубке, который сделал это нажатие возможным.<br><br><b>Современное эхо.</b> Подать это как «будущее», пришедшее раньше срока, — лаборатория растворяется в кресле, ИИ предлагает дизайн, человек по-прежнему принимает решение. Это готовит части 3 (маховик: масштаб лаборатории питает внутриофисный инструмент) и 4 (философия: лучшее сделать доступным, сделать стандартом). Идея: перемонтировать аналоговое прошлое — слепочная ложка, курьер, две недели ожидания — против Абдула, который сканирует и фрезерует за один приём, тот же пациент, то же кресло, один день.<br><br><b>Кто может об этом рассказать.</b> Доктор Абдул Алас (#1) — о страхе и моменте, когда он сломался. Стоматолог старой школы (#2) — как скептический противовес. Нил Парк — почему компания вынесла возможности лаборатории в кабинет. Майкл ДиТолла — о клиническом процессе и о том, что реально меняет визит за один приём для пациента. Джим Глайдвелл — об убеждении, что лучшая стоматология не должна требовать двухнедельного ожидания. (Уточнить, кто действительно входил в команду glidewell.io в 2017-м.)<br><br><b>Проверить до экрана.</b> Подтвердить дату запуска (по сообщениям — 21 ноября 2017, симпозиум в Далласе) и исходный комплект (iTero Element через Align — учесть, что позже Glidewell добавил собственный сканер и совместимость с Medit, поэтому формулировать состав 2017 года аккуратно). Подтвердить, что BruxZir NOW — полностью спечённый, без печи, прямо из фрезера. Цифру «час / один визит» считать маркетинговой, пока не проверена. Правило честности: говорить «вывел на рынок коронки за один визит без печи для обычной практики» — никогда «изобрёл chairside-фрезеровку»."}},
  {y:"2019", tr:"g", star:{en:"Future",ru:"Будущее"}, j:["digital","restorative"], tier:1, sc:[11],
    t:{en:"BruxZir Factory",ru:"Фабрика BruxZir"},
    d:{en:"Automated, AI-designed, robotic monolithic production.",ru:"Автоматизированное, ИИ-спроектированное, роботизированное производство монолита."},
    th:{en:"The analog→digital climax: robots make crowns.",ru:"Кульминация аналог→цифра: роботы делают коронки."},
    full:{en:"<b>What happened.</b> In 2019 Glidewell crossed the line from digital-assisted to digital-native production: the launch of fully automated, AI-designed, robotic monolithic-zirconia manufacturing — what the company frames as Glidewell Intelligent Manufacturing. Crown designs are proposed automatically by generative AI (reportedly generative-adversarial networks), then routed to production lines where robotic arms feed BruxZir zirconia blocks into banks of interconnected mills; each restoration is verified by automated metrology before it ships. No hand-waxing, no manual CAD nudging — the machine designs the tooth and the machine makes it.<br><br><b>Why it matters — the climax of the analog→digital arc.</b> This is the visual payoff the whole first half of the film has been building toward. Set it directly against the 1907 / PFM hand-craft baseline: a technician at a bench, wax, casting, a fired porcelain layer, hours of human judgment per unit. Now: software draws the crown, a robot arm cuts it, a sensor checks it. Same goal — a tooth that fits and looks right — but the labor, the variability, and the cost structure are transformed. That transformation is the thesis made physical: automation is how the best dentistry gets made affordable and brought to scale, not by cutting corners but by removing variability and human bottlenecks.<br><br><b>The link to the next generation.</b> This beat closes the loop the timeline has been tracing — Phil Venard's analog craft is the “before,” this factory is the “now.” It is also the flywheel turning: millions of cloud-design cases feed the AI that designs the next crown, and the scale of the factory is what makes that data, and that affordability, possible.<br><br><b>Modern echo.</b> The same engine now powers next-day and same-visit crown service — design-to-delivery compressed from weeks to a day, the access throughline in its sharpest modern form.<br><br><b>How a zirconia crown is actually made (the factory scene — reference).</b> The pipeline: yttria-stabilized zirconia <i>powder</i> (mostly from Tosoh, Japan) → spray-dried into free-flowing granules → pressed (Glidewell casts its own binder-free blanks) and <i>pre-sintered</i> into a soft, chalk-like disc you can scratch with a fingernail → that soft disc is milled oversized into crown shapes → then <b>fully sintered at ~1,450–1,530°C</b>, where it shrinks ~20–25% (linear, per dimension — not “by volume”), densifies to ~99%, and gains both its strength and its translucency. Mill-soft-then-fire is the whole trick: soft zirconia cuts fast without wrecking tools; the furnace turns chalk into one of the hardest things in the mouth. <b>Correction / accuracy:</b> there is <i>no</i> dramatic “zirconia dust cloud” on the line — milling runs under a water / coolant spray (wet), so on camera expect water and slurry, not dust. (Soft zirconia can be dry-milled elsewhere; confirm Glidewell's exact setup on the floor.) The cinematic beats that ARE real: the soft chalky disc vs the finished glass-like tooth held to the light; the glowing sinter furnace; the before/after size shrink; rows of robotic mills running 24/7.<br><br><b>Who can speak to it.</b> David Leeson (VP Engineering) as the architect of the automated AI / robotic / micro-CT BruxZir workflow — let him walk the floor and narrate the robots. Sergei Azernikov (VP CAD/CAM Software) on the generative crown-design AI and the cloud-case data behind it. Stage them as a volley: Azernikov explains how the software imagines the tooth, Leeson explains how the metal-and-robots make it real. Phil Venard intercut as the analog counterpoint; Jim to frame why affordability drove it. Maggie Liu (Senior Principal Scientist, R&D Materials) for the next frontier — 3D-printed permanent restorations and dentures, where milling is heading next. Idea: shoot the literal before/now diptych — Venard's bench and the robotic mill line in the same sequence.<br><br><b>Verify before screen.</b> AI-design acceptance &amp; cloud-case count — per company (Apr 2026): 30M+ cases in the cloud, >95% of restoration proposals AI-generated (note: the older “10M designs” figure is outdated / a different milestone). Treat as company-stated; get the live number from Azernikov's team. TO CONFIRM: exact 2019 launch framing and the “Glidewell Intelligent Manufacturing” naming/timeline. TO CONFIRM: GAN specifics, number of production lines / mills per line, and the metrology (DSM) step. HONESTY GUARDRAIL: say “automated / brought to scale / made affordable,” never “invented.”",ru:"<b>Что произошло.</b> В 2019 году Glidewell перешёл черту от «цифры в помощь человеку» к полностью цифровому производству: запуск автоматизированного, спроектированного ИИ, роботизированного изготовления монолитного циркония — то, что компания называет Glidewell Intelligent Manufacturing. Дизайн коронки предлагает генеративный ИИ (по данным — генеративно-состязательные сети), затем заказ уходит на производственные линии, где роботизированные руки подают блоки циркония BruxZir в связки соединённых фрезерных станков; каждая реставрация проходит автоматический метрологический контроль перед отгрузкой. Никакого ручного воска, никакой ручной правки в CAD — машина проектирует зуб и машина его изготавливает.<br><br><b>Почему это важно — кульминация дуги «аналог→цифра».</b> Это визуальная развязка, к которой шла вся первая половина фильма. Поставьте кадр впрямую против базовой точки 1907 / PFM: техник за столом, воск, литьё, обжиг фарфора, часы человеческого решения на каждую единицу. А теперь: софт рисует коронку, рука-робот её вырезает, датчик её проверяет. Цель та же — зуб, который сядет и будет выглядеть правильно, — но труд, разброс качества и структура стоимости преображены. Это и есть тезис, ставший физическим: автоматизация — это то, как лучшая стоматология делается доступной и выводится на масштаб, не за счёт срезанных углов, а за счёт устранения разброса и человеческих узких мест.<br><br><b>Связь со следующим поколением.</b> Этот эпизод замыкает петлю, которую вёл таймлайн: аналоговое ремесло Фила Венарда — это «до», эта фабрика — «сейчас». И это маховик в движении: миллионы облачных кейсов проектирования кормят ИИ, который спроектирует следующую коронку, а масштаб фабрики — это то, что делает возможными и эти данные, и эту доступность.<br><br><b>Современное эхо.</b> Тот же движок сегодня обеспечивает сервис коронки «на следующий день» и «за один визит» — путь от проекта до доставки сжат с недель до суток, сквозная линия доступа в её самой острой современной форме.<br><br><b>Как на самом деле делается циркониевая коронка (сцена фабрики — опорный материал).</b> Конвейер: <i>порошок</i> диоксида циркония, стабилизированного иттрием (в основном Tosoh, Япония) → распылительная сушка в сыпучие гранулы → прессовка (Glidewell отливает свои безбиндерные заготовки) и <i>предспекание</i> в мягкий, меловой диск, который царапается ногтем → этот мягкий диск фрезеруют с запасом в форму коронок → затем <b>полное спекание при ~1450–1530°C</b>, где он усаживается на ~20–25% (линейно, по каждому измерению — не «по объёму»), уплотняется до ~99% и одновременно обретает и прочность, и прозрачность. Весь фокус — «фрезеруй мягким, потом обжигай»: мягкий цирконий режется быстро и не убивает фрезы; печь превращает мел в один из самых твёрдых материалов во рту. <b>Поправка / точность:</b> никакого киношного «облака циркониевой пыли» на линии НЕТ — фрезеровка идёт под струёй воды / охлаждающей жидкости (мокрая), так что в кадре будут вода и шлам, а не пыль. (Мягкий цирконий где-то фрезеруют и всухую; точную схему Glidewell сверить на цеху.) Реальные киногеничные моменты: мягкий меловой диск против готового стекловидного зуба на просвет; раскалённая печь спекания; усадка «до/после»; ряды роботизированных фрезеров 24/7.<br><br><b>Кто может об этом рассказать.</b> Дэвид Лисон (VP Engineering) как архитектор автоматизированного ИИ / роботизированного / микро-КТ рабочего процесса BruxZir — пусть пройдёт по цеху и проговорит роботов. Сергей Азерников (VP CAD/CAM Software) о генеративном ИИ дизайна коронок и облачных данных за ним. Стройте их как перекличку: Азерников объясняет, как софт «придумывает» зуб, Лисон — как металл и роботы делают это реальностью. Фил Венард в перебивку как аналоговый контрапункт; Джим — чтобы задать рамку, почему доступность вела всё это. Мэгги Лю (Senior Principal Scientist, R&D Materials) — про следующий рубеж: 3D-печатные постоянные реставрации и протезы, куда движется фрезеровка. Идея: снять буквальный диптих «до/сейчас» — стол Венарда и роботизированная фрезерная линия в одной сцене.<br><br><b>Проверить до экрана.</b> Приёмка ИИ-дизайна и счёт облачных кейсов — по данным компании (апр 2026): 30 млн+ кейсов в облаке, >95% предложений генерит ИИ (старая цифра «10 млн дизайнов» устарела / это другая веха). Считать как «со слов компании»; актуальную цифру взять у команды Азерникова. УТОЧНИТЬ: точную рамку запуска 2019 и название/таймлайн «Glidewell Intelligent Manufacturing». УТОЧНИТЬ: специфику GAN, число производственных линий / станков на линию и шаг метрологии (DSM). ГАРАНТ ЧЕСТНОСТИ: говорить «автоматизировано / выведено на масштаб / сделано доступным», никогда «изобрёл»."}},
  {y:"2019", tr:"g", j:["ce"], tier:2, sc:[2,10,13,14],
    t:{en:"Guiding Leaders",ru:"Guiding Leaders"},
    d:{en:"Glidewell launches Guiding Leaders — a free leadership & practice-development program; now ~100 alumni, up to 80 CE units per cohort.",ru:"Glidewell запускает Guiding Leaders — бесплатную программу по лидерству и развитию практики; уже ~100 выпускников, до 80 CE-единиц на когорту."},
    th:{en:"Reinvesting in the profession — and our channel for finding hero dentists.",ru:"Реинвестиция в профессию — и наш канал поиска героев-дантистов."},
    full:{en:"<b>What happened.</b> In 2019, Glidewell launched Guiding Leaders — a free leadership and practice-development program built and run by Bobbie Norton, held at the Irvine campus. It was created as the profession was tipping toward a new majority: women now make up more than half of graduating dentists, yet clinical school never teaches the business, communication, and leadership skills a practice owner actually needs. Guiding Leaders fills that gap at no cost to the dentist. Today it has roughly 100 alumni, with each cohort earning up to about 80 CE units across the run from spring to the fall graduation. (To-confirm with Bobbie: exact alumni count, per-cohort CE total, and how we describe the audience on camera — publicly the program is framed as being for practicing women dentists; our internal lens of under-represented and emerging dentists should be reconciled with that before we lock language.)<br><br><b>Why it matters (the thesis made human).</b> This is the access thesis turned outward. The film argues Jim spent fifty years making the best dentistry affordable for patients; Guiding Leaders is the same instinct pointed at the profession itself — removing the cost barrier to the skills that let a dentist own, grow, and survive. It is reinvestment, not marketing: Glidewell gives away the playbook and asks nothing clinical in return. That reframes the company from a lab that sells crowns into one that grows the people who place them.<br><br><b>The link to the next generation.</b> This is our casting channel, and it is where Hero #3 comes from. The candidates already in frame are Guiding Leaders alumni: Ellen Paulisick, who built a brand-new practice fully on the Glidewell system; Nadia Rodriguez, a young New York cosmetic dentist; Bianca Clark, working in 3D printing; and Jim Lam, who runs two mills and serves a lower-income community where affordability is the whole point. STRUCTURE — two layers (built on Bobbie's four alumni): use these four as the anchored “after” (their arcs are confirmable now), and follow the live 2026 cohort as the “during,” mixing them so each alum can mirror or mentor a current student. We do NOT lock the alum↔student pairings yet — that's decided live, once we see the cohort on camera. Both layers converge at the October 15–16, 2026 graduation — the “Dentistry on the Rise” symposium in Irvine: the alumni take the podium as proof (Ellen Paulisick and Bianca Clark are on the DOTR speaker roster) while the current cohort crosses the line the same day. The arc lands as a graduation, the literal next generation rising. This is the heart of Part 13.<br><br><b>Modern echo.</b> The same campus that mills a crown in minutes also runs a classroom that rebuilds careers — the flywheel feeding the profession, not just the supply chain. The visual rhyme: empty chairs filling in spring, the same dentists at the podium in October.<br><br><b>Who can speak to it.</b> Bobbie Norton, who runs the program and knows every cohort's story; Jim Glidewell on why he gives it away; and our alumni candidates — Ellen Paulisick, Nadia Rodriguez, Bianca Clark, Jim Lam — who can each say what the program changed for them.<br><br><b>Verify before screen.</b> Confirm with Bobbie: (1) founding year 2019, (2) alumni count near 100, (3) up-to-80 CE units per cohort, (4) the on-camera description of the audience (women dentists vs. under-represented/emerging), and (5) the October 15–16, 2026 Irvine dates and symposium name. Note publicly that recent cohorts ran roughly spring–October with 40-plus dentists selected from 100-plus applicants — so do not state a fixed annual date without confirming 2026.",ru:"<b>Что произошло.</b> В 2019 году Glidewell запустил Guiding Leaders — бесплатную программу развития лидерства и практики, созданную и ведомую Bobbie Norton на кампусе в Ирвайне. Она появилась в момент, когда профессия меняла лицо: женщины теперь составляют больше половины выпускников-стоматологов, но вуз не учит бизнесу, коммуникации и лидерству, без которых владельцу практики не выжить. Guiding Leaders закрывает этот пробел и не берёт с дантиста денег. Сегодня у программы около 100 выпускников, каждый поток набирает до примерно 80 CE-единиц за цикл с весны до осеннего выпуска. (Уточнить у Bobbie: точное число выпускников, сумму CE на поток и то, как мы описываем аудиторию в кадре — публично программа подаётся как программа для практикующих женщин-стоматологов; нашу внутреннюю формулировку про недопредставленных и начинающих дантистов нужно свести с этим до фиксации текста.)<br><br><b>Почему это важно (тезис, ставший человеком).</b> Это тезис доступности, развёрнутый наружу. Фильм утверждает, что Джим пятьдесят лет делал лучшую стоматологию доступной для пациентов; Guiding Leaders — тот же инстинкт, направленный на саму профессию: снять ценовой барьер к навыкам, которые позволяют дантисту владеть, расти и удержаться. Это реинвестиция, а не маркетинг: Glidewell отдаёт плейбук и ничего клинического не просит взамен. Это переописывает компанию — из лаборатории, продающей коронки, в ту, что выращивает людей, которые их ставят.<br><br><b>Связь со следующим поколением.</b> Это наш кастинговый канал — и именно отсюда приходит Герой №3. Кандидаты в кадре — выпускники Guiding Leaders: Ellen Paulisick, построившая новую практику полностью на системе Glidewell; Nadia Rodriguez, молодой косметический стоматолог из Нью-Йорка; Bianca Clark, работающая с 3D-печатью; и Jim Lam, у которого две фрезы и который обслуживает небогатую общину, где доступность — это и есть весь смысл. СТРУКТУРА — два слоя (на четырёх выпускниках от Bobbie): эти четверо — закреплённое «после» (их арки подтверждаемы уже сейчас), а живой поток 2026 — «во время»; миксуем так, чтобы каждый выпускник был зеркалом или наставником студенту потока. Пары «выпускник ↔ студент» пока НЕ фиксируем — решаем живьём, когда увидим поток на камере. Оба слоя сходятся на выпуске 15–16 октября 2026 — симпозиум «Dentistry on the Rise» в Ирвайне: выпускники выходят на трибуну как доказательство (Ellen Paulisick и Bianca Clark — в списке спикеров DOTR), а нынешний поток в тот же день пересекает черту. Дуга закрывается как выпускной — буквально восходящее следующее поколение. Это сердце Части 13.<br><br><b>Современное эхо.</b> Тот же кампус, что фрезерует коронку за минуты, ведёт класс, который пересобирает карьеры — маховик питает профессию, а не только цепочку поставок. Визуальная рифма: пустые кресла, заполняющиеся весной, и те же дантисты на трибуне в октябре.<br><br><b>Кто может об этом сказать.</b> Bobbie Norton, которая ведёт программу и знает историю каждого потока; Джим Glidewell — почему он отдаёт это даром; и наши кандидаты-выпускники — Ellen Paulisick, Nadia Rodriguez, Bianca Clark, Jim Lam — каждый о том, что программа изменила для него.<br><br><b>Проверить до эфира.</b> Подтвердить у Bobbie: (1) год запуска 2019, (2) число выпускников около 100, (3) до 80 CE-единиц на поток, (4) описание аудитории в кадре (женщины-стоматологи против недопредставленных/начинающих) и (5) даты 15–16 октября 2026 в Ирвайне и название симпозиума. Учесть, что публично последние потоки шли примерно с весны по октябрь и набирали 40+ дантистов из 100+ заявок, — поэтому не указывать фиксированную ежегодную дату без подтверждения на 2026 год."}},
  {y:"2020–22", tr:"g", j:["digital"], tier:2, sc:[14],
    t:{en:"Memoir · CEO · scan",ru:"Мемуар · CEO · сканер"},
    d:{en:"\u201CConstant Change\u201D (2020); new CEO (2021); fastscan.io with Medit (2022).",ru:"«Constant Change» (2020); новый CEO (2021); fastscan.io с Medit (2022)."},
    th:{en:"A generational handover at the top; the scanner joins the ecosystem.",ru:"Смена поколения у руля; сканер в экосистеме."},
    full:{en:"<b>What happened.</b> Three moves in three years reshaped the top of the house. In December 2020 Jim Glidewell published his memoir, “Constant Change: Adventures in Business and Life — My Journey from Start-Up to 5,000 Employees” (Harriman House) — his own-words account of the long climb: the Kentucky farm, the Navy and Vietnam, the one-man kitchen lab in 1970, and the decision, again and again, never to sell or go public. Then a generational handover at the very top: Stephenie Goddard was named CEO — she had joined Glidewell in 2006 in HR and risen through operations, product, software, sales and analytics — while Jim stayed on as founder and president. (Confirm the name spelling “Stephenie Goddard” and the exact effective date — announced December 2021, effective January 1, 2022, to-confirm.) And in 2022 fastscan.io, built with Medit, folded an intraoral scanner into the ecosystem — the front door to the all-digital workflow.<br><br><b>Why it matters to the thesis.</b> This is the year the company says out loud what the film argues: the mission has to outlive the man. Bringing in a CEO is not Jim stepping back from access — it is Jim institutionalizing it, putting “another hand at the helm” so the engine that makes the best dentistry affordable keeps running past any one founder. The scanner matters for the same reason: capturing the mouth digitally is the cheapest possible front of the flywheel — no impressions, no remakes, data straight into the box that designs and mills the crown. The memoir, meanwhile, hands us the spine of the personal film in Jim's own voice.<br><br><b>The link to the next generation.</b> This is the literal passing-of-the-torch beat. A professional CEO at the top and the next-generation family — Lila and Jimmy — in the wings frame the same question: who carries a privately held, never-sold company forward, and on whose terms? The memoir is the inheritance document; Goddard is the operational answer; the family is the bloodline answer. The film can hold all three in tension without resolving it.<br><br><b>Modern echo.</b> Tie the book's title — “Constant Change” — to the present: the kitchen lab became a 5,000-person digital house, and the founder's reflex to keep changing is exactly what hands cleanly to a new CEO and a new generation. Idea one: build the personal film on the memoir's arc, with Neil Park's Chairside Live conversation with Jim about the book as a ready-made on-camera reading of that arc. Idea two: this is your Part 14 hinge — the past film (analog origins) and the future film (handover, ecosystem) meet here; cut the 1970 kitchen lab against the 2022 scanner and the title card “Constant Change.”<br><br><b>Who can speak to it.</b> Jim Glidewell — the memoir, the refusal to sell, why he wanted a second hand at the helm. Neil Park — interviewed Jim about the book on Chairside Live; can frame the legacy. Stephenie Goddard (to-confirm availability) — the handover from inside. Lila and Jimmy — the next generation's view of inheriting the mission. Product leads on fastscan.io / Medit for the scanner-into-ecosystem story.<br><br><b>Verify before screen.</b> Confirm the CEO's name spelling (“Stephenie Goddard”) and exact title/dates — announcement December 22, 2021; effective date January 1, 2022; her 2006 start and exact prior roles. Confirm memoir release month (December 2020), publisher (Harriman House), and full subtitle. Confirm fastscan.io launch year and the precise nature of the Medit partnership (rebrand vs. co-developed) before saying it on screen. Keep the language “made affordable / brought to market,” never “invented.”",ru:"<b>Что произошло.</b> За три года верх компании пересобрался тремя ходами. В декабре 2020 Джим Глайдвелл выпустил мемуары «Constant Change: Adventures in Business and Life — My Journey from Start-Up to 5,000 Employees» (Harriman House) — историю долгого восхождения его собственным голосом: ферма в Кентукки, флот и Вьетнам, лаборатория на одного человека на кухне в 1970-м и раз за разом одно и то же решение — не продавать и не выходить на биржу. Затем смена поколений на самом верху: Стефани Годдард (Stephenie Goddard) назначена CEO — она пришла в Glidewell в 2006-м в HR и выросла через операции, продукт, ПО, продажи и аналитику — тогда как Джим остался основателем и президентом. (Сверить написание имени «Stephenie Goddard» и точную дату — объявлено в декабре 2021, вступило в силу 1 января 2022, to-confirm.) А в 2022-м fastscan.io, сделанный с Medit, ввёл интраоральный сканер в экосистему — это парадная дверь в полностью цифровой процесс.<br><br><b>Почему это важно для тезиса.</b> Это год, когда компания вслух произносит то, что доказывает фильм: миссия должна пережить человека. Приглашение CEO — не отступление Джима от доступности, а её институционализация: «ещё одна рука на штурвале», чтобы двигатель, делающий лучшую стоматологию доступной, работал и после любого основателя. Сканер важен по той же причине: цифровой захват полости рта — самый дешёвый вход во флайвил: без слепков, без переделок, данные прямо в коробку, которая проектирует и фрезерует коронку. А мемуары дают нам стержень личного фильма голосом самого Джима.<br><br><b>Связь со следующим поколением.</b> Это буквально сцена передачи факела. Профессиональный CEO на вершине и следующее поколение семьи — Лайла и Джимми — за кулисами задают один вопрос: кто понесёт частную, ни разу не проданную компанию дальше и на каких условиях? Мемуары — документ наследования; Годдард — операционный ответ; семья — ответ по крови. Фильм может держать все три линии в напряжении, не разрешая его.<br><br><b>Современное эхо.</b> Свяжите название книги — «Constant Change» — с настоящим: кухонная лаборатория стала цифровым домом на 5000 человек, и рефлекс основателя постоянно меняться — ровно то, что чисто передаётся новому CEO и новому поколению. Идея один: построить личный фильм на арке мемуаров, а беседу Нила Парка с Джимом о книге на Chairside Live использовать как гот
