  {id:'abdul', nm:{en:"Dr. Abdul Alas · hero 1",ru:"Д-р Абдул Алас · герой 1"}, c:'#BD6A45', photo:'gl_photos/abdul.jpg', loc:{en:"Bakersfield, CA · Five Star Dentistry",ru:"Бейкерсфилд, Калифорния · Five Star Dentistry"}, sc:[1,3,4,7,8,10,11,13,14],
   bio:{en:"<b>Hero #1 — confirmed.</b> Runs a small office (~10 people) and mentors interns who shadow him; carries the film's dentist-line narrative.<br><br><b>From his recorded interview (his own words).</b> A Glidewell user for 10+ years with most of the products: he mills single crowns in-house on the fastmill and sends out bridges, multi-unit and more cosmetic cases. His interns work as his assistants and want to learn how he runs the office; he once brought a parent in to see if it would scare them off — they stayed. His honest obstacle, verbatim: a real barrier with technology — “every time I'm gonna click, I'm worried the software won't work and gives me an error — who am I gonna call if it doesn't go through? That's my biggest fear.” So the “afraid to press the button / who do I call” conflict is REAL and straight from him, even after 10+ years a user (correction: it does NOT need reframing).<br><br><b>Director's draft VO (Eldar voicing him — to confirm, not verbatim):</b> loves the work because it changes lives; ~1,000+ patients over the years; a peak of ~200 crowns a month around 2016; does free charity dentistry on weekends.<br><br><b>Practice:</b> Five Star Dentistry, Bakersfield, CA — handy for shoot planning. (His phone / email / street address live in Notion, not in this public tool.) Backup hero: Dr. Matt Lake.",ru:"<b>Герой №1 — подтверждён.</b> Держит небольшой офис (~10 человек) и менторит интернов, которые ходят за ним «хвостиком»; несёт нарратив дантистской линии.<br><br><b>Из его записанного интервью (его собственные слова).</b> Пользуется Glidewell 10+ лет, есть почти все продукты: одиночные коронки фрезерует у себя на fastmill, а мосты, многоединичные и более косметические кейсы отправляет в лабораторию. Интерны работают у него ассистентами и хотят перенять, как он ведёт офис; однажды он привёл родителя одного из них — посмотреть, не отпугнёт ли это их; остались. Его честный барьер, дословно: проблема с технологией — «каждый раз, когда нажимаю, боюсь, что софт не сработает, выдаст ошибку — кому я позвоню, если не пройдёт? Это мой главный страх». То есть конфликт «боится нажать кнопку / кому звонить» — РЕАЛЬНЫЙ и прямо из его уст, даже спустя 10+ лет (поправка: переопределять его НЕ нужно).<br><br><b>Черновой закадр (Эльдар наговаривает за него — сверить, не дословно):</b> любит работу, потому что меняет людям жизнь; ~1000+ пациентов за годы; пик ~200 коронок/мес около 2016; по выходным бесплатно лечит по благотворительности.<br><br><b>Практика:</b> Five Star Dentistry, Бейкерсфилд, Калифорния — удобно для планирования выездов. (Его телефон / email / адрес — в Notion, не в этом публичном инструменте.) Бэкап-герой: Dr. Matt Lake."},
   wants:{en:"Externally: the best for his patients and his interns; not to be left behind; to leave a legacy.",ru:"Внешне: лучшее для пациентов и учеников; не остаться в прошлом; оставить наследие."},
   conflict:{en:"NOT an adoption arc — he's been a Glidewell / digital user 10+ years. His real, present tension: a ~2016 peak (~200 crowns/mo) with the numbers now slipping as the market shifts — how to stay relevant and grow. Plus a genuine, human barrier he still names after a decade: \"who do I call if the software fails mid-appointment?\" — the support/trust question Glidewell answers. (The skeptic-who-converts arc belongs to Hero 2, the old-school dentist — not to Abdul.)",ru:"НЕ арка перехода — он 10+ лет в цифре / с Glidewell. Его настоящее напряжение: пик ~2016 (~200 коронок/мес), а сейчас цифры проседают по мере смены рынка — как остаться нужным и расти. Плюс живой человеческий барьер, который он называет и спустя десятилетие: «кому звонить, если софт упадёт посреди приёма?» — вопрос поддержки/доверия, на который отвечает Glidewell. (Арка «скептик, который переходит» — у Hero 2, олдскульного доктора, не у Абдула.)"}},
  {id:'oldschool', nm:{en:"Hero 2 · old-school dentist (TBD)",ru:"Герой 2 · олдскульный доктор (TBD)"}, c:'#B08F33', sc:[1,4,5,11,14],
   wants:{en:"To keep serving his patients well and not fall behind — but on his own terms, without the fuss.",ru:"Продолжать хорошо лечить пациентов и не отстать — но на своих условиях, без лишней возни."},
   conflict:{en:"He's comfortable taking physical impressions and wary of the scanner — habit, cost, \"the old way still works.\" Placeholder hero (no specific person yet): in the film we teach him the scanner and he speeds up.",ru:"Ему привычны слепки и боязно со сканером — привычка, цена, «по-старому ведь работает». Плейсхолдер-герой (конкретного человека пока нет): в фильме мы обучаем его сканеру, и он ускоряется."}},
  {id:'guiding', nm:{en:"Hero 3 · Guiding Leaders student (TBD)",ru:"Герой 3 · студентка Guiding Leaders (TBD)"}, c:'#9E5C8E', sc:[2,10,14],
   wants:{en:"To grow into a leader who widens access to care — and to claim a place in a field that hasn't always made room.",ru:"Вырасти в лидера, расширяющего доступ к лечению — и занять место в профессии, где не всегда находилось место таким, как она."},
   conflict:{en:"An emerging dentist with less runway and fewer resources; the open question is whether affordable, digital, well-supported dentistry lets someone like her start strong and lead. Placeholder — a Guiding Leaders cohort member; nobody cast yet (dates via Bobbie Norton).",ru:"Начинающий врач с меньшим запасом и ресурсами; открытый вопрос — позволит ли доступная, цифровая, хорошо поддержанная стоматология такому человеку стартовать сильно и вести за собой. Плейсхолдер — участница когорты Guiding Leaders; человека пока не утвердили (даты — у Bobbie Norton)."},
   gl:{en:"**GL 2026 — cohort on campus (Irvine); film windows:**\n• May 14–15 — Relational Leadership (passed)\n• Jun 11–12 — New Practice Playbook · Own Your Finances (passed)\n• **Jul 16–17 — Bias/Executive Presence · HR · (17) Systems & Profit — we film Fri 17**\n• Aug 6–7 — Speak with Impact (communication & presentation)\n• Sep 17–18 — Social Media & Branding · Clinical Photography (sits next to our Align symposium 18–19 — combine)\n• **Oct 15–16 — Dentistry on the Rise (graduation / the climax)**\n**With Hero #3 here:** film her learning and presenting in her element; the bonds with her cohort; pick a session topic that mirrors her arc (leadership, finances, communication). Follow her ~4 months from a July session to the October graduation — the rise made literal. Casting & access via Bobbie.",ru:"**GL 2026 — группа на кампусе (Ирвайн); окна для съёмки:**\n• 14–15 мая — Relational Leadership (прошло)\n• 11–12 июн — New Practice Playbook · Own Your Finances (прошло)\n• **16–17 июл — Bias/Executive Presence · HR · (17) Systems & Profit — снимаем в пт 17**\n• 6–7 авг — Speak with Impact (коммуникация и презентации)\n• 17–18 сен — Соцсети и брендинг · Клиническая фотография (впритык к нашему симпозиуму Align 18–19 — объединить)\n• **15–16 окт — Dentistry on the Rise (выпуск / кульминация)**\n**С Героем №3 здесь:** снимать, как она учится и выступает в своей стихии; связи с группой; выбрать тему сессии, которая рифмуется с её аркой (лидерство, финансы, коммуникация). Сопровождать ~4 месяца от июльской сессии до октябрьского выпуска — восхождение буквально. Каст и доступ — через Бобби."}},
  {id:'patient', nm:{en:"Hero 4 · the patient (TBD)",ru:"Герой 4 · пациент (TBD)"}, c:'#3E8E8E', sc:[2,6,14],
   bio:{en:"<b>Hero #4 — the patient (TBD, not yet cast).</b> PROPOSED as the film's MAIN emotional arc-carrier — the one who actually transforms on screen (per our June 2026 discussion). This is a working proposal + an arc template, NOT a real person yet.<br><br><b>The decision (proposal):</b> the film's spine is the access thesis — the gap between the best dentistry and the person who couldn't get it, closing. Its emotional carrier and payoff = the patient. Everyone else serves it: <b>Abdul</b> = the throughline / host we travel through (he does NOT 'change' — he's the 10-yr-digital anchor); <b>Hero 2 (old-school)</b> = contrast, the world it hasn't reached yet; <b>Hero 3 (Guiding Leaders student)</b> = the same thesis from the provider side; <b>Jim / Glidewell</b> = how it became possible (mentor frame / Midpoint). Each hero keeps their own mini-arc, but the patient's is the SPINE the others feed.<br><br><b>Why the patient carries it:</b> it's the only arc that genuinely transforms within the ~4-month shoot window (weeks, not years) AND most directly proves the thesis — 'the best dentistry finally reached someone who'd been shut out.'<br><br><b>Proposed Save-the-Cat arc (template):</b> 1) Opening Image — hides the smile, the gap. 2) Theme Stated — 'the best dentistry doesn't help the person who can't walk in.' 3) Set-Up — why they avoided care for years (cost, fear, time, a bad past). 4) Catalyst — what finally pushes them in (an event, or Abdul's free charity-weekend day). 5) Debate — 'can I afford it, will it hurt, I've put it off so long.' 6) Break into Two — sits in the chair. 7) B Story — Abdul + his intern, the human care. 8) Fun & Games — the magic: scan, on-screen design, the mill carving while they wait, single-visit wow. 9) Midpoint — trust forms / first glimpse of the result. 10) Bad Guys Close In — fear returns, a hitch, old shame. 11) All Is Lost — a setback, doubt peaks. 12) Dark Night — what the missing smile cost them for years. 13) Break into Three — support comes through, almost there. 14) Finale — the reveal: restored smile, one visit, affordable; the 'oh my god, thank you' (real patients say this to Abdul). 15) Final Image — mirror of the opening: they smile freely. Thesis made flesh.<br><br><b>Casting criteria:</b> real stakes (years of avoided / written-off care; visible or felt impact); a case that showcases single-visit / affordable tech; willing to be filmed through a vulnerable arc (consent / privacy); ideally found via Abdul's practice or his charity clinic.<br><br><b>Honest caveats (proposal):</b> no specific patient is locked yet — this is the template; the real one gets cast. Beats 11–12 (All Is Lost / Dark Night) are hardest to guarantee on a routine crown — likely carried by the emotion (years of shame) rather than a clinical failure, or by choosing a slightly more involved case. One patient can feel narrow for a company+industry film, so breadth comes from Abdul's world + the Guiding Leaders cohort + the old-school contrast; the patient is the 'cat', the access theme is the spine.<br><br><b>Who we're looking for — portrait from the message (proposal):</b> someone for whom cost / fear / time kept good dentistry out of reach, and whose restored smile = restored dignity. Variants, each a facet of the thesis: (1) <b>economic access</b> — a working, uninsured person who put care off for years; affordability + single-visit finally lets them in (most on-thesis: 'for all economic strata, not only the rich'); (2) <b>fear / shame</b> — avoided the dentist for years, hid the smile; the gentle, fast, single-visit experience breaks the fear; (3) <b>time / logistics</b> — a busy parent or two-job worker who couldn't take multiple days off; one visit is the unlock; (4) <b>dignity / a life moment</b> — a broken front tooth blocking a job search or a return to public life; restoration reopens a door; (5) <b>health</b> — an untreated problem that hurt their broader health, finally fixed. Cross axes: age, gender, region, underserved / immigrant community. Practical pool (fact): Abdul's free charity weekends (where shut-out patients turn up) and his Bakersfield practice (a working, agricultural Central-Valley community). The message points hardest to (1); the strongest is usually a blend (economic + shame + a life moment). No real patient yet — this is the casting brief.",ru:"<b>Герой №4 — пациент (TBD, ещё не выбран).</b> ПРЕДЛОЖЕН как ГЛАВНЫЙ носитель эмоциональной арки фильма — тот, кто реально меняется на экране (по обсуждению, июнь 2026). Это рабочее предложение + шаблон арки, а НЕ реальный человек пока.<br><br><b>Решение (предложение):</b> хребет фильма — тезис доступности: разрыв между лучшей стоматологией и тем, кто не мог её получить, закрывается. Эмоциональный носитель и развязка этого = пациент. Остальные служат ему: <b>Абдул</b> = проводник/хозяин мира, через которого мы путешествуем (он НЕ «меняется» — он 10-летний цифровой якорь); <b>Hero 2 (олдскул)</b> = контраст, мир, куда ещё не дошло; <b>Hero 3 (студент Guiding Leaders)</b> = тот же тезис со стороны провайдера; <b>Джим / Glidewell</b> = как это стало возможным (рамка-ментор / Midpoint). У каждого героя своя мини-арка, но арка пациента — СПИНА, которую питают остальные.<br><br><b>Почему несёт пациент:</b> это единственная арка, что реально меняется в окно съёмок ~4 месяца (недели, не годы) И прямее всех доказывает тезис — «лучшая стоматология наконец дошла до того, кого раньше не пускали».<br><br><b>Предложенная арка «Спасти котика» (шаблон):</b> 1) Opening Image — прячет улыбку, разрыв. 2) Theme Stated — «лучшая стоматология не помогает тому, кто не может в неё войти». 3) Set-Up — почему годами не шёл (цена, страх, время, плохой прошлый опыт). 4) Catalyst — что наконец толкает прийти (повод, или бесплатный благотворительный день Абдула). 5) Debate — «потяну ли, будет ли больно, столько лет откладывал». 6) Break into Two — садится в кресло. 7) B Story — Абдул + его интерн, человеческая забота. 8) Fun & Games — магия: скан, дизайн на экране, фрезер точит коронку, пока он ждёт, вау «за один визит». 9) Midpoint — возникает доверие / первый проблеск результата. 10) Bad Guys Close In — возвращается страх, заминка, старый стыд. 11) All Is Lost — сбой, сомнение на пике. 12) Dark Night — чего стоила ему пропавшая улыбка годами. 13) Break into Three — поддержка срабатывает, почти у цели. 14) Finale — раскрытие: восстановленная улыбка, один визит, по карману; «oh my god, спасибо» (реальные пациенты так и говорят Абдулу). 15) Final Image — зеркало открытия: улыбается открыто. Тезис стал плотью.<br><br><b>Критерии кастинга:</b> настоящая ставка (годами избегал/списал помощь; видимый или ощущаемый эффект); кейс, показывающий один-визит / доступную технологию; готов сниматься в уязвимой дуге (согласие / приватность); в идеале найден через практику Абдула или его благотворительную клинику.<br><br><b>Честные оговорки (предложение):</b> конкретного пациента ещё нет — это шаблон, реального кастуем. Биты 11–12 (All Is Lost / Dark Night) труднее всего гарантировать на рядовой коронке — скорее их даст эмоция (годы стыда), чем клинический провал; либо берём чуть более сложный кейс. Один пациент может быть узковат для фильма о компании+индустрии, поэтому ширину дают мир Абдула + поток Guiding Leaders + олдскул-контраст; пациент — «котик», тема доступности — спина. <br><br><b>Кого ищем — портрет из месседжа (предложение):</b> человек, для кого цена / страх / время держали хорошую стоматологию вне досягаемости, и чья восстановленная улыбка = вернувшееся достоинство. Варианты, каждый — грань тезиса: (1) <b>экономический доступ</b> — работающий человек без страховки, годами откладывал; доступная цена + один визит наконец впускают (самый «на тезисе»: «для всех достатков, не только богатых»); (2) <b>страх / стыд</b> — годами избегал, прятал улыбку; мягкий, быстрый, за-один-визит опыт ломает страх; (3) <b>время / логистика</b> — занятой родитель или человек на двух работах, не мог отпрашиваться; разблокирует один визит; (4) <b>достоинство / момент жизни</b> — сломанный передний зуб мешает поиску работы или возвращению в общество; восстановление открывает дверь; (5) <b>здоровье</b> — нелеченая проблема била по общему здоровью, наконец решена. Поперечные оси: возраст, пол, регион, недообслуженное / иммигрантское комьюнити. Практический пул (факт): благотворительные выходные Абдула (туда приходят «отрезанные» пациенты) и его практика в Бейкерсфилде (рабочий аграрный город Центральной долины). Месседж тянет сильнее к (1); сильнее всего обычно смесь (экономика + стыд + момент жизни). Реального пациента пока нет — это кастинг-бриф."},
   wants:{en:"To stop hiding their smile and finally get care they'd written off as out of reach — to be treated and made whole.",ru:"Перестать прятать улыбку и наконец получить помощь, которую считал недоступной, — вылечиться и снова почувствовать себя целым."},
   conflict:{en:"Cost, fear and time kept them away for years — the film's central question made personal: will affordable, single-visit, well-supported dentistry actually reach someone like them? Placeholder — to be cast from current patients, ideally one whose treatment we can follow in a hero-dentist's chair; the one face the whole film answers to.",ru:"Годами не шёл из-за цены, страха и нехватки времени — центральный вопрос фильма, ставший личным: дойдёт ли доступная, за один визит, хорошо поддержанная стоматология до такого человека? Плейсхолдер — выбрать из текущих пациентов, в идеале того, чьё лечение покажем в кресле героя-дантиста; то самое лицо, на которое отвечает весь фильм."}}
];

        +calDays(m.dim,m.k)+'<span class="cm-nm">'+L(m.nm)+'</span></div>';

    const evx=(mk,d)=>{ const i=CAL_MONTHS.findIndex(m=>m.k===mk); if(i<0)return CL; const m=CAL_MONTHS[i]; return CL+i*MW+((d-0.5)/m.dim)*MW; };
    // "Now" tracks the real current date (clamped to the Jul–Oct window) so it never goes stale
    const lo=CAL_MONTHS[0].k, hi=CAL_MONTHS[CAL_MONTHS.length-1].k, t=new Date(), tM=t.getMonth()+1, tD=t.getDate();
    const nowMD=(tM<lo)?[lo,1]:(tM>hi)?[hi,CAL_MONTHS[CAL_MONTHS.length-1].dim]:[tM,tD];
    CAL_EVENTS.forEach((e,i)=>{
      const x=e.now?evx(nowMD[0],nowMD[1]):evx(e.m,e.d), lbl=L(e.short||e.t);
      if(e.now){
        h+='<div class="cal-now" data-cal="'+i+'" title="'+L(e.t)+' — '+L(e.when)+'" style="left:'+x.toFixed(1)+'px;top:'+(CALTOP-15)+'px;height:'+(CALH+26)+'px">'
          +'<span class="cn-lbl" style="color:'+e.c+'">'+lbl+'</span>'
          +'<span class="cn-line" style="background:'+e.c+'"></span></div>';
      } else {
        const dotStyle=e.tent?('background:var(--paper);border-color:'+e.c):('background:'+e.c);
        h+='<div class="cal-ev'+(e.star?' star':'')+(e.tent?' tent':'')+'" data-cal="'+i+'" title="'+L(e.t)+' — '+L(e.when)+'" style="left:'+x.toFixed(1)+'px;top:'+(CALTOP+CALH/2)+'px">'
          +'<span class="ce-dot" style="'+dotStyle+'"></span>'
          +'<span class="ce-lbl" style="color:'+e.c+'">'+lbl+'</span></div>';
      }
    });
  })();
  // story-beat ruler (Save the Cat) — between scenes and heroes, positioned by % of film
  const bx=p=>84+(p/100)*(STAGEW-154);
  let _bb=0,_pp=0;
  BEATSHEET.forEach((B,i)=>{
    if(B.a!=null){
      const x1=bx(B.a), x2=bx(B.b), w=Math.max(30,x2-x1-3);
      h+='<div class="beatblk'+(_bb++%2?'':' alt')+'" data-beat-sheet="'+i+'" style="left:'+(x1+1.5)+'px;top:'+(BEATY-12)+'px;width:'+w+'px">'
        +'<span class="bk-n">'+L(B.nm)+'</span><span class="bk-p">'+B.pct+'</span></div>';
    } else {
      const x=bx(B.pos);
      h+='<div class="beatpin" data-beat-sheet="'+i+'" style="left:'+x+'px;top:'+(BEATY-15)+'px">'
        +'<span class="pin-stem"></span><span class="pin-dot"></span>'
        +'<span class="pin-lbl hi">'+L(B.nm)+'</span></div>';
    }
  });
  h+='<div class="morep" data-pers="1" style="left:88px;top:66px"><div class="mp-ttl">'+L(UI.persBtnTitle)+'</div><div class="mp-sub">'+L(UI.persSub)+' · '+Object.keys(SPK).length+' + '+MORE_PEOPLE.reduce((a,b)=>a+b.people.length,0)+'</div></div>';
  h+='<div class="linelegend" style="left:90px;top:115px">'
    +'<div class="lgnd-row" data-metric="cap"><span class="lgnd-sw cap"></span>'+L(UI.legCap)+'</div>'
    +'<div class="lgnd-row" data-metric="territory"><span class="lgnd-sw terr"></span>'+L(UI.legTerr)+'</div>'
    +'<div class="lgnd-row" data-metric="employees"><span class="lgnd-sw emp"></span>'+L(UI.legEmp)+'</div>'
    +'</div>';
  // --- Territory expansion markers: blue building icons just above the line, at each growth year ---
  (function(){
    if(typeof EXPANSIONS==='undefined'||!EXPANSIONS.length) return;
    const py=v=>{ v=String(v); if(/today|now|present/i.test(v))return 2026; const m=v.match(/(\d{4})/); if(m)return +m[1]; const d=v.match(/(\d0)s/); if(d){let b=+d[1]; return (b<=30?2000:1900)+b;} return 1970; };
    const yp=BEATS.map(b=>({yr:py(b.y),x:b.x})).filter(p=>p.yr).sort((a,b)=>a.yr-b.yr);
    const yToX=y=>{ if(y<=yp[0].yr)return yp[0].x; for(let i=1;i<yp.length;i++){ if(y<=yp[i].yr){const a=yp[i-1],b=yp[i]; return a.x+(b.x-a.x)*(y-a.yr)/(b.yr-a.yr);} } return yp[yp.length-1].x; };
    const ico='<svg width="18" height="18" viewBox="-7 -8 14 16" class="bld-ico" aria-hidden="true"><path fill-rule="evenodd" d="M-5,-5 H5 V6 H-5 Z M-3,-3 H-1 V-1 H-3 Z M1,-3 H3 V-1 H1 Z M-3,1 H-1 V3 H-3 Z M1,1 H3 V3 H1 Z"/></svg>';
    EXPANSIONS.forEach((e,i)=>{ const x=yToX(py(e.y));
      h+='<div class="bld" data-bld="'+i+'" style="left:'+x.toFixed(1)+'px;top:'+(LINEY-36)+'px" title="'+e.y+' · '+L({en:'territory expansion',ru:'расширение территории'})+'">'+ico+'</div>';
    });
    // employees — little-person icons in the SAME lane as buildings; if a building shares the year, sit beside it
    if(typeof EMPLOYEES!=='undefined'){
      const pico='<svg width="15" height="18" viewBox="-6 -9 12 19" class="ppl-ico" aria-hidden="true"><circle cx="0" cy="-5" r="3"/><path d="M-4,9 V2 a4,4 0 0 1 8,0 V9 Z"/></svg>';
      const expYears=new Set(EXPANSIONS.map(x=>py(x.y)));
      EMPLOYEES.forEach((e,i)=>{ const yr=py(e.y); const x=yToX(yr); const dup=expYears.has(yr); const left=dup?(x+14):x;
        h+='<div class="ppl" data-ppl="'+i+'" style="left:'+left.toFixed(1)+'px;top:'+(LINEY-36)+'px" title="'+e.y+' · '+L({en:'employees',ru:'сотрудники'})+'">'+pico+'</div>';
      });
    }
    // --- Archival book photos: thumbnails ABOVE the line at their year; click → lightbox (no caption) ---
    if(typeof BOOK_PHOTOS!=='undefined' && BOOK_PHOTOS.length){
      const PH=66, PW=Math.round(PH*16/9), GAP=7, TOP=JIMLINEY+8; let lastRight=-1e9;
      [...BOOK_PHOTOS].sort((a,b)=>a.yr-b.yr).forEach((p,i)=>{
        let left=yToX(p.yr)-PW/2; if(left<lastRight+GAP) left=lastRight+GAP; lastRight=left+PW;
        h+='<div class="line-photo'+(p.film?' lp-film':'')+(p.archive?' lp-archive':'')+'" data-src="'+p.src+'"'+(p.film?' data-film="film.html"':'')+(p.archive?' data-archive="1"':'')+' style="left:'+left.toFixed(1)+'px;top:'+TOP+'px;width:'+PW+'px;height:'+PH+'px" title="'+(p.film?'About the film':p.archive?'Archive hunt':p.yr)+'">'
          +'<img src="'+p.src+'" alt="" onerror="this.closest(\'.line-photo\').remove()">'
          +(p.film?'<span class="lp-badge">▶ The film</span>':'')
          +(p.archive?'<span class="lp-badge">🗄 Archive</span>':'')
          +'</div>';
      });
    }
  })();
  // preview frame thumbnails (lane between Save-the-Cat and Heroes)
  if(typeof SCENE_FRAMES!=='undefined'){
    const FW=Math.round(FRAMEH*16/9), GAP=6;
    for(let k=1;k<=14;k++){
      const arr=SCENE_FRAMES[k]; if(!arr||!arr.length) continue;
      const x0=sbnd[k-1]+4;  // start frames at the BEGINNING (left edge) of the scene
      arr.forEach((fr,i)=>{ const left=x0+i*(FW+GAP);
        h+='<div class="frame-thumb" data-frame-scene="'+k+'" style="left:'+left.toFixed(1)+'px;top:'+FRAMETOP+'px;width:'+FW+'px;height:'+FRAMEH+'px" title="#'+k+' '+L(SCENES[k])+'">'
          +'<img class="frame-img" src="'+fr.src+'" alt="" onerror="this.remove()">'
          +'<span class="frame-ph">#'+k+'</span>'
          +'</div>';
      });
    }
  }
  return h;
}

function setHL(bi,on){
  const st=document.getElementById('st-'+bi), nd=document.getElementById('nd-'+bi);
  if(st)st.classList.toggle('hl',on); if(nd)nd.classList.toggle('hl',on);
  document.querySelectorAll('.chip[data-beat="'+bi+'"],.ev[data-beat="'+bi+'"]').forEach(el=>el.classList.toggle('hl',on));
  document.querySelectorAll('.arl[data-beat="'+bi+'"]').forEach(e=>e.classList.toggle('on',on));
  (BEATS[bi].sc||[]).forEach(k=>{ const fl=document.getElementById('fl-'+k); if(fl)fl.classList.toggle('hl',on); });
  (BEATS[bi].j||[]).forEach(key=>{
    const lane=document.getElementById('jl-'+key); if(lane)lane.classList.toggle('hl',on);
    const mk=document.getElementById('jm-'+key+'-'+bi); if(mk)mk.classList.toggle('hl',on);
  });
  stage.classList.toggle('dim',on);
}

['mouseover','mouseout'].forEach(evt=>{

    const ch=e.target.closest('.chip'); if(ch){setSpkHL(ch.dataset.spk,evt==='mouseover');return;}
    const el=e.target.closest('[data-beat]'); if(el)hoverHL(el.dataset.beat,evt==='mouseover');
  });

    const sp=e.target.closest('.spkpill'); if(sp){setSpkHL(sp.dataset.spk,evt==='mouseover');return;}

// format free text into readable blocks: blank-line paragraphs, • / - bullets, **bold**, leading LABEL:
function fmtText(s){
  function esc2(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  return String(s).split(/\n+/).map(function(raw){
    var line=raw.trim(); if(!line) return '';
    var bullet=/^[•\-–]\s?/.test(line); if(bullet) line=line.replace(/^[•\-–]\s?/,'');
    var html=esc2(line).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/^([A-ZА-Я][A-ZА-Я0-9 ()\/.,—-]{1,42}:)/,'<b>$1</b>');
    return bullet ? '<div class="fmt-li">'+html+'</div>' : '<p>'+html+'</p>';
  }).join('');
}

    {h:{en:"Handcraft — how teeth were made",ru:"Ручное ремесло — как делали зубы"}, q:"“Before CAD existed it would be a physical model, casted as a stone model using the impression taken from the patient — and the technician would just sculpt the crown, essentially as a sculptor.” · “He was an artist by training — a lot of ceramists treat themselves as artists; they'd really carve the tooth out of physical material. That's how it was, long ago, before CAD/CAM.”"},
    {h:{en:"The vanishing 'trimmer'",ru:"Исчезающий «обрезчик»"}, q:"“One of the central pieces in any lab was the stone model — people pouring stone into the impressions and then trimming them by hand. The trimmer was the most skilled technician in the lab. That's no longer the case — we maybe have one or two trimmers left.”"},
    {h:{en:"Handmade vs machine",ru:"Рукотворное vs машина"}, q:"“There's a traditional perception that handmade is always higher quality — more attention, more work went into it. But today nobody does it that way — because the quality is actually higher with a machine; you can't reach the accuracy a machine delivers.”"},
    {h:{en:"The waiting & discomfort",ru:"Ожидание и неудобство"}, q:"“Instead of coming two or three times, everything is done in one day… patients save time, they get the crown the same day.” · “The stone model itself may have errors — physical impression → pouring stone → trimming; digitally we can provide accuracy that was impossible before.”"}]},
   {spk:'abdul', role:'witness', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"The old way, first-person",ru:"Старый процесс от первого лица"}, q:"“Just to make a crown, it was a lot of steps: the manual impression, mix the stone, pour it, wait, trim it… wax a crown by hand, put it in a flask, melt the wax out — then you melt the metal with really extreme heat, it spins, you inject it into the flask… and you've got to pray there are no bubbles, because if there are, you do it all over again. If it's a front tooth, you brush the porcelain on one layer at a time, bake it, glaze it — and again you pray everything fits.”"},
    {h:{en:"Never imagined",ru:"Не мог представить"}, q:"“I never imagined in my life that it would be just kind of a click of a button at some point — and boom, you have your crown.”"}]}],
  2:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Why it matters",ru:"Почему это важно"}, q:"“Teeth you don't always see — but a toothache, or a crown made wrong, has a huge impact on your quality of life. If we do the software and the process right, we help people with real problems — that's what drives me.”"}]},
   {spk:'abdul', role:'witness', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"The price, felt",ru:"Цена, как её чувствуют"}, q:"“There's always that little financial pain when you're paying for those services.” · Volunteer events offer extractions and fillings — never crowns: “when it comes to having a crown, in our society right now it comes with a price tag.”"}]}],
  3:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Same-day crown",ru:"Коронка за один визит"}, q:"“You come to the dentist, he can scan you, design — you can see how they design your crown and how they make it — and put it in your mouth in under two hours. I experienced it myself. It's a game changer.”"}]},
   {spk:'abdul', role:'guide', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"In his office, today",ru:"В его кабинете, сегодня"}, q:"“We tell the patient: give us about an hour — we're going to work on your crown… We call them to the back office and show them how we designed it, how we're milling it. It's a wow factor: ‘You don't have to send it out anymore? I don't have to come back for a temporary anymore?’ The machine prompts us: put the block in, change the bur, close the door, hit start — and it just takes over from there.”"},
    {h:{en:"The taste of digital",ru:"Вкус цифры"}, q:"“Once you get a taste of that digital advantage — the perfection in the design, the execution, the delivery — it's very satisfying, because you reach a level that is very predictable, and you can reach it over and over and over.”"}]}],
  4:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Why change is hard",ru:"Почему переход труден"}, q:"“Change is difficult for everybody. People who are not willing to adjust, not willing to change — it will be very tough for them.”"}]},
   {spk:'abdul', role:'counter', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"His own doubt",ru:"Его собственное сомнение"}, q:"“We were skeptical at first — you're so used to a physical impression, and now everything is digital, images flying around: does this really work? I even had to have that leap of faith with my staff.”"},
    {h:{en:"The catalyst was the pandemic",ru:"Катализатором стала пандемия"}, q:"“It all started in the pandemic… I started thinking about the same-day crown — this will eliminate a second visit… that's when we adopted that new technology.” (milling since 2020)"},
    {h:{en:"Trust, earned",ru:"Доверие, заработанное"}, q:"“I used to tell my patients: just in case technology fails me, I want to have a backup [impression] so I can make you a temporary crown… We don't take those backup impressions anymore — that's how confident we are with the process.”"}]}],
  5:[{spk:'azernikov', role:'anchor', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"AI designs, a human approves",ru:"ИИ проектирует, человек утверждает"}, q:"“Today we design pretty much 100% of our crowns using generative neural networks. Back in 2015–2016 it was absolutely novel — even outside of dentistry.” ⚠ reconcile with the public “>95%” figure before screen"},
    {h:{en:"50 → 200 a day",ru:"50 → 200 в день"}, q:"“A designer went from about 50 designs a day to 200 — his role essentially shifted from designing to quality assurance. When he opens the case, he is the first person who actually sees it.”"},
    {h:{en:"A twist of history",ru:"Поворот истории"}, q:"“Interestingly, 3Shape — very known now as a dental company — was a hearing-aid company. Glidewell actually taught 3Shape how to make teeth.”"}]}],
  6:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Awareness",ru:"Осведомлённость"}, q:"“If you ask people on the street — do you know you can get a crown done the same day in the doctor's office? — most of them will say no. If we create that awareness, we'll serve many more patients.”"}]},
   {spk:'abdul', role:'anchor', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"What holds patients back",ru:"Что держит пациентов"}, q:"“Patients have their worries first: in their mind it's not a pleasant experience — numbing, discomfort, time, and the cost, because dentistry is not cheap. The number one factor that makes things easier is trust — that relationship you build with the patient.”"},
    {h:{en:"Do they care how it's made?",ru:"Им важно, как сделана коронка?"}, q:"“Honestly — the patients, they don't care… they want to feel they're in a place where they can trust you. But I always enjoy showing them the process — the scanning, the AI-assisted design, the mill. For them it's entertaining, and it reinforces that feeling of trust.”"}]}],
  8:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Self-reliance",ru:"Самодостаточность"}, q:"“If you're using third party, you depend on somebody else. Jim's philosophy is always to be self-reliant — vertical integration is one of the pillars of this company.”"},
    {h:{en:"Kitchen → empire",ru:"Кухня → империя"}, q:"“You can't, from just making crowns in your kitchen, create an empire that runs hundreds of thousands of cases a week. Those things don't happen — but it happened here. I compare him to Ford or Carnegie.”"}]}],
  7:[{spk:'abdul', role:'witness', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"Visits are the cost",ru:"Визиты и есть цена"}, q:"“Before: two visits — if you get everything right and don't have to remake it… With the same-day crown, patients come in, get numbed once, we do the work. It's chair time for us too — we used to block an hour that now we can free up for other work.”"}]}],
  10:[{spk:'azernikov', role:'anchor', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"The data moat",ru:"Ров из данных"}, q:"“Our case collection implicitly represents the knowledge of thousands of technicians. I compare it to a self-driving car: millions of cars accumulating data constantly, improving the system. The same can be said about our cases — a self-accelerating process that is difficult to replicate.”"},
    {h:{en:"People, not layoffs",ru:"Люди, а не сокращения"}, q:"“When we introduced innovation, part of that process was thinking where we are going to relocate these people. We never went through a major wave of layoffs — we kept the headcount steady while the volume grew.”"}]},
   {spk:'abdul', role:'witness', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"The Costco effect",ru:"Эффект Costco"}, q:"“It's like going to Costco: you buy something, you're not sure if it's going to work or not, but you always feel like you have that backup — they'll take care of it. That's been our story with Glidewell.”"},
    {h:{en:"Support as the answer to fear",ru:"Поддержка как ответ на страх"}, q:"“If there's any issue, they're so quick on making it right — that gives you confidence… we love the people that pick up on the other side of the phone: very courteous, very helpful, very prompt.”"}]}],
  11:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Nearly hands-free",ru:"Почти без рук"}, q:"“If you think about how many people touch the crown manually today — it can be as little as the person who puts it in the shipping package.”"}]},
   {spk:'abdul', role:'witness', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"Routine now",ru:"Теперь рутина"}, q:"“My staff do it: they scan, they get the design, we get the milling going.” · “With all the updates, with the AI features detecting the margin, the design is a lot more flawless now — we don't have to interfere as much.”"}]}],
  12:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Connect first, then make it smart",ru:"Сначала соединить, потом поумнеть"}, q:"“In the doctor's office the systems just don't talk to each other. Before you make them smarter, you have to connect them — and once we have that, we can enhance it with intelligence.”"},
    {h:{en:"Robots at the chair",ru:"Роботы у кресла"}, q:"“There are robots that can prepare the tooth with the doctor supervising. It's not adopted yet, but technically it's possible — within the next 5 to 10 years we'll definitely see it.”"}]},
   {spk:'abdul', role:'counter', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"An honest note",ru:"Честная нота"}, q:"“We're implementing the 3D printing now — we're still kind of struggling with that step, compared to the milling. The milling we got down; I'm sure there will be a lot of changes.”"}]}],
  13:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"The lesson of the transition",ru:"Урок перехода"}, q:"“The machine is not going to replace you — but somebody who knows how to use it will. People who were forward-looking understood the potential — they're now able to make much more.”"}]},
   {spk:'abdul', role:'witness', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"Walter's story",ru:"История Уолтера"}, q:"“About 15 years ago a young guy named Walter came to shadow us… he ended up going to UCLA for dental school, and he told us: ‘that experience really changed my life.’ Through the years we've had more than 12 young dentists start here. I tell them: you'd better come back to Bakersfield and help me out — one of them will take over the practice.”"}]}],
  14:[{spk:'azernikov', role:'builder', d:{en:"from his 9 Jul interview",ru:"из интервью 9 июля"}, items:[
    {h:{en:"Five years out",ru:"Через пять лет"}, q:"“I'm sure that in five years from now most dentists will have some sort of technology that will allow them to create crowns in the office. From the patient's perspective — one visit. That's huge.”"},
    {h:{en:"The hardest part",ru:"Самое трудное"}, q:"“If you ask people what they want, they would want a faster horse. It's not until you come up with the disruption… For a system to learn how to disrupt — creativity — that's the hardest part.”"}]},
   {spk:'abdul', role:'counter', d:{en:"from his 10 Jul interview",ru:"из интервью 10 июля"}, items:[
    {h:{en:"The counterpoint",ru:"Контрапункт"}, q:"“I don't think people would want to go to a robot to do their dental work. The human interaction is very crucial in our profession… That relationship, that human labor — I think we still have a pretty good runway before the machine takes over.”"}]}]

function svSubmit(){
  const d=svLoad(), st=document.getElementById('sv-status');
  const rows=Object.keys(d.answers||{}).filter(id=>d.answers[id]&&(d.answers[id].fam||d.answers[id].connect))
    .map(id=>({id:id, name:SPK[id]?SPK[id].nm:id, fam:d.answers[id].fam||'', connect:d.answers[id].connect||''}));
  if(!d.name||!d.name.trim()){ if(st)st.textContent=L({en:'Enter your name first.',ru:'Сначала впишите имя.'}); return; }
  if(!rows.length){ if(st)st.textContent=L({en:'Mark at least one person.',ru:'Отметьте хотя бы одного.'}); return; }
  const payload={type:'connect', respondent:d.name.trim(), items:rows};
  if(!SURVEY_ENDPOINT){ if(st)st.textContent=L({en:'Receiver not connected yet (Apps Script URL needed).',ru:'Приёмник ещё не подключён (нужен URL Apps Script).'}); console.log('SURVEY payload (not sent):',payload); return; }
  if(st)st.textContent=L({en:'Sending…',ru:'Отправляю…'});
  fetch(SURVEY_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(()=>{ if(st)st.textContent=L({en:'Thanks — sent ✓',ru:'Спасибо — отправлено ✓'}); })
    .catch(()=>{ if(st)st.textContent=L({en:'Send error — try again.',ru:'Ошибка отправки — ещё раз.'}); });
}
const SPK_GEO=[
  {t:{en:"Glidewell — at the company now",ru:"Glidewell — сейчас работают в компании"}, ids:['jim','sasaki','leeson','azernikov','chi','manalili','friebauer','norton']},
  {t:{en:"California — outside the company",ru:"Калифорния — вне компании"}, ids:['venard','dorfman','ditolla','park']},
  {t:{en:"Other states",ru:"Другие штаты"}, ids:['farran','spear','christensen','rella','kois','kosinski','resnik','patel']}
];
function openPersonalities(keep){
  if(!keep)openRef={type:'personalities'}; clearPin();
  const sv=svLoad();
  const cardFor=function(id){var sp=SPK[id]; var a=(sv.answers&&sv.answers[id])||{};
    var connected=!!SURVEY_CONNECTED[id];
    var fam=connected
      ? '<span class="sv-connected">'+L({en:'Connected',ru:'На связи'})+'</span>'
      : SURVEY_FAM.map(f=>'<button type="button" class="sv-fam'+(a.fam===f.v?' on':'')+'" data-sv-id="'+id+'" data-sv-fam="'+f.v+'">'+L(f)+'</button>').join('');
    return '<div class="pers-card sv-card">'
      +(SPK_IMG[id]?'<img src="'+SPK_IMG[id]+'" alt="" data-go="'+id+'" title="'+L({en:'Open profile',ru:'Открыть профиль'})+'">':'')
      +'<div class="pc-tx"><div class="pc-nm" data-go="'+id+'" title="'+L({en:'Open profile',ru:'Открыть профиль'})+'">'+sp.nm+gwBadge(sp)+micBadge(id)+'</div><div class="pc-role">'+L(sp.role)+'</div>'
      +'<div class="sv-fams">'+fam+'</div>'
      +(connected?'':'<input class="sv-connect" data-sv-id="'+id+'" placeholder="'+L({en:'Can you connect / via whom?',ru:'Могу свести / через кого?'})+'" value="'+svEsc(a.connect)+'">')
      +'</div></div>';
  };
  const placed={}; SPK_GEO.forEach(g=>g.ids.forEach(id=>placed[id]=1));
  const leftovers=Object.keys(SPK).filter(id=>!placed[id]);
  const secs=SPK_GEO.map(g=>'<div class="cast-sec">'+L(g.t)+'</div><div class="pers-grid sv-grid">'+g.ids.filter(id=>SPK[id]).map(cardFor).join('')+'</div>').join('')
    +(leftovers.length?'<div class="cast-sec">'+L({en:'Unsorted',ru:'Вне групп'})+'</div><div class="pers-grid sv-grid">'+leftovers.map(cardFor).join('')+'</div>':'');
  const moreBlocks=MORE_PEOPLE.map(b=>'<dt>'+L(b.g)+'</dt><dd>'+b.people.map(p=>'<div class="mp-row">'+(MORE_IMG[p.n]?'<img class="mp-av" src="'+MORE_IMG[p.n]+'" alt="">':'')+'<div class="mp-tx"><b>'+p.n+'</b>'+(p.r?' — '+L(p.r):'')+'</div></div>').join('')+'</dd>').join('');
  pin.innerHTML='<div class="kicker">'+L(UI.persKicker)+'</div>'
    +'<h2>'+L({en:'Speaker connections — survey',ru:'Связи со спикерами — опрос'})+'</h2>'
    +'<p class="scdesc">'+L({en:'For each person: how well you know them, and whether you can connect us for an interview. Fill once, one <a class="sv-resplink" href="https://docs.google.com/spreadsheets/d/1K0zPInMC3SgQakJCjt1289Loxbtsv_xke-AFiYAKDHQ/edit" target="_blank" rel="noopener">Send</a><a href="cast-results.html" style="color:inherit;text-decoration:none;cursor:text">.</a>',ru:'По каждому: насколько знаете и можете ли свести для интервью. Заполните один раз, одна <a class="sv-resplink" href="https://docs.google.com/spreadsheets/d/1K0zPInMC3SgQakJCjt1289Loxbtsv_xke-AFiYAKDHQ/edit" target="_blank" rel="noopener">«Отправить»</a><a href="cast-results.html" style="color:inherit;text-decoration:none;cursor:text">.</a>'})+'</p>'
    +secs
    +'<div class="sv-foot"><input class="sv-name" placeholder="'+L({en:'Your name',ru:'Ваше имя'})+'" value="'+svEsc(sv.name)+'"><button type="button" class="sv-send" id="sv-send">'+L({en:'Send',ru:'Отправить'})+'</button><span class="sv-status" id="sv-status"></span></div>'
    +'<div class="cast-sec" style="margin-top:22px">'+L(UI.moreTitle)+'</div>'
    +'<p class="scdesc">'+L(UI.moreIntro)+'</p>'
    +'<dl>'+moreBlocks+'</dl>';
  show();
}
function show(){panel.classList.add('open');panel.setAttribute('aria-hidden','false');}
function hide(){panel.classList.remove('open');panel.classList.remove('full');var _pf=document.getElementById('pfull');if(_pf)_pf.textContent='⤢';panel.setAttribute('aria-hidden','true');openRef=null;clearPin();}
const lightbox=document.getElementById('lightbox');
const lbImg=lightbox.querySelector('img'), lbCap=lightbox.querySelector('figcaption');
function openLightbox(src){ if(!src)return; lbImg.src=src; lbCap.style.display='none'; lightbox.classList.add('open'); lightbox.setAttribute('aria-hidden','false'); }
function closeLightbox(){ lightbox.classList.remove('open'); lightbox.setAttribute('aria-hidden','true'); lbImg.removeAttribute('src'); }
lightbox.addEventListener('click',closeLightbox);
document.getElementById('px').onclick=hide;
document.getElementById('pfull').onclick=function(){var f=panel.classList.toggle('full');this.textContent=f?'⤡':'⤢';this.setAttribute('aria-label',f?'Collapse':'Expand');this.setAttribute('title',f?'Свернуть':'Развернуть на весь экран');};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(lightbox.classList.contains('open')){closeLightbox();return;}hide();}});
stage.addEventListener('click',e=>{
  const lp=e.target.closest('.line-photo'); if(lp){ if(lp.dataset.film){window.open(lp.dataset.film,'_blank','noopener');return;} if(lp.dataset.archive){openArchive();return;} openLightbox(lp.dataset.src||(lp.querySelector('img')||{}).src, lp.dataset.cap||''); return;}
  const ft=e.target.closest('.frame-thumb'); if(ft){openScene(+ft.dataset.frameScene);return;}
  const bd=e.target.closest('.bld'); if(bd){openExpansion(+bd.dataset.bld);return;}
  const pp=e.target.closest('.ppl'); if(pp){openWorkforce(+pp.dataset.ppl);return;}
  const lg=e.target.closest('.lgnd-row'); if(lg){openMetric(lg.dataset.metric);return;}
  const mp=e.target.closest('.morep'); if(mp){mp.dataset.pers?openPersonalities():openMorePeople();return;}
  const bk=e.target.closest('.beatblk,.beatpin'); if(bk){openBeatSheet(+bk.dataset.beatSheet);return;}
  const ce=e.target.closest('.cal-ev'); if(ce){openCalEvent(+ce.dataset.cal);return;}
  const cm=e.target.closest('.cal-month'); if(cm){openCalMonth(+cm.dataset.calMonth);return;}
  const pl=e.target.closest('.fb-pill'); if(pl){openPillar(pl.dataset.pillar);return;}
  const fb=e.target.closest('.film-block'); if(fb){openScene(+fb.dataset.scene);return;}
  const chip=e.target.closest('.chip'); if(chip){openSpeaker(chip.dataset.spk);return;}
  const card=e.target.closest('.ev'); if(card){openBeat(+card.dataset.beat);return;}
});
pin.addEventListener('input',e=>{
  const c=e.target.closest('.sv-connect'); if(c){ const d=svLoad(); d.answers=d.answers||{}; d.answers[c.dataset.svId]=d.answers[c.dataset.svId]||{}; d.answers[c.dataset.svId].connect=c.value; svSave(d); return; }
  const n=e.target.closest('.sv-name'); if(n){ const d=svLoad(); d.name=n.value; svSave(d); }
});
draw.addEventListener('click',e=>{
  const gh=e.target.closest('[data-go-allheroes]'); if(gh){openAllHeroes();return;}
  const sp=e.target.closest('.spkpill'); if(sp){openSpeaker(sp.dataset.spk);return;}
  const pl=e.target.closest('[data-pillar]'); if(pl){openPillar(pl.dataset.pillar);return;}
  const hb=e.target.closest('.herobar'); if(hb){openHeroMoment(hb.dataset.hero,+hb.dataset.scene);return;}
  const nd=e.target.closest('.nd'); if(nd){openBeat(+nd.dataset.beat);return;}
  const fm=e.target.closest('[data-scene]'); if(fm){openScene(+fm.dataset.scene);return;}
  const jm=e.target.closest('[data-jim]'); if(jm){openJim(+jm.dataset.jim);return;}
  const jl=e.target.closest('[data-journey]'); if(jl){openJourney(jl.dataset.journey);return;}
});
pin.addEventListener('click',e=>{
  const sfam=e.target.closest('.sv-fam'); if(sfam){ const id=sfam.dataset.svId, v=sfam.dataset.svFam; const d=svLoad(); d.answers=d.answers||{}; d.answers[id]=d.answers[id]||{}; d.answers[id].fam=(d.answers[id].fam===v?'':v); svSave(d); sfam.parentNode.querySelectorAll('.sv-fam').forEach(b=>b.classList.toggle('on', b.dataset.svFam===d.answers[id].fam)); return; }
  const ssend=e.target.closest('.sv-send'); if(ssend){ svSubmit(); return; }
  const sf=e.target.closest('.scframe'); if(sf){const im=sf.querySelector('img'); if(im&&im.getAttribute('src')){const fc=sf.querySelector('figcaption'); openLightbox(im.src, fc?fc.textContent:''); return;}}
  const cn=e.target.closest('[data-cal-nav]'); if(cn){openCalMonth(+cn.dataset.calNav);return;}
  const ga=e.target.closest('[data-go-allscenes]'); if(ga){openAllScenes();return;}
  const gp=e.target.closest('[data-go-pers]'); if(gp){openPersonalities();return;}
  const gb=e.target.closest('[data-go-beat]'); if(gb){openBeat(+gb.dataset.goBeat);return;}
  const gs=e.target.closest('[data-go-scene]'); if(gs){openScene(+gs.dataset.goScene);return;}
  const g=e.target.closest('[data-go]'); if(g)openSpeaker(g.dataset.go);
});

const bEN=document.getElementById('lang-en'), bRU=document.getElementById('lang-ru');
function setLang(l){
  lang=l; bEN.setAttribute('aria-pressed',l==='en'); bRU.setAttribute('aria-pressed',l==='ru');
  try{localStorage.setItem('gw_lang',l);}catch(e){}
  render();
}
bEN.onclick=()=>setLang('en'); bRU.onclick=()=>setLang('ru');

let view='full';
const bSpine=document.getElementById('v-spine'), bFull=document.getElementById('v-full');
function setView(v){
  view=v;
  stage.classList.toggle('mode-spine', v==='spine');
  bSpine.setAttribute('aria-pressed', v==='spine');
  bFull.setAttribute('aria-pressed', v==='full');
  try{localStorage.setItem('gw_view',v);}catch(e){}
}
bSpine.onclick=()=>setView('spine'); bFull.onclick=()=>setView('full');

let down=false,sx=0,sl=0,sy=0,spageY=0;
scroller.addEventListener('wheel',e=>{
  // horizontal intent (shift+wheel or trackpad sideways) → pan the timeline
  if(e.shiftKey || Math.abs(e.deltaX)>Math.abs(e.deltaY)){ scroller.scrollLeft += (e.deltaX||e.deltaY); e.preventDefault(); }
  // plain vertical wheel: do nothing → the page scrolls normally to reveal the lower tiers
},{passive:false});
scroller.addEventListener('pointerdown',e=>{if(e.target.closest('.chip,.ev,.nd,.spkpill,.herobar,.film-block,.morep'))return;down=true;scroller.classList.add('grabbing');sx=e.clientX;sl=scroller.scrollLeft;sy=e.clientY;spageY=window.scrollY||window.pageYOffset||0;});
window.addEventListener('pointermove',e=>{if(!down)return;scroller.scrollLeft=sl-(e.clientX-sx);window.scrollTo(0, spageY-(e.clientY-sy));});
window.addEventListener('pointerup',()=>{down=false;scroller.classList.remove('grabbing');});
scroller.tabIndex=0;
scroller.addEventListener('keydown',e=>{if(e.key==='ArrowRight')scroller.scrollLeft+=240;if(e.key==='ArrowLeft')scroller.scrollLeft-=240;});

lang="en"; /* always start in English; RU only when the toggle is switched, and not remembered across reloads */
setLang(lang);
try{const vv=localStorage.getItem('gw_view'); if(vv==='spine'||vv==='full')view=vv;}catch(e){}
setView(view);

/* ===== Task board (Glidewell-logo button → half-screen kanban) ===== */
(function(){
  const COLS=[
    {key:'ideas',    nm:{en:'Ideas',ru:'Идеи'}},
    {key:'progress', nm:{en:'In progress',ru:'В работе'}},
    {key:'done',     nm:{en:'Done',ru:'Готово'}},
    {key:'archive',  nm:{en:'Archive',ru:'Архив'}}
  ];
  const tp=document.getElementById('taskpanel'), tpBody=document.getElementById('tp-body');
  const tasks=()=> (window.GW_TASKS||[]);
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  const tpFoot=document.getElementById('tp-foot');
  function tfbLoad(){ try{return JSON.parse(localStorage.getItem('gw_taskfb')||'{}');}catch(e){return {};} }
  function tfbSave(d){ try{localStorage.setItem('gw_taskfb',JSON.stringify(d));}catch(e){} }
  function tfbCount(){ var f=(tfbLoad().fb)||{}, n=0; Object.keys(f).forEach(function(k){ if(f[k]&&f[k].trim())n++; }); return n; }
  function renderBoard(){
    const fb=(tfbLoad().fb)||{};
    let h='<div class="kb">';
    COLS.forEach(c=>{
      const items=tasks().filter(t=>t.col===c.key);
      h+='<div class="kb-col"><div class="kb-colh"><span>'+L(c.nm)+'</span><span>'+items.length+'</span></div>';
      h+=items.map(t=>'<div class="kb-card c-'+c.key+'" data-card="'+esc(t.id)+'"><div class="kc-id">'+esc(t.id)+(t.date?' · '+esc(t.date):'')+(fb[t.id]&&fb[t.id].trim()?'<span class="kc-fb" title="has feedback">💬</span>':'')+'</div><div class="kc-t">'+esc(L(t.title))+'</div></div>').join('');
      h+='</div>';
    });
    h+='</div>';
    tpBody.innerHTML=h;
  }
  function fmtNotes(s){
    return String(s).split(/\n+/).map(function(raw){
      var line=raw.trim(); if(!line) return '';
      var bullet=/^[•\-–]\s?/.test(line);
      if(bullet) line=line.replace(/^[•\-–]\s?/,'');
      var html=esc(line).replace(/^([A-ZА-Я][A-ZА-Я0-9 ()\/.,—-]{1,42}:)/, '<b>$1</b>');
      return bullet ? '<div class="kn-li">'+html+'</div>' : '<p>'+html+'</p>';
    }).join('');
  }
  function renderCard(id){
    const t=tasks().find(x=>x.id===id); if(!t){renderBoard();return;}
    const col=COLS.find(c=>c.key===t.col);
    let h='<div class="kb-detail"><button class="kd-back" id="kd-back"><span class="kd-back-arw">‹</span> '+L({en:'back to all tasks',ru:'назад ко всем задачам'})+'</button>';
    h+='<div class="kd-meta">'+esc(t.id)+' · '+L(col?col.nm:{en:t.col,ru:t.col})+(t.date?' · '+esc(t.date):'')+'</div>';
    h+='<h3>'+esc(L(t.title))+'</h3>';
    h+='<div class="kd-notes">'+(t.notes?fmtNotes(L(t.notes)):'—')+'</div>';
    if(t.links&&t.links.length){ h+='<div class="kd-sec">'+L({en:'Links',ru:'Связи'})+'</div>'+t.links.map(l=>'<div class="kd-link">• '+esc(L(l))+'</div>').join(''); }
    if(t.media&&t.media.length){ h+='<div class="kd-sec">'+L({en:'Media',ru:'Медиа'})+'</div><div class="kd-media">'+t.media.map(m=>'<img src="'+esc(m)+'" alt="">').join('')+'</div>'; }
    h+='<div class="kd-sec">'+L({en:'Your feedback',ru:'Ваш комментарий'})+'</div>';
    h+='<textarea class="kd-fb" data-tk-id="'+esc(t.id)+'" placeholder="'+esc(L({en:'Notes, ideas, concerns on this task…',ru:'Заметки, идеи, вопросы по задаче…'}))+'">'+esc(((tfbLoad().fb)||{})[t.id]||'')+'</textarea>';
    h+='</div>';
    tpBody.innerHTML=h;
  }
  function sendLabel(){ var n=tfbCount(); return L({en:'Send all feedback',ru:'Отправить всё'})+(n?' ('+n+')':''); }
  function renderFoot(){
    if(!tpFoot) return;
    var d=tfbLoad();
    tpFoot.hidden=false;
    tpFoot.innerHTML='<input class="tk-name" id="tk-name" placeholder="'+esc(L({en:'Your name',ru:'Ваше имя'}))+'" value="'+esc(d.name||'')+'">'
      +'<button type="button" class="tk-send" id="tk-send"'+(tfbCount()?'':' disabled')+'>'+esc(sendLabel())+'</button>'
      +'<span class="tk-status" id="tk-status"></span>';
  }
  function updateFootCount(){ var b=document.getElementById('tk-send'); if(b){ b.disabled=!tfbCount(); b.textContent=sendLabel(); } }
  function tfbSubmit(){
    var d=tfbLoad(), f=d.fb||{}, st=document.getElementById('tk-status');
    var items=Object.keys(f).filter(function(id){return f[id]&&f[id].trim();})
      .map(function(id){var t=tasks().find(x=>x.id===id); return {id:id, title:t?L(t.title):id, comment:f[id].trim()};});
    if(!d.name||!d.name.trim()){ if(st)st.textContent=L({en:'Enter your name first.',ru:'Сначала впишите имя.'}); return; }
    if(!items.length){ if(st)st.textContent=L({en:'Add a comment to at least one task.',ru:'Добавьте коммент хотя бы к одной задаче.'}); return; }
    if(!SURVEY_ENDPOINT){ if(st)st.textContent=L({en:'Receiver not connected yet.',ru:'Приёмник ещё не подключён.'}); return; }
    if(st)st.textContent=L({en:'Sending…',ru:'Отправляю…'});
    fetch(SURVEY_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'taskfeedback', respondent:d.name.trim(), items:items})})
      .then(function(){ if(st)st.textContent=L({en:'Thanks — sent ✓',ru:'Спасибо — отправлено ✓'}); })
      .catch(function(){ if(st)st.textContent=L({en:'Send error — try again.',ru:'Ошибка отправки — ещё раз.'}); });
  }
  function setTitle(){ const el=tp.querySelector('.tp-ttl'); if(el)el.innerHTML='📋 '+esc(L({en:'Film tasks',ru:'Задачи фильма'}))+' <span class="tp-sub">· task board</span>'; }
  function openTasks(){ setTitle(); if(!window.GW_TASKS){tpBody.innerHTML='<p style="color:var(--mute)">Glidewell_Tasks.js not loaded.</p>';}else renderBoard(); renderFoot(); tp.classList.add('open'); tp.setAttribute('aria-hidden','false'); }
  function closeTasks(){ tp.classList.remove('open'); tp.classList.remove('full'); var _tf=document.getElementById('tp-full'); if(_tf)_tf.textContent='⤢'; tp.setAttribute('aria-hidden','true'); }
  const gw=document.getElementById('gwmark'); if(gw)gw.addEventListener('click',openTasks);
  document.getElementById('tp-close').addEventListener('click',closeTasks);
  document.getElementById('tp-full').addEventListener('click',function(){var f=tp.classList.toggle('full');this.textContent=f?'⤡':'⤢';this.setAttribute('aria-label',f?'Collapse':'Expand');this.setAttribute('title',f?'Свернуть':'Развернуть на весь экран');});
  tpBody.addEventListener('click',e=>{
    const card=e.target.closest('[data-card]'); if(card){renderCard(card.dataset.card);return;}
    if(e.target.closest('#kd-back')){renderBoard();return;}
  });
  tpBody.addEventListener('input',e=>{
    const fb=e.target.closest('.kd-fb'); if(fb){ const d=tfbLoad(); d.fb=d.fb||{}; d.fb[fb.dataset.tkId]=fb.value; tfbSave(d); updateFootCount(); }
  });
  if(tpFoot){
    tpFoot.addEventListener('input',e=>{ const n=e.target.closest('.tk-name'); if(n){ const d=tfbLoad(); d.name=n.value; tfbSave(d); } });
    tpFoot.addEventListener('click',e=>{ if(e.target.closest('.tk-send'))tfbSubmit(); });
  }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&tp.classList.contains('open'))closeTasks(); });
  // re-render board in the new language if it's open when the toggle is switched
  ['lang-en','lang-ru'].forEach(id=>{ const b=document.getElementById(id); if(b)b.addEventListener('click',()=>{ if(tp.classList.contains('open')){ setTitle(); renderBoard(); renderFoot(); } }); });
})();
</script>
