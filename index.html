    bruxzir:{en:"<b>How:</b> oversees the materials side (BruxZir, Obsidian) — the person to ask about the material’s authorship and the Tosoh raw-material (zirconia powder) partnership. <b>Why:</b> explains how the BruxZir material itself was created and how that R&D flows into Glidewell’s free education — the materials-science origin, distinct from DiTolla’s clinical/market story. ⚠️ Title varies by source — confirm before credits.",ru:"<b>Как:</b> курирует материалы (BruxZir, Obsidian) — к нему идти за авторством материала и партнёрством с Tosoh (поставщик циркониевого порошка). <b>Почему:</b> объяснит, как создавался сам материал BruxZir и как это R&D перетекает в бесплатное обучение — материаловедческая сторона истоков, в отличие от клинико-рыночной истории DiTolla. ⚠️ Должность по источникам разнится — уточнить перед титрами."},
    access:{en:"Newport Beach; internal. Title varies by source — confirm before credits.",ru:"Newport Beach; внутренний. Должность по источникам разнится — уточнить перед титрами."}},
  christensen:{nm:"Gordon Christensen", a:20, sc:[3,8,10], g:"x", status:"ok",
    quote:{q:"…establish a nonprofit group that would allow for unbiased evaluation without money interfering, to identify the best products.", src:"Gordon Christensen · Chairside Magazine, Vol. 17-2 (Dec 2022)", url:"https://glidewelldental.com/education/chairside-magazine/volume-17-issue-2/interview-with-gordon-christensen"},
    brief:{en:"<b>Who he is.</b> Dr. Gordon J. Christensen (DDS, MSD, PhD) is, for half a century, the most trusted independent referee in American dentistry: co-founder (with Dr. Rella Christensen) of the non-profit Clinicians Report / CR Foundation in Provo, Utah, whose lab and field research tests what manufacturers claim. And the booking myth is wrong: he is not a retired elder — he is lecturing almost every week, with CR “Dentistry Update” courses already scheduled through 2026 (Chicago, Kansas City — <a href='https://www.cliniciansreport.org/' target='_blank' rel='noopener'>cliniciansreport.org</a>).<br><br><b>Why this film.</b> He is the film’s proof (#10) and its second documented prophet: in Glidewell’s own magazine, a year BEFORE BruxZir, he said zirconia would overtake PFMs “and it won’t take too long” (<a href='https://glidewelldental.com/education/chairside-magazine/volume-3-issue-1/clinician-spotlight-dr-gordon-christensen' target='_blank' rel='noopener'>Chairside Vol. 3-1, 2008</a>); in 2007 he published the crown-fee economics we cite in #9 (<a href='https://glidewelldental.com/education/chairside-magazine/volume-2-issue-1/is-the-wide-range-in-crown-fees-justifiable' target='_blank' rel='noopener'>Vol. 2-1, 2007</a>). TRAC’s long-term zirconia data is the answer to “this film is an ad”.<br><br><b>What only he gives.</b> Fifty years of witness + the independent verdict, in one chair. No one else can say “the data shows it held” with this weight — and no one else can be handed his OWN 2008 prediction on camera.<br><br><b>What to ask.</b><br>1) “In 2008 you predicted zirconia would overtake PFMs — a year before BruxZir launched. How did you know?” — why: prophecy scene #2; hand him the printed page.<br>2) “TRAC followed monolithic zirconia for a decade in real mouths. Say plainly what the data shows — and where the industry over-claims.” — why: the proof beat, with его own guardrails.<br>3) “Rerun your 2007 fee analysis out loud: did technology actually move the price of a crown?” — why: closes the economics loop he opened himself.<br>4) “You’ve watched this profession for fifty years. What is the biggest change you’ve seen — and what never changes?” — why: the 50-year view only he owns; feeds #14.<br>5) “Make one more prediction: what does a crown look like in 2040?” — why: the forecast from the man whose predictions came true.<br><br><b>How to approach / caution.</b> RECORD EARLY — the standing rule stands, but note he is highly active; two booking routes: (а) remote/local crew to Provo (per travel constraints), (б) film around a 2026 Dentistry Update course city. Enter via PCC/CR office; warm links: DiTolla (presented CR lectures 2012–15) and the long TRAC-Glidewell history. NEVER frame him as endorsing Glidewell — he validates DATA, not brands; that distinction is his lifetime’s asset and our film’s credibility.<br><br><b>Verify before shooting.</b> His age and exact titles for the lower-third (do not guess); current TRAC zirconia findings and the “100% survival / zero terminal fractures” claim from our master doc — against actual CR publications before ANY on-screen use; Rella’s current role; upcoming 2026 course dates for scheduling.<br><br><b>Confidence.</b> Standing, activity, both archive articles: high (verified). Specific TRAC statistics: UNVERIFIED here — must come from CR publications or the interview itself.",ru:"<b>Кто он.</b> Д-р Гордон Дж. Кристенсен (DDS, MSD, PhD) — уже полвека самый доверенный независимый арбитр американской стоматологии: сооснователь (с д-ром Реллой Кристенсен) некоммерческого Clinicians Report / CR Foundation в Прово, Юта, чья лаборатория и полевые исследования проверяют заявления производителей. И букинг-миф неверен: он не пенсионер на покое — он читает лекции почти каждую неделю, курсы CR «Dentistry Update» уже расписаны на 2026-й (Чикаго, Канзас-Сити — <a href='https://www.cliniciansreport.org/' target='_blank' rel='noopener'>cliniciansreport.org</a>).<br><br><b>Зачем фильму.</b> Он — доказательство фильма (#10) и его второй задокументированный пророк: в журнале самого Glidewell, за год ДО BruxZir, он сказал, что цирконий обгонит металлокерамику «и это не займёт много времени» (<a href='https://glidewelldental.com/education/chairside-magazine/volume-3-issue-1/clinician-spotlight-dr-gordon-christensen' target='_blank' rel='noopener'>Chairside Vol. 3-1, 2008</a>); в 2007-м опубликовал экономику цен на коронки, которую мы цитируем в #9 (<a href='https://glidewelldental.com/education/chairside-magazine/volume-2-issue-1/is-the-wide-range-in-crown-fees-justifiable' target='_blank' rel='noopener'>Vol. 2-1, 2007</a>). Долгосрочные данные TRAC по цирконию — ответ на «этот фильм — реклама».<br><br><b>Что только он даёт.</b> Пятьдесят лет свидетельства + независимый вердикт в одном кресле. Никто другой не может сказать «данные показывают: выдержало» с таким весом — и никому другому нельзя вручить на камеру его СОБСТВЕННОЕ предсказание 2008 года.<br><br><b>О чём спрашивать.</b><br>1) «В 2008-м вы предсказали, что цирконий обгонит металлокерамику, — за год до запуска BruxZir. Откуда вы знали?» — зачем: сцена пророчества №2; вручить печатную страницу.<br>2) «TRAC десятилетие следил за монолитным цирконием в реальных ртах. Скажите прямо: что показывают данные — и где индустрия преувеличивает?» — зачем: бит доказательства, с его собственными гардрейлами.<br>3) «Прогоните вслух ваш анализ цен 2007 года: технология реально сдвинула цену коронки?» — зачем: закрывает экономическую петлю, которую он сам открыл.<br>4) «Вы смотрите на профессию пятьдесят лет. Какая перемена самая большая — и что не меняется никогда?» — зачем: взгляд на 50 лет, который есть только у него; кормит #14.<br>5) «Сделайте ещё одно предсказание: какой будет коронка в 2040-м?» — зачем: прогноз от человека, чьи предсказания сбывались.<br><br><b>Как заходить / осторожно.</b> ПИСАТЬ РАНО — правило в силе, но он очень активен; два маршрута букинга: (а) удалённая/локальная команда в Прово (по нашим ограничениям выездов), (б) снять вокруг города курса Dentistry Update 2026 года. Вход через офис PCC/CR; тёплые связи: ДиТолла (читал лекции CR в 2012–15) и долгая история TRAC—Glidewell. НИКОГДА не подавать его как одобряющего Glidewell — он валидирует ДАННЫЕ, не бренды; это различие — актив всей его жизни и доверие нашего фильма.<br><br><b>Проверить перед съёмкой.</b> Возраст и точные титулы для титра (не угадывать); текущие данные TRAC по цирконию и формулу «100% выживаемость / ноль терминальных переломов» из нашего мастер-дока — по реальным публикациям CR до ЛЮБОГО экранного использования; текущую роль Реллы; даты курсов 2026 для планирования.<br><br><b>Уверенность.</b> Статус, активность, обе архивные статьи: высокая (выверено). Конкретная статистика TRAC: НЕ ВЫВЕРЕНА здесь — только из публикаций CR или самого интервью."},
    rl:{en:"Clinicians Report",ru:"Clinicians Report"},
    role:{en:"Co-founder, Clinicians Report; prosthodontist (with Dr. Rella Christensen / TRAC)",ru:"Соучредитель Clinicians Report; ортопед (с д-ром Реллой Кристенсен / TRAC)"},
    loc:{en:"Provo, UT",ru:"Provo, UT"},
    theme:{en:"“Proof” · the independent validation of BruxZir / monolithic zirconia — what inoculates the film against “it's just an ad.” Spans 2009→2020.",ru:"«Доказательство» · независимая валидация BruxZir / монолитного циркония — то, что прививает фильм от «это просто реклама». Охватывает 2009→2020."},
    bruxzir:{en:"<b>How:</b> his Clinicians Report / TRAC Research tracked monolithic zirconia for 10+ years — of 15 brands, the original BruxZir is the only one at 100% survival and zero terminal fractures. <b>Why:</b> dentistry’s most trusted independent authority → he is what lets the film assert BruxZir’s durability without sounding like an ad. Direct tie: Neil Park interviewed him on Chairside about the 10-year results.",ru:"<b>Как:</b> его Clinicians Report / TRAC Research 10+ лет отслеживал монолитный цирконий — из 15 брендов оригинальный BruxZir единственный со 100% выживаемостью и нулём терминальных переломов. <b>Почему:</b> самый доверенный независимый авторитет → именно он даёт фильму право утверждать долговечность BruxZir без рекламного привкуса. Прямая связь: Нил Парк брал у него интервью на Chairside о 10-летних результатах."},
    access:{en:"Provo, UT (travel). Warm + on-thesis; elderly — schedule early, via PCC. Direct Glidewell tie: Neil Park interviewed him and Rella on Chairside about the 10-year BruxZir results.",ru:"Provo, UT (выезд). Тёплый, в теме; в возрасте — планировать раньше, через PCC. Прямая связь с Glidewell: Нил Парк брал интервью у него и Реллы на Chairside о 10-летних результатах BruxZir."}},
  rella:{nm:"Rella Christensen", a:20, sc:[3,8,10], g:"x", status:"verify",
    brief:{en:"<b>Who she is.</b> Dr. Rella Christensen (PhD) is the scientist of the pair: co-founder of CRA / the CR Foundation and long-time director of TRAC Research — the team that does what almost nobody in dentistry does: long-term clinical field research in real mouths over years, including the monolithic-zirconia studies our film leans on. A microbiologist by training, she is the person behind the numbers Gordon cites on stage.<br><br><b>Why this film.</b> If Gordon is the verdict, Rella is the evidence (#10). The film’s honesty architecture — «independent voices validate» — stands on her lab’s data. Her presence also quietly carries another thread: a woman running hard science in dentistry decades before it was common.<br><br><b>What only she gives.</b> The methodology: how you actually prove a crown survives — recall visits, fracture counts, real patients — told by the person who ran it. Gordon persuades; Rella demonstrates.<br><br><b>What to ask.</b><br>1) “How does TRAC actually work — what does following a restoration for ten years physically look like?” — why: makes «validation» concrete and filmable.<br>2) “What surprised you most in how monolithic zirconia survived?” — why: the proof beat as discovery, not verdict.<br>3) “What claim in dentistry did your data kill?” — why: establishes her power as referee — and the film’s honesty.<br>4) “You ran a research team in this field for decades. What did that road look like for a woman scientist?” — why: her thread of the next-generation theme, in biography not slogan.<br><br><b>How to approach / caution.</b> Book together with Gordon (Provo; same trip, same crew), but interview SEPARATELY — she is her own scientist, not his echo. Data first: she will not bless adjectives. No photo on file yet (roster gap — get one via CR office).<br><br><b>Verify before shooting.</b> Her exact current title at TRAC/CR; the zirconia study parameters we plan to quote (years, N, survival) — from publications; microbiology credential for the lower-third.<br><br><b>Confidence.</b> Role and TRAC leadership: high. Specific study numbers: unverified here — source before screen.",ru:"<b>Кто она.</b> Д-р Релла Кристенсен (PhD) — учёный в этой паре: сооснователь CRA / CR Foundation и многолетний руководитель TRAC Research — команды, которая делает то, чего в стоматологии не делает почти никто: долгосрочные клинические полевые исследования в реальных ртах годами, включая исследования монолитного циркония, на которые опирается наш фильм. Микробиолог по образованию, она — человек за цифрами, которые Гордон называет со сцены.<br><br><b>Зачем фильму.</b> Если Гордон — вердикт, Релла — доказательство (#10). Архитектура честности фильма — «независимые голоса валидируют» — стоит на данных её лаборатории. Её присутствие тихо несёт и другую нить: женщина, руководящая жёсткой наукой в стоматологии за десятилетия до того, как это стало обычным.<br><br><b>Что только она даёт.</b> Методологию: как на самом деле доказывают, что коронка выживает, — повторные визиты, счёт переломов, реальные пациенты — от того, кто это вёл. Гордон убеждает; Релла показывает.<br><br><b>О чём спрашивать.</b><br>1) «Как физически устроен TRAC — как выглядит слежение за реставрацией десять лет?» — зачем: делает «валидацию» конкретной и снимаемой.<br>2) «Что удивило вас больше всего в том, как выжил монолитный цирконий?» — зачем: бит доказательства как открытие, не вердикт.<br>3) «Какое утверждение в стоматологии убили ваши данные?» — зачем: устанавливает её силу арбитра — и честность фильма.<br>4) «Вы десятилетиями вели исследовательскую команду в этой области. Как выглядела эта дорога для женщины-учёного?» — зачем: её нить темы следующего поколения — биографией, не лозунгом.<br><br><b>Как заходить / осторожно.</b> Букинг вместе с Гордоном (Прово; одна поездка, одна команда), но интервью ОТДЕЛЬНО — она самостоятельный учёный, не его эхо. Сначала данные: прилагательные она не благословит. Фото в ростере нет (пробел — взять через офис CR).<br><br><b>Проверить перед съёмкой.</b> Её точный текущий титул в TRAC/CR; параметры исследования циркония, которые собираемся цитировать (годы, N, выживаемость) — по публикациям; микробиологическую степень для титра.<br><br><b>Уверенность.</b> Роль и руководство TRAC: высокая. Конкретные цифры исследований: не выверены здесь — источник до экрана."},
    rl:{en:"TRAC Research",ru:"TRAC Research"},
    role:{en:"Microbiologist; director, TRAC Research (research arm of Clinicians Report)",ru:"Микробиолог; директор TRAC Research (исследовательское подразделение Clinicians Report)"},

    theme:{en:"\u201CProof\u201D \u00B7 the independent science behind BruxZir \u2014 the scientist who ran the data, in her own right rather than a footnote to Gordon.",ru:"\u00ABДоказательство\u00BB \u00B7 независимая наука за BruxZir \u2014 учёная, которая вела эти данные, как самостоятельный голос, а не сноска к Гордону."},
    bruxzir:{en:"<b>How:</b> directs TRAC Research, the independent lab that actually ran the long-term monolithic-zirconia study behind BruxZir’s standing. <b>Why:</b> the scientist who personally ran the data — record her as a voice in her own right, not a footnote to Gordon; she can explain how an independent lab judges a material and why the BruxZir result held up. Photo still needed.",ru:"<b>Как:</b> руководит TRAC Research — независимой лабораторией, которая физически вела долгосрочное исследование монолитного циркония, на котором держится репутация BruxZir. <b>Почему:</b> учёный, лично ведший данные — записать как самостоятельный голос, а не сноску к Гордону; объяснит, как независимая лаба судит материал и почему результат BruxZir выстоял. Нужно фото."},
    access:{en:"Provo, UT (travel). Pairs naturally with Gordon, but record her as a distinct voice. Photo still needed.",ru:"Provo, UT (выезд). Естественно идёт в паре с Гордоном, но записать как отдельный голос. Нужно фото."}},
  kois:{nm:"John Kois", a:8, sc:[3,4], g:"x", status:"ok",
    quote:{q:"It is often our lack of clear, objective data that allows one dentist to determine treatment needs that another dentist would judge to be inappropriate.", src:"Inside Dentistry, Apr 2010", url:"https://insidedentistry.net/2010/04/a-conversation-with-dr-john-kois"},
    brief:{en:"<b>Who he is.</b> Dr. John Kois runs the Kois Center in Seattle — the profession’s “unbiased referee”: an advanced CE program built on its own research and data, famously sponsor-free. Fully active: the Center just redesigned its primary curriculum (five courses becoming six, incl. digital workflow integration), and every course is still personally taught by Kois himself (<a href='https://www.koiscenter.com/' target='_blank' rel='noopener'>koiscenter.com</a>, 2026).<br><br><b>Why this film.</b> Kois is the «this is science, not an ad» voice (#4, #10): the film pays for its honesty architecture with people like him. His digital-workflow curriculum makes him current, not nostalgic, on the exact question the film asks: when is going digital evidence, when is it fashion?<br><br><b>What only he gives.</b> The frame of trust — the language of evidence («how do you KNOW a crown lasts ten years?») delivered by someone with no stake in our answer. He validates the film’s logic without ever praising Glidewell.<br><br><b>What to ask.</b><br>1) “How should a practicing dentist tell real progress from the marketing of a new material?” — why: hands the viewer a criterion; quietly sets up why BruxZir held (without Kois endorsing it).<br>2) “Your center went deep on digital workflow. From an evidence standpoint — when is staying analog defensible, and when is it inertia?” — why: #4’s central question from the referee himself.<br>3) “What changes in dentistry when quality care becomes affordable and predictable?” — why: bridges to the thesis from independent lips.<br>4) “You still teach every course yourself. What can’t be digitized about teaching this craft?” — why: the handover theme (#13) from an unexpected angle.<br><br><b>How to approach / caution.</b> Seattle — remote/local crew (travel constraints); book early, his calendar is course-driven. Do NOT pitch as «Glidewell speaker» — he will decline or flatten; approach as the industry authority whose standard of proof we want on record. Soft-competitor framing (his CE vs Glidewell’s) — our interpretation, keep off camera.<br><br><b>Verify before shooting.</b> Exact credentials for the lower-third; curriculum-redesign details if cited; the «sponsor-free» characterization (his own materials support it — confirm phrasing).<br><br><b>Confidence.</b> Standing and activity: high (his center’s 2026 materials). Everything else: solid public record.",ru:"<b>Кто он.</b> Д-р Джон Койс ведёт Kois Center в Сиэтле — «непредвзятого арбитра» профессии: продвинутая CE-программа, построенная на собственных исследованиях и данных, принципиально без спонсоров. Полностью активен: центр только что пересобрал основную программу (пять курсов становятся шестью, включая интеграцию цифрового workflow), и каждый курс по-прежнему лично ведёт сам Койс (<a href='https://www.koiscenter.com/' target='_blank' rel='noopener'>koiscenter.com</a>, 2026).<br><br><b>Зачем фильму.</b> Койс — голос «это наука, а не реклама» (#4, #10): архитектура честности фильма оплачивается такими, как он. Его цифровая программа делает его современным, а не ностальгирующим, ровно в вопросе фильма: когда цифра — доказательство, а когда — мода?<br><br><b>Что только он даёт.</b> Рамку доверия — язык доказательности («откуда вы ЗНАЕТЕ, что коронка живёт десять лет?») от человека без ставки в нашем ответе. Он валидирует логику фильма, ни разу не похвалив Glidewell.<br><br><b>О чём спрашивать.</b><br>1) «Как практикующему врачу отличить настоящий прогресс от маркетинга нового материала?» — зачем: вручает зрителю критерий; тихо подводит к тому, почему BruxZir выстоял (без индоссамента Койса).<br>2) «Ваш центр глубоко ушёл в цифровой workflow. С точки зрения доказательств — когда оставаться в аналоге оправданно, а когда это инерция?» — зачем: центральный вопрос #4 от самого арбитра.<br>3) «Что меняется в стоматологии, когда качественное лечение становится доступным и предсказуемым?» — зачем: мост к тезису из независимых уст.<br>4) «Вы до сих пор сами ведёте каждый курс. Что в передаче этого ремесла нельзя оцифровать?» — зачем: тема передачи (#13) с неожиданного угла.<br><br><b>Как заходить / осторожно.</b> Сиэтл — удалённая/локальная команда (ограничения выездов); букинг заранее, его календарь подчинён курсам. НЕ подавать как «спикера Glidewell» — откажет или потускнеет; заходить как к авторитету, чей стандарт доказательства мы хотим записать. Рамку «мягкий конкурент» (его CE против образования Glidewell) — наша интерпретация, держать вне камеры.<br><br><b>Проверить перед съёмкой.</b> Точные регалии для титра; детали пересборки программы, если цитируем; характеристику «без спонсоров» (его материалы её поддерживают — сверить формулировку).<br><br><b>Уверенность.</b> Статус и активность: высокая (материалы центра 2026). Остальное: твёрдый публичный след."},

    role:{en:"Director, the Kois Center; prosthodontist",ru:"Директор Kois Center; ортопед"},

    theme:{en:"CE / restorative authority · the science-first voice — independent CE, a soft competitor.",ru:"CE / авторитет в реставрации · «сначала наука» — независимое CE, мягкий конкурент."},
    access:{en:"Seattle, WA (travel). Independent — confirm interest before approaching.",ru:"Seattle, WA (выезд). Независимый — подтвердить интерес перед заходом."}},
  spear:{nm:"Frank Spear", a:21, sc:[4,13], g:"x", status:"ok",
    brief:{en:"<b>Who he is.</b> Dr. Frank Spear founded Spear Education (Scottsdale) — one of the two great independent CE houses (with Kois). Fully active: Spear Summit 2026 just ran, with his keynote pointedly titled “What Are You Going to Do with the Rest of Your Life?” — and the company deepening partnerships with Align and Overjet, a dental-AI firm (<a href='https://www.speareducation.com/company/newsroom/spear-summit-2026-growth-partnerships-events-update/' target='_blank' rel='noopener'>Spear newsroom, 2026</a>).<br><br><b>Why this film.</b> Spear is the psychology-of-the-clinician voice (#4): the elder statesman who teaches seasoned dentists why they resist and how they change. His Overjet/AI partnership makes him a current witness of the digital wave, not a nostalgic one (#14).<br><br><b>What only he gives.</b> The inner life of the profession: purpose, fear, the arc of a career — the questions his own 2026 keynote asks. Where Kois brings evidence, Spear brings the couch.<br><br><b>What to ask.</b><br>1) “You teach seasoned dentists. What is the real fear under ‘I’ve done it this way for thirty years’?” — why: the #4 psychology, from its best-known therapist.<br>2) “Your summit keynote was titled ‘What are you going to do with the rest of your life?’ Ask that question of the profession itself.” — why: his own frame, turned into the film’s forecast (#14).<br>3) “Spear now partners with an AI company. What did that decision cost you internally?” — why: even the educators convert — the transition theme at the meta level.<br>4) “What does a dentist lose when the craft gets easier — and what do they gain?” — why: the elegy/gain balance in one question; the film’s heart.<br><br><b>How to approach / caution.</b> Scottsdale — batch with Farran (Phoenix) in one trip, remote/local crew. Same independence rule as Kois: industry authority, not brand friend. His Align/Overjet partnerships mean он не anti-digital — do not cast him as the resistance; he explains it.<br><br><b>Verify before shooting.</b> Current title/role at Spear Education (founder vs day-to-day); partnership details if cited; keynote title quote (from their newsroom — confirm exact wording on screen).<br><br><b>Уверенность.</b> Standing and 2026 activity: high (their newsroom). Fit and tone: our interpretation — vet call first.",ru:"<b>Кто он.</b> Д-р Фрэнк Спир основал Spear Education (Скоттсдейл) — один из двух великих независимых CE-домов (вместе с Койсом). Полностью активен: только что прошёл Spear Summit 2026 с его кинотом с говорящим названием «What Are You Going to Do with the Rest of Your Life?» — и компания углубляет партнёрства с Align и Overjet, фирмой стоматологического ИИ (<a href='https://www.speareducation.com/company/newsroom/spear-summit-2026-growth-partnerships-events-update/' target='_blank' rel='noopener'>ньюсрум Spear, 2026</a>).<br><br><b>Зачем фильму.</b> Спир — голос психологии клинициста (#4): старейшина, который учит опытных врачей, почему они сопротивляются и как меняются. Партнёрство с Overjet/ИИ делает его текущим свидетелем цифровой волны, а не ностальгирующим (#14).<br><br><b>Что только он даёт.</b> Внутреннюю жизнь профессии: смысл, страх, арку карьеры — вопросы его собственного кинота 2026 года. Где Койс приносит доказательства, Спир приносит кушетку.<br><br><b>О чём спрашивать.</b><br>1) «Вы учите опытных врачей. Какой настоящий страх под фразой ‘я тридцать лет так делаю’?» — зачем: психология #4 от её самого известного терапевта.<br>2) «Ваш кинот назывался ‘Что вы будете делать с остатком жизни?’ Задайте этот вопрос самой профессии.» — зачем: его собственная рамка, повёрнутая в прогноз фильма (#14).<br>3) «Spear теперь партнёрится с ИИ-компанией. Чего это решение стоило вам внутренне?» — зачем: даже教育-дома конвертируются — тема перехода на мета-уровне.<br>4) «Что врач теряет, когда ремесло становится легче, — и что приобретает?» — зачем: баланс элегии/приобретения одним вопросом; сердце фильма.<br><br><b>Как заходить / осторожно.</b> Скоттсдейл — батчить с Фарраном (Финикс) одной поездкой, удалённая/локальная команда. То же правило независимости, что с Койсом: авторитет индустрии, не друг бренда. Его партнёрства с Align/Overjet значат, что он не анти-цифра — не назначать его «сопротивлением»; он его объясняет.<br><br><b>Проверить перед съёмкой.</b> Текущий титул/роль в Spear Education (основатель vs операционка); детали партнёрств, если цитируем; точную формулировку названия кинота (по их ньюсруму) до экрана.<br><br><b>Уверенность.</b> Статус и активность-2026: высокая (их ньюсрум). Fit и тон: наша интерпретация — сначала разведочный звонок."},
    rl:{en:"Founder, Spear Education",ru:"основатель, Spear Education"},
    role:{en:"Founder, Spear Education",ru:"Основатель Spear Education"},

  manalili:{nm:"Taylor Manalili", a:22, sc:[4,10], g:"g", status:"ok",
    quote:{q:"I think one of the most important jobs we have here as clinicians is trying to improve communication between the doctors and the lab technicians.", src:"Chairside Magazine, Vol. 14-3 (Glidewell), 2019", url:"https://glidewelldental.com/education/chairside-magazine/volume-14-issue-3/interview-manalili"},
    brief:{en:"<b>Who she is.</b> Dr. Taylor Manalili is Glidewell’s Director of Clinical Prosthodontics — and the institution’s bet on the next generation made flesh: she joined in 2018 as the company’s first-ever Fellow, straight out of Stony Brook (DDS + prosthodontics specialty), with a chemical engineering degree from Northeastern underneath (<a href='https://glidewelldental.com/education/chairside-magazine/volume-14-issue-3/interview-manalili' target='_blank' rel='noopener'>Chairside Vol. 14-3, 2019</a>). Her research focus: improving the digital full-arch implant workflow. During residency she taught predoctoral students; today she lectures CE, teaches at Resnik’s implant institute, and is involved with Guiding Leaders. Still publishing in the newest issues (Chairside Vol. 21-1/21-2 contributor, 2026).<br><br><b>Why this film.</b> Manalili carries the next-generation beat (#13) and the implant-democratization thread (#12): young clinician + engineer’s mind + teacher of teachers. She is also the film’s natural voice on women entering the profession’s majority — through her own career, not statistics.<br><br><b>What only she gives.</b> The only cast member who is simultaneously the NEXT generation (first Fellow, 2018) and a maker of it (instructor at Resnik’s institute, GL involvement) — the handover of the craft, embodied. Plus an engineer-to-clinic bridge that mirrors Leeson’s F1 story from the clinical side.<br><br><b>What to ask.</b><br>1) “You were a chemical engineer first. What did engineering teach you that dental school couldn’t?” — why: her real arc; rhymes with the film’s engineers without repeating them.<br>2) “Glidewell’s first-ever Fellow — what was the bet the company made on you in 2018, and did it pay?” — why: institutionalized next-generation, from the inside.<br>3) “Explain digital full-arch implant treatment like we’re patients — what changed from the old way?” — why: her research specialty; the implant seam (#12) in plain words.<br>4) “You teach at the Resnik institute: what do general dentists learn about implants today that took specialists a career?” — why: democratization-of-skill thesis from the person doing the teaching.<br>5) “What do the veterans in this building teach you — and what do you teach them back?” — why: the two-way handover; feeds #13’s emotional close.<br><br><b>How to approach / caution.</b> Studio Day 2. Warm, articulate, camera-experienced (Chairside Live podcast guest, 2021). The bridge to Resnik goes through her — book that thread in one conversation. If the women-in-dentistry theme comes up, keep it in her biography, not as a claim we haven’t verified.<br><br><b>Verify before shooting.</b> Exact title today; “first-ever Fellow” framing (per Vol. 14-3, 2019 — confirm the program’s official name); Northeastern chem-eng degree (per bios — confirm); current research topics for the lower-third.<br><br><b>Confidence.</b> Career facts: high (her Chairside interview + program bios). Teaching-at-Resnik detail: high (documented) — but confirm current status.",ru:"<b>Кто она.</b> Д-р Тейлор Маналили — директор клинической ортопедии Glidewell и воплощённая ставка компании на следующее поколение: пришла в 2018-м первым в истории Fellow, прямо из Stony Brook (DDS + специализация по протезированию), с дипломом инженера-химика Northeastern в основании (<a href='https://glidewelldental.com/education/chairside-magazine/volume-14-issue-3/interview-manalili' target='_blank' rel='noopener'>Chairside Vol. 14-3, 2019</a>). Фокус её исследований — цифровой full-arch имплант-workflow. В резидентуре преподавала студентам; сегодня читает CE-лекции, преподаёт в имплант-институте Резника и вовлечена в Guiding Leaders. Публикуется в свежайших номерах (Chairside Vol. 21-1/21-2, 2026).<br><br><b>Зачем фильму.</b> Маналили несёт бит следующего поколения (#13) и линию демократизации имплантологии (#12): молодой клиницист + инженерный ум + учитель учителей. И она — естественный голос фильма о женщинах, становящихся большинством профессии, — через собственную карьеру, а не статистику.<br><br><b>Что только она даёт.</b> Единственная в касте, кто одновременно и ЕСТЬ следующее поколение (первый Fellow, 2018), и делает его (преподаватель у Резника, участие в GL) — передача ремесла во плоти. Плюс мост «инженер → клиника», зеркалящий историю Лисона про F1 с клинической стороны.<br><br><b>О чём спрашивать.</b><br>1) «Сначала вы были инженером-химиком. Чему инженерия научила вас из того, чего не могла дать стоматологическая школа?» — зачем: её настоящая арка; рифмуется с инженерами фильма, не повторяя их.<br>2) «Первый Fellow в истории Glidewell — какую ставку компания сделала на вас в 2018-м, и сыграла ли она?» — зачем: институциализированное следующее поколение изнутри.<br>3) «Объясните цифровое full-arch имплант-лечение как пациентам — что изменилось против старого способа?» — зачем: её исследовательская специальность; имплант-шов (#12) простыми словами.<br>4) «Вы преподаёте в институте Резника: что обычные врачи узнают об имплантах сегодня из того, на что у специалистов уходила карьера?» — зачем: тезис демократизации навыка от той, кто учит.<br>5) «Чему ветераны этого здания учат вас — и чему вы учите их в ответ?» — зачем: двусторонняя передача; эмоциональное закрытие #13.<br><br><b>Как заходить / осторожно.</b> Студийный день №2. Тёплая, артикулированная, с опытом камеры (гость подкаста Chairside Live, 2021). Мост к Резнику идёт через неё — забронировать эту нить одним разговором. Если всплывает тема женщин в профессии — держать её в биографии, а не как непроверенное утверждение.<br><br><b>Проверить перед съёмкой.</b> Точный сегодняшний титул; формулу «первый Fellow» (по Vol. 14-3, 2019 — уточнить официальное название программы); диплом Northeastern (по биографиям — подтвердить); текущие темы исследований для титра.<br><br><b>Уверенность.</b> Факты карьеры: высокая (её интервью в Chairside + биографии программ). Преподавание у Резника: задокументировано — но подтвердить текущий статус."},
    rl:{en:"Dir. Clinical Prosthodontics",ru:"дир. клин. ортопедии"},
    role:{en:"Director of Clinical Prosthodontics",ru:"Директор клинической ортопедии"},

  resnik:{nm:"Randy Resnik", a:22, sc:[10], g:"k", status:"ok",
    quote:{q:"I believe the days of general dentists not participating in implantology are over — practitioners now must be involved in the prosthetic side of implant dentistry at the very least.", src:"Chairside Magazine, Vol. 16-2 (Glidewell), 2021", url:"https://glidewelldental.com/education/chairside-magazine/volume-16-issue-2/interview-randolph-resnik-dmd-mds"},
    brief:{en:"<b>Who he is.</b> Dr. Randolph Resnik, DMD, MDS, is implant education’s living lineage: he worked alongside Carl Misch — the father of modern implant education — for 30+ years, now directs the Misch-Resnik Implant Institute, runs his own Resnik Implant Institute (Pittsburgh) and authors the field’s standard textbooks. Glidewell already interviewed him on record: «Placing Dental Implants» (<a href='https://glidewelldental.com/education/chairside-magazine/volume-16-issue-2/interview-randolph-resnik-dmd-mds' target='_blank' rel='noopener'>Chairside Vol. 16-2, 2021</a>) — where his line «the days of general dentists not participating in implantology are over» comes from; the institute’s story ran in Vol. 13-2, 2018.<br><br><b>Why this film.</b> Resnik carries the democratization-of-skill thread (#12): implants moving from specialist art to guided, plannable procedure a GP can do. Our bridge is warm — Manalili teaches at his institute.<br><br><b>What only he gives.</b> The educational lineage: Misch → Resnik → today’s GPs; he can narrate HOW a craft skill becomes a teachable system — the film’s thesis applied to surgery.<br><br><b>What to ask.</b><br>1) “You said the days of GPs not placing implants are over (Chairside Vol. 16-2, 2021). What changed — the tools or the teaching?” — why: his own line, unpacked into the #12 argument.<br>2) “You worked beside Carl Misch for thirty years. What did he teach that no software ever will?” — why: honors the lineage; keeps the human in the democratization story.<br>3) “Show us guided surgery: what does the guide know that the hand used to?” — why: the expertise-into-system seam, physically demonstrable.<br>4) “What should a GP still NOT do?” — why: the honesty guardrail on democratization — limits make the claim credible.<br><br><b>How to approach / caution.</b> Pittsburgh — East-coast trip only if the paper edit demands it; alternatives: film at a course he teaches (incl. Glidewell symposia) or via Manalili’s bridge. Frame around education and patient access, not products. Honor Misch’s memory precisely — get names and dates right.<br><br><b>Verify before shooting.</b> Current titles across the two institutes; the Misch-years count; textbook titles for the lower-third.<br><br><b>Confidence.</b> Lineage, roles, both Chairside pieces: high (verified). Logistics: pending the trip decision.",ru:"<b>Кто он.</b> Д-р Рэндольф Резник, DMD, MDS, — живая родословная имплант-образования: 30+ лет работал рядом с Карлом Мишем — отцом современного имплант-образования, — теперь возглавляет институт Misch-Resnik, ведёт собственный Resnik Implant Institute (Питтсбург) и пишет стандартные учебники области. Glidewell уже интервьюировал его on record: «Placing Dental Implants» (<a href='https://glidewelldental.com/education/chairside-magazine/volume-16-issue-2/interview-randolph-resnik-dmd-mds' target='_blank' rel='noopener'>Chairside Vol. 16-2, 2021</a>) — оттуда его строка «дни, когда врачи общей практики не занимались имплантологией, закончились»; история института вышла в Vol. 13-2, 2018.<br><br><b>Зачем фильму.</b> Резник несёт нить демократизации навыка (#12): импланты переходят из искусства специалиста в управляемую, планируемую процедуру для обычного врача. Наш мост тёплый — Маналили преподаёт у него.<br><br><b>Что только он даёт.</b> Образовательную родословную: Миш → Резник → сегодняшние GP; он может рассказать, КАК ремесленный навык становится преподаваемой системой — тезис фильма в приложении к хирургии.<br><br><b>О чём спрашивать.</b><br>1) «Вы сказали, что дни GP вне имплантологии закончились (Chairside Vol. 16-2, 2021). Что изменилось — инструменты или обучение?» — зачем: его собственная строка, развёрнутая в аргумент #12.<br>2) «Тридцать лет рядом с Карлом Мишем. Чему он учил из того, чему не научит никакой софт?» — зачем: чтит родословную; сохраняет человека в истории демократизации.<br>3) «Покажите guided surgery: что знает шаблон из того, что раньше знала рука?» — зачем: шов «экспертиза в систему», физически демонстрируемый.<br>4) «Что GP по-прежнему НЕ должен делать?» — зачем: гардрейл честности на демократизации — границы делают утверждение достоверным.<br><br><b>Как заходить / осторожно.</b> Питтсбург — восточный выезд только если paper edit потребует; альтернативы: снять на курсе, который он ведёт (включая симпозиумы Glidewell), или через мост Маналили. Рамка — образование и доступ пациента, не продукты. Память Миша чтить точно — имена и даты выверить.<br><br><b>Проверить перед съёмкой.</b> Текущие титулы в двух институтах; счёт лет с Мишем; названия учебников для титра.<br><br><b>Уверенность.</b> Родословная, роли, обе статьи Chairside: высокая (выверено). Логистика: ждёт решения по выезду."},

  kosinski:{nm:"Tim Kosinski", a:22, sc:[13], g:"k", status:"ok",
    brief:{en:"<b>Who he is.</b> Dr. Timothy Kosinski (Bingham Farms, MI) is the workhorse-educator of implantology: 14,000+ implants placed, 200+ published articles, an adjunct professor’s temperament — and a regular teacher at Glidewell symposia, so the бренд knows him and he knows the audience. His specialty per his own writing: predictable, lifelike esthetic-zone implant results.<br><br><b>Why this film.</b> Kosinski is the practice-scale proof of democratization (#12): not the institute director but the man who has actually done it fourteen thousand times and teaches weekend courses that change what a GP dares to do on Monday.<br><br><b>What only he gives.</b> Volume-earned pragmatism: where Resnik gives lineage and system, Kosinski gives the hand that repeated it 14,000 times — the difference between teaching a craft and having done one.<br><br><b>What to ask.</b><br>1) “Fourteen thousand implants in — what can a weekend course safely teach a GP today that took you a career?” — why: the democratization claim, stress-tested by its most experienced practitioner.<br>2) “What did implant #14,000 feel like compared to #1?” — why: humanizes repetition; the craft-into-routine seam in one answer.<br>3) “When does the guide fail — and what saves the patient then?” — why: honesty guardrail; the limits of the system from the man who knows them.<br><br><b>How to approach / caution.</b> Michigan — do NOT plan a dedicated trip: catch him at a Glidewell symposium in Irvine (he teaches there — check the fall calendar first). Friendly to the company; keep him on craft and teaching, not endorsement.<br><br><b>Verify before shooting.</b> Implant and article counts (roster figures — confirm with him); current academic affiliations; next Glidewell symposium appearance for scheduling.<br><br><b>Confidence.</b> Role and relationship: high. Counts: medium — his own materials vary; confirm.",ru:"<b>Кто он.</b> Д-р Тимоти Косински (Бингэм-Фармс, Мичиган) — рабочая лошадь имплант-образования: 14 000+ поставленных имплантов, 200+ статей, темперамент адъюнкт-профессора — и постоянный преподаватель симпозиумов Glidewell, так что бренд его знает, а он знает аудиторию. Его специальность по его же статьям: предсказуемые, живые результаты в эстетической зоне.<br><br><b>Зачем фильму.</b> Косински — доказательство демократизации в масштабе практики (#12): не директор института, а человек, который реально сделал это четырнадцать тысяч раз и ведёт курсы выходного дня, меняющие то, на что GP решается в понедельник.<br><br><b>Что только он даёт.</b> Прагматизм, заработанный объёмом: где Резник даёт родословную и систему, Косински даёт руку, повторившую это 14 000 раз — разница между «преподавать ремесло» и «сделать его».<br><br><b>О чём спрашивать.</b><br>1) «Четырнадцать тысяч имплантов позади — чему курс выходного дня может безопасно научить GP сегодня из того, на что у вас ушла карьера?» — зачем: утверждение демократизации, проверенное самым опытным практиком.<br>2) «Каким был имплант №14 000 по сравнению с №1?» — зачем: очеловечивает повторение; шов «ремесло в рутину» одним ответом.<br>3) «Когда шаблон подводит — и что тогда спасает пациента?» — зачем: гардрейл честности; пределы системы от того, кто их знает.<br><br><b>Как заходить / осторожно.</b> Мичиган — отдельный выезд НЕ планировать: ловить его на симпозиуме Glidewell в Ирвайне (он там преподаёт — сверить осенний календарь первым делом). Дружественен компании; держать его на ремесле и обучении, не на индоссаменте.<br><br><b>Проверить перед съёмкой.</b> Счётчики имплантов и статей (цифры ростера — подтвердить у него); текущие академические аффилиации; ближайшее появление на симпозиуме Glidewell для планирования.<br><br><b>Уверенность.</b> Роль и отношения: высокая. Счётчики: средняя — его материалы разнятся; подтвердить."},

  chi:{nm:"Justin Chi", a:23, sc:[3,5,9,11], g:"g", status:"ok",
    quote:{q:"One of the greatest benefits of in-office CAD/CAM is the ability to try in and deliver restorations in the same appointment, which I believe is best for the patient's health.", src:"Chairside Magazine, Vol. 13-1 (Glidewell), 2018", url:"https://glidewelldental.com/education/chairside-magazine/volume-13-issue-1/interview-chi"},
    brief:{en:"<b>Who he is.</b> Justin Chi is Glidewell’s Director of Clinical Technologies and the roster’s rare three-in-one: a hands trained in the old craft (B.S. in dental laboratory technology from LSU — one of only two dental-school-level programs in the country; CDT in crown &amp; bridge), a former lab owner (his own Dallas lab, PFMs and gold — the very materials the film’s “before” is made of), and a clinician (DDS, USC). His road ran THROUGH the transition: in 2007 he joined E4D Technologies as a CAD/CAM trainer — by his own account initially disappointed by the machines after years of mastering handcraft — then watched patients light up at same-day restorations, went to dental school, and in 2015 joined Glidewell, where he helped shape BruxZir NOW, Obsidian Fused to Metal and the glidewell.io In-Office Solution (<a href='https://glidewelldental.com/education/chairside-magazine/volume-13-issue-1/interview-chi' target='_blank' rel='noopener'>Chairside Vol. 13-1, 2018</a>). His own line is the film’s quality bar: “As a technician, I would not trust the CAD/CAM system if it produced a restoration inferior to one made the traditional way.” A frequent voice on Chairside Live (the podcast is hosted by Dr. Neil Park — our earlier note that Chi hosts it was wrong).<br><br><b>Why this film.</b> Chi carries the same-day demonstration (#3), the validation layer (#5, #11) and the office of the future (#12). Fresh on record: digital is now about far more than molars — multi-unit anterior work off 35+ million restoration records; “the future is for the dental office to be more self-sufficient”; “there’s no growth without change” (<a href='https://glidewelldental.com/education/chairside-magazine/volume-19-issue-2/digital-dentistry-is-about-more-than-broken-molars' target='_blank' rel='noopener'>Chairside Vol. 19-2, 2024</a>).<br><br><b>What only he gives.</b> He is the only person in the cast who can do BOTH halves of every seam with his own hands: wax and cast a crown the 1907 way, then scan and mill one the 2026 way — and judge the machine as a craftsman, not a salesman. That makes him (a) the ideal live demonstrator for the seams, and (b) a serious candidate for the hands and the narration of “The Old Way” shoot. His personal arc — craftsman disappointed by machines who became the machines’ chief clinical validator — is the Debate beat resolved in one biography.<br><br><b>What to ask.</b><br>1) “You spent years mastering PFM and gold by hand — and CAD/CAM initially disappointed you. Tell that disappointment.” — why: his own documented arc; gives the Debate beat a voice from the hands’ side.<br>2) “You said you wouldn’t trust a CAD/CAM system that made anything inferior to handwork (Chairside Vol. 13-1, 2018). When did the machine catch up with your hands — was there a moment?” — why: the craftsman’s verdict on the machine, the film’s quality bar in one answer.<br>3) “Mill a crown with us in real time and narrate what the machine knows that you had to know by feel.” — why: the live-demo spine of #3, from the one person who can compare honestly.<br>4) “You wrote ‘garbage in, garbage out’ about scanning (Vol. 19-2, 2024). What does a dentist actually have to learn — and how long does it take?” — why: grounds the learning-curve barrier (#4) in specifics.<br>5) “‘The future is for the dental office to be more self-sufficient’ — where does the lab end and the office begin, ten years from now?” — why: his own thesis; feeds #12 and the self-disruption theme.<br>6) “Do you ever miss the wax?” — why: the human close; the elegy question to the one who left the craft willingly.<br><br><b>How to approach / caution.</b> Studio Day 1 with Leeson and Azernikov — he is the clinical counterweight to their engineering; shoot his live demo while the studio is set for macro work. Approach as craftsman-clinician, not product presenter: his credibility IS the distance from marketing, so keep glidewell.io pitch language out of our questions. Candidate hands for “The Old Way” reconstruction — raise it with him directly. Fix everywhere: he does NOT host the podcast (Park does).<br><br><b>Verify before shooting.</b> Title and product credits (BruxZir NOW, Obsidian FTM, glidewell.io role) — per Chairside Vol. 13-1, 2018, confirm current. “35+ million restoration records” (Vol. 19-2, 2024) vs Leeson’s “10M+ designs” (2022) — different metrics or growth? Reconcile before screen. E4D years (~2007–2010) and Dallas lab dates — from the 2018 interview, confirm with him. LSU program “one of only two” — his claim, verify.<br><br><b>Confidence.</b> Career arc and quotes are sourced (Vol. 13-1, 2018; Vol. 19-2, 2024) — high. Podcast correction is verified (host: Park). Product-credit breadth and dates need his confirmation.",ru:"<b>Кто он.</b> Джастин Чи — директор клинических технологий Glidewell и редчайший «три-в-одном» в нашем касте: руки старого ремесла (бакалавр зуботехнических технологий LSU — одна из двух программ такого уровня в стране; CDT по коронкам и мостам), бывший владелец лаборатории (своя лаба в Далласе, PFM и золото — ровно те материалы, из которых сделано «было» фильма) и клиницист (DDS, USC). Его путь прошёл СКВОЗЬ перелом: в 2007-м он пришёл в E4D Technologies тренером по CAD/CAM — по его собственным словам, поначалу разочарованный машинами после лет ручного мастерства, — затем увидел, как пациенты загораются от same-day реставраций, отучился на врача и в 2015-м пришёл в Glidewell, где приложил руку к BruxZir NOW, Obsidian Fused to Metal и glidewell.io (<a href='https://glidewelldental.com/education/chairside-magazine/volume-13-issue-1/interview-chi' target='_blank' rel='noopener'>Chairside Vol. 13-1, 2018</a>). Его собственная фраза — планка качества фильма: «Как техник, я не доверял бы CAD/CAM-системе, если бы она делала реставрацию хуже сделанной вручную». Частый голос Chairside Live (подкаст ведёт д-р Нил Парк — наша прежняя пометка, что ведёт Чи, была ошибкой).<br><br><b>Зачем фильму.</b> Чи несёт живую демонстрацию same-day (#3), слой валидации (#5, #11) и «офис будущего» (#12). Свежее on record: цифра теперь сильно больше, чем моляры, — многоединичные передние работы на базе 35+ млн записей реставраций; «будущее — за более самодостаточным кабинетом»; «нет роста без перемен» (<a href='https://glidewelldental.com/education/chairside-magazine/volume-19-issue-2/digital-dentistry-is-about-more-than-broken-molars' target='_blank' rel='noopener'>Chairside Vol. 19-2, 2024</a>).<br><br><b>Что только он даёт.</b> Единственный в касте, кто может СВОИМИ руками сделать обе половины любого шва: отлить коронку по-старому — и отсканировать/отфрезеровать по-новому, и судить машину как ремесленник, а не продавец. Поэтому он (а) идеальный живой демонстратор швов и (б) серьёзный кандидат на руки и голос съёмки «The Old Way». Его личная арка — ремесленник, разочарованный машинами, ставший их главным клиническим валидатором, — это бит Debate, разрешённый одной биографией.<br><br><b>О чём спрашивать.</b><br>1) «Вы годами осваивали PFM и золото руками — а CAD/CAM вас поначалу разочаровал. Расскажите про это разочарование.» — зачем: его задокументированная арка; голос сомнения со стороны рук.<br>2) «Вы говорили, что не доверяли бы системе, которая делает хуже рук (Chairside Vol. 13-1, 2018). Когда машина догнала ваши руки — был момент?» — зачем: вердикт ремесленника машине, планка качества фильма одним ответом.<br>3) «Отфрезеруйте коронку с нами в реальном времени и прокомментируйте: что машина знает из того, что вы знали на ощупь?» — зачем: живое демо для #3 от единственного, кто может сравнивать честно.<br>4) «Вы написали ‘garbage in, garbage out’ про сканирование (Vol. 19-2, 2024). Чему врачу реально надо научиться — и сколько это занимает?» — зачем: конкретика барьера обучения (#4).<br>5) «‘Будущее — за самодостаточным кабинетом’ — где через десять лет заканчивается лаборатория и начинается кабинет?» — зачем: его собственный тезис; кормит #12 и тему self-disruption.<br>6) «Вы скучаете по воску?» — зачем: человеческое закрытие; вопрос элегии тому, кто ушёл из ремесла добровольно.<br><br><b>Как заходить / осторожно.</b> Студийный день №1 вместе с Лисоном и Азерниковым — он клинический противовес их инженерии; живое демо снимать, пока студия настроена на макро. Заходить как к ремесленнику-клиницисту, не как к презентеру продукта: его ценность — дистанция от маркетинга, поэтому язык питча glidewell.io в вопросах не используем. Кандидат на руки «The Old Way» — обсудить с ним напрямую. Исправить везде: подкаст ведёт НЕ он (ведущий — Парк).<br><br><b>Проверить перед съёмкой.</b> Титул и продуктовые кредиты (BruxZir NOW, Obsidian FTM, роль в glidewell.io) — по Chairside Vol. 13-1, 2018, подтвердить актуальность. «35+ млн записей реставраций» (Vol. 19-2, 2024) против «10M+ дизайнов» у Лисона (2022) — разные метрики или рост? Свести перед экраном. Годы E4D (~2007–2010) и даты далласской лабы — из интервью 2018-го, подтвердить у него. «Одна из двух программ» LSU — его утверждение, проверить.<br><br><b>Уверенность.</b> Арка карьеры и цитаты — из источников (Vol. 13-1, 2018; Vol. 19-2, 2024), высокая. Поправка про подкаст выверена (ведущий — Парк). Широту продуктовых кредитов и даты подтвердить у него."},

  patel:{nm:"Paresh Patel", a:22, sc:[10], g:"k", status:"verify",
    brief:{en:"<b>Who he is.</b> Dr. Paresh Patel — location NOW CONFIRMED: private practices in Lenoir and Mooresville, North Carolina. UNC Chapel Hill DDS, MCG/AAID MaxiCourse, ICOI diplomate; 5,000+ implants placed — and here is his angle for us: co-founder of the American Academy of Small Diameter Implants, 3,500+ mini implants placed. He is deep in the Glidewell orbit: promotes BruxZir NOW with glidewell.io, teaches Glidewell live courses on freehand and guided implant surgery, appears in company videos, and contributed to Chairside (Vol. 18-1).<br><br><b>Why this film.</b> Patel is the access angle of implantology (#12, #2): mini implants exist precisely for patients who can’t afford or can’t take conventional ones — implant dentistry’s own affordability story, told by its co-founder-academy man.<br><br><b>What only he gives.</b> The affordable-implant thread nobody else on the roster carries: what do you do for the denture patient with $2,000, not $20,000? That question IS our thesis, in surgery.<br><br><b>What to ask.</b><br>1) “Mini implants: who is the patient conventional implantology leaves behind — and what do minis change for them?” — why: the access thesis in implants, from the academy’s co-founder.<br>2) “You teach both freehand and guided surgery. What does the guide democratize, honestly — and what still takes ten years of hands?” — why: #12’s balance, from a man who teaches both.<br>3) “You practice in small-town North Carolina, not a metro. What does dental access look like from Lenoir?” — why: geography of the gap (#2) from inside it — no one else on the roster practices rural.<br><br><b>How to approach / caution.</b> Warm route: through Glidewell education/courses (he teaches for them) — but on camera he must speak as educator-practitioner, not product promoter; his glidewell.io ties are the closest to promotional on the external roster, so keep questions on patients and geography. East-coast trip only if paper edit demands; alternatively film at a Glidewell course he teaches in Irvine.<br><br><b>Verify before shooting.</b> Implant counts (5,000+/3,500+ — his bios); academy title; current course schedule with Glidewell; which practice (Lenoir vs Mooresville) to name in the lower-third.<br><br><b>Confidence.</b> Location, credentials, Glidewell ties: high (multiple sources). The rural-access framing: our angle — verify his willingness to speak to it.",ru:"<b>Кто он.</b> Д-р Пареш Пател — локация ТЕПЕРЬ ПОДТВЕРЖДЕНА: частные практики в Леноире и Мурсвилле, Северная Каролина. DDS Университета Северной Каролины (Чапел-Хилл), MaxiCourse MCG/AAID, дипломат ICOI; 5000+ поставленных имплантов — и вот его угол для нас: сооснователь Американской академии имплантов малого диаметра, 3500+ мини-имплантов. Глубоко в орбите Glidewell: продвигает BruxZir NOW с glidewell.io, ведёт живые курсы Glidewell по freehand и guided хирургии, появляется в видео компании, публиковался в Chairside (Vol. 18-1).<br><br><b>Зачем фильму.</b> Пател — угол доступа в имплантологии (#12, #2): мини-импланты существуют ровно для пациентов, которым обычные не по карману или не по кости, — собственная история доступности имплант-стоматологии от человека, сооснователя её академии.<br><br><b>Что только он даёт.</b> Нить доступного импланта, которую не несёт никто в ростере: что делать пациенту с протезом и $2000, а не $20 000? Этот вопрос И ЕСТЬ наш тезис — в хирургии.<br><br><b>О чём спрашивать.</b><br>1) «Мини-импланты: кто тот пациент, которого обычная имплантология оставляет за бортом, — и что мини меняют для него?» — зачем: тезис доступа в имплантах от сооснователя академии.<br>2) «Вы учите и freehand, и guided хирургии. Что шаблон демократизирует честно — а что по-прежнему требует десяти лет рук?» — зачем: баланс #12 от человека, который учит обоим.<br>3) «Вы практикуете в малых городах Северной Каролины, не в метрополии. Как выглядит стоматологический доступ из Леноира?» — зачем: география разрыва (#2) изнутри — никто другой в ростере не практикует в глубинке.<br><br><b>Как заходить / осторожно.</b> Тёплый маршрут: через образование/курсы Glidewell (он для них преподаёт) — но в кадре он должен говорить как educator-практик, не промоутер продукта; его связи с glidewell.io — самые близкие к промо во внешнем ростере, поэтому вопросы держать на пациентах и географии. Восточный выезд — только если paper edit потребует; альтернатива — снять на курсе Glidewell в Ирвайне.<br><br><b>Проверить перед съёмкой.</b> Счётчики имплантов (5000+/3500+ — его биографии); титул в академии; текущее расписание курсов с Glidewell; какую практику (Леноир или Мурсвилл) ставить в титр.<br><br><b>Уверенность.</b> Локация, регалии, связи с Glidewell: высокая (несколько источников). Рамка сельского доступа: наш угол — проверить его готовность говорить об этом."},

  leeson:{nm:"David Leeson", a:24, sc:[5,11,12,13], g:"g", status:"ok",
    quote:{q:"Now we are creating heavily connected systems and leveraging data from the more than 10 million individual patient designs we store in the cloud.", src:"Glidewell / Machine Design, 2022", url:"https://glidewelldental.com/company/blog/sinking-their-teeth-into-automation"},
    brief:{en:"<b>Who he is.</b> David Leeson is Glidewell’s EVP of Engineering, Manufacturing and R&D — the architect of the BruxZir Factory and of what he calls “mass customization”: multiple automated lines coordinating thousands of restorations at once, every single one unique to its patient, each carrying its own tracking code (<a href='https://glidewelldental.com/education/chairside-magazine/volume-21-issue-2/robotics-automation' target='_blank' rel='noopener'>Chairside Vol. 21-2, 2026</a>). He came to dentistry from Formula 1 engineering and aerodynamics, “where precision is measured in thousandths of a millimeter” (<a href='https://glidewelldental.com/company/blog/from-scans-to-smiles-how-glidewell-is-shaping-the-future-of-digital-dentistry' target='_blank' rel='noopener'>company blog, Sep 2025</a>) — and his own career replays the whole automation story in miniature: as a young engineering manager he piloted Glidewell’s first collaborative robot, a single UR5, back when cobots were exotic (he trusted them after seeing BMW use them); that one robot cut crown production from 27 to 18 hours and, in his words, “freed our employees up to focus on complex tasks” (<a href='https://www.universal-robots.com/case-stories/glidewell-laboratories/' target='_blank' rel='noopener'>Universal Robots case study</a>). Today robotic arms pick the zirconia blocks on his floor. He is an engineer first — systems, tolerances, throughput, not marketing — which is exactly what makes him credible on camera.<br><br><b>Why this film.</b> Leeson carries the factory chapter (#11), the R&D-ahead beat (#12), the next generation (#13) — and now #5: the digitize floor, since by his own fresh number ~30% of cases still arrive as physical impressions and must be converted by human hands (<a href='https://glidewelldental.com/education/chairside-magazine/volume-21-issue-2/robotics-automation' target='_blank' rel='noopener'>Chairside Vol. 21-2, 2026</a>). His role in the story is the later chapter of BruxZir: not the birth of the material but how a premium crown becomes a default, affordable product — automation and scale as the mechanism of access. He pairs naturally with Azernikov: the AI brain to his factory floor; and with Venard on the other side of time — the hands his machines replaced, in the same buildings.<br><br><b>What only he gives.</b> Two things nobody else has. First, the strongest on-camera automation voice on the roster — the one person who can stand on the line and honestly divide the labor: what the machine took, what humans still do (approving AI designs, inspecting mills, shade recipes, final QC — his own published list). Second, a biography that IS the film’s seam: precision culture arriving from Formula 1 into a craft — one life as the bridge between “hands that feel tenths” and “machines that measure thousandths”.<br><br><b>What to ask.</b><br>1) “Walk me through one crown — from the scan landing to the box shipping. Where does a human touch it?” — why: the visual spine of the factory sequence; his published process flow says he will deliver it step by step.<br>2) “In Formula 1 you measured thousandths of a millimeter. What surprised you about teeth?” — why: humanizes him instantly and hands us the thesis seam in one sentence — a car has identical parts, a mouth never does.<br>3) “Tell the story of the first robot — one UR5, when cobots were exotic. What did the team say when it showed up?” — why: grounded in the documented case; unlocks fear→trust and “the robot freed people for complex work”, our people-not-layoffs theme from the floor’s perspective.<br>4) “Car plants make thousands of identical parts; you make thousands where every one is different. Explain ‘mass customization’ to a patient.” — why: his own term; gives the factory scene its thesis line in plain language.<br>5) “About 30% of cases still arrive as physical impressions. What does that analog tail tell you?” — why: his number; honestly bridges the factory to the old-school world and part #5.<br>6) “Where does the system still fail — what keeps you up at night?” — why: the honesty beat that keeps the factory from feeling like a brochure.<br><br><b>How to approach / caution.</b> Treat him as an engineer, not a spokesman — let him geek out on process and he gives gold; push superlatives and he flattens. Studio Day 1 slot, together with Azernikov and Chi — shoot their blocks adjacent so the “brain” and the “floor” answer the same questions. Schedule the factory walk around line uptime. Keep the honesty guardrail: Glidewell brought monolithic zirconia to market and made it the default at scale — never “invented zirconia”. Avoid competitor comparisons and proprietary specifics on camera. ⚠ Same-name trap: the internet has two other known David Leesons (a Stanford microwave-electronics professor and a Dallas photojournalist) — do not pull their bios or photos (we already had this happen with a Friebauer namesake).<br><br><b>Verify before shooting.</b> Lower-third title: “EVP of Engineering, Manufacturing and R&D” per Chairside Vol. 21-2, 2026 — our roster still said “VP of Engineering”, update everywhere. UR-robot numbers (27→18 hours, 10-min mill cycle) are from the early-2010s case study — do not present as today’s figures without his confirmation. “10M+ patient designs in the cloud” is from 2022 — ask the current number. His fresh ~30% physical impressions supersedes our older ~25% — adopt his figure. F1 details (team, years) unknown — ask him directly; great icebreaker.<br><br><b>Confidence.</b> Factory role, mass-customization concept, F1 background and the first-cobot story are all sourced with dates — high. Exact career timeline and F1 specifics are unknown — to be filled at the interview.",ru:"<b>Кто он.</b> Дэвид Лисон — EVP по инженерии, производству и R&D Glidewell, архитектор фабрики BruxZir и того, что он сам называет «mass customization»: несколько автоматизированных линий одновременно ведут тысячи реставраций, каждая уникальна и несёт собственный код отслеживания (<a href='https://glidewelldental.com/education/chairside-magazine/volume-21-issue-2/robotics-automation' target='_blank' rel='noopener'>Chairside Vol. 21-2, 2026</a>). В стоматологию он пришёл из инженерии и аэродинамики Формулы-1, «где точность меряется тысячными долями миллиметра» (<a href='https://glidewelldental.com/company/blog/from-scans-to-smiles-how-glidewell-is-shaping-the-future-of-digital-dentistry' target='_blank' rel='noopener'>блог компании, сентябрь 2025</a>), — и его собственная карьера повторяет всю историю автоматизации в миниатюре: молодым инженером-менеджером он запустил первый коллаборативный робот Glidewell — один UR5, когда коботы были экзотикой (доверился им, увидев их на BMW); этот один робот сократил производство коронок с 27 до 18 часов и, его словами, «освободил сотрудников для сложных задач» (<a href='https://www.universal-robots.com/case-stories/glidewell-laboratories/' target='_blank' rel='noopener'>кейс Universal Robots</a>). Сегодня циркониевые заготовки на его этаже подают роботы-манипуляторы. Он прежде всего инженер — системы, допуски, пропускная способность, не маркетинг — и именно это делает его убедительным в кадре.<br><br><b>Зачем фильму.</b> Лисон несёт главу фабрики (#11), бит «R&D впереди» (#12), следующее поколение (#13) — и теперь #5: участок оцифровки, потому что по его собственной свежей цифре ~30% кейсов до сих пор приходят физическими слепками и оцифровываются руками (<a href='https://glidewelldental.com/education/chairside-magazine/volume-21-issue-2/robotics-automation' target='_blank' rel='noopener'>Chairside Vol. 21-2, 2026</a>). Его роль в истории — поздняя глава BruxZir: не рождение материала, а то, как премиальная коронка становится дефолтным, доступным продуктом — автоматизация и масштаб как механизм доступности. Естественная пара — Азерников: ИИ-мозг при его цехе; и Venard по другую сторону времени — руки, которые заменили его машины, в тех же зданиях.<br><br><b>Что только он даёт.</b> Две вещи, которых нет ни у кого. Первое — сильнейший голос по автоматизации во всём касте: единственный, кто может встать у линии и честно разделить труд — что забрала машина и что до сих пор делают люди (утверждают ИИ-дизайны, инспектируют фрезеровку, ведут рецепты оттенков, финальный QC — его собственный опубликованный список). Второе — биография, которая и ЕСТЬ шов фильма: культура точности, пришедшая из Формулы-1 в ремесло; одна жизнь как мост между «руками, чувствующими десятые» и «машинами, меряющими тысячные».<br><br><b>О чём спрашивать.</b><br>1) «Проведите меня по пути одной коронки — от прихода скана до отгрузки коробки. Где её касается человек?» — зачем: визуальный стержень сцены фабрики; его опубликованный процесс говорит, что он выдаст это по шагам.<br>2) «В Формуле-1 вы меряли тысячные доли миллиметра. Что вас удивило в зубах?» — зачем: мгновенно очеловечивает и вручает нам шов тезиса одной фразой — у машины детали одинаковые, во рту одинаковых не бывает.<br>3) «Расскажите историю первого робота — один UR5, когда коботы были экзотикой. Что сказала команда, когда он появился?» — зачем: опирается на задокументированный кейс; вскрывает «страх→доверие» и «робот освободил людей для сложной работы» — наша тема «люди, а не сокращения» глазами цеха.<br>4) «Автозавод делает тысячи одинаковых деталей; вы делаете тысячи, где каждая разная. Объясните ‘mass customization’ пациенту.» — зачем: его собственный термин; даёт сцене фабрики тезисную фразу простым языком.<br>5) «Около 30% кейсов до сих пор приходят физическими слепками. О чём вам говорит этот аналоговый хвост?» — зачем: его цифра; честно связывает фабрику с миром «по-старому» и частью #5.<br>6) «Где система до сих пор ошибается — что не даёт вам спать?» — зачем: бит честности, который не даёт фабрике выглядеть брошюрой.<br><br><b>Как заходить / осторожно.</b> Относиться как к инженеру, а не спикеру: дайте углубиться в процесс — выдаст золото; потянете к превосходным степеням — потускнеет. Слот студийного дня №1, вместе с Азерниковым и Chi — снимать их блоки смежно, чтобы «мозг» и «цех» отвечали на одни и те же вопросы. Проход по фабрике согласовать с работой линий. Гайдрейл честности: Glidewell вывел монолитный цирконий на рынок и сделал стандартом в масштабе — никогда не «изобрёл цирконий». Без сравнений с конкурентами и закрытых деталей на камеру. ⚠ Ловушка тёзок: в сети есть два других известных Дэвида Лисона (стэнфордский профессор СВЧ-электроники и фотожурналист из Далласа) — не тянуть их биографии и фото (с тёзкой Фрибауэра такое уже случалось).<br><br><b>Проверить перед съёмкой.</b> Титр: «EVP of Engineering, Manufacturing and R&D» по Chairside Vol. 21-2, 2026 — в нашем ростере до сих пор было «VP of Engineering», обновить везде. Цифры UR-кейса (27→18 часов, 10-мин цикл) — из кейса начала 2010-х, не выдавать за сегодняшние без его подтверждения. «10M+ дизайнов в облаке» — 2022 год, спросить актуальную цифру. Его свежие ~30% физических слепков заменяют наши прежние ~25% — берём его цифру. Детали Формулы-1 (команда, годы) неизвестны — спросить лично; отличный icebreaker.<br><br><b>Уверенность.</b> Роль на фабрике, концепция mass customization, бэкграунд Формулы-1 и история первого кобота — всё из первоисточников с датами (высокая). Точная хронология карьеры и детали F1 неизвестны — добрать на интервью."},

    bruxzir:{en:"<b>How:</b> lead architect of Glidewell Intelligent Manufacturing — the automated, AI/robotic, micro-CT workflow that mills and ships BruxZir crowns at scale (BruxZir Factory, 2019). <b>Why:</b> this is the <i>later</i> chapter, not the birth — how BruxZir is made industrially today; what the machine took over vs. what still needs a human hand. Pairs with Azernikov (the AI brain).",ru:"<b>Как:</b> главный архитектор Glidewell Intelligent Manufacturing — автоматизированного ИИ/робот./микро-КТ процесса, который фрезерует и отгружает коронки BruxZir в масштабе (фабрика BruxZir, 2019). <b>Почему:</b> это <i>поздняя</i> глава, не рождение — как BruxZir делают индустриально сегодня; что забрала машина, а где ещё нужна рука человека. В паре с Azernikov (ИИ-мозг)."},
